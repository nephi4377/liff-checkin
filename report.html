<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>添心設計 | 施工回報 v7.8</title>

  <!-- UI / SDK -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>

  <script>
    // ⚠️請確認為最新設定
    const LIFF_ID = '2007974938-gOrjlzna';
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwbEVAfoO9eRzcUSfESIwih1Poub657h_9jz5UcqTXbxsDQOZ3mjLm1nHZfn_WM2K8/exec';
  </script>

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .spinner { border-top-color: #3498db; animation: spin 1s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .file-input-label { display: inline-block; background-color: #3b82f6; color: white; border: 1px solid #3b82f6; padding: 0.5rem 1rem; border-radius: 0.375rem; cursor: pointer; transition: background-color 0.2s; font-weight: 600; }
    .file-input-label:hover { background-color: #2563eb; }
    .file-input-label.selected { background-color: #6b7280; border-color: #6b7280; cursor: default; }
    /* 【您的要求】輔助按鈕樣式 */
    .helper-btn {
      background-color: #f3f4f6; color: #4b5563; border: 1px solid #d1d5db;
      padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.875rem;
      transition: background-color 0.2s;
    }
    .helper-btn:hover { background-color: #e5e7eb; }
  </style>
</head>

<body class="bg-gray-100">
  <div class="container mx-auto p-4 max-w-lg">
    <div class="bg-white rounded-lg shadow-md p-6">
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">添心設計｜施工回報</h1>
      </div>

      <!-- 表單 -->
      <form id="report-form" novalidate>
        <!-- 案號：限制純數字 + 範例 + 非案場=9999 -->
        <div class="mb-4">
          <label for="projectId" class="block text-gray-700 font-semibold mb-2">
            案號 <span class="text-red-500">*</span>
          </label>
          <input
            type="tel"
            id="projectId"
            class="w-full px-3 py-2 border border-gray-300 rounded-md"
            inputmode="numeric"
            pattern="[0-9]+"
            placeholder="例如：715；非案場請填 9999"
            required
          >
          <p class="text-sm text-gray-500 mt-1">
            僅允許數字（例：<span class="font-semibold">715</span>）。若為非案場，請填 <span class="font-semibold">9999</span>。
          </p>
          <p id="projectIdError" class="text-sm text-red-600 mt-1 hidden"></p>
        </div>

        <div class="mb-4">
          <label for="workType" class="block text-gray-700 font-semibold mb-2">
            今日施工項目 <span class="text-red-500">*</span>
          </label>
          <select id="workType" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-white" required>
            <option value="" disabled selected>請選擇施工項目</option>
            <option value="保護工程-進退場項目">1. 保護工程-進退場項目</option>
            <option value="木作工程">2. 木作工程</option>
            <option value="系統工程">3. 系統工程</option>
            <option value="水電工程">4. 水電工程</option>
            <option value="油漆工程">5. 油漆工程</option>
            <option value="泥作工程">6. 泥作工程</option>
            <option value="清潔工程">7. 清潔工程</option>
            <option value="玻璃工程">8. 玻璃工程</option>
            <option value="其他工程">9. 其他工程</option>
          </select>
        </div>

        <div class="mb-4">
          <label for="workDescription" class="block text-gray-700 font-semibold mb-2">當日施工內容說明</label>
          <textarea id="workDescription" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-md"></textarea>
          <!-- 【您的要求】施工內容輔助按鈕容器 -->
          <div id="workDescriptionHelpers" class="mt-2 flex flex-wrap gap-2">
            <!-- 按鈕將由 JS 動態產生 -->
          </div>
        </div>

        <div class="mb-4">
          <label class="block text-gray-700 font-semibold mb-2">現場照片 (可多選)</label>
          <div class="flex items-center">
            <label for="sitePhotos" id="sitePhotosLabel" class="file-input-label">選擇檔案</label>
            <span id="sitePhotosCount" class="ml-3 text-gray-600">未選取檔案</span>
            <input type="file" id="sitePhotos" multiple accept="image/*" class="hidden" />
          </div>
        </div>

        <div class="mb-4">
          <label for="problemDescription" class="block text-gray-700 font-semibold mb-2">問題回報</label>
          <textarea id="problemDescription" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-md"></textarea>
          <!-- 【您的要求】問題回報輔助按鈕容器 -->
          <div id="problemDescriptionHelpers" class="mt-2 flex flex-wrap gap-2">
            <!-- 按鈕將由 JS 動態產生 -->
          </div>
        </div>

        <div class="mb-6">
          <label class="block text-gray-700 font-semibold mb-2">問題照片 (可多選)</label>
          <div class="flex items-center">
            <label for="problemPhotos" id="problemPhotosLabel" class="file-input-label">選擇檔案</label>
            <span id="problemPhotosCount" class="ml-3 text-gray-600">未選取檔案</span>
            <input type="file" id="problemPhotos" multiple accept="image/*" class="hidden" />
          </div>
        </div>

        <div class="flex items-center mb-4">
          <input id="compressImages" type="checkbox" checked class="h-4 w-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500"/>
          <label for="compressImages" class="ml-2 block text-sm text-gray-900">壓縮相片以加快上傳</label>
        </div>

        <div id="status-message" class="text-center mb-4 min-h-[24px]"></div>

        <button type="submit" id="submit-button" class="w-full bg-blue-600 text-white font-bold py-3 px-6 rounded-lg text-lg hover:bg-blue-700 disabled:bg-gray-400">
          <span id="button-text">提交回報</span>
          <div id="button-spinner" class="spinner w-6 h-6 border-4 border-white rounded-full mx-auto hidden"></div>
        </button>
      </form>

      <!-- [v454.0 UX優化] 新增成功提交畫面 -->
      <div id="success-screen" class="text-center hidden">
        <svg class="mx-auto h-16 w-16 text-green-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <h2 class="mt-4 text-2xl font-bold text-gray-800">回報已成功提交！</h2>
        <p class="mt-2 text-gray-600">後續處理完成後您會收到 LINE 通知。<br>此視窗將在 30 秒後自動關閉。</p>
      </div>
    </div>
  </div>

  <!-- 【v150.0 核心修正】徹底修正巢狀 script 標籤與註解語法錯誤 -->
  <script type="module">
    import { readFileAsBase64 } from './utils.js';

    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('report-form');
      const submitButton = document.getElementById('submit-button');
      const buttonText = document.getElementById('button-text');
      const buttonSpinner = document.getElementById('button-spinner');
      const statusMessage = document.getElementById('status-message');
      let userProfile = null;

      // === 初始化 ===
      async function main() {
        // [v425.0 架構優化] 支援混合模式 (從主控台內嵌 或 直接LIFF開啟)
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');
        const name = urlParams.get('name');

        if (uid && name) {
            // 模式一：從主控台內嵌，已取得 uid 和 name
            console.log('⚡️ 偵測到 uid，以內嵌模式啟動...');
            userProfile = { userId: uid, displayName: name };
            initializeEventListeners();
        } else {
            // 模式二：直接開啟，需執行 LIFF 驗證
            console.log('🔄 未偵測到 uid，以獨立 LIFF 模式啟動...');
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                userProfile = await liff.getProfile();
                initializeEventListeners();
            } catch (error) {
                console.error('LIFF 初始化失敗:', error);
                updateStatus('頁面初始化失敗，請在 LINE 中開啟或重新載入。', 'error');
                submitButton.disabled = true;
            }
        }
      }

      // === 綁定 UI 事件 ===
      function initializeEventListeners() {
        setupFileInputUI('sitePhotos', 'sitePhotosLabel', 'sitePhotosCount');
        setupFileInputUI('problemPhotos', 'problemPhotosLabel', 'problemPhotosCount');

        // 【您的要求】初始化輔助按鈕
        initializeHelperButtons();

        // 案號輸入：即時只留數字；失焦再清一次
        const projectIdEl = document.getElementById('projectId');
        projectIdEl.addEventListener('input', () => enforceDigits(projectIdEl));
        projectIdEl.addEventListener('blur',  () => enforceDigits(projectIdEl));

        // 【優化建議】記住並還原上次選擇的施工項目
        const workTypeSelect = document.getElementById('workType');
        const lastWorkType = localStorage.getItem('lastSelectedWorkType');
        if (lastWorkType) {
          workTypeSelect.value = lastWorkType;
          // 【您的要求】手動觸發一次 change 事件，以確保輔助按鈕能被正確渲染
          // 這會模擬使用者手動選擇的行為，觸發 initializeHelperButtons 中綁定的監聽器
          workTypeSelect.dispatchEvent(new Event('change'));
        }
        workTypeSelect.addEventListener('change', () => localStorage.setItem('lastSelectedWorkType', workTypeSelect.value));

        form.addEventListener('submit', handleFormSubmit);
      }

      // 【您的要求】輔助按鈕核心邏輯
      function initializeHelperButtons() {
        const workTypeSelect = document.getElementById('workType');
        
        const workTypePhrases = {
          '保護工程-進退場項目': ['進場保護', '退場清潔', '電梯保護', '走道保護', '廢棄物清運', '完工保護'],
          '木作工程': ['天花板施工', '櫃體組裝', '門片安裝', '角料下料', '隔間牆施工', '造型牆', '電視牆施工'],
          '系統工程': ['櫃體安裝', '門片調整', '五金安裝', '收邊', '層板安裝', '檯面安裝'],
          '水電工程': ['配管', '拉線', '燈具安裝', '開關面板', '插座面板', '弱電佈線', '給水測試', '排水測試'],
          '油漆工程': ['批土', '研磨', '底漆', '面漆', '跳色', '噴漆', '木皮上漆'],
          '泥作工程': ['砌磚', '打底', '粉光', '磁磚鋪貼', '防水施作', '地坪墊高', '門窗崁縫'],
          '清潔工程': ['粗清', '細清', '垃圾清運', '裝潢後清潔'],
          '玻璃工程': ['玻璃安裝', '鏡面安裝', '矽利康收邊', '淋浴拉門'],
          '其他工程': ['現場丈量', '設計圖製作', '施工圖製作', '與客戶討論', '廠商洽談', '材料確認']
        };

        const problemPhrases = ['【缺料】', '【尺寸不符】', '【圖面疑問】', '【品質問題】', '【需與設計師確認】', '【需與工務確認】', '【工序衝突】', '【現場保護不足】', '【工具損壞】'];

        // 渲染問題回報的通用按鈕
        renderHelperButtons('problemDescriptionHelpers', problemPhrases, 'problemDescription');

        // 根據施工項目動態渲染按鈕
        workTypeSelect.addEventListener('change', () => {
          const selectedType = workTypeSelect.value;
          renderHelperButtons('workDescriptionHelpers', workTypePhrases[selectedType] || [], 'workDescription');
        });

        // 初始觸發一次
        renderHelperButtons('workDescriptionHelpers', [], 'workDescription');
      }

      function renderHelperButtons(containerId, phrases, targetTextareaId) {
        const container = document.getElementById(containerId);
        const textarea = document.getElementById(targetTextareaId);
        container.innerHTML = '';
        if (!phrases || phrases.length === 0) return;

        phrases.forEach(phrase => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'helper-btn';
          button.textContent = phrase;
          button.addEventListener('click', () => {
            // 【您的要求】智慧插入：如果文字框是空的，或結尾是空格/換行，則直接插入；否則先補一個空格再插入，確保文字接續。
            const endsWithSpaceOrNewline = textarea.value === '' || /\s$/.test(textarea.value);
            const separator = endsWithSpaceOrNewline ? '' : ' ';
            textarea.value += separator + phrase;
            textarea.focus(); // 將焦點移回文字框
          });
          container.appendChild(button);
        });
      }

      // === 僅允許數字：即時過濾 ===
      function enforceDigits(el) {
        const digits = (el.value || '').replace(/\D+/g, '');
        if (el.value !== digits) el.value = digits;
      }

      // === 錯誤訊息顯示/隱藏 ===
      function showProjectIdError(msg) {
        const err = document.getElementById('projectIdError');
        const input = document.getElementById('projectId');
        err.textContent = msg || '案號僅能輸入數字；非案場請填 9999。';
        err.classList.remove('hidden');
        input.classList.add('border-red-500');
      }
      function hideProjectIdError() {
        const err = document.getElementById('projectIdError');
        const input = document.getElementById('projectId');
        err.textContent = '';
        err.classList.add('hidden');
        input.classList.remove('border-red-500');
      }

      // === 取得並驗證案號（通過回傳純數字字串；失敗回傳 null） ===
      function getValidProjectId() {
        const input = document.getElementById('projectId');
        enforceDigits(input);
        const v = (input.value || '').trim();
        if (!v || !/^\d+$/.test(v)) {
          showProjectIdError('請輸入純數字案號；非案場請填 9999。');
          return null;
        }
        hideProjectIdError();
        return v;
      }

      // === 送出處理 ===
      async function handleFormSubmit(event) {
        event.preventDefault();
        setLoadingState(true);

        if (!userProfile) {
          updateStatus('無法取得使用者資訊，請重新載入頁面。', 'error');
          setLoadingState(false);
          return;
        }

        // 1) 先驗證案號（純數字；非案場請填 9999）
        const cleanProjectId = getValidProjectId();
        if (!cleanProjectId) {
            setLoadingState(false);
            return; // 中止提交
        }

        const shouldCompress = document.getElementById('compressImages').checked;

        const siteFiles = Array.from(document.getElementById('sitePhotos').files);
        const problemFiles = Array.from(document.getElementById('problemPhotos').files);
        const allPhotosInfo = [
            ...siteFiles.map(file => ({ file, isProblem: false })),
            ...problemFiles.map(file => ({ file, isProblem: true }))
        ];

        const workDescription = document.getElementById('workDescription').value.trim();
        const problemDescription = document.getElementById('problemDescription').value.trim();
        if (allPhotosInfo.length === 0 && !workDescription && !problemDescription) {
            updateStatus('請至少填寫施工內容或上傳照片。', 'error');
            setLoadingState(false);
            return;
        }

        const batchId = `${userProfile.userId}-${Date.now()}`;
        const SUBMIT_CHUNK_SIZE = 8;
        const totalChunks = Math.ceil(allPhotosInfo.length / SUBMIT_CHUNK_SIZE) || 1;

        const baseFormData = {
            action: 'submitReport',
            batchId,
            totalChunks,
            userId: userProfile.userId,
            userName: userProfile.displayName,
            projectId: cleanProjectId,
            projectNameRaw: cleanProjectId,
            workType: document.getElementById('workType').value,
            workDescription: document.getElementById('workDescription').value,
            problemDescription: document.getElementById('problemDescription').value,
        };

        // [v466.0 核心改造] 為了避免後端超時，將「設定檔案權限」的耗時操作移至前端。
        // 在此處預先取得所有檔案的 ID，並在背景設定權限。
        // 這樣後端接收到請求時，可以直接使用這些已授權的檔案，大幅縮短處理時間。
        const allFileIds = await getAndShareAllFileIds(allPhotosInfo);

        for (let i = 0; i < totalChunks; i++) {
            try {
                const chunkStart = i * SUBMIT_CHUNK_SIZE;
                const chunkEnd = chunkStart + SUBMIT_CHUNK_SIZE;
                const photoChunk = allPhotosInfo.slice(chunkStart, chunkEnd);

                updateStatus(`正在處理第 ${i + 1} / ${totalChunks} 批照片...`, 'info');
                const processedPhotos = await processPhotoChunk(photoChunk, shouldCompress);

                // [v466.0] 將對應 chunk 的 fileIds 也一併傳送給後端
                const chunkFileIds = allFileIds.slice(chunkStart, chunkEnd);
                const chunkFormData = { 
                    ...baseFormData, 
                    chunkIndex: i + 1, 
                    photos: processedPhotos,
                    driveFileIds: chunkFileIds.join(',') };

                updateStatus(`正在提交第 ${i + 1} / ${totalChunks} 批資料...`, 'info');
                
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(chunkFormData),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });

                const result = await response.json();

                if (!response.ok || !result.success) {
                    // 拋出一個包含具體錯誤訊息的例外
                    throw new Error(`第 ${i + 1} 批資料提交失敗：${result.message || '後端回報了一個未知的錯誤。'}`);
                }
            } catch (error) {
                console.error('表單處理失敗', error);
                console.log('Caught error in chunk loop, calling setLoadingState(false) and returning.');
                updateStatus(`提交失敗：${error.message}`, 'error');
                setLoadingState(false);
                return; // 【關鍵修正】一旦出錯，立即終止整個函式
            }
        }

        // 所有批次都成功後，才執行成功處理
        console.log('All chunks processed successfully. Calling handleSuccess().');
        handleSuccess();
    }

    // [v466.0 新增] 輔助函式：預先上傳所有檔案至暫存區，取得 File ID，並設定共用權限
    async function getAndShareAllFileIds(allPhotosInfo) {
        if (allPhotosInfo.length === 0) return [];
        
        updateStatus('正在準備檔案...', 'info');
        const fileIds = [];
        const tempFolderId = '1r54Q3G2I0S5p2G3eA4B5C6d7E8f9G0hI'; // 請替換為您的暫存資料夾 ID

        for (const photoInfo of allPhotosInfo) {
            try {
                const formData = new FormData();
                formData.append('file', photoInfo.file, photoInfo.file.name);

                // 1. 上傳檔案至暫存資料夾
                const uploadResponse = await fetch(`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${liff.getAccessToken()}` },
                    body: formData
                });
                const uploadResult = await uploadResponse.json();
                if (!uploadResult.id) throw new Error('上傳至 Drive 失敗');

                // 2. 設定檔案權限為公開
                await fetch(`https://www.googleapis.com/drive/v3/files/${uploadResult.id}/permissions`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${liff.getAccessToken()}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role: 'reader', type: 'anyone' })
                });
                fileIds.push(uploadResult.id);
            } catch (error) { throw new Error(`準備檔案 ${photoInfo.file.name} 時失敗: ${error.message}`); }
        }
        return fileIds;
    }

    // === 成功後處理 ===
    function handleSuccess() {
      // [v454.0 UX優化] 顯示成功畫面，取代單純的文字提示
      console.log('handleSuccess() called. Hiding form and showing success screen.');
      document.getElementById('report-form').style.display = 'none';
      document.getElementById('success-screen').style.display = 'block';
      submitButton.textContent = '已完成';
      submitButton.disabled = true;
      setTimeout(() => {
        if (liff && liff.isInClient()) {
          liff.closeWindow();
        }
      }, 30000); // [v455.0] 根據使用者要求，延長關閉時間至 30 秒
    }

    // === 單批相片處理（壓縮→轉 Base64） ===
    async function processPhotoChunk(photoInfoChunk, shouldCompress) {
      const photoArray = [];
      const options = { maxSizeMB: 1, maxWidthOrHeight: 1920, useWebWorker: true };
      for (const photoInfo of photoInfoChunk) {
        let processedFile = photoInfo.file;
        try {
          if (shouldCompress) {
            processedFile = await imageCompression(photoInfo.file, options);
            }
          // 【v144.0 核心修正】直接呼叫 import 的函式
          const base64 = await readFileAsBase64(processedFile);
          photoArray.push({
            name: photoInfo.file.name,
            type: processedFile.type,
            data: base64,
            isProblem: photoInfo.isProblem
          });
        } catch (error) { // [v456.0 核心修正] 增加明確的錯誤回報機制
          console.error(`圖片 ${photoInfo.file.name} 處理失敗:`, error);
          throw new Error(`處理圖片 "${photoInfo.file.name}" 時失敗，請檢查檔案是否損毀或過大。`);
          }
        }
      return photoArray;
    }

    // === 載入狀態 ===
    function setLoadingState(isLoading, message = '處理中...') {
      submitButton.disabled = isLoading;
      if (isLoading) {
        buttonText.classList.add('hidden');
        buttonSpinner.classList.remove('hidden');
        updateStatus(message, 'info');
      } else {
        buttonText.classList.remove('hidden');
        buttonSpinner.classList.add('hidden');
        // 移除此行，避免在錯誤發生後清除錯誤訊息。
        // 狀態訊息的清除或更新應由呼叫者明確處理。
      }
    }

    // === 狀態顯示 ===
    function updateStatus(message, type) {
      statusMessage.className = 'text-center mb-4 min-h-[24px]';
      statusMessage.textContent = message;

      if (type === 'success') {
        statusMessage.classList.add('text-green-600', 'font-semibold');
      } else if (type === 'error') {
        statusMessage.classList.add('bg-red-100', 'border', 'border-red-400', 'text-red-700', 'px-4', 'py-3', 'rounded-lg', 'font-bold');
      } else {
        statusMessage.classList.add('text-gray-600');
      }
    }

    // === 檔案選擇 UI ===
    function setupFileInputUI(inputId, labelId, countId) {
      const input = document.getElementById(inputId);
      const label = document.getElementById(labelId);
      const count = document.getElementById(countId);
      input.addEventListener('change', () => {
        if (input.files.length > 0) {
          label.classList.add('selected');
          count.textContent = `已選擇 ${input.files.length} 張照片`;
        } else {
          label.classList.remove('selected');
          count.textContent = '未選取檔案';
        }
      });
    }

    main();
  });
</script>
</body>
</html>
