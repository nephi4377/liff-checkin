<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作回報總覽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .spinner { border-top-color: #3498db; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .report-card-content ul { list-style-position: inside; }
        .report-card-content li { margin-bottom: 0.25rem; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4 md:p-8 max-w-4xl">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">工作回報總覽</h1>
            <p class="text-gray-500 mt-1">集中檢視團隊成員在指定區間內的所有施工回報。</p>
        </header>

        <div class="bg-white p-6 rounded-lg shadow-md mb-6 sticky top-4 z-10">
            <div class="flex flex-col md:flex-row gap-4 items-center">
                <label for="start-date-picker" class="font-semibold text-gray-700">查詢區間：</label>
                <input type="date" id="start-date-picker" class="border-gray-300 rounded-md shadow-sm text-base p-2 flex-grow">
                <span class="text-gray-500">至</span>
                <input type="date" id="end-date-picker" class="border-gray-300 rounded-md shadow-sm text-base p-2 flex-grow">
                <button id="query-btn" class="bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 w-full md:w-auto">查詢</button>
            </div>
        </div>

        <div id="reports-container" class="space-y-6">
            <div id="placeholder" class="text-center text-gray-500 py-16">
                <div class="spinner w-10 h-10 border-4 border-gray-200 rounded-full mx-auto"></div>
                <p class="mt-4">正在載入回報資料...</p>
            </div>
        </div>
    </div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbwbEVAfoO9eRzcUSfESIwih1Poub657h_9jz5UcqTXbxsDQOZ3mjLm1nHZfn_WM2K8/exec';
        const startDatePicker = document.getElementById('start-date-picker');
        const endDatePicker = document.getElementById('end-date-picker');
        const queryBtn = document.getElementById('query-btn');
        const reportsContainer = document.getElementById('reports-container');
        const placeholder = document.getElementById('placeholder');
        let userProfile = null; // [v399.0 新增] 用於儲存使用者資訊

        // 初始化日期選擇器為今天
        const today = new Date();
        startDatePicker.value = today.toLocaleDateString('sv');
        endDatePicker.value = today.toLocaleDateString('sv');

        // [v399.0 新增] 初始化使用者資訊
        function initializeUser() {
            const urlParams = new URLSearchParams(window.location.search);
            const isLocalTest = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
            let uid = urlParams.get('uid');
            let name = urlParams.get('name');

            if (isLocalTest && !uid) {
                console.warn('⚡️ 本地測試模式啟用，使用預設使用者資訊。');
                uid = 'Ud58333430513b7527106fa71d2e30151'; 
                name = '本地測試員';
            }

            if (!uid || !name) {
                showError('錯誤：缺少使用者認證資訊。<br>請從「整合主控台」進入此頁面。');
                queryBtn.disabled = true;
                return false;
            }
            userProfile = { userId: uid, userName: name };
            console.log('認證成功:', userProfile);
            return true;
        }

        // [v399.0 新增] 應用程式主入口
        function main() {
            // [v405.0 重構] 引入共用模組
            import('./utils.js').then(({ extractDriveFileId }) => {
                window.extractDriveFileId = extractDriveFileId; // 將函式掛載到 window，以便後續使用
                fetchAndRenderReports(startDatePicker.value, endDatePicker.value);
            }).catch(err => console.error('無法載入 utils.js:', err));

            if (initializeUser()) {
                queryBtn.addEventListener('click', () => fetchAndRenderReports(startDatePicker.value, endDatePicker.value));
                fetchAndRenderReports(startDatePicker.value, endDatePicker.value);
            }
        }

        // 啟動應用程式
        main();

        /**
         * 核心函式：獲取並渲染指定區間的回報
         * @param {string} startDateStr - YYYY-MM-DD 格式的開始日期
         * @param {string} endDateStr - YYYY-MM-DD 格式的結束日期
         */
        async function fetchAndRenderReports(startDateStr, endDateStr) {
            showLoading();
            if (!userProfile) {
                showError('使用者資訊尚未初始化，無法查詢。');
                return;
            }

            try {
                const url = new URL(API_BASE_URL);
                url.searchParams.append('page', 'get_daily_reports');
                url.searchParams.append('startDate', startDateStr);
                url.searchParams.append('endDate', endDateStr);
                url.searchParams.append('userName', userProfile.userName); // [v399.0 新增] 附上使用者名稱

                const response = await fetch(url);
                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.message || '後端回傳一個未知的錯誤');
                }

                renderReports(result.data);

            } catch (error) {
                console.error('載入回報失敗:', error);
                showError(`載入資料失敗：${error.message}`);
            }
        }

        /**
         * 將回報資料渲染到畫面上
         * @param {Array<object>} reports - 從後端取得的回報物件陣列
         */
        function renderReports(reports) {
            reportsContainer.innerHTML = '';

            if (!reports || reports.length === 0) {
                showEmpty();
                return;
            }

            reports.forEach(report => {
                const card = document.createElement('div');
                card.className = 'bg-white p-6 rounded-lg shadow-md border-l-4 border-blue-500';
                
                const reportTime = new Date(report.Timestamp).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });

                // 解析施工內容與問題回報
                let workContentHtml = '';
                // [v401.0 核心修正] 增加防呆機制，確保 report.Content 是字串後才進行 split 操作。
                // 這可以從根本上解決當 Content 欄位為 null 或非字串類型時，導致 .split is not a function 的錯誤。
                if (report.Content !== null && typeof report.Content !== 'undefined') {
                    const contentParts = String(report.Content).split('【問題回報】');
                    const workDesc = contentParts[0].replace('【施工內容】', '').trim();
                    const problemDesc = contentParts[1] ? contentParts[1].trim() : '';

                    if (workDesc) {
                        workContentHtml += `
                            <div>
                                <h4 class="font-semibold text-gray-600">施工內容：</h4>
                                <p class="text-gray-800 whitespace-pre-wrap pl-2">${workDesc}</p>
                            </div>`;
                    }
                    if (problemDesc) {
                        workContentHtml += `
                            <div class="mt-3">
                                <h4 class="font-semibold text-red-600">問題回報：</h4>
                                <p class="text-red-800 whitespace-pre-wrap pl-2">${problemDesc}</p>
                            </div>`;
                    }
                }

                // 處理照片
                let photosHtml = '';
                if (report.PhotoLinks) {
                    const photoUrls = report.PhotoLinks.split(',');
                    photosHtml = `
                        <div class="mt-4">
                            <h4 class="font-semibold text-gray-600 mb-2">現場照片 (${photoUrls.length}張)：</h4>
                            <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-2">
                                ${photoUrls.map(url => `
                                    <a href="${url.replace(/=s\d+$/, '')}" target="_blank" rel="noopener noreferrer" title="點擊以檢視原始大圖">                                        
                                        <!-- [v404.0 核心修正] 修正縮圖請求方式，解決 403 Forbidden 錯誤。 -->
                                        <!-- 1. 從 URL 中提取 fileId。 -->
                                        <!-- 2. 使用 /thumbnail 端點並帶上 sz=w256 參數請求縮圖，這是正確且穩定的作法。 -->
                                        <!-- 3. 點擊時，移除可能存在的 =s... 參數，確保開啟的是原始大圖。 -->
                                        <img src="https://drive.google.com/thumbnail?id=${window.extractDriveFileId(url)}&sz=w256" 
                                             alt="現場照片" class="w-full h-24 object-cover rounded-md hover:opacity-80 transition-opacity">
                                    </a>
                                `).join('')}
                            </div>
                        </div>`;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3 pb-3 border-b">
                        <div>
                            <h2 class="text-xl font-bold text-gray-800">${report.Title || '無標題'}</h2>
                            <p class="text-sm text-gray-500">
                                <span class="font-semibold">${report.UserName || '未知人員'}</span> 於 
                                <span class="font-semibold">${reportTime}</span> 回報
                            </p>
                        </div>
                        <div class="text-right">
                            <span class="text-sm font-medium bg-blue-100 text-blue-800 py-1 px-3 rounded-full">
                                案號 #${report.ProjectName || 'N/A'}
                            </span>
                        </div>
                    </div>
                    <div class="report-card-content text-sm space-y-3">
                        ${workContentHtml || '<p class="text-gray-500">無文字內容回報。</p>'}
                    </div>
                    ${photosHtml}
                `;
                reportsContainer.appendChild(card);
            });
        }

        function showLoading() {
            reportsContainer.innerHTML = '';
            placeholder.innerHTML = `
                <div class="spinner w-10 h-10 border-4 border-gray-200 rounded-full mx-auto"></div>
                <p class="mt-4">正在載入回報資料...</p>`;
            placeholder.classList.remove('hidden');
            reportsContainer.appendChild(placeholder);
        }

        function showError(message) {
            reportsContainer.innerHTML = '';
            placeholder.innerHTML = `<p class="text-red-500 font-semibold">${message}</p>`;
            placeholder.classList.remove('hidden');
            reportsContainer.appendChild(placeholder);
        }

        function showEmpty() {
            reportsContainer.innerHTML = '';
            placeholder.innerHTML = '<p>此區間內沒有任何工作回報紀錄。</p>';
            placeholder.classList.remove('hidden');
            reportsContainer.appendChild(placeholder);
        }
    });

</script>
</body>
</html>
