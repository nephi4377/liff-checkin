  <text x="225.0" y="218.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="11" font-weight="500" fill="#166534">或私訊傳圖</text>  <line x1="225" y1="230" x2="225" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>  <rect x="135" y="254" width="180" height="40" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="225.0" y="274.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="13" font-weight="700" fill="#1e40af">系統解析／帶照片</text>  <line x1="225" y1="294" x2="225" y2="314" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>  <rect x="135" y="318" width="180" height="40" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
