  <text x="675.0" y="274.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="13" font-weight="700" fill="#1e40af">填表單＋分攤＋照片</text>  <line x1="675" y1="294" x2="675" y2="314" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>  <rect x="585" y="318" width="180" height="40" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
