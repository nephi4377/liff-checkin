  <text x="450.0" y="120" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="10" fill="#64748b">否 → 請改看「待付款申請」</text>  <line x1="450" y1="130" x2="450" y2="158" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>  <text x="225" y="168" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="11" font-weight="600" fill="#64748b">LINE 模式</text>  <rect x="135" y="178" width="180" height="52" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
