  <text x="350.0" y="164.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="13" font-weight="700" fill="#1e40af">開啟送審單（員工自審／主管代開）</text>  <line x1="350" y1="186" x2="350" y2="206" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>  <rect x="180" y="210" width="340" height="44" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="350.0" y="232.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="13" font-weight="700" fill="#1e40af">核對本薪、減項、獎金；專案報酬僅對照</text>  <line x1="350" y1="254" x2="350" y2="274" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>  <text x="175" y="290" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="11" font-weight="600" fill="#64748b">核准</text>  <rect x="85" y="300" width="180" height="40" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="175.0" y="320.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="13" font-weight="700" fill="#1e40af">填獎金、扣款、備註</text>  <line x1="175" y1="340" x2="175" y2="352" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>  <rect x="85" y="356" width="180" height="40" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
