  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="260.0" y="36" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="20" font-weight="700" fill="#0f172a">薪資 — 員工送審</text>
  <text x="260.0" y="58" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="12" fill="#64748b">添心設計 · 內部系統使用教學</text>
  <rect x="150" y="78" width="220" height="40" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="260.0" y="98.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="13" font-weight="700" fill="#334155">我的出勤與假勤</text>  <line x1="260" y1="118" x2="260" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>  <rect x="150" y="142" width="220" height="40" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="260.0" y="162.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="13" font-weight="700" fill="#1e40af">選發薪期別</text>  <line x1="260" y1="182" x2="260" y2="194" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>  <rect x="150" y="206" width="220" height="40" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="260.0" y="226.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="13" font-weight="700" fill="#1e40af">檢查出勤、請假、試算</text>  <line x1="260" y1="246" x2="260" y2="258" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>  <rect x="150" y="270" width="220" height="40" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="260.0" y="290.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="13" font-weight="700" fill="#64748b">異常？提出說明申訴</text>  <line x1="260" y1="310" x2="260" y2="322" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>  <rect x="150" y="334" width="220" height="40" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="260.0" y="354.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="13" font-weight="700" fill="#166534">送出薪資核對</text>  <text x="260" y="400" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="11" fill="#64748b">須等該期最後一天下班後才能送出</text></svg>
