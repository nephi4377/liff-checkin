  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="260.0" y="36" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="20" font-weight="700" fill="#0f172a">會計與款項 — 怎麼選？</text>
  <text x="260.0" y="58" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="12" fill="#64748b">添心設計 · 內部系統使用教學</text>
  <rect x="170" y="72" width="180" height="44" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="260.0" y="94.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="13" font-weight="700" fill="#334155">這筆款…</text>  <line x1="260" y1="116" x2="260" y2="136" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>  <text x="160" y="152" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="11" font-weight="600" fill="#64748b">已收／已付</text>  <rect x="70" y="162" width="180" height="50" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="160.0" y="179.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="13" font-weight="700" fill="#1e40af">會計系統</text>
  <text x="160.0" y="201.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="11" font-weight="500" fill="#1e40af">→ 收支登錄</text>  <line x1="160" y1="212" x2="160" y2="232" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>  <rect x="70" y="236" width="180" height="44" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="160.0" y="258.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="13" font-weight="700" fill="#166534">直接記帳</text>  <text x="360" y="152" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="11" font-weight="600" fill="#64748b">還沒付款</text>  <rect x="270" y="162" width="180" height="50" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="360.0" y="187.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="13" font-weight="700" fill="#1e40af">待付款申請</text>  <line x1="360" y1="212" x2="360" y2="232" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>  <rect x="270" y="236" width="180" height="44" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="360.0" y="258.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="13" font-weight="700" fill="#1e40af">申請 → 審核 → 匯款</text>  <text x="260" y="308" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="11" font-weight="600" fill="#64748b">員工薪資</text>  <rect x="170" y="318" width="180" height="44" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="260.0" y="340.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="13" font-weight="700" fill="#166534">員工送審</text>  <line x1="260" y1="362" x2="260" y2="382" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>  <rect x="170" y="386" width="180" height="44" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="260.0" y="408.0" text-anchor="middle" font-family="Noto Sans TC", "Microsoft JhengHei", sans-serif font-size="13" font-weight="700" fill="#166534">審核 → 匯款</text></svg>
