<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>照片轉正工具 | TianXin Plan Scanner</title>

    <!-- Tailwind CSS (樣式庫) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM (前端框架) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel (JSX 編譯器) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 預先定義 OpenCV 回呼函數，確保在腳本載入前已存在 -->
    <script>
        window.cvLoaded = false;
        window.onOpenCvReady = function () {
            window.cvLoaded = true;
            // 觸發自定義事件通知 React
            window.dispatchEvent(new Event('opencv-ready'));
            console.log("OpenCV.js is ready.");
        };
    </script>

    <!-- OpenCV.js (電腦視覺核心庫 - 非同步載入) -->
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"
        type="text/javascript"></script>

    <style>
        /* 針對移動裝置優化觸控體驗 */
        canvas {
            touch-action: none;
            /* 防止拖曳時觸發捲動 */
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #fafaf9;
            /* Stone 50 - 溫暖的淺灰白 */
            color: #292524;
            /* Stone 800 - 深暖灰文字 */
        }

        .loader {
            border: 4px solid #e7e5e4;
            /* Stone 200 */
            border-top: 4px solid #d97706;
            /* Amber 600 */
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .cursor-wait {
            cursor: wait;
        }

        .cursor-grabbing {
            cursor: grabbing;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- 內建圖標組件 ---
        const Icon = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const Layers = ({ className }) => (
            <Icon className={className}>
                <polygon points="12 2 2 7 12 12 22 7 12 2" />
                <polyline points="2 17 12 22 22 17" />
                <polyline points="2 12 12 17 22 12" />
            </Icon>
        );

        const Upload = ({ className }) => (
            <Icon className={className}>
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="17 8 12 3 7 8" />
                <line x1="12" y1="3" x2="12" y2="15" />
            </Icon>
        );

        const Move = ({ className }) => (
            <Icon className={className}>
                <polyline points="5 9 2 12 5 15" />
                <polyline points="9 5 12 2 15 5" />
                <polyline points="15 19 12 22 9 19" />
                <polyline points="19 15 22 12 19 9" />
                <line x1="2" y1="12" x2="22" y2="12" />
                <line x1="12" y1="2" x2="12" y2="22" />
            </Icon>
        );

        const Check = ({ className }) => (
            <Icon className={className}>
                <polyline points="20 6 9 17 4 12" />
            </Icon>
        );

        const Download = ({ className }) => (
            <Icon className={className}>
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
            </Icon>
        );

        const RefreshCw = ({ className }) => (
            <Icon className={className}>
                <path d="M23 4v6h-6" />
                <path d="M1 20v-6h6" />
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
            </Icon>
        );

        const Scissors = ({ className }) => (
            <Icon className={className}>
                <circle cx="6" cy="6" r="3" />
                <circle cx="6" cy="18" r="3" />
                <line x1="20" y1="4" x2="8.12" y2="15.88" />
                <line x1="14.47" y1="14.48" x2="20" y2="20" />
                <line x1="8.12" y1="8.12" x2="12" y2="12" />
            </Icon>
        );

        /** 編輯區四點預設（亦作 drawCanvas 防呆） */
        const DEFAULT_EDIT_POINTS = [{ x: 0.1, y: 0.1 }, { x: 0.9, y: 0.1 }, { x: 0.9, y: 0.9 }, { x: 0.1, y: 0.9 }];

        // --- 點位排序 ---
        const sortPoints = (pts) => {
            const sortedBySum = [...pts].sort((a, b) => (a.x + a.y) - (b.x + b.y));
            const p0 = sortedBySum[0]; // 左上 (TL)
            const p2 = sortedBySum[3]; // 右下 (BR)
            const middle = [sortedBySum[1], sortedBySum[2]].sort((a, b) => (a.x - a.y) - (b.x - b.y));
            const p1 = middle[0]; // 右上 (TR)
            const p3 = middle[1]; // 左下 (BL)
            return [p0, p1, p2, p3];
        };

        /** 偵測全失敗時的備援：近乎貼齊圖邊（拼貼／透視合成圖常用） */
        const FULL_IMAGE_FRAME_QUAD = sortPoints([
            { x: 0.012, y: 0.012 }, { x: 0.988, y: 0.012 },
            { x: 0.988, y: 0.988 }, { x: 0.012, y: 0.988 }
        ]);

        /** 從 approxPolyDP 的 Mat 讀出四點（整數／浮點皆嘗試） */
        const readQuadFromApprox = (approx, cols, rows) => {
            if (!approx || approx.rows !== 4) return null;
            const tempPoints = [];
            for (let j = 0; j < 4; j++) {
                let x = NaN;
                let y = NaN;
                if (approx.data32S && approx.data32S.length >= (j + 1) * 2) {
                    x = approx.data32S[j * 2];
                    y = approx.data32S[j * 2 + 1];
                }
                if ((x !== x || y !== y) && approx.data32F && approx.data32F.length >= (j + 1) * 2) {
                    x = approx.data32F[j * 2];
                    y = approx.data32F[j * 2 + 1];
                }
                if (x !== x || y !== y) return null;
                tempPoints.push({ x: x / cols, y: y / rows });
            }
            return sortPoints(tempPoints);
        };

        /** 輪廓的最小外接矩形四角（多數圖 approx 不是剛好 4 點時的補救） */
        const quadFromMinAreaRectContour = (contour, cols, rows) => {
            try {
                const rect = cv.minAreaRect(contour);
                if (typeof cv.rotatedRectPoints === 'function') {
                    const m = cv.rotatedRectPoints(rect);
                    if (Array.isArray(m) && m.length === 4) {
                        const tempPoints = m.map(v => ({ x: v.x / cols, y: v.y / rows }));
                        return sortPoints(tempPoints);
                    }
                    if (m && m.data32F && m.rows >= 4) {
                        try {
                            const tempPoints = [];
                            for (let j = 0; j < 4; j++) {
                                const x = m.data32F[j * 2] / cols;
                                const y = m.data32F[j * 2 + 1] / rows;
                                tempPoints.push({ x, y });
                            }
                            return sortPoints(tempPoints);
                        } finally {
                            if (typeof m.delete === 'function') m.delete();
                        }
                    }
                    if (m && typeof m.delete === 'function') m.delete();
                }
                if (typeof cv.RotatedRect !== 'undefined' && typeof cv.RotatedRect.points === 'function') {
                    const vertices = cv.RotatedRect.points(rect);
                    if (vertices && vertices.length === 4) {
                        const tempPoints = vertices.map(v => ({ x: v.x / cols, y: v.y / rows }));
                        return sortPoints(tempPoints);
                    }
                }
            } catch (e) {
                console.warn('minAreaRect quad', e);
            }
            return null;
        };

        const quadsNearlySame = (a, b, tol = 0.035) => {
            if (!a || !b || a.length !== 4 || b.length !== 4) return false;
            return a.every((p, i) => Math.abs(p.x - b[i].x) < tol && Math.abs(p.y - b[i].y) < tol);
        };

        const pushUniqueQuad = (list, quad) => {
            if (!quad) return;
            if (list.some((c) => quadsNearlySame(c, quad, 0.045))) return;
            list.push(quad);
        };

        /** 漸進加大簡化比例，嘗試得到剛好四角（適合複雜邊緣） */
        const tryIterativeApproxQuad = (contour, cols, rows) => {
            const perim = cv.arcLength(contour, true);
            if (perim < 8) return null;
            for (const scale of [0.015, 0.025, 0.04, 0.06, 0.09, 0.12, 0.18]) {
                const approx = new cv.Mat();
                try {
                    cv.approxPolyDP(contour, approx, scale * perim, true);
                    if (approx.rows === 4) {
                        return readQuadFromApprox(approx, cols, rows);
                    }
                } finally {
                    approx.delete();
                }
            }
            return null;
        };

        /** 凸包再簡化，常能從拼貼／透視圖得到外框四角 */
        const tryHullQuad = (contour, cols, rows) => {
            const hull = new cv.Mat();
            try {
                cv.convexHull(contour, hull, false, true);
                if (!hull || hull.rows < 3) return null;
                const perim = Math.max(cv.arcLength(hull, true), 4);
                for (const scale of [0.022, 0.04, 0.065, 0.09, 0.13]) {
                    const approx = new cv.Mat();
                    try {
                        cv.approxPolyDP(hull, approx, scale * perim, true);
                        if (approx.rows === 4) {
                            return readQuadFromApprox(approx, cols, rows);
                        }
                    } finally {
                        approx.delete();
                    }
                }
            } catch (e) {
                console.warn('tryHullQuad', e);
            } finally {
                hull.delete();
            }
            return null;
        };

        /** 正規化座標下四邊形面積（越大通常越像「框住主體」） */
        const quadPolygonAreaNorm = (q) => {
            if (!q || q.length !== 4) return 0;
            let s = 0;
            for (let i = 0; i < 4; i++) {
                const j = (i + 1) % 4;
                s += q[i].x * q[j].y - q[j].x * q[i].y;
            }
            return Math.abs(s) * 0.5;
        };

        /** 收斂候選：依面積排序、合併近似重複、最多 maxKeep 組 */
        const trimAndRankCandidates = (list, maxKeep = 6) => {
            if (!list || list.length === 0) return [];
            const sorted = [...list].sort((a, b) => quadPolygonAreaNorm(b) - quadPolygonAreaNorm(a));
            const out = [];
            const mergeTol = 0.058;
            for (const q of sorted) {
                if (!q || q.length !== 4) continue;
                if (out.some((o) => quadsNearlySame(o, q, mergeTol))) continue;
                out.push(q.map((p) => ({ ...p })));
                if (out.length >= maxKeep) break;
            }
            return out;
        };

        // --- 自動偵測邊角（多種二值化 + 最大輪廓加強；仍無則整張外框備援）---
        const findAllCornerCandidates = (img) => {
            const candidates = [];
            if (!window.cv || !window.cvLoaded) return candidates;

            try {
                const src = cv.imread(img);
                const scaledSrc = new cv.Mat();
                const MAX_PROCESSING_WIDTH = 1200;

                if (src.cols > MAX_PROCESSING_WIDTH) {
                    const scaleFactor = MAX_PROCESSING_WIDTH / src.cols;
                    const dsize = new cv.Size(MAX_PROCESSING_WIDTH, src.rows * scaleFactor);
                    cv.resize(src, scaledSrc, dsize, 0, 0, cv.INTER_AREA);
                } else {
                    src.copyTo(scaledSrc);
                }

                const gray = new cv.Mat();
                const ch = scaledSrc.channels();
                if (ch === 4) {
                    cv.cvtColor(scaledSrc, gray, cv.COLOR_RGBA2GRAY, 0);
                } else if (ch === 3) {
                    cv.cvtColor(scaledSrc, gray, cv.COLOR_RGB2GRAY, 0);
                } else if (ch === 1) {
                    scaledSrc.copyTo(gray);
                } else {
                    cv.cvtColor(scaledSrc, gray, cv.COLOR_RGBA2GRAY, 0);
                }

                const blur = new cv.Mat();
                cv.GaussianBlur(gray, blur, new cv.Size(5, 5), 0);

                const cols = scaledSrc.cols;
                const rows = scaledSrc.rows;
                const totalArea = cols * rows;

                const processContoursFromBinary = (binary) => {
                    const minAreaLoose = totalArea * 0.025;
                    const minAreaLarge = totalArea * 0.10;
                    const contours = new cv.MatVector();
                    const hierarchy = new cv.Mat();
                    cv.findContours(binary, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                    let maxIdx = -1;
                    let maxArea = 0;
                    for (let i = 0; i < contours.size(); ++i) {
                        const contour = contours.get(i);
                        const area = cv.contourArea(contour);
                        if (area > maxArea) {
                            maxArea = area;
                            maxIdx = i;
                        }
                        if (area <= minAreaLoose) continue;
                        const perimeter = cv.arcLength(contour, true);
                        const approx = new cv.Mat();
                        cv.approxPolyDP(contour, approx, 0.02 * perimeter, true);
                        if (area > minAreaLarge && approx.rows === 4) {
                            pushUniqueQuad(candidates, readQuadFromApprox(approx, cols, rows));
                        }
                        pushUniqueQuad(candidates, quadFromMinAreaRectContour(contour, cols, rows));
                        approx.delete();
                    }
                    if (maxIdx >= 0 && maxArea > totalArea * 0.015) {
                        const big = contours.get(maxIdx);
                        pushUniqueQuad(candidates, tryIterativeApproxQuad(big, cols, rows));
                        pushUniqueQuad(candidates, tryHullQuad(big, cols, rows));
                        pushUniqueQuad(candidates, quadFromMinAreaRectContour(big, cols, rows));
                    }
                    contours.delete();
                    hierarchy.delete();
                };

                const binInv = new cv.Mat();
                cv.adaptiveThreshold(blur, binInv, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);
                processContoursFromBinary(binInv);
                binInv.delete();

                const bin = new cv.Mat();
                cv.adaptiveThreshold(blur, bin, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 11, 2);
                processContoursFromBinary(bin);
                bin.delete();

                const otsuInv = new cv.Mat();
                cv.threshold(blur, otsuInv, 0, 255, cv.THRESH_BINARY_INV + cv.THRESH_OTSU);
                processContoursFromBinary(otsuInv);
                otsuInv.delete();

                const otsuBin = new cv.Mat();
                cv.threshold(blur, otsuBin, 0, 255, cv.THRESH_BINARY + cv.THRESH_OTSU);
                processContoursFromBinary(otsuBin);
                otsuBin.delete();

                const edges = new cv.Mat();
                const dilated = new cv.Mat();
                cv.Canny(blur, edges, 20, 70);
                const k3 = cv.Mat.ones(3, 3, cv.CV_8U);
                cv.dilate(edges, dilated, k3);
                k3.delete();
                processContoursFromBinary(dilated);
                dilated.delete();
                edges.delete();

                if (candidates.length === 0) {
                    pushUniqueQuad(candidates, FULL_IMAGE_FRAME_QUAD.map(p => ({ ...p })));
                }

                src.delete();
                scaledSrc.delete();
                gray.delete();
                blur.delete();
            } catch (err) {
                console.error("Error detecting corners:", err);
            }

            return trimAndRankCandidates(candidates, 6);
        };

        // 放大鏡元件 (支援樣式傳入)
        const Magnifier = ({ image, point, zoomLevel = 2, style }) => {
            const magnifierCanvasRef = useRef(null);
            const MAGNIFIER_SIZE = 140;

            useEffect(() => {
                if (!magnifierCanvasRef.current || !image || !point) return;

                const canvas = magnifierCanvasRef.current;
                const ctx = canvas.getContext('2d');
                canvas.width = MAGNIFIER_SIZE;
                canvas.height = MAGNIFIER_SIZE;

                const sourceSize = MAGNIFIER_SIZE / zoomLevel;
                const sourceX = (point.x * image.width) - (sourceSize / 2);
                const sourceY = (point.y * image.height) - (sourceSize / 2);

                ctx.clearRect(0, 0, MAGNIFIER_SIZE, MAGNIFIER_SIZE);
                ctx.drawImage(
                    image,
                    sourceX, sourceY, sourceSize, sourceSize,
                    0, 0, MAGNIFIER_SIZE, MAGNIFIER_SIZE
                );

                ctx.strokeStyle = 'rgba(251, 191, 36, 0.8)'; // Amber 400
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(MAGNIFIER_SIZE / 2, 0);
                ctx.lineTo(MAGNIFIER_SIZE / 2, MAGNIFIER_SIZE);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, MAGNIFIER_SIZE / 2);
                ctx.lineTo(MAGNIFIER_SIZE, MAGNIFIER_SIZE / 2);
                ctx.stroke();

            }, [image, point, zoomLevel]);

            return (
                <canvas
                    ref={magnifierCanvasRef}
                    className="rounded-full border-4 border-white shadow-2xl bg-white"
                    style={{ width: MAGNIFIER_SIZE, height: MAGNIFIER_SIZE, ...style }}
                />
            );
        };

        // 主應用程式元件
        function App() {
            const [isOpenCvReady, setIsOpenCvReady] = useState(window.cvLoaded);
            const [imageSrc, setImageSrc] = useState(null);
            const [processedImage, setProcessedImage] = useState(null);
            const [points, setPoints] = useState([]);
            const [activePointIndex, setActivePointIndex] = useState(null);
            const [dragOffset, setDragOffset] = useState({ dx: 0, dy: 0 });
            const [isProcessing, setIsProcessing] = useState(false);
            const [canvasSize, setCanvasSize] = useState({ width: 0, height: 0 });
            const [cornerCandidates, setCornerCandidates] = useState([]);
            const [candidateIndex, setCandidateIndex] = useState(-1);
            const [cursorPos, setCursorPos] = useState({ x: 0, y: 0 });
            /** 操作失敗時給使用者看的白話說明（非工程 log） */
            const [actionError, setActionError] = useState(null);
            /** 自動偵測結果說明（有／無候選框） */
            const [detectionHint, setDetectionHint] = useState(null);
            /** 是否畫出自動偵測候選虛線（預設關，避免干擾拖黃點） */
            const [showCandidateOverlay, setShowCandidateOverlay] = useState(false);
            /** 候選線濃度：ghost=極淡，muted=稍清楚 */
            const [overlayPreset, setOverlayPreset] = useState('ghost');

            const canvasRef = useRef(null);
            const imageRef = useRef(null);
            const containerRef = useRef(null);

            useEffect(() => {
                if (window.cvLoaded) {
                    setIsOpenCvReady(true);
                }
                const handleCvReady = () => setIsOpenCvReady(true);
                window.addEventListener('opencv-ready', handleCvReady);
                return () => window.removeEventListener('opencv-ready', handleCvReady);
            }, []);

            const friendlyErrorMessage = (err) => {
                const raw = typeof err === 'string' ? err : (err && err.message) ? String(err.message) : String(err || '');
                if (/OpenCV not ready/i.test(raw) || /not ready or no image/i.test(raw)) {
                    return '影像引擎還沒準備好，請重新整理頁面後再試一次。';
                }
                if (/No image loaded/i.test(raw)) {
                    return '目前沒有圖片，請先上傳一張照片。';
                }
                if (/Invalid crop dimensions/i.test(raw)) {
                    return '四個點太靠近或重疊，請把角拉開一點再按「應用裁切」。';
                }
                return '這一步沒有完成。可以試試較小的圖、或重新整理頁面後再操作一次。';
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setActionError(null);
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        setShowCandidateOverlay(false);
                        setOverlayPreset('ghost');
                        setImageSrc(event.target.result);
                        setProcessedImage(null);
                        setPoints(DEFAULT_EDIT_POINTS.map(p => ({ ...p })));

                        const candidates = findAllCornerCandidates(img);
                        setCornerCandidates(candidates);
                        setCandidateIndex(-1);
                        const onlyFullFallback = candidates.length === 1 && quadsNearlySame(candidates[0], FULL_IMAGE_FRAME_QUAD, 0.09);
                        if (onlyFullFallback) {
                            setDetectionHint('這類圖較難自動猜角，已收斂候選並含「整張外框」。請拖黃點微調；要對照其他自動框可勾選「顯示偵測候選」。');
                        } else {
                            setDetectionHint(`已收斂為 ${candidates.length} 組較可能的外框（按「自動偵測」可輪流套用）。若要對照淡虛線，請勾選「顯示偵測候選」。`);
                        }
                    };
                    img.src = event.target.result;
                    imageRef.current = img;
                };
                reader.readAsDataURL(file);
            };

            const drawGrid = (ctx, points, segments = 4) => {
                ctx.save();
                ctx.strokeStyle = 'rgba(251, 191, 36, 0.8)'; // Amber 400
                ctx.lineWidth = 2;
                ctx.setLineDash([10, 8]);
                for (let i = 1; i < segments; i++) {
                    const t = i / segments;
                    const pLeft = { x: points[0].x + (points[3].x - points[0].x) * t, y: points[0].y + (points[3].y - points[0].y) * t };
                    const pRight = { x: points[1].x + (points[2].x - points[1].x) * t, y: points[1].y + (points[2].y - points[1].y) * t };
                    ctx.beginPath(); ctx.moveTo(pLeft.x, pLeft.y); ctx.lineTo(pRight.x, pRight.y); ctx.stroke();
                }
                for (let i = 1; i < segments; i++) {
                    const t = i / segments;
                    const pTop = { x: points[0].x + (points[1].x - points[0].x) * t, y: points[0].y + (points[1].y - points[0].y) * t };
                    const pBottom = { x: points[3].x + (points[2].x - points[3].x) * t, y: points[3].y + (points[2].y - points[3].y) * t };
                    ctx.beginPath(); ctx.moveTo(pTop.x, pTop.y); ctx.lineTo(pBottom.x, pBottom.y); ctx.stroke();
                }
                ctx.restore();
            };

            const drawCanvas = useCallback(() => {
                const canvas = canvasRef.current;
                const img = imageRef.current;
                if (!canvas || !img || !imageSrc) return;
                const ctx = canvas.getContext('2d');
                const container = containerRef.current;
                let containerWidth = container && container.clientWidth ? container.clientWidth : 0;
                // 從「結果頁」回到編輯時，首幀外層 flex 常為 0 寬 → 若不備援會整片空白
                if (!containerWidth || containerWidth < 8) {
                    containerWidth = Math.max(320, Math.floor((window.innerWidth || 900) * 0.88));
                }
                const ratio = img.height / img.width;
                const targetWidth = containerWidth * 0.95;
                const displayWidth = Math.min(img.width, targetWidth);
                const displayHeight = displayWidth * ratio;
                if (displayWidth === 0 || displayHeight === 0) return;

                if (canvas.width !== displayWidth || canvas.height !== displayHeight) {
                    canvas.width = displayWidth;
                    canvas.height = displayHeight;
                    setCanvasSize({ width: displayWidth, height: displayHeight });
                }

                const pts = (points && points.length === 4) ? points : DEFAULT_EDIT_POINTS;

                ctx.drawImage(img, 0, 0, displayWidth, displayHeight);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fillRect(0, 0, displayWidth, displayHeight);

                const currentPoints = pts.map(p => ({ x: p.x * displayWidth, y: p.y * displayHeight }));

                ctx.save();
                ctx.beginPath();
                ctx.moveTo(currentPoints[0].x, currentPoints[0].y);
                ctx.lineTo(currentPoints[1].x, currentPoints[1].y);
                ctx.lineTo(currentPoints[2].x, currentPoints[2].y);
                ctx.lineTo(currentPoints[3].x, currentPoints[3].y);
                ctx.closePath();
                ctx.clip();
                ctx.drawImage(img, 0, 0, displayWidth, displayHeight);
                drawGrid(ctx, currentPoints, 8);
                ctx.restore();
                ctx.beginPath();
                ctx.strokeStyle = '#d97706'; // Amber 600
                ctx.lineWidth = 3;
                ctx.setLineDash([]);
                ctx.moveTo(currentPoints[0].x, currentPoints[0].y);
                currentPoints.forEach((p, i) => { if (i > 0) ctx.lineTo(p.x, p.y); });
                ctx.lineTo(currentPoints[0].x, currentPoints[0].y);
                ctx.stroke();
                currentPoints.forEach((p, i) => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 9, 0, 2 * Math.PI);
                    ctx.fillStyle = activePointIndex === i ? '#fbbf24' : '#f59e0b'; // Amber 400 / 500
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2.5;
                    ctx.stroke();
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 11px Arial';
                    ctx.fillText(i + 1, p.x - 3.5, p.y + 4);
                });

                // 候選虛線：僅在勾選時繪製，預設極淡以免蓋過黃點操作
                if (showCandidateOverlay && cornerCandidates && cornerCandidates.length > 0) {
                    const quadNearlySame = (a, b) => {
                        if (!a || !b || a.length !== 4 || b.length !== 4) return false;
                        const tol = 0.018;
                        return a.every((p, i) => Math.abs(p.x - b[i].x) < tol && Math.abs(p.y - b[i].y) < tol);
                    };
                    const pal = overlayPreset === 'muted'
                        ? {
                            fillOther: 'rgba(100, 116, 139, 0.07)',
                            fillMatch: 'rgba(251, 191, 36, 0.1)',
                            strokeOther: 'rgba(100, 116, 139, 0.38)',
                            strokeMatch: 'rgba(180, 83, 9, 0.42)',
                            lineW: 1.35,
                            dash: [8, 6]
                        }
                        : {
                            fillOther: 'rgba(120, 113, 108, 0.035)',
                            fillMatch: 'rgba(251, 191, 36, 0.055)',
                            strokeOther: 'rgba(120, 113, 108, 0.2)',
                            strokeMatch: 'rgba(180, 83, 9, 0.26)',
                            lineW: 1.05,
                            dash: [6, 7]
                        };
                    ctx.save();
                    ctx.lineJoin = 'round';
                    cornerCandidates.forEach((cand) => {
                        if (!cand || cand.length !== 4) return;
                        const m = cand.map(p => ({ x: p.x * displayWidth, y: p.y * displayHeight }));
                        const matchesCurrent = quadNearlySame(cand, pts);
                        ctx.beginPath();
                        ctx.moveTo(m[0].x, m[0].y);
                        for (let i = 1; i < 4; i++) ctx.lineTo(m[i].x, m[i].y);
                        ctx.closePath();
                        ctx.fillStyle = matchesCurrent ? pal.fillMatch : pal.fillOther;
                        ctx.fill();
                        ctx.setLineDash(pal.dash);
                        ctx.lineWidth = pal.lineW;
                        ctx.strokeStyle = matchesCurrent ? pal.strokeMatch : pal.strokeOther;
                        ctx.stroke();
                    });
                    ctx.restore();
                }
            }, [imageSrc, points, activePointIndex, cornerCandidates, showCandidateOverlay, overlayPreset]);

            useEffect(() => {
                drawCanvas();
                window.addEventListener('resize', drawCanvas);
                return () => window.removeEventListener('resize', drawCanvas);
            }, [drawCanvas]);

            // 編輯區版面延遲算出寬度時補繪（含「重新調整」回到本頁）
            useEffect(() => {
                if (!imageSrc || processedImage) return;
                const el = containerRef.current;
                if (!el || typeof ResizeObserver === 'undefined') return;
                const ro = new ResizeObserver(() => drawCanvas());
                ro.observe(el);
                return () => ro.disconnect();
            }, [imageSrc, processedImage, drawCanvas]);

            const handleBackToAdjust = useCallback(() => {
                setProcessedImage(null);
                setActionError(null);
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => drawCanvas());
                });
            }, [drawCanvas]);

            /** 回傳座標與 canvas 內部像素（canvas.width / height）一致，避免 CSS 縮放後對不準 */
            const getPointerPos = (e) => {
                const canvas = canvasRef.current;
                if (!canvas) return null;
                const rect = canvas.getBoundingClientRect();
                if (rect.width <= 0 || rect.height <= 0) return null;
                const clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY
                };
            };

            const handlePointerTracker = useCallback((e) => {
                const clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
                setCursorPos({ x: clientX, y: clientY });
            }, []);

            const handlePointerUp = useCallback(() => {
                setActivePointIndex(null);
                setDragOffset({ dx: 0, dy: 0 });
            }, []);

            const handlePointerMove = useCallback((e) => {
                if (activePointIndex === null) return;
                if (!canvasRef.current || canvasSize.width === 0 || canvasSize.height === 0) return;
                e.preventDefault();
                const pos = getPointerPos(e);
                if (!pos) return;
                const width = canvasSize.width;
                const height = canvasSize.height;
                const intendedPointX = pos.x - dragOffset.dx;
                const intendedPointY = pos.y - dragOffset.dy;
                const newX = Math.max(0, Math.min(intendedPointX / width, 1));
                const newY = Math.max(0, Math.min(intendedPointY / height, 1));
                if (isNaN(newX) || isNaN(newY)) return;
                setPoints(prevPoints => {
                    const newPoints = [...prevPoints];
                    newPoints[activePointIndex] = { x: newX, y: newY };
                    return newPoints;
                });
            }, [activePointIndex, canvasSize.width, canvasSize.height, dragOffset]);

            const handlePointerDown = (e) => {
                if (!canvasRef.current) return;
                const pos = getPointerPos(e);
                if (!pos) return;
                setActionError(null);
                const width = canvasSize.width;
                const height = canvasSize.height;
                const threshold = 30;
                const index = points.findIndex(p => {
                    const px = p.x * width;
                    const py = p.y * height;
                    const dist = Math.sqrt(Math.pow(px - pos.x, 2) + Math.pow(py - pos.y, 2));
                    return dist < threshold;
                });
                if (index !== -1) {
                    setActivePointIndex(index);
                    const currentPointDisplay = { x: points[index].x * width, y: points[index].y * height };
                    setDragOffset({ dx: pos.x - currentPointDisplay.x, dy: pos.y - currentPointDisplay.y });

                    const clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
                    setCursorPos({ x: clientX, y: clientY });
                }
            };

            useEffect(() => {
                window.addEventListener('mousemove', handlePointerMove);
                window.addEventListener('mousemove', handlePointerTracker);
                window.addEventListener('mouseup', handlePointerUp, { passive: true });
                window.addEventListener('touchmove', handlePointerMove, { passive: false });
                window.addEventListener('touchmove', handlePointerTracker);
                window.addEventListener('touchend', handlePointerUp, { passive: true });
                return () => {
                    window.removeEventListener('mousemove', handlePointerMove);
                    window.removeEventListener('mousemove', handlePointerTracker);
                    window.removeEventListener('mouseup', handlePointerUp, { passive: true });
                    window.removeEventListener('touchmove', handlePointerMove);
                    window.removeEventListener('touchmove', handlePointerTracker);
                    window.removeEventListener('touchend', handlePointerUp, { passive: true });
                };
            }, [handlePointerMove, handlePointerTracker, handlePointerUp]);

            const handleAutoDetect = () => {
                setActionError(null);
                let list = cornerCandidates;
                if (list.length === 0 && imageRef.current && window.cv && window.cvLoaded) {
                    list = findAllCornerCandidates(imageRef.current);
                    setCornerCandidates(list);
                }
                if (list.length === 0) {
                    setDetectionHint('仍沒有候選框。請手動拖黃點，或換一張邊線更清楚的平面圖。');
                    setPoints(DEFAULT_EDIT_POINTS.map(p => ({ ...p })));
                    setCandidateIndex(-1);
                    return;
                }
                setDetectionHint(`共 ${list.length} 組候選，再按「自動偵測」可換下一組。若要對照淡虛線，請勾選下方「顯示偵測候選」。`);
                const nextIndex = (candidateIndex + 1) % list.length;
                setPoints(list[nextIndex].map(p => ({ ...p })));
                setCandidateIndex(nextIndex);
            };

            const handleResetPoints = () => {
                setActionError(null);
                setPoints(DEFAULT_EDIT_POINTS.map(p => ({ ...p })));
                setCandidateIndex(-1);
            };

            // --- 核心演算法：OpenCV 透視變換 (共用邏輯) ---
            const generateWarpedImage = () => {
                return new Promise((resolve, reject) => {
                    if (!isOpenCvReady || !imageRef.current) {
                        reject("OpenCV not ready or no image");
                        return;
                    }

                    let src = null;
                    let dst = null;
                    let M = null;
                    let srcTri = null;
                    let dstTri = null;

                    try {
                        const imgElement = imageRef.current;
                        src = cv.imread(imgElement);

                        const srcCoords = points.map(p => ({
                            x: p.x * imgElement.width,
                            y: p.y * imgElement.height
                        }));

                        srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
                            srcCoords[0].x, srcCoords[0].y, // TL
                            srcCoords[1].x, srcCoords[1].y, // TR
                            srcCoords[2].x, srcCoords[2].y, // BR
                            srcCoords[3].x, srcCoords[3].y  // BL
                        ]);

                        const widthTop = Math.hypot(srcCoords[1].x - srcCoords[0].x, srcCoords[1].y - srcCoords[0].y);
                        const widthBottom = Math.hypot(srcCoords[2].x - srcCoords[3].x, srcCoords[2].y - srcCoords[3].y);
                        const heightLeft = Math.hypot(srcCoords[3].x - srcCoords[0].x, srcCoords[3].y - srcCoords[0].y);
                        const heightRight = Math.hypot(srcCoords[2].x - srcCoords[1].x, srcCoords[2].y - srcCoords[1].y);

                        const W_out = Math.max(widthTop, widthBottom);
                        const H_out = Math.max(heightLeft, heightRight);

                        dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
                            0, 0,
                            W_out, 0,
                            W_out, H_out,
                            0, H_out
                        ]);

                        M = cv.getPerspectiveTransform(srcTri, dstTri);

                        dst = new cv.Mat();
                        let dsize = new cv.Size(W_out, H_out);
                        cv.warpPerspective(src, dst, M, dsize, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar(255, 255, 255, 255));

                        const outputCanvas = document.createElement('canvas');
                        cv.imshow(outputCanvas, dst);
                        resolve(outputCanvas.toDataURL('image/png'));

                    } catch (err) {
                        console.error("OpenCV Processing Error:", err);
                        reject(err);
                    } finally {
                        if (src) src.delete();
                        if (dst) dst.delete();
                        if (srcTri) srcTri.delete();
                        if (dstTri) dstTri.delete();
                        if (M) M.delete();
                    }
                });
            };

            // [核心新增] 無變形裁切 (Bounding Box Crop)
            const generateBoundingBoxCrop = () => {
                return new Promise((resolve, reject) => {
                    if (!imageRef.current) {
                        reject("No image loaded");
                        return;
                    }

                    try {
                        const img = imageRef.current;
                        const width = img.width;
                        const height = img.height;

                        // 1. 計算 Bounding Box
                        const xs = points.map(p => p.x * width);
                        const ys = points.map(p => p.y * height);
                        const minX = Math.max(0, Math.min(...xs));
                        const maxX = Math.min(width, Math.max(...xs));
                        const minY = Math.max(0, Math.min(...ys));
                        const maxY = Math.min(height, Math.max(...ys));

                        const cropWidth = maxX - minX;
                        const cropHeight = maxY - minY;

                        if (cropWidth <= 0 || cropHeight <= 0) {
                            reject("Invalid crop dimensions");
                            return;
                        }

                        // 2. 建立新 Canvas 並裁切
                        const canvas = document.createElement('canvas');
                        canvas.width = cropWidth;
                        canvas.height = cropHeight;
                        const ctx = canvas.getContext('2d');

                        // 3. 繪製裁切區域
                        ctx.drawImage(
                            img,
                            minX, minY, cropWidth, cropHeight, // Source rect
                            0, 0, cropWidth, cropHeight        // Dest rect
                        );

                        resolve(canvas.toDataURL('image/png'));

                    } catch (err) {
                        console.error("Bounding Box Crop Error:", err);
                        reject(err);
                    }
                });
            };

            const processImage = async () => {
                setActionError(null);
                setIsProcessing(true);
                setTimeout(async () => {
                    try {
                        const dataUrl = await generateWarpedImage();
                        setProcessedImage(dataUrl);
                        setActionError(null);
                    } catch (err) {
                        console.error("處理失敗", err);
                        setActionError(friendlyErrorMessage(err));
                    } finally {
                        setIsProcessing(false);
                    }
                }, 100);
            };

            // [核心修改] 裁切並繼續編輯 (改為無變形裁切)
            const handleCropAndContinue = async () => {
                setActionError(null);
                setIsProcessing(true);
                setTimeout(async () => {
                    try {
                        // 改用 generateBoundingBoxCrop
                        const dataUrl = await generateBoundingBoxCrop();

                        // 建立新的 Image 物件以更新 imageRef
                        const newImg = new Image();
                        newImg.onload = () => {
                            imageRef.current = newImg;
                            setImageSrc(dataUrl);
                            setProcessedImage(null);
                            // 重置點位到角落，稍微內縮一點以免貼邊
                            setPoints([{ x: 0.05, y: 0.05 }, { x: 0.95, y: 0.05 }, { x: 0.95, y: 0.95 }, { x: 0.05, y: 0.95 }]);
                            setCandidateIndex(-1);
                            setActionError(null);
                            const newCands = findAllCornerCandidates(newImg);
                            setCornerCandidates(newCands);
                            const onlyFullCrop = newCands.length === 1 && quadsNearlySame(newCands[0], FULL_IMAGE_FRAME_QUAD, 0.09);
                            if (onlyFullCrop) {
                                setDetectionHint('裁切後仍偏像合成／情境照，已收斂候選（多為整張外框）；請拖黃點微調。需對照虛線可勾選「顯示偵測候選」。');
                            } else {
                                setDetectionHint(`裁切後收斂為 ${newCands.length} 組候選；按「自動偵測」可換組。對照淡虛線請勾選「顯示偵測候選」。`);
                            }
                            setIsProcessing(false);
                        };
                        newImg.onerror = () => {
                            console.error("裁切後圖片載入失敗");
                            setActionError('裁切後的圖片無法顯示，請換一張圖或縮小解析度後再試。');
                            setIsProcessing(false);
                        };
                        newImg.src = dataUrl;

                    } catch (err) {
                        console.error("裁切失敗", err);
                        setActionError(friendlyErrorMessage(err));
                        setIsProcessing(false);
                    }
                }, 100);
            };

            const reset = () => {
                setImageSrc(null);
                setProcessedImage(null);
                setActionError(null);
                setDetectionHint(null);
                setShowCandidateOverlay(false);
                setOverlayPreset('ghost');
            };

            const downloadImage = () => {
                if (!processedImage) return;
                const link = document.createElement('a');
                link.download = `添心設計_圖面校正_${new Date().getTime()}.png`;
                link.href = processedImage;
                link.click();
            };

            // --- 介面渲染 ---
            return (
                <div className="min-h-screen bg-stone-50 text-stone-800 flex flex-col items-center py-8 px-4 font-sans">
                    <header className="mb-6 text-center max-w-2xl w-full">
                        <h1 className="text-2xl font-bold text-stone-800 mb-2 flex items-center justify-center gap-2 tracking-wide">
                            <Layers className="w-7 h-7 text-amber-500" />
                            添心智能圖面校正儀 - 照片轉正工具
                        </h1>
                    </header>

                    <main className="w-full max-w-[95%] bg-white rounded-3xl shadow-xl overflow-hidden border border-stone-200">
                        {!imageSrc ? (
                            <div className="p-16 flex flex-col items-center justify-center text-center border-2 border-dashed border-stone-300 m-6 rounded-2xl hover:border-amber-400 hover:bg-stone-50 transition-all cursor-pointer relative group">
                                <input
                                    type="file"
                                    accept="image/*"
                                    onChange={handleImageUpload}
                                    className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                                    disabled={!isOpenCvReady}
                                />
                                <div className="p-5 bg-stone-100 rounded-full mb-4 group-hover:scale-110 transition-transform shadow-sm">
                                    <Upload className="w-10 h-10 text-amber-500" />
                                </div>
                                <h3 className="text-xl font-semibold text-stone-700 mb-2">上傳平面圖照片</h3>
                                <p className="text-stone-500 max-w-md">
                                    支援 JPG, PNG 格式。
                                    {!isOpenCvReady && <span className="block mt-2 text-amber-500 text-sm font-medium">請稍候，引擎載入中...</span>}
                                </p>
                            </div>
                        ) : !processedImage ? (
                            <div className="flex flex-col lg:flex-row h-full">
                                <div className="flex-1 p-6 bg-stone-100 relative flex items-center justify-center overflow-hidden min-h-[500px]" ref={containerRef}>
                                    <canvas
                                        ref={canvasRef}
                                        onMouseDown={handlePointerDown}
                                        onTouchStart={handlePointerDown}
                                        className={`max-w-full rounded-xl border border-stone-200 bg-white shadow-xl ${activePointIndex !== null ? 'cursor-grabbing' : 'cursor-crosshair'}`}
                                        style={{ touchAction: 'none' }}
                                    />
                                    <div className="absolute top-6 left-6 bg-white/90 backdrop-blur-md px-4 py-2 rounded-full border border-stone-200 pointer-events-none shadow-md">
                                        <p className="text-sm text-stone-600 flex items-center font-medium">
                                            <Move className="w-4 h-4 mr-2 text-amber-500" />
                                            請拖曳 4 個黃點至平面圖角落
                                        </p>
                                    </div>

                                    {activePointIndex !== null && (
                                        <div
                                            style={{
                                                position: 'fixed',
                                                left: cursorPos.x,
                                                top: cursorPos.y,
                                                transform: 'translate(-50%, -130%)',
                                                pointerEvents: 'none',
                                                zIndex: 9999
                                            }}
                                        >
                                            <Magnifier
                                                image={imageRef.current}
                                                point={points[activePointIndex]}
                                                zoomLevel={2}
                                            />
                                        </div>
                                    )}
                                </div>

                                <div className="w-full lg:w-72 bg-white border-l border-stone-200 p-6 flex flex-col gap-5 shadow-lg z-10">
                                    {actionError && (
                                        <div className="rounded-xl border border-red-200 bg-red-50 px-3 py-2.5 text-sm text-red-800 flex flex-col gap-2" role="alert">
                                            <p className="leading-relaxed">{actionError}</p>
                                            <button
                                                type="button"
                                                onClick={() => setActionError(null)}
                                                className="self-end text-xs font-medium text-red-700 hover:text-red-900 underline"
                                            >
                                                知道了
                                            </button>
                                        </div>
                                    )}
                                    {detectionHint && !actionError && (
                                        <div className="rounded-xl border border-sky-200 bg-sky-50 px-3 py-2.5 text-xs text-sky-950 leading-relaxed" role="status">
                                            {detectionHint}
                                        </div>
                                    )}
                                    <div className="flex flex-col gap-2 rounded-xl border border-stone-100 bg-stone-50/70 px-3 py-2.5">
                                        <label className="flex items-start gap-2.5 text-xs text-stone-700 cursor-pointer select-none leading-snug">
                                            <input
                                                type="checkbox"
                                                checked={showCandidateOverlay}
                                                onChange={(e) => setShowCandidateOverlay(e.target.checked)}
                                                className="mt-0.5 h-3.5 w-3.5 shrink-0 rounded border-stone-300 text-amber-600 focus:ring-amber-400"
                                            />
                                            <span>顯示偵測候選（淡虛線；預設關閉，避免干擾拖黃點）</span>
                                        </label>
                                        {showCandidateOverlay && (
                                            <label className="flex items-center gap-2 text-[11px] text-stone-600">
                                                <span className="shrink-0">線條濃度</span>
                                                <select
                                                    value={overlayPreset}
                                                    onChange={(e) => setOverlayPreset(e.target.value)}
                                                    className="min-w-0 flex-1 rounded-lg border border-stone-200 bg-white px-2 py-1 text-xs text-stone-800"
                                                >
                                                    <option value="ghost">極淡（建議）</option>
                                                    <option value="muted">稍清楚</option>
                                                </select>
                                            </label>
                                        )}
                                    </div>
                                    <div className="flex items-center justify-between mb-1">
                                        <h3 className="text-lg font-bold text-stone-800">操作面板</h3>
                                        <div className={`flex items-center gap-1.5 text-[11px] px-2.5 py-1 rounded-full border font-medium ${isOpenCvReady ? 'bg-emerald-50 border-emerald-200 text-emerald-600' : 'bg-amber-50 border-amber-200 text-amber-600'}`} title={isOpenCvReady ? "引擎已就緒" : "載入中..."}>
                                            <div className={`w-1.5 h-1.5 rounded-full ${isOpenCvReady ? 'bg-emerald-500' : 'bg-amber-500 animate-spin'}`}></div>
                                            {isOpenCvReady ? "CV 就緒" : "載入中"}
                                        </div>
                                    </div>

                                    {/* [修改] 縮小操作步驟字體 (text-xs) */}
                                    <div className="h-[180px] flex flex-col justify-center">
                                        <div className="text-xs text-stone-500 bg-stone-50 p-4 rounded-2xl h-full overflow-y-auto border border-stone-100 leading-relaxed">
                                            <p className="mb-2 font-bold text-stone-700">操作步驟：</p>
                                            <ol className="list-decimal list-inside space-y-1.5 marker:text-amber-500">
                                                <li>按「自動偵測」在收斂後的少數候選中切換；需對照時再勾選「顯示偵測候選」（極淡虛線，不干擾黃點）。</li>
                                                <li>可<span className="text-amber-600 font-medium">多次點擊</span>切換候選（橘線＋黃點為目前使用）。</li>
                                                <li>拖曳黃點微調角落位置。</li>
                                                <li>點擊「應用裁切」重設底圖。</li>
                                                <li>點擊「執行轉正」完成校正。</li>
                                            </ol>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <button
                                            onClick={handleAutoDetect}
                                            className="w-full py-2.5 px-3 rounded-xl text-sm font-medium text-stone-700 bg-white hover:bg-stone-50 border border-stone-300 hover:border-amber-400 transition-all shadow-sm"
                                        >
                                            自動偵測
                                        </button>
                                        <button
                                            onClick={handleResetPoints}
                                            className="w-full py-2.5 px-3 rounded-xl text-sm font-medium text-stone-500 hover:text-stone-800 hover:bg-stone-100 transition-colors"
                                        >
                                            還原選框
                                        </button>
                                    </div>

                                    <details className="text-xs text-stone-500 bg-stone-50/80 rounded-xl border border-stone-100 px-3 py-2">
                                        <summary className="cursor-pointer font-medium text-stone-600 select-none">自動偵測怎麼找？（白話）</summary>
                                            <p className="mt-2 leading-relaxed pl-0.5">
                                                會用<strong>好幾種</strong>方式找輪廓後，再<strong>合併近似重複</strong>、依面積<strong>最多保留約 6 組</strong>，避免選項爆炸。
                                                <strong>拼貼、透視合成</strong>仍可能不準；程式會<strong>預設不畫</strong>候選虛線，以免干擾你拖黃點——需要對照時再勾選「顯示偵測候選」，並可選「極淡／稍清楚」。
                                                橘色<strong>實線</strong>與黃點才是正在編輯的邊界；「自動偵測」在收斂後的候選之間輪流切換。
                                            </p>
                                    </details>

                                    {/* [核心新增] 應用裁切按鈕 */}
                                    <button
                                        onClick={handleCropAndContinue}
                                        disabled={isProcessing}
                                        className="w-full py-2.5 px-4 rounded-xl font-medium text-stone-700 bg-stone-100 hover:bg-stone-200 border border-stone-200 transition-all flex items-center justify-center"
                                    >
                                        <Scissors className="w-4 h-4 mr-2" />
                                        應用裁切 (無變形)
                                    </button>

                                    <button
                                        onClick={processImage}
                                        disabled={isProcessing}
                                        className={`w-full py-4 px-6 rounded-2xl font-bold text-white shadow-lg flex items-center justify-center transition-all transform hover:scale-[1.02] active:scale-[0.98]
                                            ${isProcessing
                                                ? 'bg-stone-400 cursor-wait opacity-70'
                                                : 'bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 shadow-orange-200'
                                            } `}
                                    >
                                        {isProcessing ? (
                                            <>
                                                <RefreshCw className="w-5 h-5 mr-2 animate-spin" />
                                                處理中...
                                            </>
                                        ) : (
                                            <>
                                                <Check className="w-5 h-5 mr-2" />
                                                執行轉正
                                            </>
                                        )}
                                    </button>

                                    <a
                                        href="https://line.me/R/ti/p/@uis9604v"
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="w-full py-3 px-4 rounded-xl font-medium text-emerald-600 hover:text-emerald-700 hover:bg-emerald-50 border border-emerald-200 hover:border-emerald-300 transition-all flex items-center justify-center"
                                    >
                                        聯繫添心設計
                                    </a>

                                    <button
                                        onClick={reset}
                                        className="w-full py-2.5 px-4 rounded-xl font-medium text-stone-400 hover:text-stone-600 hover:bg-stone-50 border border-transparent hover:border-stone-200 transition-all"
                                    >
                                        重新上傳
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="flex flex-col h-full">
                                <div className="flex-1 bg-stone-100 p-8 overflow-auto flex items-center justify-center">
                                    <div className="relative group">
                                        <img
                                            src={processedImage}
                                            alt="Processed Plan"
                                            className="max-w-full shadow-2xl border border-white rounded-lg"
                                        />
                                        <div className="absolute inset-0 bg-white/0 group-hover:bg-white/10 transition-all pointer-events-none rounded-lg"></div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 border-t border-stone-200 flex flex-wrap items-center justify-between gap-4">
                                    <div className="flex items-center gap-2">
                                        <Check className="w-5 h-5 text-emerald-500" />
                                        <span className="text-stone-700 font-medium tracking-wide">處理完成！已完成透視校正</span>
                                    </div>

                                    <div className="flex gap-3">
                                        <button
                                            onClick={handleBackToAdjust}
                                            className="px-5 py-2.5 rounded-xl font-medium text-stone-500 hover:bg-stone-50 hover:text-stone-800 transition-all border border-transparent hover:border-stone-200"
                                        >
                                            <div className="flex items-center">
                                                <RefreshCw className="w-4 h-4 mr-2" />
                                                重新調整
                                            </div>
                                        </button>
                                        <button
                                            onClick={downloadImage}
                                            className="px-6 py-2.5 rounded-xl font-bold text-white bg-emerald-500 hover:bg-emerald-400 shadow-lg hover:shadow-emerald-200 transition-all"
                                        >
                                            <div className="flex items-center">
                                                <Download className="w-4 h-4 mr-2" />
                                                下載圖檔
                                            </div>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-8 text-stone-400 text-xs tracking-wider">
                        &copy; 2025 添心室內裝修設計有限公司 | 技術支援
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
