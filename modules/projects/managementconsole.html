<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>專案工作區</title>
  <!-- [v262.0 新增] 引入 Tailwind CSS，與 hub.html 保持樣式一致 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <!-- 【⭐️ 核心修正：解決 favicon.ico 404 錯誤 ⭐️】 -->
  <link rel="icon" href="data:,">
  <!-- [v190.0 新增] 漢堡選單響應式樣式 -->
  <!-- [v262.0 修正] 修正漢堡選單在非手機模式下未隱藏的問題 -->
  <style>
    /* 手機版漢堡：須與 style.css 一致用 flex 置中，勿用 block（會蓋掉 flex 導致圖示靠左） */
    .mobile-nav-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 與 style.css 三欄斷點一致：≤1024 顯示漢堡；寬螢幕隱藏 */
    @media (min-width: 1025px) {
      .mobile-nav-toggle {
        display: none !important;
      }
    }

    /* [v262.0 新增] 溝通紀錄卡片的閃爍動畫 (與 hub.html 同步) */
    .card-overdue {
      animation: pulse-red 1.5s infinite;
    }

    @keyframes pulse-red {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
      }

      70% {
        box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
      }
    }
  </style>
  <!-- [新增] 引入 flatpickr 日期選擇器樣式 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <!-- [v55.0 修正] 永遠載入 LIFF SDK，並由 main.js 判斷是否使用 -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <!-- [核心修正] 將 const 改為 var，確保變數能被正確掛載到 window 物件上，
       以便後續的模組腳本 (main.js) 可以透過 window.API_BASE_URL 存取。 -->
  <script>
    var API_BASE_URL = 'https://script.google.com/macros/s/AKfycbwbEVAfoO9eRzcUSfESIwih1Poub657h_9jz5UcqTXbxsDQOZ3mjLm1nHZfn_WM2K8/exec';
    var FRONTEND_VERSION = 'v26.06.28.1242'; // Phase A1 出勤申訴 UI
  </script>
  <!-- [v2026.02.28 核心修正] 更新版本號以強制瀏覽器下載最新的 JavaScript 檔案。
       這可以解決因瀏覽器快取舊版 api.js，導致輪詢任務狀態時發送錯誤 POST 請求的問題。 -->
  <script type="module" src="./js/main.js?v=26.05.05.1"></script>
</head>

<body>
  <div class="container">
    <header class="console-top-header">
      <!-- 手機／平板：漢堡為 fixed 不佔排版列；標題列預留左側空間 -->
      <button type="button" id="mobile-nav-toggle" class="mobile-nav-toggle">
        <span class="sr-only">開啟選單</span>
        <div class="hamburger-icon"></div>
      </button>
      <div class="console-top-header__titles">
        <h1 id="project-title">專案工作區</h1>
        <p id="version-display" class="muted"></p>
      </div>
      <button type="button" id="btn-copy-site-header" class="btn btn-info console-header-copy-btn"
        aria-label="複製案場資訊全文到剪貼簿">複製案場資訊</button>
    </header>

    <!-- 主要三欄式布局 -->
    <div class="app-layout">
      <!-- 左欄：導覽區 -->
      <aside class="left-sidebar">
        <nav class="main-nav">
          <button class="nav-button active" data-view="logs">
            <span>施工日誌</span>
          </button>
          <button class="nav-button" data-view="auditor">
            <span>驗收表</span>
          </button>
          <button class="nav-button" data-view="schedule">
            <span>工程排程</span>
          </button>
          <!-- 手機／平板：專案基本資料獨立分頁（寬螢幕仍顯示於右欄，此按鈕以 CSS 隱藏） -->
          <button class="nav-button nav-button--mobile-only-project" data-view="project-basic" type="button">
            <span>專案基本資料</span>
          </button>
          <!-- [v213.0 新增][v244.0 重命名] 專案協作中心分頁按鈕 -->
          <button class="nav-button" data-view="collaboration">
            <span>專案協作中心</span>
          </button>
        </nav>
      </aside>

      <!-- 中欄＋右欄：寬螢幕並排；窄螢幕預設只顯示中欄，「專案基本資料」分頁時再顯示右欄 -->
      <div class="app-main-row">
        <main id="main-content">
          <div id="logs-container"></div> <!-- 預設顯示日誌 -->
          <div id="auditor-container" class="auditor-view-wrap" style="display: none;" aria-label="驗收表內嵌區">
            <p class="muted m-0 mb-2" style="font-size:0.85rem">與獨立驗收表相同，可勾選完成並同步雲端；Firebase／GAS 請在下方驗收表內設定。</p>
            <iframe id="auditor-iframe" class="auditor-embed-iframe" title="專案驗收表" src="about:blank" loading="lazy"></iframe>
          </div>
          <div id="schedule-container" style="display:none;"></div>
          <!-- [v213.0 新增][v261.0 重構] 專案協作中心內容容器 -->
          <div id="collaboration-container" style="display: none;">
            <div id="task-sender-container"></div> <!-- 任務交辦中心的容器 -->
            <div id="communication-history-list"></div>
          </div>
        </main>

        <!-- 右欄：專案資訊面板（手機預設隱藏，僅「專案基本資料」分頁顯示） -->
        <aside class="right-sidebar card">
          <div id="project-info-panel">
            <!-- 專案資料將由 JavaScript 動態填入 -->
          </div>
        </aside>
      </div>
    </div>
  </div>

  <div id="photo-modal" class="modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="photo-modal-title">
      <!-- [優化] 使用 form 標籤包裝，語意更清晰 -->
      <form>
        <h2 id="photo-modal-title" class="text-xl font-semibold mb-4">管理照片</h2>
        <div id="modal-photo-grid-container" class="modal-photo-grid mb-4"></div>
        <!-- [優化] 將按鈕群組放在 footer 中 -->
        <footer class="text-right space-x-2 mt-4">
          <input type="file" id="photo-file-input" multiple accept="image/*" style="display:none;">
          <!-- 【⭐️ 核心修正：移除行內樣式，改用 CSS class 統一管理顏色 ⭐️】 -->
          <button id="add-photos-button" type="button" class="btn btn-green"
            data-action="triggerPhotoUpload">新增照片</button>
          <button id="modal-cancel-btn" type="button" class="btn btn-secondary"
            data-action="closePhotoModal">取消</button>
          <button id="save-photos-button" type="button" class="btn btn-primary" data-action="savePhotos">儲存變更</button>
        </footer>
      </form>
    </div>
  </div>

  <div id="lightbox" aria-hidden="true">
    <div class="lb-wrap">
      <img class="lb-img" alt="preview">
      <button class="lb-close" aria-label="關閉">✕</button>
    </div>
  </div>

  <!-- [優化] 引入函式庫 -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh-tw.js"></script>
  <!-- [v2026] 置於 body 末端：壓過 Tailwind CDN Preflight 的 button 透明底；避免仍套用 style.css 全域 button{color:#fff} 變成白字貼白底 -->
  <style>
    #main-content .button-group > button.btn-primary {
      background-color: var(--primary, #7999ab) !important;
      color: #fff !important;
      -webkit-appearance: none;
      appearance: none;
    }
    #main-content .button-group > button.btn-primary:hover {
      background-color: var(--primary-hover, #6d8a9c) !important;
      opacity: 1;
    }
    #main-content .button-group > button.btn-green {
      background-color: var(--green, #738a72) !important;
      color: #fff !important;
      -webkit-appearance: none;
      appearance: none;
    }
    #main-content .button-group > button.btn-green:hover {
      background-color: var(--green-hover, #627860) !important;
      opacity: 1;
    }
    #main-content .button-group > button.btn-danger {
      background-color: var(--red, #c4938a) !important;
      color: #fff !important;
      -webkit-appearance: none;
      appearance: none;
    }
    #main-content .button-group > button.btn-danger:hover {
      background-color: var(--red-hover, #b07e75) !important;
      opacity: 1;
    }

    #auditor-container.auditor-view-wrap {
      width: 100%;
    }

    #auditor-container .auditor-embed-iframe {
      display: block;
      width: 100%;
      min-height: min(75vh, 860px);
      border: 0;
      border-radius: var(--radius, 0.5rem);
      background: #f1f5f9;
    }
  </style>
</body>

</html>
