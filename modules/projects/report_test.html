  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const now = new Date();
      const year = String(now.getFullYear()).slice(-2);
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      document.title += ` v${year}.${month}.${day}`;
    });

  <!-- 【v150.0 核心修正】徹底修正巢狀 script 標籤與註解語法錯誤 -->
  <script type="module">
    import { readFileAsBase64 } from '../../shared/js/utils.js'; // [v519.0 修正] 更新共用模組 utils.js 的路徑
    // [vTEST-FB] 引入 Firebase 模組
    import { initializeApp } from "firebase/app";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "firebase/storage";
    import { getAuth, signInAnonymously } from "firebase/auth"; // [v2026.03.11 新增] Auth 模組

    document.addEventListener('DOMContentLoaded', async () => {
      // [vTEST-FB] 初始化 Firebase
      const app = initializeApp(FIREBASE_CONFIG);
      const storage = getStorage(app);
      const auth = getAuth(app); // 取的 Auth

      // [v2026.03.11 新增] 錯誤顯示快捷全域函式 (供 Auth 與上傳共用)
      window.logGlobalError = function (source, msg) {
        const errorListContainer = document.getElementById('error-list-container');
        const errorList = document.getElementById('error-list');
        if (errorListContainer && errorList) {
          errorListContainer.classList.remove('hidden');
          const listItem = document.createElement('li');
          listItem.innerHTML = `<strong>[${source}]</strong> ${msg}`;
          errorList.appendChild(listItem);
        } else {
          console.error(`無法渲染 UI 錯誤: [${source}] ${msg}`);
        }
      };

      // [v2026.03.11 新增] 強制匿名登入：解決 Storage Unauthorized (403) 問題
      try {
        await signInAnonymously(auth);
        console.log("Firebase 匿名登入成功，已取得上傳權限");
      } catch (authError) {
        console.error("Firebase 匿名登入失敗:", authError);
        // 通常是 `auth/admin-restricted-operation` 或 `auth/operation-not-allowed` 
        window.logGlobalError('Firebase Auth', `匿名登入失敗 (${authError.code})，請確認 Firebase Console 是否啟用「匿名登入 (Anonymous)」或修改 Storage Rules。`);
      }

      const form = document.getElementById('report-form');
      const submitButton = document.getElementById('submit-button');
      const buttonText = document.getElementById('button-text');
      const buttonSpinner = document.getElementById('button-spinner');
      const statusMessage = document.getElementById('status-message');
      // [v567.0 新增] 進度條元素
      const progressContainer = document.getElementById('progress-container');
      const progressBar = document.getElementById('progress-bar');
      // [v575.0 新增] 擬真進度條相關變數
      let progressInterval = null;
      let currentFakeProgress = 0;
      let userProfile = null;

      // === 初始化 ===
      async function main() {
        // [v425.0 架構優化] 支援混合模式 (從主控台內嵌 或 直接LIFF開啟)
        const isLocalTest = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
        const urlParams = new URLSearchParams(window.location.search);
        let uid = urlParams.get('uid');
        let name = urlParams.get('name');

        // [v570.0 新增] 本地測試模式
        if (isLocalTest && !uid) {
          console.warn('⚡️ 本地測試模式啟用，使用預設使用者資訊。');
          userProfile = { userId: 'Ud58333430513b7527106fa71d2e30151', displayName: '本地測試員' };
          initializeEventListeners();
        } else if (uid && name) {
          // 模式一：從主控台內嵌，已取得 uid 和 name
          console.log('⚡️ 偵測到 uid，以內嵌模式啟動...');
          userProfile = { userId: uid, displayName: name };
          initializeEventListeners();
        } else {
          // 模式二：直接開啟，需執行 LIFF 驗證
          console.log('🔄 未偵測到 uid，以獨立 LIFF 模式啟動...');
          try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            userProfile = await liff.getProfile();
            initializeEventListeners();
          } catch (error) {
            console.error('LIFF 初始化失敗:', error);
            updateStatus('頁面初始化失敗，請在 LINE 中開啟或重新載入。', 'error');
            submitButton.disabled = true;
          }
        }
      }

      // === 綁定 UI 事件 ===
      function initializeEventListeners() {
        setupFileInputUI('sitePhotos', 'sitePhotosLabel', 'sitePhotosCount');
        setupFileInputUI('problemPhotos', 'problemPhotosLabel', 'problemPhotosCount');

        // 【您的要求】初始化輔助按鈕
        initializeHelperButtons();

        // 案號輸入：即時只留數字；失焦再清一次
        const projectIdEl = document.getElementById('projectId');
        projectIdEl.addEventListener('input', () => enforceDigits(projectIdEl));
        projectIdEl.addEventListener('blur', () => enforceDigits(projectIdEl));

        // 【優化建議】記住並還原上次選擇的施工項目
        const workTypeSelect = document.getElementById('workType');
        const lastWorkType = localStorage.getItem('lastSelectedWorkType');
        if (lastWorkType) {
          workTypeSelect.value = lastWorkType;
          // 【您的要求】手動觸發一次 change 事件，以確保輔助按鈕能被正確渲染
          // 這會模擬使用者手動選擇的行為，觸發 initializeHelperButtons 中綁定的監聽器
          workTypeSelect.dispatchEvent(new Event('change'));
        }
        workTypeSelect.addEventListener('change', () => localStorage.setItem('lastSelectedWorkType', workTypeSelect.value));

        form.addEventListener('submit', handleFormSubmit);
      }

      // 【您的要求】輔助按鈕核心邏輯
      function initializeHelperButtons() {
        const workTypeSelect = document.getElementById('workType');

        const workTypePhrases = {
          '保護工程-進退場項目': ['進場保護', '退場清潔', '電梯保護', '走道保護', '廢棄物清運', '完工保護'],
          '木作工程': ['天花板施工', '櫃體組裝', '門片安裝', '角料下料', '隔間牆施工', '造型牆', '電視牆施工'],
          '系統工程': ['櫃體安裝', '門片調整', '五金安裝', '收邊', '層板安裝', '檯面安裝'],
          '水電工程': ['配管', '拉線', '燈具安裝', '開關面板', '插座面板', '弱電佈線', '給水測試', '排水測試'],
          '油漆工程': ['批土', '研磨', '底漆', '面漆', '跳色', '噴漆', '木皮上漆'],
          '泥作工程': ['砌磚', '打底', '粉光', '磁磚鋪貼', '防水施作', '地坪墊高', '門窗崁縫'],
          '清潔工程': ['粗清', '細清', '垃圾清運', '裝潢後清潔'],
          '玻璃工程': ['玻璃安裝', '鏡面安裝', '矽利康收邊', '淋浴拉門'],
          '其他工程': ['現場丈量', '設計圖製作', '施工圖製作', '與客戶討論', '廠商洽談', '材料確認']
        };

        const problemPhrases = ['【缺料】', '【尺寸不符】', '【圖面疑問】', '【品質問題】', '【需與設計師確認】', '【需與工務確認】', '【工序衝突】', '【現場保護不足】', '【工具損壞】'];

        // 渲染問題回報的通用按鈕
        renderHelperButtons('problemDescriptionHelpers', problemPhrases, 'problemDescription');

        // 根據施工項目動態渲染按鈕
        workTypeSelect.addEventListener('change', () => {
          const selectedType = workTypeSelect.value;
          renderHelperButtons('workDescriptionHelpers', workTypePhrases[selectedType] || [], 'workDescription');
        });

        // 初始觸發一次
        renderHelperButtons('workDescriptionHelpers', [], 'workDescription');
      }

      function renderHelperButtons(containerId, phrases, targetTextareaId) {
        const container = document.getElementById(containerId);
        const textarea = document.getElementById(targetTextareaId);
        container.innerHTML = '';
        if (!phrases || phrases.length === 0) return;

        phrases.forEach(phrase => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'helper-btn';
          button.textContent = phrase;
          button.addEventListener('click', () => {
            // 【您的要求】智慧插入：如果文字框是空的，或結尾是空格/換行，則直接插入；否則先補一個空格再插入，確保文字接續。
            const endsWithSpaceOrNewline = textarea.value === '' || /\s$/.test(textarea.value);
            const separator = endsWithSpaceOrNewline ? '' : ' ';
            textarea.value += separator + phrase;
            textarea.focus(); // 將焦點移回文字框
          });
          container.appendChild(button);
        });
      }

      // === 僅允許數字：即時過濾 ===
      function enforceDigits(el) {
        const digits = (el.value || '').replace(/\D+/g, '');
        if (el.value !== digits) el.value = digits;
      }

      // === 錯誤訊息顯示/隱藏 ===
      function showProjectIdError(msg) {
        const err = document.getElementById('projectIdError');
        const input = document.getElementById('projectId');
        err.textContent = msg || '案號僅能輸入數字；非案場請填 9999。';
        err.classList.remove('hidden');
        input.classList.add('border-red-500');
      }
      function hideProjectIdError() {
        const err = document.getElementById('projectIdError');
        const input = document.getElementById('projectId');
        err.textContent = '';
        err.classList.add('hidden');
        input.classList.remove('border-red-500');
      }

      // === 取得並驗證案號（通過回傳純數字字串；失敗回傳 null） ===
      function getValidProjectId() {
        const input = document.getElementById('projectId');
        enforceDigits(input);
        const v = (input.value || '').trim();
        if (!v || !/^\d+$/.test(v)) {
          showProjectIdError('請輸入純數字案號；非案場請填 9999。');
          return null;
        }
        hideProjectIdError();
        return v;
      }

      // [v2026.03.11 新增] 錯誤列表處理函數 (改由 window.logGlobalError 接管)
      function appendErrorToList(source, message) {
        window.logGlobalError(source, message);
      }

      function clearErrorList() {
        const errorListContainer = document.getElementById('error-list-container');
        const errorList = document.getElementById('error-list');
        errorList.innerHTML = '';
        errorListContainer.classList.add('hidden');
      }

      // === 送出處理 ===
      async function handleFormSubmit(event) {
        event.preventDefault();
        setLoadingState(true);
        
        // [v2026.03.11 新增] 初始化計時器與統計 UI
        clearErrorList();
        const statsContainer = document.getElementById('stats-container');
        const timeElapsedEl = document.getElementById('time-elapsed');
        const uploadSpeedEl = document.getElementById('upload-speed');
        const totalMbEl = document.getElementById('total-mb');
        statsContainer.classList.remove('hidden');
        timeElapsedEl.textContent = '0.0';
        uploadSpeedEl.textContent = '0.00';
        
        // [v567.0 新增] 重設並顯示進度條
        updateStatus('', 'info'); // 清空舊的狀態訊息
        progressContainer.classList.remove('hidden');
        // [v575.0 新增] 重設擬真進度條
        currentFakeProgress = 0;
        if (progressInterval) clearInterval(progressInterval);
        progressBar.style.width = '0%';
        progressBar.textContent = '0%';

        if (!userProfile) {
          updateStatus('無法取得使用者資訊，請重新載入頁面。', 'error');
          setLoadingState(false);
          // [v567.0 新增] 發生錯誤時隱藏進度條
          progressContainer.classList.add('hidden');
          return;
        }

        // 1) 先驗證案號（純數字；非案場請填 9999）
        const cleanProjectId = getValidProjectId();
        if (!cleanProjectId) {
          setLoadingState(false);
          return; // 中止提交
        }

        const shouldCompress = document.getElementById('compressImages').checked;

        const siteFiles = Array.from(document.getElementById('sitePhotos').files);
        const problemFiles = Array.from(document.getElementById('problemPhotos').files);
        const allPhotosInfo = [
          ...siteFiles.map(file => ({ file, isProblem: false })),
          ...problemFiles.map(file => ({ file, isProblem: true }))
        ];

        const workDescription = document.getElementById('workDescription').value.trim();
        const problemDescription = document.getElementById('problemDescription').value.trim();
        if (allPhotosInfo.length === 0 && !workDescription && !problemDescription) {
          updateStatus('請至少填寫施工內容或上傳照片。', 'error');
          setLoadingState(false);
          // [v567.0 新增] 發生錯誤時隱藏進度條
          progressContainer.classList.add('hidden');
          return;
        }

        const batchId = `${userProfile.userId}-${Date.now()}`;
        const SUBMIT_CHUNK_SIZE = 4; // 【升級方案】由 8 降至 4，確保在弱網下單次請求不逾時
        const totalChunks = Math.ceil(allPhotosInfo.length / SUBMIT_CHUNK_SIZE) || 1;

        // [v2026.03.11 新增] 計算總體積與開始計時
        const totalBytes = allPhotosInfo.reduce((sum, item) => sum + item.file.size, 0);
        const totalMB = totalBytes / (1024 * 1024);
        let uploadedChunksBytes = 0;
        const uploadStartTime = performance.now();

        // [v2026.03.11 新增] 即時更新儀表板的函式
        const updateStatsDashboard = () => {
          const elapsedSec = (performance.now() - uploadStartTime) / 1000;
          timeElapsedEl.textContent = elapsedSec.toFixed(1);
          if (elapsedSec > 0.5) {
            const speed = (uploadedChunksBytes / (1024 * 1024)) / elapsedSec;
            uploadSpeedEl.textContent = speed.toFixed(2);
          }
        };
        const statsTimer = setInterval(updateStatsDashboard, 500);

        const baseFormData = {
          action: 'submitFastReport', // [v2026.03.12 新增] 改用高速專用路由
          batchId,
          totalChunks,
          userId: userProfile.userId,
          userName: userProfile.displayName,
          projectId: cleanProjectId,
          projectNameRaw: cleanProjectId,
          workType: document.getElementById('workType').value,
          workDescription: document.getElementById('workDescription').value,
          problemDescription: document.getElementById('problemDescription').value,
          clientTrace: {
            url: window.location.href,
            ver: '2026.02.27.2300-report',
            uid: userProfile.userId,
            ts: Date.now()
          }
        };

        for (let i = 0; i < totalChunks; i++) {
          try {
            const chunkStart = i * SUBMIT_CHUNK_SIZE;
            const chunkEnd = chunkStart + SUBMIT_CHUNK_SIZE;
            const photoChunk = allPhotosInfo.slice(chunkStart, chunkEnd);

            updateStatus(`正在處理第 ${i + 1} / ${totalChunks} 批照片...`, 'info');
            // [vTEST-FB] 傳遞 storage 物件以便並行上傳
            const processedPhotos = await processPhotoChunk(photoChunk, shouldCompress, storage, cleanProjectId, batchId);

            // [v575.0 新增] 為當前批次啟動擬真進度動畫
            const chunkTargetProgress = Math.round(((i + 1) / totalChunks) * 100);
            startFakeProgress(chunkTargetProgress);
            const chunkFormData = { ...baseFormData, chunkIndex: i + 1, photos: processedPhotos };

            updateStatus(`正在提交第 ${i + 1} / ${totalChunks} 批資料...`, 'info');

            // [v573.0 核心修正] 回歸到最可靠的 fetch + FormData 模式，以徹底解決 CORS 問題。
            // 放棄即時進度，改回分批次更新進度。
            // 【效能優化】改進 FormData 傳送方式，避免 "引數過大" 錯誤。
            // 不再將所有東西 stringify 成單一 payload，而是將文字和圖片資料分開欄位。
            // 這需要後端 GAS 的 doPost 函式做相應調整來解析。
            const formData = new FormData();
            formData.append('payload', JSON.stringify(chunkFormData));
            // 1. 將非檔案的文字資料逐一附加
            Object.keys(baseFormData).forEach(key => {
              formData.append(key, typeof baseFormData[key] === 'object' ? JSON.stringify(baseFormData[key]) : baseFormData[key]);
            });
            Object.keys(chunkFormData).forEach(key => {
              if (key !== 'photos') formData.append(key, typeof chunkFormData[key] === 'object' ? JSON.stringify(chunkFormData[key]) : chunkFormData[key]);
            });
            formData.append('chunkIndex', i + 1);
            // 2. 只將圖片陣列（Base64 字串）單獨 stringify 後附加
            formData.append('photos', JSON.stringify(processedPhotos));

            const response = await fetch(GAS_WEB_APP_URL, {
              method: 'POST',
              body: formData,
            });

            const result = await response.json();
            if (!response.ok || !result.success) {
              const gasError = result.message || '後端未知錯誤';
              appendErrorToList(`批次 ${i + 1}`, `GAS 拒絕請求: ${gasError}`);
              throw new Error(`第 ${i + 1} 批資料提交失敗：${gasError}`);
            }

            // 更新已處理的位元組以供計速
            uploadedChunksBytes += photoChunk.reduce((s, p) => s + p.file.size, 0);

            // [v575.0 修改] 批次成功後，停止動畫並將進度條精確設定到里程碑位置
            if (progressInterval) clearInterval(progressInterval);
            updateProgressBar(Math.min(99, chunkTargetProgress));

            // [v469.2 核心修正] 在每個批次成功提交後，加入一個短暫的延遲，以避免觸發後端的 429 速率限制錯誤。
            if (i < totalChunks - 1) {
              await new Promise(resolve => setTimeout(resolve, 500)); // 延遲 500 毫秒
            }
          } catch (error) {
            console.error('表單處理失敗', error);
            console.log('Caught error in chunk loop, calling setLoadingState(false) and returning.');
            updateStatus(`提交發生錯誤，部分或全部失敗。`, 'error');
            appendErrorToList('整體提交流程', error.message);
            // [v575.0 新增] 出錯時停止動畫
            if (progressInterval) clearInterval(progressInterval);
            clearInterval(statsTimer); // 停止計時
            setLoadingState(false);
            // [v567.0 新增] 發生錯誤時隱藏進度條
            progressContainer.classList.add('hidden');
            return; // 【關鍵修正】一旦出錯，立即終止整個函式
          }
        }

        // 所有批次都成功後，才執行成功處理
        clearInterval(statsTimer);
        updateStatsDashboard(); // 做最後一次精準結算
        console.log('All chunks processed successfully. Calling handleSuccess().');
        // [v568.0 新增] 在跳轉到成功畫面之前，將進度條推到 100%
        updateProgressBar(100);
        handleSuccess();
      }

      // === 成功後處理 ===
      function handleSuccess() {
        // [v454.0 UX優化] 顯示成功畫面，取代單純的文字提示
        console.log('handleSuccess() called. Hiding form and showing success screen.');
        document.getElementById('report-form').style.display = 'none';
        document.getElementById('success-screen').style.display = 'block';
        // submitButton.textContent = '已完成'; // [v568.0] 移除此行，因為按鈕已被隱藏
        // [v567.0 新增] 成功後隱藏進度條
        progressContainer.classList.add('hidden');
        submitButton.disabled = true;
        setTimeout(() => {
          if (liff && liff.isInClient()) {
            liff.closeWindow();
          }
        }, 30000); // [v455.0] 根據使用者要求，延長關閉時間至 30 秒
      }

      // === 單批相片處理（壓縮→轉 Base64 & 同步上傳 Firebase） ===
      async function processPhotoChunk(photoInfoChunk, shouldCompress, storage, projectId, batchId) {
        const options = { maxSizeMB: 0.4, maxWidthOrHeight: 1280, useWebWorker: true };
        
        // [v2026.03.12 終極效能優化] 使用 Promise.all 並行處理同批次所有照片
        const processPromises = photoInfoChunk.map(async (photoInfo) => {
          let processedFile = photoInfo.file;
          let firebaseURL = "";
          let base64 = null; // 預設不夾帶 Base64
          
          try {
            if (shouldCompress) {
              processedFile = await imageCompression(photoInfo.file, options);
            }

            try {
              const fileName = `${Date.now()}_${photoInfo.file.name.replace(/[^a-zA-Z0-9.\-_]/g, '')}`; // 檔名安全化
              const storagePath = `reports/${projectId}/${batchId}/${fileName}`;
              const storageRef = ref(storage, storagePath);

              const uploadResult = await uploadBytes(storageRef, processedFile);
              firebaseURL = await getDownloadURL(uploadResult.ref);
              console.log(`[Firebase] 上傳成功: ${firebaseURL}`);
            } catch (fbError) {
              const debugMsg = fbError.code || fbError.message || '未知錯誤';
              console.error(`[Firebase] 上傳失敗 (${photoInfo.file.name})`, fbError);
              appendErrorToList(`${photoInfo.file.name} (Firebase)`, debugMsg); 
              
              // 容錯機制：Firebase 失敗時，才被迫執行耗時的 Base64 轉換來撐住備用方案
              // 【核心關鍵】只有這裡才會呼叫 readFileAsBase64，節省 90% 以上本地資源
              console.log(`[降級轉換] 開始將 ${photoInfo.file.name} 轉為 Base64...`);
              base64 = await readFileAsBase64(processedFile);
            }

            return {
              name: photoInfo.file.name,
              type: processedFile.type,
              data: base64, 
              isProblem: photoInfo.isProblem,
              firebaseURL: firebaseURL 
            };
          } catch (error) {
            console.error(`圖片 ${photoInfo.file.name} 處理失敗:`, error);
            appendErrorToList(`${photoInfo.file.name} (這張圖已崩損)`, error.message);
            throw new Error(`處理圖片 "${photoInfo.file.name}" 時失敗。`);
          }
        });

        // 等待這批次所有照片並行處理完畢
        return await Promise.all(processPromises);
      }

      // === 載入狀態 ===
      function setLoadingState(isLoading, message = '處理中...') {
        submitButton.disabled = isLoading;
        if (isLoading) {
          buttonText.classList.add('hidden');
          buttonSpinner.classList.remove('hidden');
          updateStatus(message, 'info');
        } else {
          buttonText.classList.remove('hidden');
          buttonSpinner.classList.add('hidden');
          // 移除此行，避免在錯誤發生後清除錯誤訊息。
          // 狀態訊息的清除或更新應由呼叫者明確處理。
        }
      }

      // [v575.0 新增] 啟動擬真進度條動畫的函式
      function startFakeProgress(targetPercentage) {
        if (progressInterval) clearInterval(progressInterval);

        progressInterval = setInterval(() => {
          // 讓進度緩慢增加，但永遠不會超過目標的前 1%
          if (currentFakeProgress < targetPercentage - 1) {
            currentFakeProgress++;
            updateProgressBar(currentFakeProgress);
          } else {
            clearInterval(progressInterval);
          }
        }, 250); // 每 250 毫秒更新一次，這個速度看起來比較舒服
      }

      // [v568.0 新增] 獨立的進度條更新函式
      function updateProgressBar(percentage) {
        progressBar.style.width = `${percentage}%`;
        progressBar.textContent = `${percentage}%`;
      }

      // [v2026.03.11 新增] 錯誤列表控制
      function appendErrorToList(target, errorMessage) {
        const container = document.getElementById('error-list-container');
        const ul = document.getElementById('error-list');
        container.classList.remove('hidden'); // 顯示容器
        
        const li = document.createElement('li');
        li.innerHTML = `<strong>${target}</strong>: ${errorMessage}`;
        ul.appendChild(li);
      }

      function clearErrorList() {
        document.getElementById('error-list-container').classList.add('hidden');
        document.getElementById('error-list').innerHTML = '';
      }

      // === 狀態顯示 ===
      function updateStatus(message, type) {
        statusMessage.className = 'text-center mb-4 min-h-[24px]';
        statusMessage.textContent = message;

        if (type === 'success') {
          statusMessage.classList.add('text-green-600', 'font-semibold');
        } else if (type === 'error') {
          statusMessage.classList.add('bg-red-100', 'border', 'border-red-400', 'text-red-700', 'px-4', 'py-3', 'rounded-lg', 'font-bold');
        } else {
          statusMessage.classList.add('text-gray-600');
        }
      }

      // === 檔案選擇 UI ===
      function setupFileInputUI(inputId, labelId, countId) {
        const input = document.getElementById(inputId);
        const label = document.getElementById(labelId);
        const count = document.getElementById(countId);
        input.addEventListener('change', () => {
          if (input.files.length > 0) {
            label.classList.add('selected');
            count.textContent = `已選擇 ${input.files.length} 張照片`;
          } else {
            label.classList.remove('selected');
            count.textContent = '未選取檔案';
          }
        });
      }

      main();
    });
  </script>
