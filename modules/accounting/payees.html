<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>收款帳戶</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="../../shared/js/accounting_master_data.js?v=9"></script>
  <script src="../../shared/js/accounting_api.js?v=19"></script>
  <script src="../../shared/js/accounting_cache.js?v=19"></script>
  <script src="../../shared/js/accounting_ui.js?v=2"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; max-width: 560px; margin: 0 auto; background: #f4f6f8; }
    h2 { margin: 0 0 8px; }
    .sub { color: #555; font-size: 14px; }
    .card { background: #fff; border-radius: 12px; padding: 14px; margin: 12px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    label { display: block; margin-top: 8px; font-weight: 600; font-size: 14px; }
    input { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .hint { font-size: 12px; color: #777; margin-top: 2px; }
    .btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; background: #1a73e8; color: #fff; }
    .item { border-bottom: 1px solid #eee; padding: 10px 0; }
    .item:last-child { border-bottom: none; }
    .bank { font-family: ui-monospace, monospace; font-size: 13px; color: #333; }
    .inactive { opacity: .55; }
    #msg { color: #c5221f; font-size: 14px; }
    #ok { color: #137333; font-size: 14px; }
    .hidden { display: none; }
    .nav { margin-bottom: 12px; font-size: 14px; }
    .nav a { color: #1a73e8; text-decoration: none; }
  </style>
</head>
<body>
  <div id="loading">載入中…</div>
  <div id="app" class="hidden">
    <p class="nav"><a href="index.html">← 會計功能選單</a></p>
    <h2>收款帳戶</h2>
    <p class="sub" id="userLine">—</p>
    <div id="msg"></div>
    <div id="ok"></div>

    <div class="card">
      <h3 style="margin:0 0 8px">新增收款人</h3>
      <label>姓名／廠商名稱</label><input id="name" />
      <div class="row2">
        <div>
          <label>銀行代碼</label>
          <input id="bank_code" inputmode="numeric" maxlength="3" placeholder="例：013" />
          <div class="hint">3 碼</div>
        </div>
        <div>
          <label>分行代碼</label>
          <input id="branch_code" inputmode="numeric" maxlength="4" placeholder="例：1234" />
          <div class="hint">4 碼</div>
        </div>
      </div>
      <label>帳號</label><input id="account_no" inputmode="numeric" />
      <label>戶名</label><input id="account_name" />
      <label>聯絡電話（選填）</label><input id="phone" inputmode="tel" />
      <button type="button" class="btn" id="addBtn">新增</button>
    </div>

    <div class="card">
      <h3 style="margin:0 0 8px">列表</h3>
      <div id="list"></div>
    </div>
  </div>
  <script>
    (function () {
      AccountingUi.init();
      var session = null;
      var ui = AccountingUi.feedback();
      function setMsg(t) { ui.setMsg(t); }
      function setOk(t) { ui.setOk(t); }
      function showApp() {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
      }
      function maskAccount(no) {
        if (!no || no.length < 5) return no || '—';
        return no.slice(0, 4) + '****' + no.slice(-3);
      }
      async function loadList() {
        if (!AccountingCache.get(session)) {
          await AccountingCache.load(session);
        }
        var rows = AccountingCache.payees(session);
        var data = { success: true, data: rows };
        var box = document.getElementById('list');
        box.innerHTML = '';
        if (!data.success) { setMsg(data.message); return; }
        (data.data || []).forEach(function (p) {
          var div = document.createElement('div');
          div.className = 'item' + (p.is_active === false || p.is_active === 'FALSE' ? ' inactive' : '');
          var bankLine = (p.bank_code || '—') + '-' + (p.branch_code || '—') + ' · ' + maskAccount(p.account_no);
          div.innerHTML = '<strong>' + (p.name || '') + '</strong>' +
            (p.account_name ? '（' + p.account_name + '）' : '') + '<br>' +
            '<span class="bank">' + bankLine + '</span><br>' +
            '<span class="sub">' + (p.phone || '無電話') + '</span>';
          box.appendChild(div);
        });
        if (!data.data || !data.data.length) box.textContent = '尚無資料';
      }
      document.getElementById('addBtn').addEventListener('click', async function () {
        var btn = this;
        await AccountingUi.runAsync(btn, {
          busyLabel: '儲存中…',
          startMessage: '正在新增收款帳戶…'
        }, async function () {
          ui.clear();
          var payload = {
            name: document.getElementById('name').value.trim(),
            bank_code: document.getElementById('bank_code').value.trim(),
            branch_code: document.getElementById('branch_code').value.trim(),
            account_no: document.getElementById('account_no').value.trim(),
            account_name: document.getElementById('account_name').value.trim(),
            phone: document.getElementById('phone').value.trim()
          };
          if (!payload.name) { setMsg('請填姓名或廠商名稱'); return; }
          if (!payload.bank_code || payload.bank_code.length !== 3) { setMsg('銀行代碼須為 3 碼'); return; }
          if (!payload.branch_code || payload.branch_code.length !== 4) { setMsg('分行代碼須為 4 碼'); return; }
          if (!payload.account_no) { setMsg('請填帳號'); return; }
          if (!payload.account_name) { setMsg('請填戶名'); return; }
          var data = await AccountingApi.crudCreate(session, 'payee', payload);
          if (!data.success) { setMsg(data.message || '新增失敗'); return; }
          ['name', 'bank_code', 'branch_code', 'account_no', 'account_name', 'phone'].forEach(function (id) {
            document.getElementById(id).value = '';
          });
          setOk('已新增「' + payload.name + '」');
          await loadList();
        });
      });
      (async function boot() {
        try {
          session = await AccountingApi.initSession();
          if (!session) return;
          var mode = session.devBypass ? ' · 測試模式（無登入）' : '';
          document.getElementById('userLine').textContent = session.profile.displayName + ' · 權限 ' + session.auth.permission + mode;
          showApp();
          await loadList();
        } catch (e) {
          document.getElementById('loading').textContent = e.message || String(e);
        }
      })();
    })();
  </script>
</body>
</html>
