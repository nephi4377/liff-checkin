<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的案件追加減與收款</title>
  <link rel="stylesheet" href="../../shared/css/accounting_layout.css?v=5" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="../../shared/js/operator_context.js?v=1"></script>
  <script src="../../shared/js/accounting_api.js?v=38"></script>
  <script src="../../shared/js/hub_ref_cache.js?v=1"></script>
  <script src="../../shared/js/accounting_list_cache.js?v=3"></script>
  <script src="../../shared/js/customer_finance_ui.js?v=2"></script>
  <!-- 客戶專用 LIFF（與員工會計 policy.liffId 分開）。LINE Developers Endpoint URL：
       https://info.tanxin.space/modules/accounting/customer-finance-portal.html -->
  <script>
    var CUSTOMER_FINANCE_LIFF_ID = '2007974938-d2y1uA1G';
  </script>
  <style>
    body { max-width: 640px; margin: 0 auto; padding: 16px; font-family: system-ui, sans-serif; }
    h2 { margin: 0 0 8px; font-size: 20px; }
    .sub { color: #555; font-size: 14px; margin-bottom: 12px; }
    .card { background: #fff; border-radius: 12px; padding: 14px; margin: 12px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #e8f0fe; }
    .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; font-size: 15px; margin-top: 8px; cursor: pointer; }
    .btn-primary { background: #06c755; color: #fff; }
    .btn-secondary { background: #e8eaed; color: #333; }
    .warn-box { background: #fef7e0; border-radius: 8px; padding: 10px; font-size: 13px; margin: 8px 0; color: #5f4400; }
    #signCanvas { border: 1px solid #ccc; border-radius: 8px; width: 100%; height: 160px; touch-action: none; }
    .hidden { display: none; }
    #msg { color: #c5221f; font-size: 14px; }
    select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; }
    .adj-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
    .adj-table th, .adj-table td { border: 1px solid #e0e0e0; padding: 8px 6px; text-align: left; vertical-align: top; }
    .adj-table th { background: #f8f9fa; font-weight: 600; }
    .adj-table .num { text-align: right; white-space: nowrap; }
    .adj-table .neg { color: #c5221f; }
    .btn:disabled, .btn.is-busy { opacity: 0.65; cursor: wait; }
  </style>
</head>
<body>
  <div id="loading">載入中…</div>
  <div id="app" class="hidden">
    <h2>我的案件紀錄</h2>
    <p class="sub" id="userLine">—</p>
    <div id="msg"></div>

    <div class="card">
      <label>選擇案號</label>
      <select id="projectSelect"></select>
    </div>

    <div id="content">
      <div class="card">
        <h3 style="margin:0 0 8px">追加減</h3>
        <div id="adjList">—</div>
      </div>
      <div class="card">
        <h3 style="margin:0 0 8px">收款紀錄</h3>
        <div id="recList">—</div>
      </div>
    </div>

    <div id="signModal" class="hidden card">
      <h3>電子簽名</h3>
      <canvas id="signCanvas"></canvas>
      <button class="btn btn-secondary" id="btnClearSign">清除</button>
      <button class="btn btn-primary" id="btnSubmitSign">提交簽名</button>
      <button class="btn btn-secondary" id="btnCancelSign">取消</button>
    </div>
  </div>
  <script>
  (function () {
    var session = null;
    var pendingSignAdjId = null;
    var canvas = document.getElementById('signCanvas');
    var ctx = canvas.getContext('2d');
    var drawing = false;

    function $(id) { return document.getElementById(id); }
    function showMsg(t) { $('msg').textContent = t || ''; }

    function parsePortalDeepLink() {
      var params = new URLSearchParams(window.location.search);
      var projectNo = params.get('project_no') || '';
      var entity = params.get('entity') || '';
      var entityId = params.get('id') || '';
      var liffState = params.get('liff.state');
      if (liffState) {
        var inner = liffState.charAt(0) === '?' ? liffState.slice(1) : liffState;
        try {
          var innerParams = new URLSearchParams(decodeURIComponent(inner));
          projectNo = projectNo || innerParams.get('project_no') || '';
          entity = entity || innerParams.get('entity') || '';
          entityId = entityId || innerParams.get('id') || '';
        } catch (e) {}
      }
      return { projectNo: projectNo, entity: entity, entityId: entityId };
    }

    var deepLink = parsePortalDeepLink();

    function statusLabel(st) {
      var map = {
        pending_customer: '待您確認', content_confirmed: '待簽名', pending_company: '公司已收到',
        company_confirmed: '已生效', pending_customer: '待確認',
        customer_stage1: '待最終確認', customer_confirmed: '已確認'
      };
      return map[st] || st;
    }

    function setupCanvas() {
      var rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * 2;
      canvas.height = rect.height * 2;
      ctx.scale(2, 2);
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#111';
    }

    function pos(e) {
      var r = canvas.getBoundingClientRect();
      var t = e.touches ? e.touches[0] : e;
      return { x: t.clientX - r.left, y: t.clientY - r.top };
    }
    canvas.addEventListener('mousedown', function (e) { drawing = true; var p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('mousemove', function (e) { if (!drawing) return; var p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
    canvas.addEventListener('mouseup', function () { drawing = false; });
    canvas.addEventListener('touchstart', function (e) { e.preventDefault(); drawing = true; var p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('touchmove', function (e) { e.preventDefault(); if (!drawing) return; var p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
    canvas.addEventListener('touchend', function () { drawing = false; });

    function fillProjects(projects) {
      var sel = $('projectSelect');
      sel.innerHTML = (projects || []).map(function (p) {
        return '<option value="' + p.project_no + '">' + p.project_no + ' ' + (p.site_name || '') + '</option>';
      }).join('');
      if (!projects.length) sel.innerHTML = '<option value="">（尚無綁定案件）</option>';
      sel.onchange = function () {
        if (sel.disabled) return;
        sel.disabled = true;
        sel.classList.add('is-busy');
        loadData().finally(function () {
          sel.disabled = false;
          sel.classList.remove('is-busy');
        });
      };
    }

    function setContentBusy(on) {
      var box = $('content');
      if (!box) return;
      box.classList.toggle('is-busy', !!on);
      box.style.opacity = on ? '0.55' : '';
      box.style.pointerEvents = on ? 'none' : '';
    }

    async function loadData(forceRefresh) {
      var pno = $('projectSelect').value;
      if (!pno) return;
      showMsg('');
      setContentBusy(true);
      $('projectSelect').disabled = true;
      try {
        var fetchFn = function () { return AccountingApi.cfPortalData(session, pno); };
        var res;
        if (typeof AccountingListCache !== 'undefined' && !forceRefresh) {
          res = await AccountingListCache.loadPortalData(session, pno, fetchFn);
        } else {
          res = await fetchFn();
          if (typeof AccountingListCache !== 'undefined' && res && res.success) {
            AccountingListCache.loadPortalData(session, pno, function () { return Promise.resolve(res); }, { force: true });
          }
        }
        if (!res.success) { showMsg(res.message); return; }
        renderAdj(res.adjustments || []);
        renderRec(res.receipts || []);
        focusDeepLinkEntity();
      } finally {
        setContentBusy(false);
        $('projectSelect').disabled = false;
      }
    }

    function showRecStage2Locally(receiptId) {
      var row = document.querySelector('[data-rec-id="' + receiptId + '"]');
      if (!row) return;
      var stage2Hint = '確認後此收款紀錄將寫入您的案件紀錄，請再次核對金額、日期與階段名稱。款項相關請務必謹慎確認。';
      var tag = row.querySelector('.tag');
      if (tag) tag.textContent = statusLabel('customer_stage1');
      var oldBtns = row.querySelectorAll('[data-rec-s1]');
      oldBtns.forEach(function (b) { b.remove(); });
      if (row.querySelector('[data-rec-s2]')) return;
      var wrap = document.createElement('div');
      wrap.innerHTML = '<div class="warn-box">' + stage2Hint + '</div>' +
        '<button class="btn btn-primary" data-rec-s2="' + receiptId + '">② 我確認已收到此收款紀錄</button>';
      row.appendChild(wrap);
      bindRecStage2Button(wrap.querySelector('[data-rec-s2]'));
    }

    function bindRecStage2Button(btn) {
      if (!btn || btn._bound) return;
      btn._bound = true;
      var stage2Hint = '確認後此收款紀錄將寫入您的案件紀錄，請再次核對金額、日期與階段名稱。款項相關請務必謹慎確認。';
      btn.onclick = function () {
        if (!confirm(stage2Hint + '\n\n確定要提交？提交後不可取消。')) return;
        CustomerFinanceUi.runBtnAsync(btn, async function () {
          var res = await AccountingApi.cfRecCustomerStage2(session, btn.getAttribute('data-rec-s2'));
          if (!res.success) showMsg(res.message);
          else {
            if (typeof AccountingListCache !== 'undefined') {
              AccountingListCache.invalidatePortalData(session, $('projectSelect').value);
            }
            return loadData(true);
          }
        }, { busyLabel: '處理中…', lockRoot: $('recList') });
      };
    }

    function focusDeepLinkEntity() {
      if (!deepLink.entityId) return;
      var target = null;
      if (deepLink.entity === 'adjustment') {
        target = document.querySelector('[data-adj-id="' + deepLink.entityId + '"]')
          || document.querySelector('[data-adj-confirm="' + deepLink.entityId + '"]')
          || document.querySelector('[data-adj-sign="' + deepLink.entityId + '"]');
      } else if (deepLink.entity === 'receipt') {
        target = document.querySelector('[data-rec-id="' + deepLink.entityId + '"]')
          || document.querySelector('[data-rec-s1="' + deepLink.entityId + '"]')
          || document.querySelector('[data-rec-s2="' + deepLink.entityId + '"]');
      }
      if (!target) return;
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      target.style.outline = '2px solid #06c755';
      setTimeout(function () { target.style.outline = ''; }, 4000);
      var signBtn = document.querySelector('[data-adj-sign="' + deepLink.entityId + '"]');
      if (deepLink.entity === 'adjustment' && signBtn) {
        signBtn.click();
      }
    }

    function fmtMoney(n) {
      var v = parseFloat(n);
      if (isNaN(v)) return '—';
      return (v < 0 ? '-' : '') + '$' + Math.abs(Math.round(v)).toLocaleString('zh-TW');
    }

    function renderAdj(items) {
      if (!items.length) {
        $('adjList').innerHTML = '<p>目前無待確認追加減</p>';
        return;
      }
      var rows = items.map(function (a) {
        var tp = parseFloat(a.total_price);
        if (isNaN(tp)) tp = String(a.type) === '減項' ? -(parseFloat(a.amount) || 0) : (parseFloat(a.amount) || 0);
        var btns = '';
        if (a.status === 'pending_customer') {
          btns = '<button class="btn btn-primary" data-adj-confirm="' + a.adjustment_id + '">① 我確認內容</button>';
        }
        if (a.status === 'content_confirmed') {
          btns = '<button class="btn btn-primary" data-adj-sign="' + a.adjustment_id + '">② 電子簽名</button>';
        }
        return '<tr data-adj-id="' + a.adjustment_id + '">' +
          '<td class="num">' + (a.item_no || '—') + '</td>' +
          '<td>' + (a.item_name || a.item_desc || '') + '</td>' +
          '<td>' + (a.unit || '—') + '</td>' +
          '<td class="num">' + (a.quantity !== '' && a.quantity != null ? a.quantity : '—') + '</td>' +
          '<td class="num' + (tp < 0 ? ' neg' : '') + '">' + fmtMoney(tp) + '</td>' +
          '<td>' + (a.note || '—') + '</td>' +
          '<td><span class="tag">' + statusLabel(a.status) + '</span>' + btns + '</td></tr>';
      }).join('');
      $('adjList').innerHTML =
        '<table class="adj-table"><thead><tr>' +
        '<th>項次</th><th>項目</th><th>單位</th><th>數量</th><th>總價</th><th>備註</th><th>狀態</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table>';
      $('adjList').querySelectorAll('[data-adj-confirm]').forEach(function (btn) {
        btn.onclick = function () {
          CustomerFinanceUi.runBtnAsync(btn, async function () {
            var res = await AccountingApi.cfAdjCustomerConfirm(session, btn.getAttribute('data-adj-confirm'));
            if (!res.success) showMsg(res.message); else return loadData();
          }, { busyLabel: '處理中…', lockRoot: $('adjList') });
        };
      });
      $('adjList').querySelectorAll('[data-adj-sign]').forEach(function (btn) {
        btn.onclick = function () {
          pendingSignAdjId = btn.getAttribute('data-adj-sign');
          setupCanvas();
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          $('signModal').classList.remove('hidden');
        };
      });
    }

    function renderRec(items) {
      var stage2Hint = '確認後此收款紀錄將寫入您的案件紀錄，請再次核對金額、日期與階段名稱。款項相關請務必謹慎確認。';
      $('recList').innerHTML = items.length ? items.map(function (r) {
        var btns = '';
        if (r.status === 'pending_customer') {
          btns = '<button class="btn btn-primary" data-rec-s1="' + r.receipt_id + '">① 確認此收款紀錄</button>';
        }
        if (r.status === 'customer_stage1') {
          btns = '<div class="warn-box">' + stage2Hint + '</div>' +
            '<button class="btn btn-primary" data-rec-s2="' + r.receipt_id + '">② 我確認已收到此收款紀錄</button>';
        }
        return '<div style="padding:10px 0;border-bottom:1px solid #eee" data-rec-id="' + r.receipt_id + '">' +
          '<span class="tag">' + statusLabel(r.status) + '</span><br/>' +
          '收據編號 ' + (r.receipt_no || '') + '<br/>' +
          (r.stage_label || '') + ' · $' + r.amount + ' · ' + (r.received_at || '') +
          btns + '</div>';
      }).join('') : '<p>目前無待確認收款</p>';
      $('recList').querySelectorAll('[data-rec-s1]').forEach(function (btn) {
        btn.onclick = function () {
          CustomerFinanceUi.runBtnAsync(btn, async function () {
            var rid = btn.getAttribute('data-rec-s1');
            var res = await AccountingApi.cfRecCustomerStage1(session, rid);
            if (!res.success) showMsg(res.message);
            else {
              if (typeof AccountingListCache !== 'undefined') {
                AccountingListCache.invalidatePortalData(session, $('projectSelect').value);
              }
              showRecStage2Locally(rid);
            }
          }, { busyLabel: '處理中…', lockRoot: $('recList') });
        };
      });
      $('recList').querySelectorAll('[data-rec-s2]').forEach(function (btn) {
        bindRecStage2Button(btn);
      });
    }

    $('btnClearSign').onclick = function () { ctx.clearRect(0, 0, canvas.width, canvas.height); };
    $('btnCancelSign').onclick = function () { pendingSignAdjId = null; $('signModal').classList.add('hidden'); };
    $('btnSubmitSign').onclick = function () {
      if (!pendingSignAdjId) return;
      CustomerFinanceUi.runBtnAsync($('btnSubmitSign'), async function () {
        var data = canvas.toDataURL('image/png');
        var res = await AccountingApi.cfAdjCustomerSign(session, pendingSignAdjId, data);
        if (!res.success) showMsg(res.message);
        else {
          pendingSignAdjId = null;
          $('signModal').classList.add('hidden');
          return loadData();
        }
      }, { busyLabel: '提交中…', lockRoot: $('signModal') });
    };

    (async function boot() {
      try {
        session = await AccountingApi.initCustomerPortalSession({ liffId: CUSTOMER_FINANCE_LIFF_ID });
        $('userLine').textContent = (session.portal && session.portal.display_name) || '客戶';
        fillProjects((session.portal && session.portal.projects) || []);
        if (deepLink.projectNo) {
          $('projectSelect').value = deepLink.projectNo;
        }
        $('loading').classList.add('hidden');
        $('app').classList.remove('hidden');
        if ($('projectSelect').value) loadData();
      } catch (e) {
        $('loading').textContent = e.message || '載入失敗';
      }
    })();
  })();
  </script>
</body>
</html>
