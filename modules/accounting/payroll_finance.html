<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>薪資待匯款</title>
  <link rel="stylesheet" href="../../shared/css/accounting_layout.css?v=5" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="../../shared/js/operator_context.js?v=1"></script>
  <script src="../../shared/js/accounting_api.js?v=40"></script>
  <script src="../../shared/js/hub_ref_cache.js?v=2"></script>
  <script src="../../shared/js/accounting_list_cache.js?v=5"></script>
  <script src="../../shared/js/accounting_action_queue.js?v=1"></script>
  <script src="../../shared/js/accounting_ui.js?v=16"></script>
  <script src="../../shared/js/accounting_nav.js?v=2"></script>
  <script src="../../shared/js/accounting_boot.js?v=5"></script>
  <style>
    h2 { margin: 0 0 8px; }
    .sub { color: #555; font-size: 14px; line-height: 1.45; }
    .card { background: #fff; border-radius: 12px; padding: 14px; margin: 12px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .btn { padding: 10px 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .btn-primary { background: #1a73e8; color: #fff; width: 100%; padding: 12px; margin-top: 10px; }
    .btn-ok { background: #34a853; color: #fff; }
    .btn-muted { background: #e8eaed; color: #333; }
    .item { border-bottom: 1px solid #eee; padding: 14px 0; }
    .item:last-child { border-bottom: none; }
    .chk { width: auto; margin-right: 8px; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-start; }
    .bank { font-size: 13px; color: #444; margin-top: 4px; }
    .tag { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 6px; background: #e8f0fe; margin-right: 6px; }
    .tag.warn { background: #fce8e6; color: #c5221f; }
    #msg { color: #c5221f; font-size: 14px; }
    #ok { color: #137333; font-size: 14px; }
    .hidden { display: none; }
    .nav { margin-bottom: 12px; font-size: 14px; }
    .nav a { color: #1a73e8; text-decoration: none; }
    label { display: block; margin-top: 8px; font-weight: 600; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .inline-chk { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-weight: 600; font-size: 14px; }
    .inline-chk input { width: auto; margin: 0; }
  </style>
</head>
<body class="acct-page acct-page-form">
  <div id="loading">載入中…</div>
  <div id="app" class="hidden acct-main">
    <p class="nav"><a href="index.html">← 會計功能選單</a></p>
    <h2>薪資待匯款</h2>
    <p class="sub" id="userLine">—</p>
    <p class="sub">勾選後下載<strong>薪轉檔</strong>（非廠商整批匯款）。上傳中信請選「<strong>薪資轉帳</strong>」、編碼 <strong>BIG-5</strong>。確認銀行已匯出後，再按「標記已發薪」。</p>
    <div id="msg" role="alert"></div>
    <div id="ok" aria-live="polite"></div>

    <div class="card">
      <button type="button" class="btn btn-primary" id="reloadBtn" title="略過暫存，立刻向後端重抓最新清單">重新載入最新</button>
      <button type="button" class="btn btn-secondary" id="exportBtn" style="width:100%;padding:12px;margin-top:8px;background:#5f6368;color:#fff">匯出薪轉檔</button>
      <button type="button" class="btn btn-ok" id="markPaidBtn" style="width:100%;padding:12px;margin-top:8px">標記已發薪</button>
      <button type="button" class="btn btn-ok" id="markAllPaidBtn" style="width:100%;padding:12px;margin-top:8px">一鍵全標已發薪</button>
      <p class="sub" style="margin-top:10px">
        <strong>① 匯出薪轉檔</strong>：只下載 .txt，不改狀態、不寫收支、不推播 LINE。<br />
        <strong>② 上傳中信</strong>：請選「薪資轉帳」、BIG-5。<br />
        <strong>③ 標記已發薪</strong>：確認銀行已匯出後按鈕 → 寫收支、標已發薪、LINE 通知員工薪資摘要。<br />
        每月薪資請用此頁；單筆員工請款請用「廠商待匯款」。
      </p>
    </div>

    <div class="card">
      <h3 style="margin:0 0 8px">事後補登發薪</h3>
      <p class="sub">未走正常送審、或已私下／網銀轉帳時，補建紀錄。走帳金額會寫收支與員工發放明細；私下補差僅內部備註。</p>
      <label>員工</label>
      <select id="bfEmployee"><option value="">載入中…</option></select>
      <div class="row2">
        <div><label>期別</label><input id="bfPeriod" placeholder="115/06" /></div>
        <div><label>發薪日</label><input id="bfPayDate" type="date" /></div>
      </div>
      <div class="row2">
        <div><label>走帳／實發（元）</label><input id="bfFinal" type="number" min="1" step="1" /></div>
        <div><label>私下補差（元，內部）</label><input id="bfOffAmt" type="number" min="0" step="1" value="0" /></div>
      </div>
      <label>私下補差備註（內部）</label>
      <input id="bfOffNote" placeholder="例：超過薪轉上限部分" />
      <label>補登說明</label>
      <input id="bfNote" placeholder="例：已網銀轉帳，補登發放明細" />
      <label>收支付款方式</label>
      <select id="bfPayMethod">
        <option value="匯款" selected>匯款（網銀／非薪轉檔）</option>
        <option value="薪轉">薪轉</option>
        <option value="其他">其他</option>
      </select>
      <label class="inline-chk"><input type="checkbox" id="bfMarkPaid" checked /> 送出後直接標記已發薪（寫收支）</label>
      <label class="inline-chk"><input type="checkbox" id="bfLineNotify" checked /> LINE 通知員工薪資摘要</label>
      <label class="inline-chk"><input type="checkbox" id="bfAllowDup" /> 允許同期別重複（已有未結案時）</label>
      <button type="button" class="btn btn-primary" id="backfillBtn">送出補登</button>
    </div>

    <div class="card">
      <p id="emptyMsg" class="sub hidden">目前沒有待匯款薪資。</p>
    </div>
  </div>
  <script>
    (function () {
      var session = null;
      var employees = [];
      var ui = AccountingUi.feedback();
      function setMsg(t) { ui.setMsg(t); }
      function setOk(t) { ui.setOk(t); }
      function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

      async function downloadCtbcBig5(filename, content) {
        var text = String(content || '').replace(/^\uFEFF/, '');
        var mod = await import('https://esm.sh/iconv-lite@0.6.3');
        var iconv = mod.default || mod;
        var bytes = iconv.encode(text, 'cp950');
        var blob = new Blob([new Uint8Array(bytes)], { type: 'application/octet-stream' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
      }

      function listCacheKey() { return 'payroll_finance:pending_payment'; }

      function removeFromListCache(ids) {
        if (typeof AccountingListCache === 'undefined') return;
        var idSet = {};
        (ids || []).forEach(function (id) { idSet[id] = true; });
        AccountingListCache.patch(session, listCacheKey(), function (data) {
          if (!data || !data.items) return;
          data.items = data.items.filter(function (row) {
            return !idSet[row.payroll_request_id];
          });
        });
      }

      function removeItemsFromView(ids) {
        removeFromListCache(ids);
        (ids || []).forEach(function (id) {
          var el = document.getElementById('pf-' + id);
          if (el) el.remove();
        });
        var remaining = document.querySelectorAll('#list .item').length;
        document.getElementById('emptyMsg').classList.toggle('hidden', remaining > 0);
      }

      function renderItem(row) {
        var div = document.createElement('div');
        div.className = 'item';
        div.id = 'pf-' + row.payroll_request_id;
        var amount = parseInt(row.final_amount, 10) || parseInt(row.estimated_net, 10) || 0;
        var incomplete = row.bank_incomplete;
        var head = document.createElement('div');
        head.className = 'actions';
        var chk = document.createElement('input');
        chk.type = 'checkbox';
        chk.className = 'chk';
        chk.value = row.payroll_request_id;
        chk.checked = !incomplete;
        chk.disabled = !!incomplete;
        head.appendChild(chk);
        var ac = String(row.account_no || '');
        var tail = ac.length > 4 ? ac.slice(-4) : ac;
        var info = document.createElement('div');
        info.innerHTML =
          '<div><strong>' + esc(row.employee_name) + '</strong> <span class="tag">' + esc(row.period_label) + '</span></div>' +
          '<div class="sub">實發 $' + amount.toLocaleString('zh-TW') + '</div>' +
          (row.bonus_note ? '<div class="sub">獎金備註：' + esc(row.bonus_note) + '</div>' : '') +
          (incomplete
            ? '<div class="tag warn">銀行帳戶不完整，無法匯出</div>'
            : '<div class="bank">銀行 ' + esc(row.bank_code) + ' · 末四碼 ' + esc(tail) + '</div>');
        head.appendChild(info);
        div.appendChild(head);
        return div;
      }

      async function loadList(silent, force) {
        var run = async function () {
          if (!silent) { setMsg(''); setOk(''); }
          var list = document.getElementById('list');
          if (!silent) list.innerHTML = '<p class="sub">載入中…</p>';
          function applyListData(data) {
            if (!data || !data.success) throw new Error((data && data.message) || '載入失敗');
            list.innerHTML = '';
            var items = (data.items || []).filter(function (r) {
              return String(r.review_status) === '已審' && String(r.payment_status) !== '已匯款';
            });
            document.getElementById('emptyMsg').classList.toggle('hidden', items.length > 0);
            items.forEach(function (row) { list.appendChild(renderItem(row)); });
          }
          try {
            var data;
            if (typeof AccountingListCache !== 'undefined') {
              data = await AccountingListCache.load(session, listCacheKey(), function () {
                return AccountingApi.payrollRequestList(session, { status: 'pending_payment' });
              }, {
                force: !!force,
                onUpdate: force ? null : function (fresh) {
                  try { applyListData(fresh); } catch (e) {}
                }
              });
            } else {
              data = await AccountingApi.payrollRequestList(session, { status: 'pending_payment' });
            }
            applyListData(data);
          } catch (e) {
            list.innerHTML = '';
            setMsg(e.message || String(e));
          }
        };
        if (silent) return run();
        var reloadBtn = document.getElementById('reloadBtn');
        return AccountingUi.runAsync(reloadBtn, { busyLabel: '載入中…' }, run);
      }

      function selectedIds() {
        return Array.prototype.slice.call(document.querySelectorAll('#list .chk:checked')).map(function (c) { return c.value; });
      }

      document.getElementById('reloadBtn').addEventListener('click', function () { loadList(false, true); });

      document.getElementById('exportBtn').addEventListener('click', async function () {
        var ids = selectedIds();
        if (!ids.length) { setMsg('請先勾選要匯出的項目'); return; }
        var confirmMsg = '將下載薪轉檔（.txt）共 ' + ids.length + ' 筆。\n' +
          '不會改狀態、不寫收支、不推播 LINE。\n\n上傳中信後，請回來按「標記已發薪」。\n\n確定？';
        if (!confirm(confirmMsg)) return;
        var btn = document.getElementById('exportBtn');
        await AccountingUi.runAsync(btn, {
          busyLabel: '匯出中…',
          actionLabel: '匯出薪轉檔'
        }, async function () {
          setMsg(''); setOk('');
          var data = await AccountingApi.payrollRequestExport(session, ids);
          if (!data.success) throw new Error(data.message || '匯出失敗');
          await downloadCtbcBig5(data.filename || 'ctbc_salary.txt', data.content || '');
          var msg = '已下載 ' + (data.count || ids.length) + ' 筆薪轉檔。上傳中信請選「薪資轉帳」、BIG-5';
          if (data.warnings && data.warnings.length) {
            setMsg('以下項目未匯出：' + data.warnings.join('；'));
            msg += '（另有 ' + data.warnings.length + ' 筆略過，見上方紅字）';
          }
          setOk(msg);
        }).catch(function (e) { setMsg(e.message || String(e)); });
      });

      async function runMarkPaid(ids, btn, opts) {
        opts = opts || {};
        if (!ids.length && !opts.markAll) {
          setMsg('請先勾選要標記的項目');
          return;
        }
        var countLabel = opts.markAll ? '列表全部待匯款' : (ids.length + ' 筆');
        if (!confirm('確認銀行已匯出？將標記 ' + countLabel + ' 為已發薪、寫收支，並 LINE 通知員工薪資摘要。\n入帳日＝今日。')) return;
        await AccountingUi.runAsync(btn, {
          busyLabel: '處理中…',
          actionLabel: '標記已發薪',
          startMessage: '正在寫入收支並推播通知，可能需要十幾秒…'
        }, async function () {
          setMsg(''); setOk('');
          var data = await AccountingApi.payrollRequestMarkPaid(session, ids, { mark_all: !!opts.markAll });
          if (!data.success) throw new Error(data.message || '標記失敗');
          var msg = '已標記 ' + (data.marked || data.count || ids.length) + ' 筆已發薪';
          if (data.remit_date) msg += '（入帳日 ' + data.remit_date + '）';
          if (data.warnings && data.warnings.length) {
            setMsg('以下項目未標記：' + data.warnings.join('；'));
            msg += '（另有 ' + data.warnings.length + ' 筆略過，見上方紅字）';
          }
          setOk(msg);
          removeItemsFromView(data.payroll_request_ids || ids);
        }).catch(function (e) { setMsg(e.message || String(e)); });
      }

      document.getElementById('markPaidBtn').addEventListener('click', function () {
        runMarkPaid(selectedIds(), document.getElementById('markPaidBtn'));
      });

      document.getElementById('markAllPaidBtn').addEventListener('click', function () {
        runMarkPaid([], document.getElementById('markAllPaidBtn'), { markAll: true });
      });

      document.getElementById('markAllPaidBtn').addEventListener('click', function () {
        runMarkPaid([], document.getElementById('markAllPaidBtn'), { markAll: true });
      });

      function fillEmployeeSelect() {
        var sel = document.getElementById('bfEmployee');
        sel.innerHTML = '<option value="">— 請選擇 —</option>';
        employees.forEach(function (e) {
          var opt = document.createElement('option');
          opt.value = e.userId;
          opt.textContent = (e.userName || e.displayName || e.userId) + (e.status && e.status !== '在職' ? '（' + e.status + '）' : '');
          sel.appendChild(opt);
        });
      }

      async function loadEmployees() {
        try {
          var ctx = await AccountingApi.paymentRequestContext(session);
          if (ctx.success && ctx.employees && ctx.employees.length) {
            employees = ctx.employees;
            fillEmployeeSelect();
          }
        } catch (e) {
          document.getElementById('bfEmployee').innerHTML = '<option value="">無法載入員工</option>';
        }
      }

      document.getElementById('backfillBtn').addEventListener('click', async function () {
        var uid = document.getElementById('bfEmployee').value;
        var period = document.getElementById('bfPeriod').value.trim();
        var finalAmt = Number(document.getElementById('bfFinal').value) || 0;
        if (!uid) { setMsg('請選擇員工'); return; }
        if (!period) { setMsg('請填期別'); return; }
        if (finalAmt <= 0) { setMsg('走帳金額須大於 0'); return; }
        if (!confirm('補登 ' + period + ' 走帳 $' + finalAmt.toLocaleString('zh-TW') + '？\n私下補差不會寫進收支或員工明細。')) return;
        var btn = document.getElementById('backfillBtn');
        await AccountingUi.runAsync(btn, { busyLabel: '補登中…' }, async function () {
          setMsg(''); setOk('');
          var payDate = document.getElementById('bfPayDate').value;
          var data = await AccountingApi.payrollRequestManualBackfill(session, {
            employee_user_id: uid,
            period_label: period,
            pay_date: payDate || undefined,
            final_amount: finalAmt,
            off_record_amount: Number(document.getElementById('bfOffAmt').value) || 0,
            off_record_note: document.getElementById('bfOffNote').value.trim(),
            note: document.getElementById('bfNote').value.trim(),
            ledger_payment_method: document.getElementById('bfPayMethod').value,
            mark_paid: document.getElementById('bfMarkPaid').checked,
            line_notify: document.getElementById('bfLineNotify').checked,
            allow_duplicate: document.getElementById('bfAllowDup').checked
          });
          if (!data.success) throw new Error(data.message || '補登失敗');
          setOk(data.message || '已補登');
          if (!data.marked_paid) await loadList(false, true);
        }).catch(function (e) { setMsg(e.message || String(e)); });
      });

      AccountingBoot.run({
        minPermission: 4,
        onReady: async function (s) {
          session = s;
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('app').classList.remove('hidden');
          document.getElementById('userLine').textContent = (s.profile && s.profile.displayName) || '—';
          var today = new Date();
          var iso = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
          document.getElementById('bfPayDate').value = iso;
          await Promise.all([loadList(), loadEmployees()]);
        }
      });
    })();
  </script>
</body>
</html>
