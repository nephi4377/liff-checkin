<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>薪資待匯款</title>
  <link rel="stylesheet" href="../../shared/css/accounting_layout.css?v=5" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="../../shared/js/operator_context.js?v=1"></script>
  <script src="../../shared/js/accounting_api.js?v=41"></script>
  <script src="../../shared/js/hub_ref_cache.js?v=2"></script>
  <script src="../../shared/js/accounting_list_cache.js?v=5"></script>
  <script src="../../shared/js/accounting_action_queue.js?v=1"></script>
  <script src="../../shared/js/accounting_ui.js?v=16"></script>
  <script src="../../shared/js/accounting_nav.js?v=2"></script>
  <script src="../../shared/js/accounting_boot.js?v=5"></script>
  <style>
    h2 { margin: 0 0 8px; }
    .sub { color: #555; font-size: 14px; line-height: 1.45; }
    .card { background: #fff; border-radius: 12px; padding: 14px; margin: 12px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .btn { padding: 10px 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .btn-primary { background: #1a73e8; color: #fff; width: 100%; padding: 12px; margin-top: 10px; }
    .btn-ok { background: #34a853; color: #fff; }
    .btn-link { background: #e8f0fe; color: #1a73e8; width: 100%; margin-top: 6px; }
    .item { border-bottom: 1px solid #eee; padding: 14px 0; }
    .item:last-child { border-bottom: none; }
    .chk { width: auto; margin-right: 8px; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-start; }
    .bank { font-size: 13px; color: #444; margin-top: 4px; }
    .tag { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 6px; background: #e8f0fe; margin-right: 6px; }
    .tag.warn { background: #fce8e6; color: #c5221f; }
    #msg { color: #c5221f; font-size: 14px; white-space: pre-wrap; }
    #ok { color: #137333; font-size: 14px; white-space: pre-wrap; }
    .hidden { display: none; }
    .nav { margin-bottom: 12px; font-size: 14px; }
    .nav a { color: #1a73e8; text-decoration: none; }
    label { display: block; margin-top: 8px; font-weight: 600; font-size: 14px; }
    input, select { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .pay-panel { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd; }
    .total-line { font-weight: 700; color: #1a73e8; margin-top: 6px; }
    #emailDrafts .draft { background: #f8f9fa; border-radius: 8px; padding: 10px; margin-top: 8px; font-size: 13px; }
  </style>
</head>
<body class="acct-page acct-page-form">
  <div id="loading">載入中…</div>
  <div id="app" class="hidden acct-main">
    <p class="nav"><a href="index.html">← 會計功能選單</a> · <a href="payroll_backfill.html">薪資歷史補登</a></p>
    <h2>薪資待匯款</h2>
    <p class="sub" id="userLine">—</p>
    <p class="sub">每筆可調<strong>薪轉金額</strong>與<strong>額外發放</strong>（現金／另筆轉帳）。標記已發薪時：收支記<strong>總實發一筆</strong>，並 EMAIL 員工薪資明細。</p>
    <div id="msg" role="alert"></div>
    <div id="ok" aria-live="polite"></div>
    <div id="emailDrafts" class="card hidden"></div>

    <div class="card">
      <button type="button" class="btn btn-primary" id="reloadBtn">重新載入最新</button>
      <button type="button" class="btn btn-secondary" id="exportBtn" style="width:100%;padding:12px;margin-top:8px;background:#5f6368;color:#fff">匯出薪轉檔</button>
      <button type="button" class="btn btn-ok" id="markPaidBtn" style="width:100%;padding:12px;margin-top:8px">標記已發薪</button>
      <button type="button" class="btn btn-ok" id="markAllPaidBtn" style="width:100%;padding:12px;margin-top:8px">一鍵全標已發薪</button>
      <p class="sub" style="margin-top:10px">
        <strong>① 匯出薪轉檔</strong>：依各筆「薪轉金額」產檔，不改狀態。<br />
        <strong>② 上傳中信</strong>：薪資轉帳、BIG-5。<br />
        <strong>③ 標記已發薪</strong>：寫收支（總實發）＋員工薪資歷史＋EMAIL 明細。
      </p>
    </div>

    <div class="card">
      <h3 style="margin:0 0 8px">待匯款清單</h3>
      <div id="list"></div>
      <p id="emptyMsg" class="sub hidden">目前沒有待匯款薪資。</p>
    </div>
  </div>
  <script>
    (function () {
      var session = null;
      var ui = AccountingUi.feedback();
      function setMsg(t) { ui.setMsg(t); }
      function setOk(t) { ui.setOk(t); }
      function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

      function transferDefault(row) {
        return parseInt(row.transfer_amount, 10) || parseInt(row.final_amount, 10) || parseInt(row.estimated_net, 10) || 0;
      }
      function extraDefault(row) {
        return parseInt(row.off_record_amount, 10) || 0;
      }

      function updateTotalDisplay(id) {
        var transfer = Number(document.getElementById('xfer-' + id).value) || 0;
        var extra = Number(document.getElementById('extra-' + id).value) || 0;
        var el = document.getElementById('total-' + id);
        if (el) el.textContent = '總實發 $' + (transfer + extra).toLocaleString('zh-TW');
      }

      function renderEmailDrafts(drafts) {
        var box = document.getElementById('emailDrafts');
        box.innerHTML = '';
        if (!drafts || !drafts.length) { box.classList.add('hidden'); return; }
        box.classList.remove('hidden');
        box.innerHTML = '<h3 style="margin:0 0 8px">EMAIL 待手動寄送</h3><p class="sub">系統無法自動寄出時，請用下方按鈕開信或複製內容。</p>';
        drafts.forEach(function (d, idx) {
          if (!d || !d.body) return;
          var div = document.createElement('div');
          div.className = 'draft';
          var title = (d.subject || '薪資明細') + (d.to ? ' → ' + d.to : '（員工未填 email，寄至會計）');
          div.innerHTML = '<div><strong>' + esc(title) + '</strong></div>';
          var copyBtn = document.createElement('button');
          copyBtn.type = 'button';
          copyBtn.className = 'btn btn-link';
          copyBtn.textContent = '複製信件內容';
          copyBtn.addEventListener('click', function () {
            navigator.clipboard.writeText(d.body || '').then(function () { alert('已複製'); });
          });
          var mailBtn = document.createElement('a');
          mailBtn.className = 'btn btn-link';
          mailBtn.style.display = 'block';
          mailBtn.textContent = '用 Email 開啟（mailto）';
          mailBtn.href = d.mailto_url || ('mailto:' + encodeURIComponent(d.fallback_to || 'nephihuang@gmail.com'));
          div.appendChild(copyBtn);
          div.appendChild(mailBtn);
          box.appendChild(div);
        });
      }

      async function downloadCtbcBig5(filename, content) {
        var text = String(content || '').replace(/^\uFEFF/, '');
        var mod = await import('https://esm.sh/iconv-lite@0.6.3');
        var iconv = mod.default || mod;
        var bytes = iconv.encode(text, 'cp950');
        var blob = new Blob([new Uint8Array(bytes)], { type: 'application/octet-stream' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
      }

      function listCacheKey() { return 'payroll_finance:pending_payment'; }

      function removeFromListCache(ids) {
        if (typeof AccountingListCache === 'undefined') return;
        var idSet = {};
        (ids || []).forEach(function (id) { idSet[id] = true; });
        AccountingListCache.patch(session, listCacheKey(), function (data) {
          if (!data || !data.items) return;
          data.items = data.items.filter(function (row) { return !idSet[row.payroll_request_id]; });
        });
      }

      function removeItemsFromView(ids) {
        removeFromListCache(ids);
        (ids || []).forEach(function (id) {
          var el = document.getElementById('pf-' + id);
          if (el) el.remove();
        });
        document.getElementById('emptyMsg').classList.toggle('hidden', document.querySelectorAll('#list .item').length > 0);
      }

      function renderItem(row) {
        var id = row.payroll_request_id;
        var div = document.createElement('div');
        div.className = 'item';
        div.id = 'pf-' + id;
        var xfer = transferDefault(row);
        var extra = extraDefault(row);
        var est = parseInt(row.estimated_net, 10) || 0;
        var incomplete = row.bank_incomplete;
        var head = document.createElement('div');
        head.className = 'actions';
        var chk = document.createElement('input');
        chk.type = 'checkbox';
        chk.className = 'chk';
        chk.value = id;
        chk.checked = !incomplete;
        chk.disabled = !!incomplete;
        head.appendChild(chk);
        var ac = String(row.account_no || '');
        var tail = ac.length > 4 ? ac.slice(-4) : ac;
        var info = document.createElement('div');
        info.style.flex = '1';
        info.innerHTML =
          '<div><strong>' + esc(row.employee_name) + '</strong> <span class="tag">' + esc(row.period_label) + '</span></div>' +
          '<div class="sub">試算實發 $' + est.toLocaleString('zh-TW') + '</div>' +
          (incomplete ? '<div class="tag warn">銀行帳戶不完整，無法匯出薪轉</div>' :
            '<div class="bank">銀行 ' + esc(row.bank_code) + ' · 末四碼 ' + esc(tail) + '</div>');
        head.appendChild(info);
        div.appendChild(head);
        var panel = document.createElement('div');
        panel.className = 'pay-panel';
        panel.innerHTML =
          '<div class="row2">' +
          '<div><label>薪轉金額（元）</label><input type="number" id="xfer-' + id + '" min="0" step="1" value="' + xfer + '" /></div>' +
          '<div><label>額外發放（元）</label><input type="number" id="extra-' + id + '" min="0" step="1" value="' + extra + '" /></div>' +
          '</div>' +
          '<div class="row2">' +
          '<div><label>額外方式</label><select id="xmeth-' + id + '">' +
          '<option value="現金">現金</option><option value="匯款">另筆轉帳</option><option value="其他">其他</option></select></div>' +
          '<div><label>額外備註</label><input id="xnote-' + id + '" placeholder="例：超過薪轉上限" value="' + esc(row.off_record_note || '') + '" /></div>' +
          '</div>' +
          '<p class="total-line" id="total-' + id + '">總實發 $' + (xfer + extra).toLocaleString('zh-TW') + '</p>';
        div.appendChild(panel);
        ['xfer-' + id, 'extra-' + id].forEach(function (elId) {
          panel.querySelector('#' + elId).addEventListener('input', function () { updateTotalDisplay(id); });
        });
        var meth = panel.querySelector('#xmeth-' + id);
        if (row.extra_method) meth.value = row.extra_method;
        return div;
      }

      function collectPaymentPatches(ids) {
        var map = {};
        (ids || []).forEach(function (id) {
          map[id] = {
            transfer_amount: Number(document.getElementById('xfer-' + id).value) || 0,
            extra_amount: Number(document.getElementById('extra-' + id).value) || 0,
            extra_method: document.getElementById('xmeth-' + id).value,
            off_record_note: document.getElementById('xnote-' + id).value.trim()
          };
        });
        return map;
      }

      function allItemIds() {
        return Array.prototype.slice.call(document.querySelectorAll('#list .chk')).map(function (c) { return c.value; });
      }

      async function loadList(silent, force) {
        var run = async function () {
          if (!silent) { setMsg(''); setOk(''); renderEmailDrafts([]); }
          var list = document.getElementById('list');
          if (!silent) list.innerHTML = '<p class="sub">載入中…</p>';
          function applyListData(data) {
            if (!data || !data.success) throw new Error((data && data.message) || '載入失敗');
            list.innerHTML = '';
            var items = (data.items || []).filter(function (r) {
              return String(r.review_status) === '已審' && String(r.payment_status) !== '已匯款';
            });
            document.getElementById('emptyMsg').classList.toggle('hidden', items.length > 0);
            items.forEach(function (row) { list.appendChild(renderItem(row)); });
          }
          var data;
          if (typeof AccountingListCache !== 'undefined') {
            data = await AccountingListCache.load(session, listCacheKey(), function () {
              return AccountingApi.payrollRequestList(session, { status: 'pending_payment' });
            }, { force: !!force, onUpdate: force ? null : function (fresh) { try { applyListData(fresh); } catch (e) {} } });
          } else {
            data = await AccountingApi.payrollRequestList(session, { status: 'pending_payment' });
          }
          applyListData(data);
        };
        if (silent) return run();
        return AccountingUi.runAsync(document.getElementById('reloadBtn'), { busyLabel: '載入中…' }, run);
      }

      function selectedIds() {
        return Array.prototype.slice.call(document.querySelectorAll('#list .chk:checked')).map(function (c) { return c.value; });
      }

      document.getElementById('reloadBtn').addEventListener('click', function () { loadList(false, true); });

      document.getElementById('exportBtn').addEventListener('click', async function () {
        var ids = selectedIds();
        if (!ids.length) { setMsg('請先勾選要匯出的項目'); return; }
        if (!confirm('將依「薪轉金額」下載 ' + ids.length + ' 筆薪轉檔。\n不改狀態、不寫收支。\n\n確定？')) return;
        await AccountingUi.runAsync(document.getElementById('exportBtn'), { busyLabel: '匯出中…' }, async function () {
          setMsg(''); setOk('');
          var data = await AccountingApi.payrollRequestExport(session, ids, { payment_by_id: collectPaymentPatches(ids) });
          if (!data.success) throw new Error(data.message || '匯出失敗');
          await downloadCtbcBig5(data.filename || 'ctbc_salary.txt', data.content || '');
          setOk('已下載 ' + (data.count || ids.length) + ' 筆薪轉檔');
        }).catch(function (e) { setMsg(e.message || String(e)); });
      });

      async function runMarkPaid(ids, btn, opts) {
        opts = opts || {};
        if (!ids.length && !opts.markAll) { setMsg('請先勾選要標記的項目'); return; }
        if (opts.markAll) ids = allItemIds();
        if (!ids.length) { setMsg('目前沒有待匯款項目'); return; }
        if (!confirm('確認銀行已匯出？將標記 ' + ids.length + ' 筆已發薪、寫收支（總實發），並 EMAIL 員工。\n入帳日＝今日。')) return;
        await AccountingUi.runAsync(btn, { busyLabel: '處理中…', startMessage: '寫入收支並寄送 EMAIL…' }, async function () {
          setMsg(''); setOk(''); renderEmailDrafts([]);
          var data = await AccountingApi.payrollRequestMarkPaid(session, ids, {
            mark_all: !!opts.markAll,
            payment_by_id: collectPaymentPatches(ids),
            email_notify: true
          });
          if (!data.success) throw new Error(data.message || '標記失敗');
          var msg = '已標記 ' + (data.marked || ids.length) + ' 筆已發薪';
          if (data.remit_date) msg += '（入帳日 ' + data.remit_date + '）';
          var drafts = [];
          (data.email_results || []).forEach(function (r) {
            if (r.draft) drafts.push(r.draft);
            else if (r.email_notify && r.email_notify.draft) drafts.push(r.email_notify.draft);
          });
          if (drafts.length) {
            setMsg('部分 EMAIL 需手動寄送（見下方）');
            renderEmailDrafts(drafts);
          }
          if (data.warnings && data.warnings.length) {
            setMsg((document.getElementById('msg').textContent ? document.getElementById('msg').textContent + '\n' : '') + data.warnings.join('；'));
          }
          setOk(msg);
          removeItemsFromView(data.payroll_request_ids || ids);
        }).catch(function (e) { setMsg(e.message || String(e)); });
      }

      document.getElementById('markPaidBtn').addEventListener('click', function () {
        runMarkPaid(selectedIds(), this);
      });
      document.getElementById('markAllPaidBtn').addEventListener('click', function () {
        runMarkPaid([], this, { markAll: true });
      });

      AccountingBoot.run({
        minPermission: 4,
        onReady: async function (s) {
          session = s;
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('app').classList.remove('hidden');
          document.getElementById('userLine').textContent = (s.profile && s.profile.displayName) || '—';
          await loadList();
        }
      });
    })();
  </script>
</body>
</html>
