<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>廠商待匯款</title>
  <link rel="stylesheet" href="../../shared/css/accounting_layout.css?v=5" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="../../shared/js/accounting_master_data.js?v=18"></script>
  <script src="../../shared/js/operator_context.js?v=1"></script>
  <script src="../../shared/js/accounting_api.js?v=40"></script>
  <script src="../../shared/js/accounting_cache.js?v=29"></script>
  <script src="../../shared/js/hub_ref_cache.js?v=1"></script>
  <script src="../../shared/js/accounting_list_cache.js?v=3"></script>
  <script src="../../shared/js/accounting_action_queue.js?v=1"></script>
  <script src="../../shared/js/accounting_lightbox.js?v=17"></script>
  <script src="../../shared/js/accounting_ui.js?v=16"></script>
  <script src="../../shared/js/accounting_nav.js?v=2"></script>
  <script src="../../shared/js/accounting_boot.js?v=4"></script>
  <style>
    h2 { margin: 0 0 8px; }
    .sub { color: #555; font-size: 14px; }
    .card { background: #fff; border-radius: 12px; padding: 14px; margin: 12px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    label { display: block; margin-top: 8px; font-weight: 600; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    input:read-only { background: #f1f3f4; color: #555; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { padding: 10px 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .btn-primary { background: #1a73e8; color: #fff; width: 100%; padding: 12px; margin-top: 10px; }
    .btn-ok { background: #34a853; color: #fff; }
    .btn-warn { background: #ea4335; color: #fff; }
    .btn-muted { background: #e8eaed; color: #333; }
    .btn-secondary { background: #5f6368; color: #fff; }
    .item { border-bottom: 1px solid #eee; padding: 14px 0; }
    .item:last-child { border-bottom: none; }
    .tag { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 6px; background: #e8f0fe; margin-right: 6px; }
    .tag.pay { background: #fef7e0; color: #b06000; }
    .bank { font-size: 13px; color: #444; margin-top: 4px; }
    #msg { color: #c5221f; font-size: 14px; }
    #ok { color: #137333; font-size: 14px; }
    .hidden { display: none; }
    .nav { margin-bottom: 12px; font-size: 14px; }
    .nav a { color: #1a73e8; text-decoration: none; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .chk { width: auto; margin-right: 8px; }
    .actions { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .inline-chk { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-weight: 600; }
    .inline-chk input { width: auto; margin: 0; }
    .fee-preview { margin: 4px 0 0 28px; color: #555; font-size: 13px; }
    .fee-chk { margin-top: 8px; font-weight: 600; font-size: 13px; }
    #ocrInput { display: none; }
  </style>
</head>
<body class="acct-page acct-page-form">
  <div id="loading">載入中…</div>
  <div id="app" class="hidden acct-main">
    <p class="nav"><a href="index.html">← 會計功能選單</a></p>
    <h2>廠商待匯款</h2>
    <p class="sub" id="userLine">—</p>
    <p class="sub">核准或財務新增的項目；從名冊選廠商後銀行帳戶鎖定。一次性收款可勾「手動輸入」並用 OCR。</p>
    <p class="sub" style="margin-top:6px">每月<strong>員工薪資</strong>請至「<a href="payroll_finance.html">薪資待匯款</a>」，勿用此頁匯出。</p>
    <div id="msg"></div>
    <div id="ok"></div>

    <div class="card">
      <h3 style="margin:0 0 8px">新增待匯款</h3>
      <label class="inline-chk"><input type="radio" name="payeeMode" value="vendor" checked /> 廠商</label>
      <label class="inline-chk"><input type="radio" name="payeeMode" value="employee" /> 員工</label>
      <label class="inline-chk"><input type="radio" name="payeeMode" value="manual" /> 手動帳戶</label>
      <div id="vendorPickBlock">
        <label>廠商</label>
        <select id="newVendor"></select>
      </div>
      <div id="employeePickBlock" class="hidden">
        <label>員工（Checkin 員工資料）</label>
        <select id="newEmployee"></select>
      </div>
      <div id="manualPayeeBlock" class="hidden">
        <label>收款人戶名</label>
        <input type="text" id="manualPayee" placeholder="匯款戶名" />
      </div>
      <div class="row2">
        <div>
          <label>金額</label>
          <input type="number" id="newAmount" inputmode="numeric" />
        </div>
        <div>
          <label>案號</label>
          <input type="text" id="newProject" placeholder="例：752" />
        </div>
      </div>
      <label>品項說明</label>
      <input type="text" id="newDesc" placeholder="例：磁磚尾款" />
      <div class="row2">
        <div>
          <label>銀行代碼</label>
          <input type="text" id="newBank" maxlength="3" inputmode="numeric" />
        </div>
        <div>
          <label>帳號</label>
          <input type="text" id="newAcct" inputmode="numeric" />
        </div>
      </div>
      <label>戶名</label>
      <input type="text" id="newAcctName" />
      <div class="actions">
        <button type="button" class="btn btn-muted" id="ocrBtn">OCR 辨識存摺</button>
        <input type="file" id="ocrInput" accept="image/*" capture="environment" />
      </div>
      <label>備註（選填）</label>
      <input type="text" id="newNote" />
      <button type="button" class="btn btn-primary" id="addBtn">一鍵加入待匯款</button>
    </div>

    <div class="card">
      <div class="toolbar">
        <button type="button" class="btn btn-muted" id="reloadBtn">重新載入</button>
        <button type="button" class="btn btn-muted" id="selAllBtn">全選</button>
        <button type="button" class="btn btn-muted" id="selNoneBtn">全不選</button>
        <button type="button" class="btn btn-secondary" id="exportBtn">匯出轉帳檔</button>
        <button type="button" class="btn btn-ok" id="markPaidBtn">標記已匯款</button>
        <button type="button" class="btn btn-ok" id="markAllPaidBtn">一鍵全標已匯款</button>
      </div>
      <p class="sub"><strong>① 匯出轉帳檔</strong>：只下載中信整批匯款 .txt，不改狀態、不寫收支、不推播。<br />
        <strong>② 上傳中信網銀</strong>：選「整批匯款」、編碼 <strong>BIG-5</strong>。<br />
        <strong>③ 標記已匯款</strong>：確認銀行已匯出後，勾選項目按「標記已匯款」→ 寫收支、標已匯款、LINE 推播廠商（已綁定 UID）。入帳日＝標記當日。<br />
        每筆可勾選<strong>是否扣匯費 $30</strong>（入帳仍記請款全額，摘要加註扣匯費；不另開支出列）。</p>
      <h3 style="margin:0 0 8px">待匯款列表</h3>
      <div id="list"></div>
      <p class="sub hidden" id="emptyHint">目前沒有待匯款項目</p>
    </div>
  </div>
  <script>
    (function () {
      var session = null;
      var vendors = [];
      var employees = [];
      var items = [];
      var payeeMode = 'vendor';
      var ui = AccountingUi.feedback();
      var REMIT_FEE = 30;

      function parseRemitFeeApply(row) {
        var raw = String(row && row.remit_fee_apply != null ? row.remit_fee_apply : '').trim();
        if (raw === '否') return false;
        if (raw === '是') return true;
        var gross = parseInt(row && row.amount, 10) || 0;
        return gross > REMIT_FEE;
      }

      function ctbcAmountForRow(row) {
        var gross = parseInt(row.amount, 10) || 0;
        if (gross <= 0) return 0;
        return parseRemitFeeApply(row) && gross > REMIT_FEE ? gross - REMIT_FEE : gross;
      }

      function feePreviewText(row) {
        var gross = parseInt(row.amount, 10) || 0;
        if (gross <= 0) return '';
        var net = ctbcAmountForRow(row);
        var fee = parseRemitFeeApply(row) && gross > REMIT_FEE ? REMIT_FEE : 0;
        if (fee > 0) {
          return '入帳 $' + gross.toLocaleString('zh-TW') + ' · 中信實匯 $' +
            net.toLocaleString('zh-TW') + '（扣匯費 $' + fee.toLocaleString('zh-TW') + '，摘要加註）';
        }
        return '入帳 $' + gross.toLocaleString('zh-TW') + ' · 中信實匯同額（不扣匯費）';
      }

      function patchListCacheRemitFee(id, val) {
        if (typeof AccountingListCache === 'undefined') return;
        AccountingListCache.patch(session, listCacheKey(), function (data) {
          if (!data || !data.items) return;
          data.items.forEach(function (row) {
            if (row.payment_request_id === id) row.remit_fee_apply = val;
          });
        });
      }

      async function saveRemitFeeApply(row, apply, feeCb) {
        if (itemQueueBusy(row.payment_request_id)) return;
        var val = apply ? '是' : '否';
        await AccountingUi.runAsync(feeCb, { busyLabel: '儲存中…', clear: false }, async function () {
          ui.clear();
          var data = await AccountingApi.vendorPaymentUpdate(session, row.payment_request_id, {
            remit_fee_apply: val
          });
          if (!data.success) throw new Error(data.message || '儲存匯費選項失敗');
          row.remit_fee_apply = val;
          patchListCacheRemitFee(row.payment_request_id, val);
          var preview = feeCb.closest('.item').querySelector('.fee-preview');
          if (preview) preview.textContent = feePreviewText(row);
        }).catch(function (e) {
          feeCb.checked = !apply;
          setMsg(e.message || String(e));
        });
      }

      function setMsg(t) { ui.setMsg(t); }
      function setOk(t) { ui.setOk(t); }
      function showApp() {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
      }
      function currentPayeeMode() {
        var checked = document.querySelector('input[name="payeeMode"]:checked');
        return checked ? checked.value : 'vendor';
      }

      function listCacheKey() { return 'vendor_payment:pending_payment'; }

      function removeFromListCache(id) {
        if (typeof AccountingListCache === 'undefined') return;
        AccountingListCache.patch(session, listCacheKey(), function (data) {
          if (!data || !data.items) return;
          data.items = data.items.filter(function (row) {
            return row.payment_request_id !== id;
          });
        });
      }

      function itemDomId(id) { return 'vp-' + id; }

      function removeItemFromView(id) {
        removeFromListCache(id);
        items = items.filter(function (row) { return row.payment_request_id !== id; });
        var el = document.getElementById(itemDomId(id));
        if (el) el.remove();
        document.getElementById('emptyHint').classList.toggle('hidden', items.length > 0);
        if (!items.length) ui.setWarn('目前沒有待匯款項目');
      }

      function removeItemsFromView(ids) {
        (ids || []).forEach(function (id) { removeItemFromView(id); });
      }

      function patchCacheAppend(row) {
        if (typeof AccountingListCache === 'undefined') return;
        AccountingListCache.patch(session, listCacheKey(), function (data) {
          if (!data) return;
          if (!data.items) data.items = [];
          data.items.unshift(row);
        });
      }

      function buildRowFromCreate(payload, data, mode) {
        var vendorName = payload.vendor_name;
        if (mode === 'vendor') {
          var v = vendors.find(function (x) { return x.vendor_id === payload.vendor_id; });
          vendorName = v ? (v.name || v.vendor_id) : vendorName;
        } else if (mode === 'employee') {
          var e = employees.find(function (x) { return x.userId === payload.employee_user_id; });
          vendorName = e ? (e.userName || e.userId) : vendorName;
        }
        return {
          payment_request_id: data.payment_request_id,
          vendor_id: payload.vendor_id || '',
          vendor_name: vendorName || payload.account_name,
          doc_type: payload.doc_type || '直接匯款',
          review_status: data.review_status || '已審',
          payment_status: data.payment_status || '未匯款',
          amount: parseInt(payload.amount, 10) || 0,
          project_no: payload.project_no,
          item_desc: payload.item_desc,
          bank_code: payload.bank_code,
          account_no: payload.account_no,
          account_name: payload.account_name,
          note: payload.note,
          remit_fee_apply: (parseInt(payload.amount, 10) || 0) > REMIT_FEE ? '是' : '否',
          source: mode === 'employee' ? 'staff_request' : 'finance_manual'
        };
      }

      function appendItemToView(row) {
        items.unshift(row);
        var box = document.getElementById('list');
        box.insertBefore(renderItem(row), box.firstChild);
        document.getElementById('emptyHint').classList.add('hidden');
      }

      function itemQueueBusy(id) {
        return typeof AccountingActionQueue !== 'undefined' &&
          AccountingActionQueue.isPending('vendor_payment', id);
      }

      function bankLine(row) {
        var code = String(row.bank_code || '').trim();
        var acct = String(row.account_no || '').trim();
        var name = String(row.account_name || '').trim();
        if (!code && !acct) return '（匯款帳戶待補）';
        return code + ' / ' + acct + ' / ' + name;
      }

      function setBankFieldsReadonly(locked) {
        ['newBank', 'newAcct', 'newAcctName'].forEach(function (id) {
          var el = document.getElementById(id);
          el.readOnly = locked;
        });
      }

      function syncPayeeMode() {
        payeeMode = currentPayeeMode();
        document.getElementById('vendorPickBlock').classList.toggle('hidden', payeeMode !== 'vendor');
        document.getElementById('employeePickBlock').classList.toggle('hidden', payeeMode !== 'employee');
        document.getElementById('manualPayeeBlock').classList.toggle('hidden', payeeMode !== 'manual');
        if (payeeMode === 'manual') setBankFieldsReadonly(false);
        else onPayeePick();
      }

      function fillEmployeeSelect() {
        var sel = document.getElementById('newEmployee');
        sel.innerHTML = '<option value="">— 請選擇 —</option>';
        employees.forEach(function (e) {
          var opt = document.createElement('option');
          opt.value = e.userId;
          opt.textContent = (e.userName || '') + ((e.bank_code && e.account_no) ? '' : '（帳戶待補）');
          sel.appendChild(opt);
        });
      }

      function onPayeePick() {
        if (payeeMode === 'manual') return;
        var row = null;
        if (payeeMode === 'vendor') {
          var vid = document.getElementById('newVendor').value;
          row = vendors.find(function (x) { return x.vendor_id === vid; });
        } else {
          var uid = document.getElementById('newEmployee').value;
          row = employees.find(function (x) { return x.userId === uid; });
        }
        if (!row) {
          setBankFieldsReadonly(false);
          return;
        }
        document.getElementById('newBank').value = row.bank_code || '';
        document.getElementById('newAcct').value = row.account_no || '';
        document.getElementById('newAcctName').value = row.account_name || row.userName || row.name || '';
        setBankFieldsReadonly(true);
      }

      function fillVendorSelect() {
        var sel = document.getElementById('newVendor');
        sel.innerHTML = '<option value="">— 請選擇 —</option>';
        vendors.forEach(function (v) {
          if (v.is_active === false || v.is_active === 'FALSE') return;
          var opt = document.createElement('option');
          opt.value = v.vendor_id;
          opt.textContent = v.name || v.vendor_id;
          sel.appendChild(opt);
        });
      }

      function onVendorPick() { onPayeePick(); }

      function downloadTxt(filename, content) {
        var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
      }

      /** 中信整批匯款：下載 Big5 二進位（每列 500 byte） */
      async function downloadCtbcBig5(filename, content) {
        var text = String(content || '').replace(/^\uFEFF/, '');
        var mod = await import('https://esm.sh/iconv-lite@0.6.3');
        var iconv = mod.default || mod;
        var bytes = iconv.encode(text, 'cp950');
        var blob = new Blob([new Uint8Array(bytes)], { type: 'application/octet-stream' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
      }

      function renderItem(row) {
        var div = document.createElement('div');
        div.className = 'item';
        div.id = itemDomId(row.payment_request_id);
        var amount = parseInt(row.amount, 10) || 0;
        var head = document.createElement('div');
        head.className = 'actions';
        var chk = document.createElement('input');
        chk.type = 'checkbox';
        chk.className = 'chk';
        chk.value = row.payment_request_id;
        chk.checked = true;
        head.appendChild(chk);
        var info = document.createElement('div');
        info.innerHTML =
          '<div><strong>' + (row.vendor_name || '收款人') + '</strong> ' +
          '<span class="tag">' + (row.doc_type || '請款') + '</span>' +
          (row.source === 'staff_request' ? '<span class="tag pay">員工請款</span>' : '') +
          (row.source === 'finance_manual' ? '<span class="tag pay">財務新增</span>' : '') +
          (!row.vendor_id && row.source !== 'staff_request' ? '<span class="tag pay">手動帳戶</span>' : '') +
          '</div>' +
          '<div class="sub">$' + amount.toLocaleString('zh-TW') + ' · 案號 ' + (row.project_no || '—') + '</div>' +
          (row.item_desc ? '<div class="sub">' + row.item_desc + '</div>' : '') +
          '<div class="bank">' + bankLine(row) + '</div>';
        head.appendChild(info);
        div.appendChild(head);

        if (amount > REMIT_FEE) {
          var feeWrap = document.createElement('label');
          feeWrap.className = 'inline-chk fee-chk';
          var feeCb = document.createElement('input');
          feeCb.type = 'checkbox';
          feeCb.className = 'fee-apply';
          feeCb.checked = parseRemitFeeApply(row);
          feeCb.addEventListener('change', function () {
            saveRemitFeeApply(row, feeCb.checked, feeCb);
          });
          feeWrap.appendChild(feeCb);
          feeWrap.appendChild(document.createTextNode(' 扣匯費 $' + REMIT_FEE + '（中信實匯較少）'));
          div.appendChild(feeWrap);
          var feePreview = document.createElement('div');
          feePreview.className = 'sub fee-preview';
          feePreview.textContent = feePreviewText(row);
          div.appendChild(feePreview);
        } else if (amount > 0) {
          var smallFee = document.createElement('div');
          smallFee.className = 'sub fee-preview';
          smallFee.textContent = '金額 ≤ $' + REMIT_FEE + '，不適用匯費扣款';
          div.appendChild(smallFee);
        }

        var actions = document.createElement('div');
        actions.className = 'actions';
        actions.appendChild(AccountingLightbox.makeButton(session, {
          payment_request_id: row.payment_request_id,
          attachment_urls: row.drive_urls ? String(row.drive_urls).split(/\s+/).filter(Boolean) : []
        }, '看單據'));

        var okBtn = document.createElement('button');
        okBtn.className = 'btn btn-ok';
        okBtn.textContent = '標記已匯款';
        okBtn.addEventListener('click', async function () {
          if (!confirm('確認銀行已匯款？將寫收支、標已匯款並 LINE 通知廠商。')) return;
          if (itemQueueBusy(row.payment_request_id)) return;
          var btn = okBtn;
          await AccountingUi.runAsync(btn, {
            busyLabel: '處理中…',
            queue: true,
            queueId: 'vendor_payment',
            itemId: row.payment_request_id
          }, async function () {
            ui.clear();
            var data = await AccountingApi.vendorPaymentMarkPaid(session, [row.payment_request_id]);
            if (!data.success) { setMsg(data.message || '失敗'); return; }
            var msg = '已標記已匯款';
            var pushSummary = summarizePushResults(data);
            if (pushSummary) msg += '\n' + pushSummary;
            if ((data.unlinked_vendors || []).length) {
              setMsg('未綁 LINE：' + data.unlinked_vendors.map(function (u) { return u.vendor_name; }).join('、'));
            }
            setOk(msg);
            removeItemFromView(row.payment_request_id);
          });
        });
        actions.appendChild(okBtn);

        var delBtn = document.createElement('button');
        delBtn.className = 'btn btn-warn';
        delBtn.textContent = '刪除';
        delBtn.addEventListener('click', async function () {
          if (!confirm('確定刪除此待匯款項目？')) return;
          if (itemQueueBusy(row.payment_request_id)) return;
          var btn = delBtn;
          await AccountingUi.runAsync(btn, {
            busyLabel: '刪除中…',
            queue: true,
            queueId: 'vendor_payment',
            itemId: row.payment_request_id
          }, async function () {
            ui.clear();
            var data = await AccountingApi.vendorPaymentDelete(session, row.payment_request_id);
            if (!data.success) { setMsg(data.message || '刪除失敗'); return; }
            setOk('已刪除此待匯款項目');
            removeItemFromView(row.payment_request_id);
          });
        });
        actions.appendChild(delBtn);
        div.appendChild(actions);
        return div;
      }

      function selectedIds() {
        return Array.prototype.slice.call(document.querySelectorAll('#list input.chk:checked'))
          .map(function (el) { return el.value; });
      }

      async function loadList(silent, force) {
        var run = async function () {
          if (!silent) ui.clear();
          var data;
          if (typeof AccountingListCache !== 'undefined') {
            data = await AccountingListCache.load(session, listCacheKey(), function () {
              return AccountingApi.vendorPaymentList(session, 'pending_payment');
            }, { force: !!force });
          } else {
            data = await AccountingApi.vendorPaymentList(session, 'pending_payment');
          }
          if (!data.success) {
            setMsg(data.message || '載入失敗');
            return;
          }
          items = data.items || [];
          var box = document.getElementById('list');
          box.innerHTML = '';
          document.getElementById('emptyHint').classList.toggle('hidden', items.length > 0);
          items.forEach(function (row) { box.appendChild(renderItem(row)); });
          if (!items.length && !silent) ui.setWarn('目前沒有待匯款項目');
        };
        if (silent) return run();
        var reloadBtn = document.getElementById('reloadBtn');
        return AccountingUi.runAsync(reloadBtn, { busyLabel: '載入中…', clear: false }, run);
      }

      document.querySelectorAll('input[name="payeeMode"]').forEach(function (el) {
        el.addEventListener('change', syncPayeeMode);
      });
      document.getElementById('newVendor').addEventListener('change', onPayeePick);
      document.getElementById('newEmployee').addEventListener('change', onPayeePick);
      document.getElementById('reloadBtn').addEventListener('click', function () { loadList(false, true); });
      document.getElementById('selAllBtn').addEventListener('click', function () {
        document.querySelectorAll('#list input.chk').forEach(function (el) { el.checked = true; });
        setOk('已全選 ' + document.querySelectorAll('#list input.chk').length + ' 筆');
      });
      document.getElementById('selNoneBtn').addEventListener('click', function () {
        document.querySelectorAll('#list input.chk').forEach(function (el) { el.checked = false; });
        setOk('已取消全選');
      });

      document.getElementById('ocrBtn').addEventListener('click', function () {
        document.getElementById('ocrInput').click();
      });
      document.getElementById('ocrInput').addEventListener('change', async function (e) {
        var file = e.target.files && e.target.files[0];
        if (!file) return;
        var ocrBtn = document.getElementById('ocrBtn');
        await AccountingUi.runAsync(ocrBtn, {
          busyLabel: '辨識中…',
          startMessage: '正在辨識存摺照片，請稍候…'
        }, async function () {
          ui.clear();
          var reader = new FileReader();
          var b64 = await new Promise(function (resolve, reject) {
            reader.onload = function () {
              resolve(String(reader.result || '').split(',')[1] || '');
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });
          var data = await AccountingApi.vendorRegisterOcr(session, {
            dataBase64: b64,
            mimeType: file.type || 'image/jpeg'
          }, 'passbook');
          if (!data.success) { setMsg(data.message || 'OCR 失敗'); return; }
          var f = data.fields || {};
          if (f.bank_code) document.getElementById('newBank').value = f.bank_code;
          if (f.account_no) document.getElementById('newAcct').value = f.account_no;
          if (f.account_name) document.getElementById('newAcctName').value = f.account_name;
          if (currentPayeeMode() === 'manual' && f.account_name) {
            document.getElementById('manualPayee').value = f.account_name;
          }
          setOk('辨識完成，請確認銀行資料後再加入');
        });
        e.target.value = '';
      });

      document.getElementById('addBtn').addEventListener('click', async function () {
        var btn = this;
        await AccountingUi.runAsync(btn, {
          busyLabel: '加入中…',
          startMessage: '正在加入待匯款列表…'
        }, async function () {
          ui.clear();
          var mode = currentPayeeMode();
          var payload = {
            vendor_id: mode === 'vendor' ? document.getElementById('newVendor').value : '',
            employee_user_id: mode === 'employee' ? document.getElementById('newEmployee').value : '',
            vendor_name: mode === 'manual' ? document.getElementById('manualPayee').value.trim() : '',
            amount: document.getElementById('newAmount').value,
            project_no: document.getElementById('newProject').value.trim(),
            item_desc: document.getElementById('newDesc').value.trim(),
            bank_code: document.getElementById('newBank').value.trim(),
            account_no: document.getElementById('newAcct').value.trim(),
            account_name: document.getElementById('newAcctName').value.trim(),
            note: document.getElementById('newNote').value.trim(),
            doc_type: mode === 'manual' ? '手動匯款' : '直接匯款'
          };
          var data = await AccountingApi.vendorPaymentCreate(session, payload);
          if (!data.success) { setMsg(data.message || '新增失敗'); return; }
          setOk('已加入待匯款列表，可在下方勾選匯出');
          document.getElementById('newAmount').value = '';
          document.getElementById('newProject').value = '';
          document.getElementById('newDesc').value = '';
          document.getElementById('newNote').value = '';
          if (data.payment_request_id) {
            var row = buildRowFromCreate(payload, data, mode);
            patchCacheAppend(row);
            appendItemToView(row);
          } else if (typeof AccountingListCache !== 'undefined') {
            AccountingListCache.invalidate(session, listCacheKey());
            await loadList(true, true);
          }
        });
      });

      function summarizePushResults(data) {
        var lines = [];
        if (data.remit_date) lines.push('入帳日：' + data.remit_date);
        var unlinked = data.unlinked_vendors || [];
        if (unlinked.length) {
          lines.push('未綁 LINE（無法推播）：' + unlinked.map(function (u) {
            return u.vendor_name || u.vendor_id || '—';
          }).join('、'));
        }
        var pushes = data.push_results || [];
        if (pushes.length) {
          var ok = pushes.filter(function (p) { return p.ok; }).length;
          lines.push('LINE 推播：' + ok + '/' + pushes.length + ' 成功');
          pushes.filter(function (p) { return !p.ok; }).forEach(function (p) {
            lines.push('推播失敗 ' + (p.vendor_name || '') + '（' + (p.line_channel || 'accounting') + '）');
          });
        } else if (data.line_push !== false && !unlinked.length) {
          lines.push('LINE 推播：無需推播的廠商');
        }
        return lines.join('\n');
      }

      async function runMarkPaid(ids, btn, opts) {
        opts = opts || {};
        if (!ids.length && !opts.markAll) {
          setMsg('請先勾選要標記的項目');
          return;
        }
        var countLabel = opts.markAll ? ('列表全部 ' + items.length + ' 筆') : (ids.length + ' 筆');
        if (!confirm('確認銀行已匯款？將標記 ' + countLabel + ' 為已匯款、寫收支，並 LINE 通知廠商。\n入帳日＝今日。')) return;
        await AccountingUi.runAsync(btn, {
          busyLabel: '處理中…',
          startMessage: '正在寫入收支並推播通知，可能需要十幾秒…'
        }, async function () {
          ui.clear();
          var data = await AccountingApi.vendorPaymentMarkPaid(session, ids, {
            mark_all: !!opts.markAll,
            line_push: true
          });
          if (!data.success) {
            setMsg(data.message || '標記失敗');
            return;
          }
          var msg = '已標記 ' + (data.marked || ids.length) + ' 筆已匯款';
          var pushSummary = summarizePushResults(data);
          if (pushSummary) msg += '\n' + pushSummary;
          if (data.warnings && data.warnings.length) {
            setMsg('以下項目未標記：' + data.warnings.join('；'));
            msg += '（另有 ' + data.warnings.length + ' 筆略過，見上方紅字）';
          }
          if ((data.unlinked_vendors || []).length) {
            setMsg(((document.getElementById('msg').textContent || '') ? document.getElementById('msg').textContent + '\n' : '') +
              '未綁 LINE：' + data.unlinked_vendors.map(function (u) { return u.vendor_name; }).join('、'));
          }
          setOk(msg);
          removeItemsFromView(data.payment_request_ids || ids);
        });
      }

      document.getElementById('markPaidBtn').addEventListener('click', function () {
        runMarkPaid(selectedIds(), this);
      });

      document.getElementById('markAllPaidBtn').addEventListener('click', function () {
        if (!items.length) { setMsg('目前沒有待匯款項目'); return; }
        runMarkPaid([], this, { markAll: true });
      });

      document.getElementById('exportBtn').addEventListener('click', async function () {
        var btn = this;
        var ids = selectedIds();
        if (!ids.length) { setMsg('請先勾選要匯出的項目'); return; }
        var confirmMsg = '將下載銀行轉帳檔（.txt）共 ' + ids.length + ' 筆。\n' +
          '不會改狀態、不寫收支、不推播 LINE。\n\n上傳中信後，請回來按「標記已匯款」。\n\n確定？';
        if (!confirm(confirmMsg)) return;
        await AccountingUi.runAsync(btn, {
          busyLabel: '匯出中…',
          startMessage: '正在產生轉帳檔…'
        }, async function () {
          ui.clear();
          var data = await AccountingApi.vendorPaymentExportCtbc(session, ids);
          if (!data.success) {
            setMsg(data.message || '匯出失敗');
            return;
          }
          if (data.content_big5_base64) {
            var bin = atob(data.content_big5_base64);
            var arr = new Uint8Array(bin.length);
            for (var bi = 0; bi < bin.length; bi++) arr[bi] = bin.charCodeAt(bi);
            var blob = new Blob([arr], { type: 'application/octet-stream' });
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = data.filename || 'ctbc_vendor_batch.txt';
            document.body.appendChild(a);
            a.click();
            a.remove();
          } else {
            await downloadCtbcBig5(data.filename || 'ctbc_vendor_batch.txt', data.content || '');
          }
          var msg = '已下載 ' + (data.count || ids.length) + ' 筆轉帳檔。上傳中信請選「整批匯款」、編碼 BIG-5';
          if (data.warnings && data.warnings.length) {
            setMsg('以下項目未匯出：' + data.warnings.join('；'));
            msg += '（另有 ' + data.warnings.length + ' 筆略過，見上方紅字）';
          }
          setOk(msg);
        });
      });

      function needPaymentRequestContext() {
        return !vendors.length || !employees.length;
      }

      function loadPaymentRequestContextIfNeeded() {
        if (!needPaymentRequestContext()) return;
        AccountingApi.paymentRequestContext(session).then(function (ctx) {
          if (!ctx.success) return;
          if (ctx.vendors && ctx.vendors.length) vendors = ctx.vendors;
          if (ctx.employees && ctx.employees.length) employees = ctx.employees;
          fillVendorSelect();
          fillEmployeeSelect();
          syncPayeeMode();
        }).catch(function () {});
      }

      (async function boot() {
        await AccountingBoot.run({
          onReady: async function (sess) {
            session = sess;
            vendors = AccountingCache.vendors(session);
            if (!vendors.length) vendors = AccountingCache.peekVendors();
            if (vendors.length) {
              fillVendorSelect();
              syncPayeeMode();
            }
            loadList().catch(function (e) { setMsg(e.message || String(e)); });
            loadPaymentRequestContextIfNeeded();
            if (!AccountingCache.get(session)) {
              AccountingCache.load(session).then(function () {
                vendors = AccountingCache.vendors(session) || vendors;
                fillVendorSelect();
                if (!employees.length) loadPaymentRequestContextIfNeeded();
              }).catch(function () {});
            }
          }
        });
      })();
    })();
  </script>
</body>
</html>
