<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>廠商名冊</title>
  <link rel="stylesheet" href="../../shared/css/accounting_layout.css?v=5" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="../../shared/js/accounting_master_data.js?v=17"></script>
  <script src="../../shared/js/operator_context.js?v=1"></script>
  <script src="../../shared/js/accounting_api.js?v=38"></script>
  <script src="../../shared/js/accounting_cache.js?v=26"></script>
  <script src="../../shared/js/hub_ref_cache.js?v=1"></script>
  <script src="../../shared/js/accounting_list_cache.js?v=3"></script>
  <script src="../../shared/js/accounting_ui.js?v=15"></script>
  <script src="../../shared/js/accounting_form_helpers.js?v=4"></script>
  <script src="../../shared/js/accounting_nav.js?v=2"></script>
  <script src="../../shared/js/accounting_boot.js?v=4"></script>
  <style>
    h2 { margin: 0 0 8px; }
    .sub { color: #555; font-size: 14px; }
    .page-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0 20px;
      align-items: start;
    }
    @media (min-width: 960px) {
      .page-layout { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }
      .page-col-list { position: sticky; top: 16px; max-height: calc(100vh - 32px); overflow: auto; }
    }
    @media (min-width: 1200px) {
      .page-layout { grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr); }
    }
    .card { background: #fff; border-radius: 12px; padding: 14px; margin: 12px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    label { display: block; margin-top: 8px; font-weight: 600; font-size: 14px; }
    label.req::after { content: ' *'; color: #c5221f; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
    textarea { min-height: 72px; resize: vertical; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { padding: 10px 14px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 14px; }
    .btn-block { width: 100%; margin-top: 10px; }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }
    .btn-secondary { background: #e8eaed; color: #333; }
    .btn-secondary:disabled { opacity: .55; cursor: not-allowed; }
    .btn-warn { background: #fce8e6; color: #c5221f; }
    .form-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    .form-actions .btn { flex: 1 1 140px; margin-top: 0; }
    .form-card.is-editing {
      border: 2px solid #1a73e8;
      box-shadow: 0 0 0 3px rgba(26, 115, 232, .12), 0 1px 3px rgba(0,0,0,.08);
    }
    .form-card.is-editing.just-saved {
      animation: form-saved-flash .9s ease;
    }
    @keyframes form-saved-flash {
      0% { box-shadow: 0 0 0 0 rgba(19, 115, 51, .45), 0 1px 3px rgba(0,0,0,.08); }
      40% { box-shadow: 0 0 0 6px rgba(19, 115, 51, .2), 0 1px 3px rgba(0,0,0,.08); }
      100% { box-shadow: 0 0 0 3px rgba(26, 115, 232, .12), 0 1px 3px rgba(0,0,0,.08); }
    }
    .form-title-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin: 0 0 8px;
    }
    .form-title-row h3 { margin: 0; }
    .mode-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
      letter-spacing: .02em;
    }
    .mode-badge.create { background: #e8f0fe; color: #174ea6; }
    .mode-badge.edit { background: #137333; color: #fff; }
    .feedback-bar {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      margin: 10px 0 4px;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.45;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      animation: feedback-in .25s ease;
    }
    .feedback-bar.ok { background: #e6f4ea; color: #137333; border: 1px solid #ceead6; }
    .feedback-bar.err { background: #fce8e6; color: #c5221f; border: 1px solid #f5c6c2; }
    .feedback-bar.warn { background: #fef7e0; color: #b06000; border: 1px solid #f9e5b8; }
    .feedback-icon { font-size: 18px; line-height: 1.2; flex-shrink: 0; }
    @keyframes feedback-in {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .item { border-bottom: 1px solid #eee; padding: 12px 0; }
    .item:last-child { border-bottom: none; }
    .item.paused { opacity: .65; }
    .vendor-card {
      background: #fafafa;
      border: 1px solid #e8eaed;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .vendor-card:last-child { margin-bottom: 0; }
    .vendor-card.paused { opacity: .7; background: #f5f5f5; }
    .vendor-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .vendor-name { font-size: 16px; font-weight: 700; line-height: 1.35; margin: 0; flex: 1; }
    .vendor-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .vendor-meta { margin-top: 10px; font-size: 13px; color: #444; line-height: 1.6; }
    .vendor-meta-row { display: flex; flex-wrap: wrap; gap: 4px 12px; }
    .vendor-meta-row + .vendor-meta-row { margin-top: 4px; }
    .meta-label { color: #888; flex-shrink: 0; }
    .vendor-note {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
      background: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      line-height: 1.45;
      word-break: break-word;
    }
    .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #e8f0fe; color: #174ea6; }
    .tag.pause { background: #fce8e6; color: #c5221f; }
    .tag.ok { background: #e6f4ea; color: #137333; }
    .tag.muted { background: #f1f3f4; color: #5f6368; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #e8eaed; }
    .files-box { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #e0e0e0; }
    .files-toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 12px; margin-bottom: 6px; }
    .files-toolbar a { color: #1a73e8; font-size: 13px; font-weight: 600; text-decoration: none; }
    .file { font-size: 13px; padding: 5px 0; }
    .file a { color: #1a73e8; text-decoration: none; }
    .file-list-empty { font-size: 12px; color: #888; margin: 4px 0 0; }
    .hidden { display: none; }
    .nav { margin-bottom: 12px; font-size: 14px; }
    .nav a { color: #1a73e8; text-decoration: none; }
    .section-title { font-size: 13px; color: #888; margin: 14px 0 6px; font-weight: 600; }
    .bind-item { border: 1px solid #e0e0e0; border-radius: 8px; padding: 8px 10px; margin: 6px 0; font-size: 13px; }
    .bind-item .mono { font-family: ui-monospace, monospace; font-size: 12px; word-break: break-all; }
    .search-hit { border: 1px solid #e8eaed; border-radius: 8px; padding: 8px; margin: 6px 0; display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 13px; }
    .photo-preview { max-width: 100%; border-radius: 8px; margin-top: 8px; }
    .hint { font-size: 13px; color: #666; margin-top: 4px; }
    .ocr-wrap { margin-top: 6px; }
    .ocr-status { font-size: 13px; margin: 0; min-height: 1.2em; }
    .ocr-status.ok { color: #137333; }
    .ocr-status.err { color: #c5221f; }
    .ocr-upload-status { font-size: 12px; margin: 4px 0 0; color: #5f6368; }
    .ocr-upload-status.ok { color: #137333; }
    .ocr-upload-status.err { color: #c5221f; }
    .ocr-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .btn-ocr-retry { padding: 6px 12px; font-size: 13px; }
    .list-filters {
      padding-bottom: 12px;
      margin-bottom: 12px;
      border-bottom: 1px solid #e8eaed;
    }
    .list-filters label:first-child { margin-top: 0; }
    .step-num { display: inline-block; background: #1a73e8; color: #fff; font-size: 12px; padding: 2px 8px; border-radius: 6px; margin-right: 6px; vertical-align: middle; }
  </style>
</head>
<body class="acct-page acct-page-wide">
  <div id="loading">載入中…</div>
  <div id="app" class="hidden acct-main">
    <p class="nav"><a href="index.html">← 會計功能選單</a></p>
    <h2>廠商名冊</h2>
    <p class="sub" id="userLine">—</p>
    <div id="feedbackBar" class="feedback-bar hidden" role="status" aria-live="polite">
      <span class="feedback-icon" id="feedbackIcon"></span>
      <span id="feedbackText"></span>
    </div>

    <div class="page-layout">
    <div class="page-col page-col-form">
    <div class="card form-card" id="formCard">
      <div class="form-title-row">
        <h3 id="formTitle">新增廠商</h3>
        <span class="mode-badge create" id="modeBadge">新增模式</span>
      </div>
      <p class="hint" style="margin:0 0 10px">可拍照自動辨識；編輯既有廠商時照片會立即存入 Drive 資料夾，新增則按儲存時一併存入。</p>
      <input type="hidden" id="editId" />

      <p class="section-title">照片輔助（選填）</p>
      <div class="row2">
        <div>
          <label><span class="step-num">1</span>名片／公司證明</label>
          <input id="cardPhoto" type="file" accept="image/*" capture="environment" />
          <div id="cardPreview"></div>
          <div class="ocr-wrap">
            <p id="cardOcrStatus" class="ocr-status"></p>
            <p id="cardUploadStatus" class="ocr-upload-status"></p>
            <div class="ocr-actions">
              <button type="button" class="btn btn-secondary btn-ocr-retry hidden" id="cardOcrRetry">重新辨識</button>
            </div>
          </div>
        </div>
        <div>
          <label><span class="step-num">2</span>存摺／匯款資訊</label>
          <input id="passbookPhoto" type="file" accept="image/*" capture="environment" />
          <div id="passbookPreview"></div>
          <div class="ocr-wrap">
            <p id="passbookOcrStatus" class="ocr-status"></p>
            <p id="passbookUploadStatus" class="ocr-upload-status"></p>
            <div class="ocr-actions">
              <button type="button" class="btn btn-secondary btn-ocr-retry hidden" id="passbookOcrRetry">重新辨識</button>
            </div>
          </div>
        </div>
      </div>

      <p class="section-title">基本資料</p>
      <label class="req">名稱</label><input id="name" />
      <div class="row2">
        <div><label>統編</label><input id="tax_id" /></div>
        <div>
          <label>工種／類別（選填）</label>
          <select id="trade_category"></select>
        </div>
      </div>
      <label>材料／工資屬性（會計後台填）</label>
      <select id="cost_type"></select>
      <div class="row2">
        <div><label class="req">聯絡人</label><input id="contact_name" /></div>
        <div><label>電話</label><input id="contact_phone" inputmode="tel" /></div>
      </div>
      <label>Email</label><input id="contact_email" type="email" />
      <label>公司／工廠地址</label><input id="address" />
      <p class="section-title">匯款資訊</p>
      <div class="row2">
        <div><label class="req">銀行代碼</label><input id="bank_code" maxlength="3" inputmode="numeric" /></div>
        <div><label>分行名稱</label><input id="branch_name" /></div>
      </div>
      <div class="row2">
        <div><label class="req">帳號</label><input id="account_no" inputmode="numeric" /></div>
        <div><label class="req">戶名</label><input id="account_name" /></div>
      </div>
      <label>付款條件</label>
      <select id="payment_terms"></select>
      <label>合作狀態</label>
      <select id="coop_status"></select>
      <label>備註</label>
      <textarea id="note" placeholder="服務區域、施工品質、配合度或其他注意事項可寫在這裡"></textarea>

      <p class="section-title">LINE 身份綁定（報價／請款辨識用）</p>
      <p class="sub" style="margin:0 0 8px">搜尋來源：<strong>會計官方 LINE @672zolga</strong> 聯絡人名單（加好友或傳訊息即自動收錄；與行政主帳 UID 不同）。</p>
      <div id="bindEditor" class="hidden">
        <label>搜尋顧客（名稱／案號／UID）</label>
        <input id="lineSearchKw" placeholder="例：木作老王、752、U 開頭 UID" />
        <div class="row2" style="margin-top:8px">
          <div>
            <label>加入時用途</label>
            <select id="bindPurpose"><option value="報價">報價</option><option value="請款">請款</option><option value="一般">一般</option></select>
          </div>
        </div>
        <button type="button" class="btn btn-secondary btn-block" id="lineSearchBtn">搜尋會計 LINE 聯絡人</button>
        <div id="lineSearchResults"></div>
        <label style="margin-top:12px">手動貼 UID／GID（進階，顧客列表找不到時）</label>
        <div class="row2">
          <div><input id="lineManualId" placeholder="U… 私訊 UID 或 C… 群組 GID" class="mono" /></div>
          <div><button type="button" class="btn btn-secondary btn-block" id="lineManualAddBtn">手動加入</button></div>
        </div>
        <h4 style="margin:14px 0 6px">已綁定</h4>
        <div id="bindingList"></div>
      </div>
      <p id="bindHint" class="sub">請先儲存廠商，或從右側列表點「編輯」，才會出現 LINE 綁定區。</p>
      <div class="form-actions">
        <button type="button" class="btn btn-primary" id="saveBtn">儲存</button>
        <button type="button" class="btn btn-secondary hidden" id="cancelEditBtn">取消編輯</button>
      </div>
    </div>
    </div>

    <div class="page-col page-col-list">
    <div class="card">
      <h3 style="margin:0 0 8px">廠商列表 <span class="sub" id="listCount"></span></h3>
      <div class="list-filters">
        <div class="row2">
          <div>
            <label>工種</label>
            <select id="filterTrade"><option value="">全部</option></select>
          </div>
          <div>
            <label>合作狀態</label>
            <select id="filterCoop">
              <option value="">全部</option>
              <option value="待審核">待審核</option>
              <option value="合作中">合作中</option>
              <option value="暫停合作">暫停合作</option>
            </select>
          </div>
        </div>
        <label>關鍵字</label>
        <input id="filterKw" placeholder="名稱、統編、電話…" />
        <button type="button" class="btn btn-secondary btn-block" id="filterBtn">套用篩選</button>
      </div>
      <div id="list"></div>
    </div>
    </div>
    </div>
  </div>
  <script>
    (function () {
      var session = null;
      function normPhone(v) {
        return AccountingFormHelpers.normalizeTaiwanPhone(v);
      }
      var allVendors = [];
      var cardFile = null;
      var passbookFile = null;
      var cardUploaded = false;
      var passbookUploaded = false;
      function $(id) { return document.getElementById(id); }

      function showFeedback(kind, text) {
        var bar = $('feedbackBar');
        var icon = $('feedbackIcon');
        var txt = $('feedbackText');
        if (!text) {
          bar.classList.add('hidden');
          txt.textContent = '';
          icon.textContent = '';
          return;
        }
        var k = kind === 'err' ? 'err' : (kind === 'warn' ? 'warn' : 'ok');
        bar.className = 'feedback-bar ' + k;
        bar.classList.remove('hidden');
        icon.textContent = k === 'ok' ? '✓' : (k === 'warn' ? '!' : '✕');
        txt.textContent = text;
        AccountingUi.notify(k, text);
      }
      function setMsg(t) { if (t) showFeedback('err', t); else showFeedback('', ''); }
      function setOk(t) { if (t) showFeedback('ok', t); }
      function setWarn(t) { if (t) showFeedback('warn', t); }

      function setFormMode(isEdit, opts) {
        opts = opts || {};
        var card = $('formCard');
        $('formTitle').textContent = isEdit ? '編輯廠商' : '新增廠商';
        $('modeBadge').textContent = isEdit ? '編輯模式' : '新增模式';
        $('modeBadge').className = 'mode-badge ' + (isEdit ? 'edit' : 'create');
        $('cancelEditBtn').classList.toggle('hidden', !isEdit);
        $('saveBtn').textContent = isEdit ? '更新' : '儲存';
        card.classList.toggle('is-editing', !!isEdit);
        setBindEditorVisible(!!isEdit);
        if (opts.flash) {
          card.classList.remove('just-saved');
          void card.offsetWidth;
          card.classList.add('just-saved');
          setTimeout(function () { card.classList.remove('just-saved'); }, 1000);
        }
      }

      function hasPendingPhotoUpload() {
        return (cardFile && !cardUploaded) || (passbookFile && !passbookUploaded);
      }

      function runBackgroundPhotoUpload(vendorRec) {
        if (!vendorRec || !hasPendingPhotoUpload()) return;
        uploadPendingPhotos(vendorRec).then(function (photoRes) {
          if (!photoRes) return;
          if (!photoRes.success && !photoRes.already_uploaded) {
            setWarn((photoRes.message || '照片未上傳') + '（廠商資料已儲存）');
            return;
          }
          if (photoRes.folder) {
            patchVendorFolder(vendorRec.vendor_id, photoRes.folder);
            refreshVendors(true);
          }
          if (cardFile && cardUploaded) setPhotoUploadStatus('card', '照片已存入廠商資料夾', false);
          if (passbookFile && passbookUploaded) setPhotoUploadStatus('passbook', '照片已存入廠商資料夾', false);
          var photoNote = photosSavedMessage(photoRes);
          if (photoNote) setOk('照片已上傳' + photoNote);
        }).catch(function (e) {
          setWarn((e.message || '照片上傳失敗') + '（廠商資料已儲存）');
        });
      }

      function fillSelect(id, options, withEmpty) {
        var sel = $(id);
        sel.innerHTML = withEmpty ? '<option value="">（請選）</option>' : '';
        options.forEach(function (o) {
          var opt = document.createElement('option');
          opt.value = o; opt.textContent = o;
          sel.appendChild(opt);
        });
      }

      function initFormOptions() {
        fillSelect('trade_category', AccountingMasterData.vendor_trade_categories, true);
        fillSelect('cost_type', AccountingMasterData.vendor_cost_types, true);
        fillSelect('coop_status', AccountingMasterData.vendor_coop_statuses, false);
        fillSelect('payment_terms', AccountingMasterData.vendor_payment_terms_presets, true);
        fillSelect('filterTrade', [''].concat(AccountingMasterData.vendor_trade_categories), false);
        $('filterTrade').options[0].textContent = '全部';
      }

      function showApp() {
        $('loading').classList.add('hidden');
        $('app').classList.remove('hidden');
      }

      function crossFillVendorAndAccountName() {
        var n = $('name').value.trim();
        var a = $('account_name').value.trim();
        if (a && !n) $('name').value = a;
        else if (n && !a) $('account_name').value = n;
      }

      function applyOcrFields(f) {
        if (!f) return;
        if (f.bank_code) $('bank_code').value = f.bank_code;
        if (f.branch_name) $('branch_name').value = f.branch_name;
        if (f.account_no) $('account_no').value = f.account_no;
        if (f.account_name) $('account_name').value = f.account_name;
        if (f.tax_id && !$('tax_id').value.trim()) $('tax_id').value = f.tax_id;
        if (f.contact_name && !$('contact_name').value.trim()) $('contact_name').value = f.contact_name;
        if (f.contact_phone && !$('contact_phone').value.trim()) $('contact_phone').value = normPhone(f.contact_phone);
        if (f.contact_email && !$('contact_email').value.trim()) $('contact_email').value = f.contact_email;
        if (f.address && !$('address').value.trim()) $('address').value = f.address;
        if (f.name && !$('name').value.trim()) $('name').value = f.name;
        crossFillVendorAndAccountName();
      }

      function fileToBase64(file) {
        return new Promise(function (resolve, reject) {
          var reader = new FileReader();
          reader.onload = function () {
            var dataUrl = reader.result || '';
            var i = String(dataUrl).indexOf(',');
            resolve({
              dataBase64: i >= 0 ? dataUrl.substring(i + 1) : dataUrl,
              mimeType: file.type || 'image/jpeg',
              filename: file.name || 'photo.jpg'
            });
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function showPreview(boxId, file) {
        var box = $(boxId);
        box.innerHTML = '';
        if (!file) return;
        var img = document.createElement('img');
        img.className = 'photo-preview';
        img.src = URL.createObjectURL(file);
        img.alt = '預覽';
        box.appendChild(img);
      }

      function photoKindMeta(kind) {
        if (kind === 'card') {
          return {
            ocrStatusId: 'cardOcrStatus',
            uploadStatusId: 'cardUploadStatus',
            retryBtnId: 'cardOcrRetry'
          };
        }
        return {
          ocrStatusId: 'passbookOcrStatus',
          uploadStatusId: 'passbookUploadStatus',
          retryBtnId: 'passbookOcrRetry'
        };
      }

      function setOcrStatus(kind, text, state) {
        var meta = photoKindMeta(kind);
        var el = $(meta.ocrStatusId);
        el.textContent = text || '';
        el.className = 'ocr-status' + (state === 'ok' ? ' ok' : (state === 'err' ? ' err' : ''));
        $(meta.retryBtnId).classList.toggle('hidden', state !== 'err');
        $(meta.retryBtnId).disabled = state === 'loading';
      }

      function setPhotoUploadStatus(kind, text, isErr) {
        var el = $(photoKindMeta(kind).uploadStatusId);
        el.textContent = text || '';
        el.className = 'ocr-upload-status' + (text ? (isErr ? ' err' : ' ok') : '');
      }

      function patchVendorFolder(vendorId, folder) {
        if (!vendorId || !folder || !folder.drive_folder_id) return;
        var idx = allVendors.findIndex(function (v) { return v.vendor_id === vendorId; });
        if (idx < 0) return;
        allVendors[idx] = Object.assign({}, allVendors[idx], {
          drive_folder_id: folder.drive_folder_id,
          drive_folder_url: folder.drive_folder_url
        });
      }

      function photosSavedMessage(photoRes) {
        if (!photoRes) return '';
        if (!photoRes.success && !photoRes.already_uploaded) return '';
        if (cardUploaded && passbookUploaded) return '（名片與存摺已存入資料夾）';
        if (cardUploaded || passbookUploaded) return '（照片已存入資料夾）';
        return '';
      }

      async function runOcr(file, kind) {
        if (!file || !session) return false;
        setOcrStatus(kind, '辨識中…', 'loading');
        try {
          var photo = await fileToBase64(file);
          photo.kind = kind;
          var data = await AccountingApi.vendorRegisterOcr(session, photo, kind);
          if (!data.success) {
            setOcrStatus(kind, data.message || '辨識失敗，請改手動填寫或按重新辨識', 'err');
            return false;
          }
          applyOcrFields(data.fields || {});
          setOcrStatus(kind, '已帶入辨識結果，請核對是否正確', 'ok');
          return true;
        } catch (e) {
          setOcrStatus(kind, e.message || String(e), 'err');
          return false;
        }
      }

      async function uploadPhotoToVendorFolder(file, kind, vendorId) {
        if (!file || !vendorId || !session) return null;
        if (kind === 'card' && cardUploaded) return { success: true, skipped: true };
        if (kind === 'passbook' && passbookUploaded) return { success: true, skipped: true };

        setPhotoUploadStatus(kind, '照片存入資料夾中…', false);
        try {
          var photo = await fileToBase64(file);
          photo.kind = kind;
          var data = await AccountingApi.vendorUploadPhotos(session, vendorId, [photo]);
          if (!data.success) {
            setPhotoUploadStatus(kind, '照片未存入：' + (data.message || '失敗'), true);
            return data;
          }
          if (kind === 'card') cardUploaded = true;
          else passbookUploaded = true;
          patchVendorFolder(vendorId, data.folder);
          setPhotoUploadStatus(kind, '照片已存入廠商資料夾', false);
          return data;
        } catch (e) {
          setPhotoUploadStatus(kind, '照片未存入：' + (e.message || String(e)), true);
          return { success: false, message: e.message || String(e) };
        }
      }

      async function handlePhotoSelected(file, kind) {
        if (!file) return;
        var vendorId = $('editId').value.trim();
        await runOcr(file, kind);
        if (vendorId) await uploadPhotoToVendorFolder(file, kind, vendorId);
        else setPhotoUploadStatus(kind, '儲存廠商後會一併存入資料夾', false);
      }

      function clearPhotos() {
        cardFile = null;
        passbookFile = null;
        cardUploaded = false;
        passbookUploaded = false;
        $('cardPhoto').value = '';
        $('passbookPhoto').value = '';
        $('cardPreview').innerHTML = '';
        $('passbookPreview').innerHTML = '';
        setOcrStatus('card', '', '');
        setOcrStatus('passbook', '', '');
        setPhotoUploadStatus('card', '', false);
        setPhotoUploadStatus('passbook', '', false);
      }

      async function uploadPendingPhotos(vendorRec) {
        if (!vendorRec || !vendorRec.vendor_id) return null;
        var photos = [];
        if (cardFile && !cardUploaded) {
          var p0 = await fileToBase64(cardFile);
          p0.kind = 'card';
          photos.push(p0);
        }
        if (passbookFile && !passbookUploaded) {
          var p1 = await fileToBase64(passbookFile);
          p1.kind = 'passbook';
          photos.push(p1);
        }
        if (!photos.length) {
          if (cardUploaded || passbookUploaded) {
            return { success: true, already_uploaded: true };
          }
          return null;
        }
        var data = await AccountingApi.vendorUploadPhotos(session, vendorRec.vendor_id, photos);
        if (data && data.success) {
          if (cardFile) cardUploaded = true;
          if (passbookFile) passbookUploaded = true;
          patchVendorFolder(vendorRec.vendor_id, data.folder);
        }
        return data;
      }

      async function addBinding(vendorId, idType, lineId, displayName, purpose, btn) {
        if (!vendorId) { setMsg('請先儲存廠商'); return; }
        lineId = String(lineId || '').trim();
        if (!lineId) { setMsg('請從搜尋結果選擇要加入的 LINE'); return; }
        var run = async function () {
          var payload = {
            vendor_id: vendorId,
            id_type: idType || (lineId.indexOf('C') === 0 ? 'group' : 'user'),
            line_id: lineId,
            display_name: displayName || '',
            purpose: purpose || $('bindPurpose').value || '一般',
            is_primary: '否'
          };
          var data = await AccountingApi.crudCreate(session, 'vendor_line_binding', payload);
          if (!data.success) { setMsg(data.message || '綁定失敗'); return; }
          $('lineSearchResults').innerHTML = '';
          setOk('已加入 LINE 綁定');
          refreshVendors(true);
          renderBindings(vendorId);
        };
        if (btn) await AccountingUi.runAsync(btn, { busyLabel: '加入中…', clear: false }, run);
        else await run();
      }

      function renderSearchHits(items) {
        var box = $('lineSearchResults');
        box.innerHTML = '';
        if (!items || !items.length) {
          box.innerHTML = '<p class="sub">沒有符合的聯絡人（請確認對方已加會計 LINE @672zolga 並傳過訊息）</p>';

      function fillForm(v, opts) {

        $('branch_name').value = v.branch_name || '';
        $('account_no').value = v.account_no || '';
        $('account_name').value = v.account_name || '';
        $('payment_terms').value = v.payment_terms || '';

        if (v.note) noteLines.push(String(v.note));

      function sortVendorsForList(rows) {
        return rows.slice().sort(function (a, b) {
          var rank = function (v) {
            var s = String(v.coop_status || '合作中');
            if (s === '待審核') return 0;
            if (s === '暫停合作') return 2;
            return 1;
          };
          var ar = rank(a);
          var br = rank(b);
          if (ar !== br) return ar - br;
          return String(a.name || '').localeCompare(String(b.name || ''), 'zh-Hant');
        });
      }

      function filterLocal(rows) {
        var tc = $('filterTrade').value;
        var cs = $('filterCoop').value;
        var kw = $('filterKw').value.trim().toLowerCase();
        return rows.filter(function (v) {
          if (tc && AccountingMasterData.normalizeVendorTradeCategory(v.trade_category) !== tc) return false;
          if (cs && String(v.coop_status || '合作中') !== cs) return false;
          if (kw && JSON.stringify(v).toLowerCase().indexOf(kw) < 0) return false;
          return true;
        });
      }

      function formatBankSummary(v) {
        var code = String(v.bank_code || '').trim();
        var acct = String(v.account_no || '').trim();
        var branch = String(v.branch_name || '').trim();
        if (!code && !acct && !branch) return '';
        var parts = [];
        if (code) parts.push(code + (branch ? ' ' + branch : ''));
        if (acct) parts.push('帳號 ' + acct);
        return parts.join(' · ');
      }

      function formatVendorMetaRows(v) {
        var rows = [];
        var contactParts = [];
        if (v.contact_name) contactParts.push(String(v.contact_name));
        if (v.contact_phone) contactParts.push(normPhone(v.contact_phone));
        if (contactParts.length) rows.push({ label: '聯絡', text: contactParts.join(' · ') });

        if (v.tax_id) rows.push({ label: '統編', text: String(v.tax_id) });

        var bank = formatBankSummary(v);
        if (bank) rows.push({ label: '匯款', text: bank });
        else if (v.bank_info) rows.push({ label: '匯款', text: String(v.bank_info) });

        var bindN = AccountingCache.vendorLineBindings(session, v.vendor_id).filter(function (b) {
          return String(b.is_active || '是') !== '否';
        }).length;
        if (bindN) rows.push({ label: 'LINE', text: bindN + ' 筆綁定' });

        return rows;
      }

      function coopStatusTag(v) {
        var st = String(v.coop_status || '合作中');
        if (st === '暫停合作') return '<span class="tag pause">暫停合作</span>';
        if (st === '待審核') return '<span class="tag pause">待審核</span>';
        return '<span class="tag ok">合作中</span>';
      }

      function loadVendorFilesList(filesBox, vendor) {
        var listHost = filesBox.querySelector('.files-list-host');
        if (!listHost) return;
        listHost.textContent = '載入中…';
        AccountingApi.vendorListFiles(session, vendor.drive_folder_id).then(function (fd) {
          listHost.innerHTML = '';
          if (!fd.success) {
            listHost.textContent = '無法載入附件';
            return;
          }
          if (!fd.files || !fd.files.length) {
            listHost.className = 'file-list-empty';
            listHost.textContent = '尚無附件（報價單、合約、存摺等）';
            return;
          }
          (fd.files || []).forEach(function (f) {
            var row = document.createElement('div');
            row.className = 'file';
            row.innerHTML = '<a href="' + f.url + '" target="_blank" rel="noopener">' + f.name + '</a>' +
              (f.updated ? ' <span class="sub">' + f.updated + '</span>' : '');
            listHost.appendChild(row);
          });
        }).catch(function () {
          listHost.textContent = '無法載入附件';
        });
      }

      function renderFiles(box, vendor) {
        var filesBox = document.createElement('div');
        filesBox.className = 'files-box';
        var toolbar = document.createElement('div');
        toolbar.className = 'files-toolbar';
        if (vendor.drive_folder_url) {
          var link = document.createElement('a');
          link.href = vendor.drive_folder_url;
          link.target = '_blank';
          link.rel = 'noopener';
          link.textContent = 'Drive 資料夾';
          toolbar.appendChild(link);
        }
        var btnFolder = document.createElement('button');
        btnFolder.type = 'button';
        btnFolder.className = 'btn btn-secondary';
        btnFolder.style.padding = '6px 12px';
        btnFolder.style.fontSize = '13px';
        btnFolder.textContent = vendor.drive_folder_id ? '建立／同步資料夾' : '建立資料夾';
        btnFolder.addEventListener('click', async function () {
          setMsg('');
          var data = await AccountingApi.vendorEnsureFolder(session, vendor.vendor_id);
          if (!data.success) { setMsg(data.message || '失敗'); return; }
          vendor.drive_folder_id = data.folder.drive_folder_id;
          vendor.drive_folder_url = data.folder.drive_folder_url;
          patchVendorFolder(vendor.vendor_id, data.folder);
          renderList();
        });
        toolbar.appendChild(btnFolder);
        if (vendor.drive_folder_id) {
          var btnFiles = document.createElement('button');
          btnFiles.type = 'button';
          btnFiles.className = 'btn btn-secondary';
          btnFiles.style.padding = '6px 12px';
          btnFiles.style.fontSize = '13px';
          btnFiles.textContent = '載入附件列表';
          btnFiles.addEventListener('click', function () {
            loadVendorFilesList(filesBox, vendor);
          });
          toolbar.appendChild(btnFiles);
        }
        filesBox.appendChild(toolbar);
        var listHost = document.createElement('div');
        listHost.className = 'files-list-host';
        filesBox.appendChild(listHost);
        box.appendChild(filesBox);
      }

      function renderList() {
        var rows = sortVendorsForList(filterLocal(allVendors));
        $('listCount').textContent = '(' + rows.length + ' 家)';
        var box = $('list');
        box.innerHTML = '';
        rows.forEach(function (v) {
          var div = document.createElement('div');
          div.className = 'vendor-card' + (v.coop_status === '暫停合作' ? ' paused' : '');

          var head = document.createElement('div');
          head.className = 'vendor-head';
          head.innerHTML =
            '<p class="vendor-name">' + (v.name || '—') + '</p>' +
            '<div>' + coopStatusTag(v) + '</div>';

          var tags = document.createElement('div');
          tags.className = 'vendor-tags';
          tags.innerHTML =
            '<span class="tag">' + (AccountingMasterData.normalizeVendorTradeCategory(v.trade_category) || '其他') + '</span>' +
            (v.cost_type ? '<span class="tag muted">' + v.cost_type + '</span>' : '');

          var meta = document.createElement('div');
          meta.className = 'vendor-meta';
          formatVendorMetaRows(v).forEach(function (row) {
            var line = document.createElement('div');
            line.className = 'vendor-meta-row';
            line.innerHTML = '<span class="meta-label">' + row.label + '</span><span>' + row.text + '</span>';
            meta.appendChild(line);
          });

          div.appendChild(head);
          div.appendChild(tags);
          if (meta.childNodes.length) div.appendChild(meta);

          if (v.note) {
            var note = document.createElement('div');
            note.className = 'vendor-note';
            var noteText = String(v.note);
            note.textContent = noteText.length > 120 ? noteText.slice(0, 120) + '…' : noteText;
            note.title = noteText;
            div.appendChild(note);
          }

          var actions = document.createElement('div');
          actions.className = 'actions';
          var btnEdit = document.createElement('button');
          btnEdit.className = 'btn btn-secondary';
          btnEdit.textContent = '編輯';
          btnEdit.addEventListener('click', function () { fillForm(v); });
          actions.appendChild(btnEdit);
          var btnToggle = document.createElement('button');
          btnToggle.className = 'btn btn-warn';
          btnToggle.textContent = v.coop_status === '暫停合作' ? '恢復合作' : '暫停合作';
          btnToggle.addEventListener('click', async function () {
            await AccountingUi.runAsync(btnToggle, { busyLabel: '處理中…', clear: false }, async function () {
              var next = v.coop_status === '暫停合作' ? '合作中' : '暫停合作';
              var data = await AccountingApi.crudUpdate(session, 'vendor', v.vendor_id, { coop_status: next });
              if (!data.success) { setMsg(data.message); return; }
              refreshVendors(true);
            });

          actions.appendChild(btnToggle);
          div.appendChild(actions);
          renderFiles(div, v);
          box.appendChild(div);
        });
        if (!rows.length) box.textContent = '沒有符合的廠商';

      $('saveBtn').addEventListener('click', async function () {
        showFeedback('', '');
        var payload = readForm();
        if (!payload.name) { setMsg('請填廠商名稱'); return; }
        if (!payload.contact_name) { setMsg('請填聯絡人'); return; }
        if (!payload.bank_code) { setMsg('請填銀行代碼'); return; }
        if (!payload.account_no) { setMsg('請填帳號'); return; }
        if (!payload.account_name) { setMsg('請填戶名'); return; }
        var editId = $('editId').value;
        var savedName = payload.name;
        var saved = null;
        var wasCreate = !editId;
        try {
          await AccountingUi.runAsync($('saveBtn'), {
            busyLabel: '儲存中…',
            actionLabel: wasCreate ? '新增廠商' : '更新廠商'
          }, async function () {
            var data = editId
              ? await AccountingApi.crudUpdate(session, 'vendor', editId, payload)
              : await AccountingApi.crudCreate(session, 'vendor', payload);
            if (!data.success) { setMsg(data.message || '儲存失敗'); return; }
            saved = data.data;
            if (saved && saved.vendor_id) {
              AccountingCache.patchMaster(session, 'vendor', saved);
            }
            refreshVendors(true);
            var refreshed = (saved && allVendors.find(function (v) {
              return v.vendor_id === saved.vendor_id;
            })) || saved;
            if (!refreshed || !refreshed.vendor_id) {
              setMsg('已儲存，但無法進入編輯（缺少廠商編號），請從右側列表點「編輯」');
              return;
            }
            fillForm(refreshed, {
              keepFeedback: true,
              keepPhotos: true,
              flash: true,
              scrollToBind: wasCreate
            });
            if (wasCreate) {
              setOk('已新增「' + savedName + '」，已進入編輯模式。請在下方綁定 LINE（請款辨識用），或按「取消編輯」清空再新增下一筆');
            } else {
              setOk('已更新「' + savedName + '」。可繼續綁定 LINE，或按「取消編輯」清空表單');
            }
            if (saved) runBackgroundPhotoUpload(saved);
          });
        } catch (e) {
          setMsg(e.message || String(e));
        }
      });

        }
      });
      $('passbookPhoto').addEventListener('change', function () {
        passbookFile = this.files && this.files[0] ? this.files[0] : null;
        passbookUploaded = false;
        showPreview('passbookPreview', passbookFile);
        if (passbookFile) handlePhotoSelected(passbookFile, 'passbook');
        else {
          setOcrStatus('passbook', '', '');
          setPhotoUploadStatus('passbook', '', false);
        }
      });
      $('cardOcrRetry').addEventListener('click', function () {
        if (cardFile) runOcr(cardFile, 'card');
      });
      $('passbookOcrRetry').addEventListener('click', function () {
        if (passbookFile) runOcr(passbookFile, 'passbook');
      });
      $('account_name').addEventListener('blur', crossFillVendorAndAccountName);
      $('name').addEventListener('blur', crossFillVendorAndAccountName);

      (async function boot() {
        await AccountingBoot.run({
          onReady: async function (sess) {
            session = sess;
            initFormOptions();
            var cached = AccountingCache.get(session);
            if (cached) mergeEnumsFromCache(cached);
            allVendors = cached ? AccountingCache.vendors(session) : AccountingCache.peekVendors();
            if (allVendors.length) renderList();
            if (!cached) {
              AccountingCache.load(session).then(function () {
                allVendors = AccountingCache.vendors(session);
                mergeEnumsFromCache(AccountingCache.get(session));
                renderList();
              }).catch(function (e) { setMsg(e.message || String(e)); });
            }
          }
        });
      })();

      function mergeEnumsFromCache(c) {
        if (!c.enums) return;
        Object.keys(c.enums).forEach(function (k) {
          if (c.enums[k]) AccountingMasterData[k] = c.enums[k];
        });
        initFormOptions();
      }
    })();
  </script>
</body>
</html>
