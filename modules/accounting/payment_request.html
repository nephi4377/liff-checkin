<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>待付款申請</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="../../shared/js/accounting_api.js?v=19"></script>
  <script src="../../shared/js/accounting_ui.js?v=3"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; max-width: 640px; margin: 0 auto; background: #f4f6f8; }
    @media (min-width: 960px) { body { max-width: 720px; } }
    h2 { margin: 0 0 8px; }
    .sub { color: #555; font-size: 14px; line-height: 1.5; }
    .card { background: #fff; border-radius: 12px; padding: 14px; margin: 12px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    label { display: block; margin-top: 8px; font-weight: 600; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    input:read-only { background: #f1f3f4; color: #555; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { padding: 10px 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #1a73e8; color: #fff; width: 100%; padding: 12px; margin-top: 10px; }
    .btn-secondary { background: #e8eaed; color: #333; width: 100%; padding: 12px; margin-top: 8px; }
    .steps { display: flex; gap: 6px; margin: 12px 0; font-size: 12px; color: #555; flex-wrap: wrap; }
    .steps span { background: #e8eaed; padding: 4px 8px; border-radius: 6px; }
    .steps span.on { background: #e8f0fe; color: #1a73e8; font-weight: 600; }
    .bank-hint { font-size: 12px; color: #666; margin: 4px 0 0; }
    .alloc-empty { color: #666; font-size: 14px; padding: 12px 0; }
    .btn-finance { background: #fff; color: #34a853; border: 2px solid #34a853; width: 100%; padding: 10px; margin-top: 8px; font-size: 13px; }
    .btn-ghost { background: #fff; border: 1px dashed #1a73e8; color: #1a73e8; width: 100%; padding: 10px; margin-top: 8px; }
    .seg { display: flex; gap: 6px; margin-top: 6px; }
    .seg button { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; background: #fff; font-weight: 600; cursor: pointer; }
    .seg button.active { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; }
    #msg { color: #c5221f; font-size: 14px; margin: 8px 0; }
    #ok { color: #137333; font-size: 14px; margin: 8px 0; }
    #warn { color: #b06000; font-size: 14px; margin: 8px 0; }
    .hidden { display: none; }
    .nav { margin-bottom: 12px; font-size: 14px; }
    .nav a { color: #1a73e8; text-decoration: none; }
    .alloc-row { border: 1px solid #e0e0e0; border-radius: 10px; padding: 10px; margin-top: 8px; background: #fafafa; position: relative; }
    .alloc-row .rm { position: absolute; top: 8px; right: 8px; border: none; background: transparent; color: #c5221f; font-size: 12px; cursor: pointer; }
    .alloc-row .tag-src { font-size: 11px; color: #888; margin-left: 6px; }
    .total-line { font-size: 18px; font-weight: 700; margin-top: 10px; text-align: right; }
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; }
    .photo-tile { border: 1px solid #ddd; border-radius: 8px; padding: 6px; background: #fafafa; text-align: center; }
    .photo-tile img { width: 100%; height: 72px; object-fit: cover; border-radius: 4px; }
    .photo-tile .file-thumb { width: 100%; height: 72px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 4px; background: #eef2f7; color: #444; font-size: 12px; line-height: 1.3; padding: 4px; box-sizing: border-box; word-break: break-all; }
    .photo-tile .file-thumb strong { font-size: 13px; color: #c5221f; }
    .photo-tile label { font-weight: normal; font-size: 12px; margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .photo-tile .del { border: none; background: none; color: #c5221f; font-size: 11px; cursor: pointer; margin-top: 2px; }
    .drop-zone { margin-top: 8px; padding: 20px 14px; border: 2px dashed #b0b8c4; border-radius: 12px; background: #f8fafc; text-align: center; cursor: pointer; transition: border-color .15s, background .15s; }
    .drop-zone:hover, .drop-zone.drag-over { border-color: #1a73e8; background: #e8f0fe; }
    .drop-zone p { margin: 0; font-size: 15px; color: #333; }
    .drop-zone .hint { margin-top: 6px; font-size: 13px; color: #666; line-height: 1.45; }
    .drop-zone input[type="file"] { display: none; }
    .ocr-status { font-size: 13px; color: #555; margin: 8px 0; min-height: 18px; }
    .btn-primary:disabled, .btn-secondary:disabled { opacity: .55; cursor: not-allowed; }
    .btn-row { display: flex; flex-direction: column; gap: 0; }
  </style>
</head>
<body>
  <div id="loading">載入中…</div>
  <div id="app" class="hidden">
    <p class="nav"><a href="index.html">← 會計功能選單</a></p>
    <h2>待付款申請</h2>
    <p class="sub" id="userLine">—</p>
    <p class="sub">錢還沒付出去才用這頁：傳單據給 AI 讀取，或手填後送審。</p>
    <div class="steps" aria-hidden="true">
      <span class="on">① 傳單據</span><span>② 辨識</span><span>③ 確認收款人</span><span>④ 送出</span>
    </div>

    <div id="formCard" class="card">
      <label>單據附件（選填，最多 12 個）</label>
      <p class="sub" id="photoCountLine">已 0 / 12 個</p>
      <div class="drop-zone" id="dropZone" role="button" tabindex="0" aria-label="加入單據檔案">
        <p>拖曳檔案到這裡，或點一下選擇</p>
        <p class="hint">支援照片（JPG、PNG…）與 PDF，單檔最多 8 MB</p>
        <input type="file" id="photoInput" accept="image/*,application/pdf,.pdf" multiple />
      </div>
      <div class="photo-grid" id="photoGrid"></div>
      <button type="button" class="btn btn-secondary" id="ocrBtn" disabled>開始辨識</button>
      <p class="ocr-status" id="ocrStatus">尚未辨識</p>

      <label>單據類型</label>
      <select id="docType">
        <option value="請款">請款</option>
        <option value="報價">報價</option>
        <option value="出貨">出貨</option>
      </select>

      <label>付給誰？</label>
      <p class="sub" style="margin:4px 0 6px">廠商請款選廠商；員工代墊選員工；不在名冊選手動。</p>
      <div class="seg" id="payeeSeg">
        <button type="button" data-mode="vendor" class="active">廠商</button>
        <button type="button" data-mode="employee">員工</button>
        <button type="button" data-mode="manual">手動填戶名</button>
      </div>
      <div id="vendorPickBlock">
        <label>廠商</label>
        <select id="pickVendor"></select>
      </div>
      <div id="employeePickBlock" class="hidden">
        <label>員工</label>
        <select id="pickEmployee"></select>
      </div>
      <div id="manualPayeeBlock" class="hidden">
        <label>收款人戶名</label>
        <input type="text" id="manualPayee" placeholder="匯款戶名" />
      </div>
      <div class="row2">
        <div>
          <label>銀行代碼</label>
          <input type="text" id="bankCode" maxlength="3" inputmode="numeric" />
        </div>
        <div>
          <label>帳號</label>
          <input type="text" id="accountNo" inputmode="numeric" />
        </div>
      </div>
      <label>戶名</label>
      <input type="text" id="accountName" />
      <p class="bank-hint" id="bankHint">選廠商或員工後，銀行資料會自動帶入；要改請切「手動填戶名」。</p>

      <div class="row2">
        <div>
          <label>單據日期</label>
          <input type="date" id="txnDate" />
        </div>
        <div>
          <label>訂編（選填）</label>
          <input type="text" id="orderNo" />
        </div>
      </div>

      <label>明細（案號＋金額，至少一列）</label>
      <div id="allocList"></div>
      <button type="button" class="btn btn-ghost" id="addAllocBtn">＋ 新增一列</button>
      <div class="total-line">合計 $<span id="totalAmt">0</span></div>

      <label>備註（選填）</label>
      <input type="text" id="note" />

      <div class="btn-row">
        <button type="button" class="btn btn-primary" id="submitBtn">送出請款（待主管審核）</button>
        <button type="button" class="btn btn-finance hidden" id="financeBtn">進階：財務直送待匯款（跳過審核）</button>
      </div>
    </div>

    <div id="successCard" class="card hidden">
      <h3 style="margin:0 0 8px">請款已送出</h3>
      <p class="sub" id="successHint">—</p>
      <a class="btn btn-secondary" href="ledger_review.html">開啟請款審核</a>
      <button type="button" class="btn btn-primary" id="anotherBtn">再建一筆</button>
    </div>
  </div>
  <script>
    (function () {
      AccountingUi.init();
      var fb = AccountingUi.feedback();
      var MAX_PHOTOS = 12;
      var MAX_BYTES = 8 * 1024 * 1024;
      var OCR_TIMEOUT_MS = 180000;
      var session = null;
      var vendors = [];
      var employees = [];
      var payeeMode = 'vendor';
      var photos = [];
      var draftId = '';
      var ocrAttempt = 0;
      var lastOcrAmount = 0;
      var queryParams = {};
      var submitting = false;
      var canFinanceDirect = false;

      function setMsg(t) { if (t) AccountingUi.notify('err', t); }
      function setOk(t) { if (t) AccountingUi.notify('ok', t); }
      function setWarn(t) { if (t) AccountingUi.notify('warn', t, { logOnly: false }); }
      function fileLabel(meta) {
        var n = String((meta && meta.name) || '檔案');
        return n.length > 16 ? n.slice(0, 14) + '…' : n;
      }
      function isManualRowFilled(r) {
        return !!(String(r.project_no || '').trim() || String(r.amount || '').trim() || String(r.item_desc || '').trim());
      }
      function applyOcrVendor(ocr) {
        if (!ocr) return;
        if (ocr.vendor_id) {
          setPayeeMode('vendor');
          document.getElementById('pickVendor').value = ocr.vendor_id;
          onPayeePick();
          AccountingUi.notify('ok', '已帶入廠商：' + (ocr.vendor_name || '（名冊）') + '，銀行帳戶已自動填入');
        } else if (ocr.vendor_name) {
          setPayeeMode('vendor');
          AccountingUi.notify('warn', '單據寫「' + ocr.vendor_name + '」，名冊找不到，請手動選廠商');
        }
      }
      function uid() { return 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

      function readQuery() {
        var q = {};
        (window.location.search || '').replace(/^\?/, '').split('&').forEach(function (p) {
          if (!p) return;
          var i = p.indexOf('=');
          var k = i >= 0 ? p.substring(0, i) : p;
          var v = i >= 0 ? p.substring(i + 1) : '';
          try { q[decodeURIComponent(k)] = decodeURIComponent(v); } catch (e) {}
        });
        return q;
      }

      function showApp() {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
      }

      function setBankReadonly(locked) {
        ['bankCode', 'accountNo', 'accountName'].forEach(function (id) {
          document.getElementById(id).readOnly = locked;
        });
      }

      var PAYEE_MODE_LABEL = { vendor: '廠商', employee: '員工', manual: '手動填戶名' };

      function setPayeeMode(mode, fromUser) {
        payeeMode = mode;
        if (fromUser) AccountingUi.tap('收款人模式 → ' + (PAYEE_MODE_LABEL[mode] || mode));
        document.querySelectorAll('#payeeSeg button').forEach(function (btn) {
          btn.classList.toggle('active', btn.getAttribute('data-mode') === mode);
        });
        document.getElementById('vendorPickBlock').classList.toggle('hidden', mode !== 'vendor');
        document.getElementById('employeePickBlock').classList.toggle('hidden', mode !== 'employee');
        document.getElementById('manualPayeeBlock').classList.toggle('hidden', mode !== 'manual');
        if (mode === 'manual') setBankReadonly(false);
        else onPayeePick();
      }

      function fillSelect(selId, rows, valueKey, labelFn, emptyLabel) {
        var sel = document.getElementById(selId);
        sel.innerHTML = '<option value="">' + emptyLabel + '</option>';
        rows.forEach(function (row) {
          var opt = document.createElement('option');
          opt.value = row[valueKey] || '';
          opt.textContent = labelFn(row);
          sel.appendChild(opt);
        });
      }

      function onPayeePick(fromUser) {
        if (payeeMode === 'manual') return;
        var row = null;
        if (payeeMode === 'vendor') {
          row = vendors.find(function (x) { return x.vendor_id === document.getElementById('pickVendor').value; });
          setBankReadonly(!!row);
          if (fromUser && row) AccountingUi.tap('選擇廠商：' + (row.name || row.vendor_id));
        } else {
          row = employees.find(function (x) { return x.userId === document.getElementById('pickEmployee').value; });
          setBankReadonly(!!row);
          if (fromUser && row) AccountingUi.tap('選擇員工：' + (row.userName || row.userId));
        }
        if (!row) { setBankReadonly(false); return; }
        document.getElementById('bankCode').value = row.bank_code || '';
        document.getElementById('accountNo').value = row.account_no || '';
        document.getElementById('accountName').value = row.account_name || row.userName || row.name || '';
      }

      function allocRowHtml(idx, row) {
        row = row || {};
        var src = row.source === 'manual' ? '<span class="tag-src">手動</span>' : (row.source === 'ai' ? '<span class="tag-src">AI</span>' : '');
        return '<div class="alloc-row" data-idx="' + idx + '" data-source="' + (row.source || '') + '">' +
          '<button type="button" class="rm" data-rm="' + idx + '">刪除</button>' +
          '<div class="row2"><div><label>案號' + src + '</label><input class="inp-pn" value="' + (row.project_no || '') + '" placeholder="752" /></div>' +
          '<div><label>金額</label><input class="inp-amt" type="number" inputmode="numeric" value="' + (row.amount || '') + '" /></div></div>' +
          '<label>品項</label><input class="inp-desc" value="' + (row.item_desc || '') + '" placeholder="摘要" /></div>';
      }

      function renderAllocRows(rows) {
        var box = document.getElementById('allocList');
        box.innerHTML = '';
        if (!rows || !rows.length) {
          box.innerHTML = '<p class="alloc-empty">尚無明細。請點「新增一列」或先「開始辨識」。</p>';
          updateTotal();
          return;
        }
        rows.forEach(function (row, idx) {
          box.insertAdjacentHTML('beforeend', allocRowHtml(idx, row));
        });
        bindAllocEvents();
        updateTotal();
      }

      function readAllocRows() {
        var rows = [];
        document.querySelectorAll('#allocList .alloc-row').forEach(function (el) {
          rows.push({
            project_no: el.querySelector('.inp-pn').value.trim(),
            amount: el.querySelector('.inp-amt').value,
            item_desc: el.querySelector('.inp-desc').value.trim(),
            source: el.getAttribute('data-source') || 'manual'
          });
        });
        return rows;
      }

      function updateTotal() {
        var sum = readAllocRows().reduce(function (s, r) {
          return s + (parseInt(r.amount, 10) || 0);
        }, 0);
        document.getElementById('totalAmt').textContent = sum.toLocaleString('zh-TW');
        if (lastOcrAmount > 0 && sum !== lastOcrAmount) {
          AccountingUi.notify('warn', '合計 $' + sum.toLocaleString('zh-TW') + ' 與單據總額 $' + lastOcrAmount.toLocaleString('zh-TW') + ' 不同；確認後仍可送出', { logOnly: true });
        }
      }

      function bindAllocEvents() {
        document.querySelectorAll('#allocList .inp-amt, #allocList .inp-pn, #allocList .inp-desc').forEach(function (inp) {
          inp.oninput = function () {
            var row = inp.closest('.alloc-row');
            if (row) row.setAttribute('data-source', 'manual');
            updateTotal();
          };
        });
        document.querySelectorAll('#allocList .rm').forEach(function (btn) {
          btn.onclick = function () {
            var rows = readAllocRows();
            var idx = parseInt(btn.getAttribute('data-rm'), 10);
            AccountingUi.tap('刪除明細第 ' + (idx + 1) + ' 列');
            rows.splice(idx, 1);
            renderAllocRows(rows);
          };
        });
      }

      function isPdfMime(mime) {
        return String(mime || '').toLowerCase() === 'application/pdf';
      }

      function guessMime(file) {
        var t = String((file && file.type) || '').toLowerCase();
        if (t) return t;
        var n = String((file && file.name) || '').toLowerCase();
        if (n.slice(-4) === '.pdf') return 'application/pdf';
        return 'image/jpeg';
      }

      function isAllowedFile(file) {
        if (!file) return false;
        var mime = guessMime(file);
        if (mime === 'application/pdf') return true;
        if (mime.indexOf('image/') === 0) return true;
        return false;
      }

      function selectedPhotoCount() {
        return photos.filter(function (p) { return p.selected; }).length;
      }

      function updateOcrBtn() {
        var n = selectedPhotoCount();
        var btn = document.getElementById('ocrBtn');
        btn.disabled = n < 1 || submitting;
        btn.textContent = (ocrAttempt > 0 ? '重新辨識（' + n + ' 個）' : '開始辨識（' + n + ' 個）');
      }

      function renderPhotoGrid() {
        var grid = document.getElementById('photoGrid');
        grid.innerHTML = '';
        photos.forEach(function (p) {
          var tile = document.createElement('div');
          tile.className = 'photo-tile';
          var isPdf = isPdfMime(p.mimeType);
          tile.innerHTML =
            (isPdf
              ? '<div class="file-thumb"><strong>PDF</strong><span></span></div>'
              : '<img alt="單據預覽" />') +
            '<label><input type="checkbox" class="chk-sel" ' + (p.selected ? 'checked' : '') + ' /> 辨識</label>' +
            '<button type="button" class="del">刪除</button>';
          if (isPdf) {
            tile.querySelector('.file-thumb span').textContent = fileLabel({ name: p.filename });
          } else {
            tile.querySelector('img').src = 'data:' + p.mimeType + ';base64,' + p.dataBase64;
          }
          tile.querySelector('.chk-sel').onchange = function (e) {
            p.selected = e.target.checked;
            updateOcrBtn();
          };
          tile.querySelector('.del').onclick = function () {
            AccountingUi.tap('刪除附件：' + fileLabel({ name: p.filename }));
            photos = photos.filter(function (x) { return x.photo_id !== p.photo_id; });
            renderPhotoGrid();
          };
          grid.appendChild(tile);
        });
        document.getElementById('photoCountLine').textContent = '已 ' + photos.length + ' / ' + MAX_PHOTOS + ' 個';
        updateOcrBtn();
      }

      function readFileB64(file) {
        return new Promise(function (resolve, reject) {
          if (!file) { resolve(null); return; }
          if (!isAllowedFile(file)) {
            reject(new Error('不支援的檔案類型：' + file.name + '（請用照片或 PDF）'));
            return;
          }
          if (file.size > MAX_BYTES) { reject(new Error('單檔不可超過 8 MB：' + file.name)); return; }
          var mimeType = guessMime(file);
          var r = new FileReader();
          r.onload = function () {
            resolve({
              photo_id: uid(),
              filename: file.name,
              mimeType: mimeType,
              dataBase64: r.result.split(',')[1],
              selected: true
            });
          };
          r.onerror = reject;
          r.readAsDataURL(file);
        });
      }

      function summarizeSubmitPayload(payload) {
        var lines = [];
        lines.push('模式：' + (payload.submit_mode === 'finance_direct' ? '財務直送待匯款' : '送審'));
        lines.push('單據類型：' + (payload.doc_type || '—'));
        if (payload.order_no) lines.push('訂編：' + payload.order_no);
        if (payload.txn_date) lines.push('單據日期：' + payload.txn_date);
        if (payload.vendor_id) {
          var v = vendors.find(function (x) { return x.vendor_id === payload.vendor_id; });
          lines.push('廠商：' + (v ? v.name : payload.vendor_id));
        } else if (payload.employee_user_id) {
          var emp = employees.find(function (x) { return x.userId === payload.employee_user_id; });
          lines.push('員工：' + (emp ? emp.userName : payload.employee_user_id));
        } else if (payload.vendor_name) {
          lines.push('手動戶名：' + payload.vendor_name);
        }
        lines.push('銀行 ' + (payload.bank_code || '—') + ' / ' + (payload.account_no || '—') + ' / ' + (payload.account_name || '—'));
        lines.push('明細：');
        var total = 0;
        (payload.allocations || []).forEach(function (r, i) {
          var amt = parseInt(r.amount, 10) || 0;
          total += amt;
          lines.push('  ' + (i + 1) + '. 案' + (r.project_no || '—') + ' $' + amt.toLocaleString('zh-TW') +
            (r.item_desc ? ' ' + r.item_desc : ''));
        });
        lines.push('合計：$' + total.toLocaleString('zh-TW'));
        if (payload.note) lines.push('備註：' + payload.note);
        var photoNames = (payload.photos || []).map(function (p) { return p.filename || '檔案'; });
        lines.push('附件 ' + photoNames.length + ' 個' + (photoNames.length ? '（' + photoNames.join('、') + '）' : ''));
        return lines.join('\n');
      }

      async function addPhotoFiles(fileList) {
        setMsg('');
        var added = 0;
        for (var i = 0; i < fileList.length; i++) {
          if (photos.length >= MAX_PHOTOS) {
            setMsg('最多 ' + MAX_PHOTOS + ' 個檔案，請刪除多餘的或另開一筆');
            break;
          }
          try {
            var p = await readFileB64(fileList[i]);
            if (p) { photos.push(p); added++; }
          } catch (e) {
            setMsg(e.message || String(e));
          }
        }
        if (added) AccountingUi.tap('加入附件 ' + added + ' 個');
        renderPhotoGrid();
        document.getElementById('photoInput').value = '';
      }

      function buildPayeePayload(payload) {
        if (payeeMode === 'vendor') payload.vendor_id = document.getElementById('pickVendor').value;
        else if (payeeMode === 'employee') payload.employee_user_id = document.getElementById('pickEmployee').value;
        else payload.vendor_name = document.getElementById('manualPayee').value.trim();
        payload.bank_code = document.getElementById('bankCode').value.trim();
        payload.account_no = document.getElementById('accountNo').value.trim();
        payload.account_name = document.getElementById('accountName').value.trim();
        return payload;
      }

      function validateForm() {
        if (payeeMode === 'vendor' && !document.getElementById('pickVendor').value) return '請選擇廠商';
        if (payeeMode === 'employee' && !document.getElementById('pickEmployee').value) return '請選擇員工';
        if (payeeMode === 'manual' && !document.getElementById('manualPayee').value.trim()) return '請填收款人戶名';
        var rows = readAllocRows();
        if (!rows.length) return '請新增明細列';
        for (var i = 0; i < rows.length; i++) {
          if (!rows[i].project_no) return '第 ' + (i + 1) + ' 列請填案號';
          if (!(parseInt(rows[i].amount, 10) > 0)) return '第 ' + (i + 1) + ' 列請填金額';
        }
        if (!document.getElementById('bankCode').value.trim() || !document.getElementById('accountNo').value.trim()) {
          return '請補齊銀行代碼與帳號';
        }
        if (!document.getElementById('accountName').value.trim()) return '請填戶名';
        return '';
      }

      function photosPayload() {
        return photos.map(function (p) {
          return { photo_id: p.photo_id, mimeType: p.mimeType, dataBase64: p.dataBase64, filename: p.filename };
        });
      }

      async function runOcr() {
        var selected = photos.filter(function (p) { return p.selected; });
        if (!selected.length) { setMsg('請勾選至少一個檔案'); return; }
        var btn = document.getElementById('ocrBtn');
        var status = document.getElementById('ocrStatus');
        submitting = true;
        updateOcrBtn();
        await AccountingUi.runAsync(btn, { actionLabel: 'AI 辨識單據', busyLabel: '辨識中…' }, async function () {
          status.textContent = '辨識中…（最長約 3 分鐘）';
          var payload = {
            draft_id: draftId || undefined,
            photo_ids: selected.map(function (p) { return p.photo_id; }),
            photos: photosPayload()
          };
          var data = await AccountingApi.paymentRequestOcrAnalyze(session, payload, OCR_TIMEOUT_MS);
          if (!data.success) {
            status.textContent = '辨識失敗';
            throw new Error(data.message || '辨識失敗');
          }
          draftId = data.draft_id || draftId;
          ocrAttempt = data.attempt_no || (ocrAttempt + 1);
          var ocr = data.ocr || {};
          if (ocr.doc_type) document.getElementById('docType').value = ocr.doc_type;
          if (ocr.order_no) document.getElementById('orderNo').value = ocr.order_no;
          if (ocr.txn_date) document.getElementById('txnDate').value = ocr.txn_date.slice(0, 10);
          applyOcrVendor(ocr);

          var manualRows = readAllocRows().filter(function (r) {
            return r.source === 'manual' && isManualRowFilled(r);
          });
          var aiRows = (data.allocations || []).map(function (r) {
            return { project_no: r.project_no, amount: r.amount, item_desc: r.item_desc, source: 'ai' };
          });
          lastOcrAmount = parseInt(ocr.amount, 10) || 0;
          if (!aiRows.length && lastOcrAmount) {
            aiRows = [{ project_no: ocr.project_no || '', amount: lastOcrAmount, item_desc: ocr.item_desc || '', source: 'ai' }];
          }
          var merged = manualRows.concat(aiRows);
          renderAllocRows(merged.length ? merged : []);
          status.textContent = '辨識完成（第 ' + ocrAttempt + ' 次）';
          var taxNote = '';
          if (ocr.tax_amount > 0) {
            taxNote = '；稅金 $' + Number(ocr.tax_amount).toLocaleString('zh-TW') + ' 已分攤進各案（含稅）';
          } else if (ocr.is_tax_inclusive) {
            taxNote = '；單據為含稅報價';
          }
          AccountingUi.log('ok', '辨識完成，共 ' + merged.length + ' 列明細' + taxNote);
        }).catch(function (e) {
          if (e && e.message) setMsg(e.message);
          status.textContent = '辨識失敗，可重試';
        }).finally(function () {
          submitting = false;
          updateOcrBtn();
        });
      }

      async function submitRequest(mode) {
        if (submitting) return;
        var err = validateForm();
        if (err) { setMsg(err); return; }
        var label = mode === 'finance_direct' ? '財務直送待匯款' : '送出請款';
        var payload = buildPayeePayload({
          submit_mode: mode,
          draft_id: draftId || undefined,
          doc_type: document.getElementById('docType').value,
          order_no: document.getElementById('orderNo').value.trim(),
          txn_date: document.getElementById('txnDate').value,
          note: document.getElementById('note').value.trim(),
          allocations: readAllocRows(),
          photos: photosPayload(),
          from_line: queryParams.from === 'line' || queryParams.from === 'ocr'
        });
        submitting = true;
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('financeBtn').disabled = true;
        try {
          AccountingUi.tap(label);
          AccountingUi.detail('送出內容', summarizeSubmitPayload(payload));
          AccountingUi.action(label, 'start');
          var data = await AccountingApi.paymentRequestSubmit(session, payload);
          if (!data.success) {
            AccountingUi.action(label, 'fail', data.message || '送出失敗');
            setMsg(data.message || '送出失敗');
            return;
          }
          AccountingUi.action(label, 'ok', '單號 ' + String(data.payment_request_id || '').slice(0, 8));
          document.getElementById('formCard').classList.add('hidden');
          document.getElementById('successCard').classList.remove('hidden');
          document.getElementById('successHint').textContent = mode === 'finance_direct'
            ? '已進入待匯款清單。'
            : '主管會在「請款審核」處理；核准後才進待匯款。';
          setOk('請款已送出');
        } catch (e) {
          AccountingUi.action(label, 'fail', e.message || String(e));
          setMsg(e.message || '送出失敗');
        } finally {
          submitting = false;
          document.getElementById('submitBtn').disabled = false;
          document.getElementById('financeBtn').disabled = false;
        }
      }

      async function loadPendingPhotos(token) {
        var auth = AccountingApi.buildAuth(session);
        var body = Object.assign({ action: 'accounting_pending_photos', token: token, user_id: session.profile.userId }, auth);
        var data = await AccountingApi.post(body);
        if (!data.success) { setMsg(data.message || '無法帶入 LINE 照片'); return; }
        (data.photos || []).forEach(function (p) {
          if (photos.length >= MAX_PHOTOS) return;
          photos.push({
            photo_id: uid(),
            mimeType: p.mimeType || 'image/jpeg',
            dataBase64: p.dataBase64,
            filename: p.filename || 'line.jpg',
            selected: true
          });
        });
        renderPhotoGrid();
      }

      async function loadOcrDraft(token) {
        var data = await AccountingApi.paymentRequestComposeDraft(session, token);
        if (!data.success || !data.draft) return;
        var d = data.draft;
        if (d.doc_type) document.getElementById('docType').value = d.doc_type;
        if (d.order_no) document.getElementById('orderNo').value = d.order_no;
        if (d.allocations && d.allocations.length) {
          renderAllocRows(d.allocations.map(function (r) {
            return { project_no: r.project_no, amount: r.amount, item_desc: r.item_desc, source: 'ai' };
          }));
        }
      }

      function resetForm() {
        AccountingUi.tap('再建一筆');
        document.getElementById('formCard').classList.remove('hidden');
        document.getElementById('successCard').classList.add('hidden');
        photos = [];
        draftId = '';
        ocrAttempt = 0;
        lastOcrAmount = 0;
        renderPhotoGrid();
        document.getElementById('ocrStatus').textContent = '尚未辨識';
        document.getElementById('note').value = '';
        renderAllocRows(queryParams.project_no
          ? [{ project_no: queryParams.project_no, amount: '', item_desc: '', source: 'manual' }]
          : []);
      }

      document.getElementById('photoInput').addEventListener('change', function (e) {
        addPhotoFiles(e.target.files || []);
      });
      (function setupDropZone() {
        var zone = document.getElementById('dropZone');
        var input = document.getElementById('photoInput');
        zone.addEventListener('click', function (e) {
          if (e.target === input) return;
          AccountingUi.tap('選擇單據檔案');
          input.click();
        });
        zone.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); input.click(); }
        });
        ['dragenter', 'dragover'].forEach(function (ev) {
          zone.addEventListener(ev, function (e) {
            e.preventDefault();
            e.stopPropagation();
            zone.classList.add('drag-over');
          });
        });
        ['dragleave', 'drop'].forEach(function (ev) {
          zone.addEventListener(ev, function (e) {
            e.preventDefault();
            e.stopPropagation();
            zone.classList.remove('drag-over');
          });
        });
        zone.addEventListener('drop', function (e) {
          var files = (e.dataTransfer && e.dataTransfer.files) ? e.dataTransfer.files : [];
          if (files.length) {
            AccountingUi.tap('拖曳加入檔案');
            addPhotoFiles(files);
          }
        });
      })();
      document.getElementById('ocrBtn').addEventListener('click', function () {
        AccountingUi.tap(document.getElementById('ocrBtn').textContent || '開始辨識');
        runOcr();
      });
      document.getElementById('payeeSeg').addEventListener('click', function (e) {
        var btn = e.target.closest('button[data-mode]');
        if (!btn) return;
        setPayeeMode(btn.getAttribute('data-mode'), true);
      });
      document.getElementById('pickVendor').addEventListener('change', function () { onPayeePick(true); });
      document.getElementById('pickEmployee').addEventListener('change', function () { onPayeePick(true); });
      document.getElementById('addAllocBtn').addEventListener('click', function () {
        AccountingUi.tap('新增明細列');
        var rows = readAllocRows();
        rows.push({ project_no: '', amount: '', item_desc: '', source: 'manual' });
        renderAllocRows(rows);
      });
      document.getElementById('submitBtn').addEventListener('click', function () { submitRequest('review'); });
      document.getElementById('financeBtn').addEventListener('click', function () { submitRequest('finance_direct'); });
      document.getElementById('anotherBtn').addEventListener('click', resetForm);

      (async function boot() {
        queryParams = readQuery();
        try {
          AccountingUi.action('載入頁面', 'start');
          session = await AccountingApi.initSession();
          if (!session) return;
          document.getElementById('userLine').textContent =
            (session.auth.display_name || session.profile.displayName) + ' · 權限 ' + session.auth.permission;
          showApp();
          var ctx = await AccountingApi.paymentRequestContext(session);
          if (!ctx.success) { setMsg(ctx.message); return; }
          vendors = ctx.vendors || [];
          employees = ctx.employees || [];
          canFinanceDirect = !!ctx.can_finance_direct;
          if (canFinanceDirect) document.getElementById('financeBtn').classList.remove('hidden');
          fillSelect('pickVendor', vendors, 'vendor_id', function (v) { return v.name || v.vendor_id; }, '— 請選擇廠商 —');
          fillSelect('pickEmployee', employees, 'userId', function (e) {
            return (e.userName || '') + ((e.bank_code && e.account_no) ? '' : '（帳戶待補）');
          }, '— 請選擇員工 —');
          setPayeeMode('vendor');
          renderAllocRows(queryParams.project_no
            ? [{ project_no: queryParams.project_no, amount: '', item_desc: '', source: 'manual' }]
            : []);
          if (queryParams.doc_type) document.getElementById('docType').value = queryParams.doc_type;
          if (queryParams.pending) await loadPendingPhotos(queryParams.pending);
          if (queryParams.draft) await loadOcrDraft(queryParams.draft);
          AccountingUi.action('載入頁面', 'ok');
        } catch (e) {
          document.getElementById('loading').textContent = e.message || String(e);
        }
      })();
    })();
  </script>
</body>
</html>
