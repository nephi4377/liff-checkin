<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>匯款請款</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="../../shared/js/accounting_api.js?v=16"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; max-width: 640px; margin: 0 auto; background: #f4f6f8; }
    h2 { margin: 0 0 8px; }
    .sub { color: #555; font-size: 14px; }
    .card { background: #fff; border-radius: 12px; padding: 14px; margin: 12px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    label { display: block; margin-top: 8px; font-weight: 600; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    input:read-only { background: #f1f3f4; color: #555; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { padding: 10px 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #1a73e8; color: #fff; width: 100%; padding: 12px; margin-top: 10px; }
    .seg { display: flex; gap: 6px; margin-top: 6px; }
    .seg button { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; background: #fff; font-weight: 600; cursor: pointer; }
    .seg button.active { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; }
    #msg { color: #c5221f; font-size: 14px; margin: 8px 0; }
    .hidden { display: none; }
    .nav { margin-bottom: 12px; font-size: 14px; }
    .nav a { color: #1a73e8; text-decoration: none; }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }
    .btn-secondary { background: #e8eaed; color: #333; width: 100%; padding: 12px; margin-top: 8px; display: block; text-align: center; text-decoration: none; box-sizing: border-box; }
    .success-card { text-align: center; }
    .success-icon { width: 56px; height: 56px; margin: 0 auto 12px; border-radius: 50%; background: #e6f4ea; color: #137333; font-size: 28px; line-height: 56px; font-weight: 700; }
    .success-title { margin: 0 0 6px; font-size: 20px; }
    .success-next { color: #555; font-size: 14px; line-height: 1.5; margin: 0 0 14px; }
    .summary { text-align: left; background: #f8f9fa; border-radius: 10px; padding: 12px 14px; margin: 0 0 14px; font-size: 14px; }
    .summary dt { color: #666; margin-top: 8px; }
    .summary dt:first-child { margin-top: 0; }
    .summary dd { margin: 2px 0 0; font-weight: 600; }
  </style>
</head>
<body>
  <div id="loading">載入中…</div>
  <div id="app" class="hidden">
    <p class="nav"><a href="index.html">← 會計功能選單</a></p>
    <h2>匯款請款（未實現）</h2>
    <p class="sub" id="userLine">—</p>
    <p class="sub">錢還沒付出去才用這頁。群組／表單記帳只記<strong>已發生</strong>的收支，不會進審核。</p>
    <div id="msg" role="alert"></div>

    <div id="formCard" class="card">
      <label>收款對象</label>
      <div class="seg" id="payeeSeg">
        <button type="button" data-mode="vendor" class="active">廠商</button>
        <button type="button" data-mode="employee">員工</button>
        <button type="button" data-mode="manual">手動</button>
      </div>
      <div id="vendorPickBlock">
        <label>廠商</label>
        <select id="pickVendor"></select>
      </div>
      <div id="employeePickBlock" class="hidden">
        <label>員工（Checkin 員工資料）</label>
        <select id="pickEmployee"></select>
      </div>
      <div id="manualPayeeBlock" class="hidden">
        <label>收款人戶名</label>
        <input type="text" id="manualPayee" placeholder="匯款戶名" />
      </div>
      <div class="row2">
        <div>
          <label>金額</label>
          <input type="number" id="amount" inputmode="numeric" />
        </div>
        <div>
          <label>案號</label>
          <input type="text" id="projectNo" placeholder="例：752" />
        </div>
      </div>
      <label>品項說明</label>
      <input type="text" id="itemDesc" placeholder="例：磁磚尾款" />
      <div class="row2">
        <div>
          <label>銀行代碼</label>
          <input type="text" id="bankCode" maxlength="3" inputmode="numeric" />
        </div>
        <div>
          <label>帳號</label>
          <input type="text" id="accountNo" inputmode="numeric" />
        </div>
      </div>
      <label>戶名</label>
      <input type="text" id="accountName" />
      <label>備註（選填）</label>
      <input type="text" id="note" />
      <button type="button" class="btn btn-primary" id="submitBtn">送出請款（待主管審核）</button>
    </div>

    <div id="successCard" class="card success-card hidden" aria-live="polite">
      <div class="success-icon" aria-hidden="true">✓</div>
      <h3 class="success-title">請款已送出</h3>
      <p class="success-next">主管會在「請款審核」處理；核准後才進入待匯款，此時<strong>還不會</strong>記入收支。</p>
      <dl class="summary" id="successSummary"></dl>
      <button type="button" class="btn btn-primary" id="anotherBtn">再送一筆</button>
      <a class="btn btn-secondary" href="index.html">回會計選單</a>
    </div>
  </div>
  <script>
    (function () {
      var session = null;
      var vendors = [];
      var employees = [];
      var payeeMode = 'vendor';
      var submitting = false;

      function setMsg(t) { document.getElementById('msg').textContent = t || ''; }
      function showForm() {
        document.getElementById('formCard').classList.remove('hidden');
        document.getElementById('successCard').classList.add('hidden');
      }
      function showSuccess(summary) {
        var dl = document.getElementById('successSummary');
        dl.innerHTML = '';
        summary.forEach(function (row) {
          var dt = document.createElement('dt');
          dt.textContent = row.label;
          var dd = document.createElement('dd');
          dd.textContent = row.value;
          dl.appendChild(dt);
          dl.appendChild(dd);
        });
        document.getElementById('formCard').classList.add('hidden');
        document.getElementById('successCard').classList.remove('hidden');
        setMsg('');
        window.scrollTo(0, 0);
        document.getElementById('anotherBtn').focus();
      }
      function showApp() {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
      }
      function setBankReadonly(locked) {
        ['bankCode', 'accountNo', 'accountName'].forEach(function (id) {
          document.getElementById(id).readOnly = locked;
        });
      }
      function setPayeeMode(mode) {
        payeeMode = mode;
        document.querySelectorAll('#payeeSeg button').forEach(function (btn) {
          btn.classList.toggle('active', btn.getAttribute('data-mode') === mode);
        });
        document.getElementById('vendorPickBlock').classList.toggle('hidden', mode !== 'vendor');
        document.getElementById('employeePickBlock').classList.toggle('hidden', mode !== 'employee');
        document.getElementById('manualPayeeBlock').classList.toggle('hidden', mode !== 'manual');
        if (mode === 'manual') setBankReadonly(false);
        else onPayeePick();
      }
      function fillSelect(selId, rows, valueKey, labelFn, emptyLabel) {
        var sel = document.getElementById(selId);
        sel.innerHTML = '<option value="">' + emptyLabel + '</option>';
        rows.forEach(function (row) {
          var opt = document.createElement('option');
          opt.value = row[valueKey] || '';
          opt.textContent = labelFn(row);
          sel.appendChild(opt);
        });
      }
      function onPayeePick() {
        if (payeeMode === 'manual') return;
        var row = null;
        if (payeeMode === 'vendor') {
          var vid = document.getElementById('pickVendor').value;
          row = vendors.find(function (x) { return x.vendor_id === vid; });
          setBankReadonly(!!row);
        } else {
          var uid = document.getElementById('pickEmployee').value;
          row = employees.find(function (x) { return x.userId === uid; });
          setBankReadonly(!!row);
        }
        if (!row) {
          setBankReadonly(false);
          return;
        }
        document.getElementById('bankCode').value = row.bank_code || '';
        document.getElementById('accountNo').value = row.account_no || '';
        document.getElementById('accountName').value = row.account_name || row.userName || row.name || '';
      }
      function getPayeeLabel() {
        if (payeeMode === 'vendor') {
          var vid = document.getElementById('pickVendor').value;
          var v = vendors.find(function (x) { return x.vendor_id === vid; });
          return v ? (v.name || v.vendor_id) : '';
        }
        if (payeeMode === 'employee') {
          var uid = document.getElementById('pickEmployee').value;
          var e = employees.find(function (x) { return x.userId === uid; });
          return e ? (e.userName || uid) : '';
        }
        return document.getElementById('manualPayee').value.trim();
      }
      function buildPayload() {
        var payload = {
          amount: document.getElementById('amount').value,
          project_no: document.getElementById('projectNo').value.trim(),
          item_desc: document.getElementById('itemDesc').value.trim(),
          bank_code: document.getElementById('bankCode').value.trim(),
          account_no: document.getElementById('accountNo').value.trim(),
          account_name: document.getElementById('accountName').value.trim(),
          note: document.getElementById('note').value.trim(),
          doc_type: '匯款請款'
        };
        if (payeeMode === 'vendor') payload.vendor_id = document.getElementById('pickVendor').value;
        else if (payeeMode === 'employee') payload.employee_user_id = document.getElementById('pickEmployee').value;
        else payload.vendor_name = document.getElementById('manualPayee').value.trim();
        return payload;
      }
      function validateForm() {
        if (payeeMode === 'vendor' && !document.getElementById('pickVendor').value) return '請選擇廠商';
        if (payeeMode === 'employee' && !document.getElementById('pickEmployee').value) return '請選擇員工';
        if (payeeMode === 'manual' && !document.getElementById('manualPayee').value.trim()) return '請填收款人戶名';
        var amount = parseInt(document.getElementById('amount').value, 10);
        if (!amount || amount <= 0) return '請填金額（須大於 0）';
        if (!document.getElementById('projectNo').value.trim()) return '請填案號';
        if (!document.getElementById('bankCode').value.trim() || !document.getElementById('accountNo').value.trim()) {
          return '請補齊銀行代碼與帳號';
        }
        if (!document.getElementById('accountName').value.trim()) return '請填戶名';
        return '';
      }
      function resetForm() {
        document.getElementById('pickVendor').value = '';
        document.getElementById('pickEmployee').value = '';
        document.getElementById('manualPayee').value = '';
        document.getElementById('amount').value = '';
        document.getElementById('projectNo').value = '';
        document.getElementById('itemDesc').value = '';
        document.getElementById('bankCode').value = '';
        document.getElementById('accountNo').value = '';
        document.getElementById('accountName').value = '';
        document.getElementById('note').value = '';
        setPayeeMode('vendor');
        setMsg('');
        showForm();
      }

      document.getElementById('payeeSeg').addEventListener('click', function (e) {
        var btn = e.target.closest('button[data-mode]');
        if (!btn) return;
        setPayeeMode(btn.getAttribute('data-mode'));
      });
      document.getElementById('pickVendor').addEventListener('change', onPayeePick);
      document.getElementById('pickEmployee').addEventListener('change', onPayeePick);
      document.getElementById('submitBtn').addEventListener('click', async function () {
        if (submitting) return;
        setMsg('');
        var err = validateForm();
        if (err) { setMsg(err); return; }
        var payload = buildPayload();
        var summary = [
          { label: '收款對象', value: getPayeeLabel() },
          { label: '金額', value: '$' + Number(payload.amount).toLocaleString('zh-TW') },
          { label: '案號', value: payload.project_no },
          { label: '品項', value: payload.item_desc || '匯款請款' }
        ];
        var btn = document.getElementById('submitBtn');
        submitting = true;
        btn.disabled = true;
        btn.textContent = '送出中…';
        try {
          var data = await AccountingApi.staffPaymentSubmit(session, payload);
          if (!data.success) { setMsg(data.message || '送出失敗'); return; }
          if (data.payment_request_id) {
            summary.push({ label: '單號', value: String(data.payment_request_id).slice(0, 8) + '…' });
          }
          showSuccess(summary);
        } catch (e) {
          setMsg(e.message || '送出失敗，請稍後再試');
        } finally {
          submitting = false;
          btn.disabled = false;
          btn.textContent = '送出請款（待主管審核）';
        }
      });
      document.getElementById('anotherBtn').addEventListener('click', resetForm);

      (async function boot() {
        try {
          session = await AccountingApi.initSession();
          if (!session) return;
          document.getElementById('userLine').textContent =
            (session.auth.display_name || session.profile.displayName) + ' · 權限 ' + session.auth.permission;
          showApp();
          var ctx = await AccountingApi.paymentRequestContext(session);
          if (!ctx.success) { setMsg(ctx.message); return; }
          vendors = ctx.vendors || [];
          employees = ctx.employees || [];
          fillSelect('pickVendor', vendors, 'vendor_id', function (v) { return v.name || v.vendor_id; }, '— 請選擇廠商 —');
          fillSelect('pickEmployee', employees, 'userId', function (e) {
            var bank = (e.bank_code && e.account_no) ? '' : '（帳戶待補）';
            return (e.userName || '') + bank;
          }, '— 請選擇員工 —');
          setPayeeMode('vendor');
        } catch (e) {
          document.getElementById('loading').textContent = e.message || String(e);
        }
      })();
    })();
  </script>
</body>
</html>
