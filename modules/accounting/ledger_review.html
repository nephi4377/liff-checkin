<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>收支審核</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="../../shared/js/accounting_api.js?v=13"></script>
  <script src="../../shared/js/accounting_lightbox.js?v=13"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; max-width: 600px; margin: 0 auto; background: #f4f6f8; }
    h2 { margin: 0 0 8px; }
    .sub { color: #555; font-size: 14px; }
    .card { background: #fff; border-radius: 12px; padding: 14px; margin: 12px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    label { display: block; margin-top: 8px; font-weight: 600; font-size: 14px; }
    select, input { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { padding: 8px 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-ok { background: #34a853; color: #fff; }
    .btn-warn { background: #f9ab00; color: #333; }
    .btn-muted { background: #e8eaed; color: #333; }
    .item { border-bottom: 1px solid #eee; padding: 12px 0; }
    .item:last-child { border-bottom: none; }
    .tag { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 6px; background: #e8f0fe; margin-right: 6px; }
    .tag.vendor { background: #fef7e0; color: #b06000; }
    .tag.pay { background: #e6f4ea; }
    .tag.exp { background: #fce8e6; }
    .actions { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    #msg { color: #c5221f; font-size: 14px; }
    #ok { color: #137333; font-size: 14px; }
    .hidden { display: none; }
    .nav { margin-bottom: 12px; font-size: 14px; }
    .nav a { color: #1a73e8; text-decoration: none; }
    .headline { font-size: 16px; font-weight: 700; }
    .amount { font-size: 18px; font-weight: 700; margin: 4px 0; }
  </style>
</head>
<body>
  <div id="loading">載入中…</div>
  <div id="app" class="hidden">
    <p class="nav"><a href="index.html">← 會計功能選單</a></p>
    <h2>收支審核</h2>
    <p class="sub" id="userLine">—</p>
    <p class="sub">群組記帳待審與廠商請款待審都在這裡；廠商核准後進「待匯款」。</p>
    <div id="msg"></div>
    <div id="ok"></div>

    <div class="card">
      <div class="row2">
        <div>
          <label>審核狀態</label>
          <select id="filterReview">
            <option value="">全部</option>
            <option value="待審" selected>待審</option>
            <option value="已審">已審</option>
            <option value="退回">退回</option>
          </select>
        </div>
        <div>
          <label>匯款狀態</label>
          <select id="filterPay">
            <option value="">全部</option>
            <option value="未匯款">未匯款</option>
            <option value="已匯款">已匯款</option>
            <option value="已現金">已現金</option>
          </select>
        </div>
      </div>
      <label>關鍵字（對象／案號／品項）</label>
      <input id="filterKw" placeholder="例：磁磚、752" />
      <button type="button" class="btn btn-primary" id="reloadBtn" style="width:100%;margin-top:10px;padding:12px">重新載入</button>
    </div>

    <div class="card">
      <h3 style="margin:0 0 8px">待審列表</h3>
      <div id="list"></div>
    </div>
  </div>
  <script>
    (function () {
      var session = null;
      var canApproveVendor = false;

      function setMsg(t) { document.getElementById('msg').textContent = t || ''; }
      function setOk(t) { document.getElementById('ok').textContent = t || ''; }
      function showApp() {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
      }
      function buildFilter() {
        var f = {};
        var rs = document.getElementById('filterReview').value;
        var ps = document.getElementById('filterPay').value;
        var kw = document.getElementById('filterKw').value.trim();
        f.review_status = rs;
        if (ps) f.payment_status = ps;
        if (kw) f.keyword = kw;
        return f;
      }
      function fmtMoney(n) {
        return (parseInt(n, 10) || 0).toLocaleString('zh-TW');
      }

      async function approveLedger(item) {
        var data = await AccountingApi.crudUpdate(session, 'ledger_status', item.ingest_id, {
          review_status: '已審',
          payment_status: item.payment_status || '未匯款',
          note: item.note || ''
        });
        if (!data.success) { setMsg(data.message || '核准失敗'); return false; }
        setOk('已核准：' + (item.party_name || item.summary));
        return true;
      }

      async function rejectLedger(item) {
        var data = await AccountingApi.crudUpdate(session, 'ledger_status', item.ingest_id, {
          review_status: '退回',
          payment_status: item.payment_status || '未匯款',
          note: item.note || ''
        });
        if (!data.success) { setMsg(data.message || '退回失敗'); return false; }
        setOk('已退回');
        return true;
      }

      async function approveVendor(item) {
        var data = await AccountingApi.vendorPaymentApprove(session, item.payment_request_id, {
          project_no: item.project_no,
          amount: item.amount,
          item_desc: item.summary
        });
        if (!data.success) { setMsg(data.message || '核准失敗'); return false; }
        setOk('廠商請款已核准，進入待匯款');
        return true;
      }

      async function rejectVendor(item) {
        var reason = prompt('退回原因（選填）', '主管退回') || '主管退回';
        var data = await AccountingApi.vendorPaymentReject(session, item.payment_request_id, reason);
        if (!data.success) { setMsg(data.message || '退回失敗'); return false; }
        setOk('已退回廠商請款');
        return true;
      }

      function renderItem(item) {
        var div = document.createElement('div');
        div.className = 'item';
        var isVendor = item.kind === 'vendor_payment';
        var typeTag = isVendor
          ? '<span class="tag vendor">廠商' + (item.doc_type || '請款') + '</span>'
          : '<span class="tag">' + (item.type || '收支') + '</span>';
        div.innerHTML =
          '<div class="headline">' + (item.party_name || '—') + '</div>' +
          '<div class="amount">$' + fmtMoney(item.amount) + '</div>' +
          '<div class="sub">案號 ' + (item.project_no || '—') + ' · ' + (item.txn_date || '—') + '</div>' +
          '<div class="sub">' + (item.summary || '') + '</div>' +
          '<div style="margin-top:6px">' + typeTag +
          '<span class="tag pay">' + (item.review_status || '待審') + '</span>' +
          '<span class="tag">' + (item.payment_status || '未匯款') + '</span></div>';

        var actions = document.createElement('div');
        actions.className = 'actions';

        if (item.has_attachments || (item.attachment_urls && item.attachment_urls.length)) {
          var lbBtn = AccountingLightbox.makeButton(session, item, '看單據');
          actions.appendChild(lbBtn);
        }

        if (item.review_status !== '已審') {
          var btnOk = document.createElement('button');
          btnOk.className = 'btn btn-ok';
          btnOk.textContent = isVendor ? '核准 → 待匯款' : '核准';
          btnOk.addEventListener('click', async function () {
            setMsg('');
            var ok = isVendor ? await approveVendor(item) : await approveLedger(item);
            if (ok) await loadList();
          });
          if (!isVendor || canApproveVendor) actions.appendChild(btnOk);
          else {
            var hint = document.createElement('span');
            hint.className = 'sub';
            hint.textContent = '（廠商核准需權限 ≥ 5）';
            actions.appendChild(hint);
          }
        }
        if (item.review_status !== '退回') {
          var btnReject = document.createElement('button');
          btnReject.className = 'btn btn-warn';
          btnReject.textContent = '退回';
          btnReject.addEventListener('click', async function () {
            setMsg('');
            var ok = isVendor
              ? (canApproveVendor ? await rejectVendor(item) : (setMsg('權限不足'), false))
              : await rejectLedger(item);
            if (ok) await loadList();
          });
          if (!isVendor || canApproveVendor) actions.appendChild(btnReject);
        }
        if (!isVendor && item.payment_status !== '已匯款' && item.review_status === '已審') {
          var btnPaid = document.createElement('button');
          btnPaid.className = 'btn btn-primary';
          btnPaid.textContent = '標記已匯款';
          btnPaid.addEventListener('click', async function () {
            setMsg('');
            var data = await AccountingApi.crudUpdate(session, 'ledger_status', item.ingest_id, {
              review_status: '已審',
              payment_status: '已匯款',
              note: item.note || ''
            });
            if (!data.success) { setMsg(data.message); return; }
            setOk('已標記匯款');
            await loadList();
          });
          actions.appendChild(btnPaid);
        }
        div.appendChild(actions);
        return div;
      }

      async function loadList() {
        setOk('');
        var data = await AccountingApi.ledgerReviewBundle(session, buildFilter());
        var box = document.getElementById('list');
        box.innerHTML = '';
        if (!data.success) { setMsg(data.message); return; }
        canApproveVendor = !!data.can_approve_vendor;
        (data.items || []).forEach(function (row) { box.appendChild(renderItem(row)); });
        if (!data.items || !data.items.length) box.textContent = '沒有符合的紀錄';
      }

      document.getElementById('reloadBtn').addEventListener('click', loadList);
      (async function boot() {
        try {
          session = await AccountingApi.initSession();
          if (!session) return;
          var mode = session.devBypass ? ' · 測試模式（無登入）' : '';
          document.getElementById('userLine').textContent = session.profile.displayName + ' · 權限 ' + session.auth.permission + mode;
          showApp();
          await loadList();
        } catch (e) {
          document.getElementById('loading').textContent = e.message || String(e);
        }
      })();
    })();
  </script>
</body>
</html>
