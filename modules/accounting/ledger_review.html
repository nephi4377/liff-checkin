<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>收支審核</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="../../shared/js/accounting_api.js?v=9"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; max-width: 600px; margin: 0 auto; background: #f4f6f8; }
    h2 { margin: 0 0 8px; }
    .sub { color: #555; font-size: 14px; }
    .card { background: #fff; border-radius: 12px; padding: 14px; margin: 12px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    label { display: block; margin-top: 8px; font-weight: 600; font-size: 14px; }
    select, input { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { padding: 8px 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-ok { background: #34a853; color: #fff; }
    .btn-warn { background: #f9ab00; color: #333; }
    .item { border-bottom: 1px solid #eee; padding: 12px 0; }
    .item:last-child { border-bottom: none; }
    .tag { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 6px; background: #e8f0fe; margin-right: 6px; }
    .tag.pay { background: #e6f4ea; }
    .mono { font-family: ui-monospace, monospace; font-size: 12px; color: #555; word-break: break-all; }
    .actions { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
    #msg { color: #c5221f; font-size: 14px; }
    #ok { color: #137333; font-size: 14px; }
    .hidden { display: none; }
    .nav { margin-bottom: 12px; font-size: 14px; }
    .nav a { color: #1a73e8; text-decoration: none; }
  </style>
</head>
<body>
  <div id="loading">載入中…</div>
  <div id="app" class="hidden">
    <p class="nav"><a href="index.html">← 會計功能選單</a></p>
    <h2>收支審核／匯款狀態</h2>
    <p class="sub" id="userLine">—</p>
    <div id="msg"></div>
    <div id="ok"></div>

    <div class="card">
      <div class="row2">
        <div>
          <label>審核狀態</label>
          <select id="filterReview">
            <option value="">全部</option>
            <option value="待審" selected>待審</option>
            <option value="已審">已審</option>
            <option value="退回">退回</option>
          </select>
        </div>
        <div>
          <label>匯款狀態</label>
          <select id="filterPay">
            <option value="">全部</option>
            <option value="未匯款" selected>未匯款</option>
            <option value="已匯款">已匯款</option>
            <option value="已現金">已現金</option>
          </select>
        </div>
      </div>
      <label>ingest_id 關鍵字（選填）</label>
      <input id="filterId" placeholder="部分 UUID 即可" />
      <button type="button" class="btn btn-primary" id="reloadBtn" style="width:100%;margin-top:10px;padding:12px">重新載入</button>
    </div>

    <div class="card">
      <h3 style="margin:0 0 8px">列表</h3>
      <div id="list"></div>
    </div>
  </div>
  <script>
    (function () {
      var session = null;
      function setMsg(t) { document.getElementById('msg').textContent = t || ''; }
      function setOk(t) { document.getElementById('ok').textContent = t || ''; }
      function showApp() {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
      }
      function buildFilter() {
        var f = { page_size: 100 };
        var rs = document.getElementById('filterReview').value;
        var ps = document.getElementById('filterPay').value;
        var iid = document.getElementById('filterId').value.trim();
        if (rs) f.review_status = rs;
        if (ps) f.payment_status = ps;
        if (iid) f.ingest_id = iid;
        return f;
      }
      async function saveRow(row, patch) {
        setMsg('');
        var payload = {
          review_status: patch.review_status != null ? patch.review_status : row.review_status,
          payment_status: patch.payment_status != null ? patch.payment_status : row.payment_status,
          note: row.note || ''
        };
        var data = await AccountingApi.crudUpdate(session, 'ledger_status', row.ingest_id, payload);
        if (!data.success) { setMsg(data.message || '更新失敗'); return false; }
        setOk('已更新 ' + row.ingest_id.slice(0, 8) + '…');
        return true;
      }
      function renderItem(row) {
        var div = document.createElement('div');
        div.className = 'item';
        div.innerHTML =
          '<div class="mono">' + (row.ingest_id || '') + '</div>' +
          '<div><span class="tag">' + (row.review_status || '待審') + '</span>' +
          '<span class="tag pay">' + (row.payment_status || '未匯款') + '</span></div>' +
          '<div class="sub">' + (row.reviewed_by ? '審核：' + row.reviewed_by + ' · ' + (row.reviewed_at || '') : '尚未審核') + '</div>' +
          (row.note ? '<div class="sub">來源：' + row.note + '</div>' : '') +
          '<div class="sub"><a href="attachments.html?ingest_id=' + encodeURIComponent(row.ingest_id || '') + '">查單據附件</a></div>';
        var actions = document.createElement('div');
        actions.className = 'actions';
        if (row.review_status !== '已審') {
          var btnOk = document.createElement('button');
          btnOk.className = 'btn btn-ok';
          btnOk.textContent = '核准';
          btnOk.addEventListener('click', async function () {
            if (await saveRow(row, { review_status: '已審' })) await loadList();
          });
          actions.appendChild(btnOk);
        }
        if (row.review_status !== '退回') {
          var btnReject = document.createElement('button');
          btnReject.className = 'btn btn-warn';
          btnReject.textContent = '退回';
          btnReject.addEventListener('click', async function () {
            if (await saveRow(row, { review_status: '退回' })) await loadList();
          });
          actions.appendChild(btnReject);
        }
        if (row.payment_status !== '已匯款') {
          var btnPaid = document.createElement('button');
          btnPaid.className = 'btn btn-primary';
          btnPaid.textContent = '標記已匯款';
          btnPaid.addEventListener('click', async function () {
            if (await saveRow(row, { payment_status: '已匯款', review_status: row.review_status === '待審' ? '已審' : row.review_status })) await loadList();
          });
          actions.appendChild(btnPaid);
        }
        div.appendChild(actions);
        return div;
      }
      async function loadList() {
        setOk('');
        var data = await AccountingApi.crudList(session, 'ledger_status', buildFilter());
        var box = document.getElementById('list');
        box.innerHTML = '';
        if (!data.success) { setMsg(data.message); return; }
        (data.data || []).forEach(function (row) { box.appendChild(renderItem(row)); });
        if (!data.data || !data.data.length) box.textContent = '沒有符合的紀錄';
      }
      document.getElementById('reloadBtn').addEventListener('click', loadList);
      (async function boot() {
        try {
          session = await AccountingApi.initSession();
          if (!session) return;
          var mode = session.devBypass ? ' · 測試模式（無登入）' : '';
          document.getElementById('userLine').textContent = session.profile.displayName + ' · 權限 ' + session.auth.permission + mode;
          showApp();
          await loadList();
        } catch (e) {
          document.getElementById('loading').textContent = e.message || String(e);
        }
      })();
    })();
  </script>
</body>
</html>
