<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>請款審核</title>
  <link rel="stylesheet" href="../../shared/css/accounting_layout.css?v=5" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="../../shared/js/operator_context.js?v=1"></script>
  <script src="../../shared/js/accounting_api.js?v=26"></script>
  <script src="../../shared/js/accounting_list_cache.js?v=1"></script>
  <script src="../../shared/js/accounting_action_queue.js?v=1"></script>
  <script src="../../shared/js/accounting_lightbox.js?v=17"></script>
  <script src="../../shared/js/accounting_ui.js?v=10"></script>
  <script src="../../shared/js/accounting_nav.js?v=2"></script>
  <script src="../../shared/js/accounting_boot.js?v=4"></script>
  <style>
    h2 { margin: 0 0 8px; }
    .sub { color: #555; font-size: 14px; line-height: 1.45; }
    .card { background: #fff; border-radius: 12px; padding: 14px; margin: 12px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    label { display: block; margin-top: 8px; font-weight: 600; font-size: 14px; }
    select, input, textarea { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { padding: 10px 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-ok { background: #34a853; color: #fff; }
    .btn-warn { background: #f9ab00; color: #333; }
    .btn-muted { background: #e8eaed; color: #333; }
    .btn-block { width: 100%; margin-top: 10px; padding: 12px; }
    .item { border: 1px solid #e8eaed; border-radius: 10px; padding: 12px; margin-bottom: 10px; background: #fff; }
    .item.focus { border-color: #1a73e8; background: #f8f9ff; }
    .tag { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 6px; background: #e8f0fe; margin-right: 6px; margin-top: 4px; }
    .tag.vendor { background: #fef7e0; color: #b06000; }
    .tag.pay { background: #e6f4ea; }
    .tag.expense { background: #fce8e6; color: #c5221f; }
    .actions { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    #msg { color: #c5221f; font-size: 14px; margin: 8px 0; }
    #ok { color: #137333; font-size: 14px; margin: 8px 0; }
    .hidden { display: none; }
    .nav { margin-bottom: 12px; font-size: 14px; }
    .nav a { color: #1a73e8; text-decoration: none; }
    .headline { font-size: 17px; font-weight: 700; }
    .amount { font-size: 20px; font-weight: 700; margin: 4px 0; color: #1a73e8; }
    .need { color: #c5221f; font-size: 12px; font-weight: 600; }
    .review-panel { margin-top: 12px; padding-top: 12px; border-top: 1px dashed #ddd; }
    .bulk-bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .bulk-bar .sub { margin: 0; }
    .mono { font-family: ui-monospace, monospace; font-size: 12px; color: #666; word-break: break-all; }
    .bank-line { font-size: 13px; color: #444; margin-top: 6px; }
    .alloc-row { border: 1px solid #e0e0e0; border-radius: 10px; padding: 10px; margin-top: 8px; background: #fafafa; position: relative; }
    .alloc-row .alloc-rm { position: absolute; top: 8px; right: 8px; border: none; background: transparent; color: #c5221f; font-size: 12px; cursor: pointer; }
    .alloc-empty { color: #666; font-size: 14px; padding: 8px 0; }
    .btn-ghost { background: #fff; border: 1px dashed #1a73e8; color: #1a73e8; width: 100%; padding: 10px; margin-top: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 8px; }
    .total-line { font-size: 16px; font-weight: 700; margin-top: 10px; text-align: right; color: #1a73e8; }
  </style>
</head>
<body class="acct-page acct-page-form">
  <div id="loading">載入中…</div>
  <div id="app" class="hidden acct-main">
    <p class="nav"><a href="index.html">← 會計功能選單</a></p>
    <h2>請款審核</h2>
    <p class="sub" id="userLine">—</p>
    <p class="sub">只審「待付款申請」（未實現）。資料沒問題可<strong>快速核准</strong>；有疑慮請點<strong>審核</strong>看單據並改分攤（可多案）。</p>
    <div id="msg" role="alert"></div>
    <div id="ok" aria-live="polite"></div>

    <div class="card">
      <div class="row2">
        <div>
          <label>審核狀態</label>
          <select id="filterReview">
            <option value="">全部</option>
            <option value="待審" selected>待審</option>
            <option value="已審">已審</option>
            <option value="退回">退回</option>
          </select>
        </div>
        <div>
          <label>付款狀態</label>
          <select id="filterPay">
            <option value="">全部</option>
            <option value="未匯款">待匯款</option>
            <option value="已匯款">已匯款</option>
          </select>
        </div>
      </div>
      <label>關鍵字（對象／案號／品項）</label>
      <input id="filterKw" placeholder="例：磁磚、752" />
      <button type="button" class="btn btn-primary btn-block" id="reloadBtn">重新載入</button>
    </div>

    <div class="card">
      <div id="bulkBar" class="bulk-bar hidden">
        <p class="sub" id="bulkSummary">—</p>
        <button type="button" class="btn btn-ok" id="bulkApproveBtn">全部核准（資料完整）</button>
      </div>
      <h3 style="margin:0 0 8px">待審列表</h3>
      <div id="list"></div>
    </div>
  </div>
  <script>
    (function () {
      var session = null;
      var canApproveVendor = false;
      var listItems = [];
      var ui = AccountingUi.feedback();

      function setMsg(t) { ui.setMsg(t); }
      function setOk(t) { ui.setOk(t); }
      function listCacheKey() {
        return 'ledger_review:' + JSON.stringify(buildFilter());
      }
      function removeFromListCache(id) {
        if (typeof AccountingListCache === 'undefined') return;
        AccountingListCache.patch(session, listCacheKey(), function (data) {
          if (!data || !data.items) return;
          data.items = data.items.filter(function (it) {
            return it.payment_request_id !== id;
          });
        });
      }
      function itemQueueBusy(id) {
        return typeof AccountingActionQueue !== 'undefined' &&
          AccountingActionQueue.isPending('ledger_review', id);
      }
      function showApp() {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
      }
      function buildFilter() {
        var f = {};
        var rs = document.getElementById('filterReview').value;
        var ps = document.getElementById('filterPay').value;
        var kw = document.getElementById('filterKw').value.trim();
        f.review_status = rs;
        if (ps) f.payment_status = ps;
        if (kw) f.keyword = kw;
        return f;
      }
      function fmtMoney(n) {
        return (parseInt(n, 10) || 0).toLocaleString('zh-TW');
      }
      function isPaymentRequest(item) {
        return item.kind === 'vendor_payment' || item.kind === 'staff_payment';
      }
      function isPending(item) {
        return String(item.review_status || '') !== '已審' && String(item.review_status || '') !== '退回';
      }
      function itemReady(item) {
        var rows = allocRowsFromItem(item);
        if (!rows.length) return false;
        var sum = 0;
        for (var i = 0; i < rows.length; i++) {
          if (!String(rows[i].project_no || '').trim()) return false;
          var amt = parseInt(rows[i].amount, 10) || 0;
          if (amt <= 0) return false;
          sum += amt;
        }
        return sum > 0;
      }
      function allocRowsFromItem(item) {
        if (item.allocations && item.allocations.length) {
          return item.allocations.map(function (a) {
            return {
              project_no: a.project_no || '',
              amount: a.amount || '',
              item_desc: a.item_desc || ''
            };
          });
        }
        return [{
          project_no: item.project_no || '',
          amount: item.amount || '',
          item_desc: item.summary || ''
        }];
      }
      function defaultPatchForItem(item) {
        return { allocations: allocRowsFromItem(item) };
      }
      function readAllocRowsFromPanel(panel) {
        var rows = [];
        panel.querySelectorAll('.alloc-row').forEach(function (el) {
          rows.push({
            project_no: el.querySelector('.inp-pn').value.trim(),
            amount: el.querySelector('.inp-amt').value,
            item_desc: el.querySelector('.inp-desc').value.trim()
          });
        });
        return rows;
      }
      function validateAllocRows(rows) {
        if (!rows.length) return '請至少一列分攤（案號＋金額）';
        for (var i = 0; i < rows.length; i++) {
          if (!rows[i].project_no) return '第 ' + (i + 1) + ' 列請填案號';
          if (!(parseInt(rows[i].amount, 10) > 0)) return '第 ' + (i + 1) + ' 列請填金額';
        }
        return '';
      }
      function updatePanelTotal(panel) {
        var sum = readAllocRowsFromPanel(panel).reduce(function (s, r) {
          return s + (parseInt(r.amount, 10) || 0);
        }, 0);
        var el = panel.querySelector('.alloc-total');
        if (el) el.textContent = sum.toLocaleString('zh-TW');
      }
      function bindAllocPanelEvents(panel) {
        panel.querySelectorAll('.inp-amt, .inp-pn, .inp-desc').forEach(function (inp) {
          inp.oninput = function () { updatePanelTotal(panel); };
        });
        panel.querySelectorAll('.alloc-rm').forEach(function (btn) {
          btn.onclick = function () {
            var rows = readAllocRowsFromPanel(panel);
            var idx = parseInt(btn.getAttribute('data-rm'), 10);
            rows.splice(idx, 1);
            renderAllocRowsInPanel(panel, rows);
          };
        });
        var addBtn = panel.querySelector('.btn-add-alloc');
        if (addBtn) {
          addBtn.onclick = function () {
            var rows = readAllocRowsFromPanel(panel);
            rows.push({ project_no: '', amount: '', item_desc: '' });
            renderAllocRowsInPanel(panel, rows);
          };
        }
      }
      function renderAllocRowsInPanel(panel, rows) {
        var box = panel.querySelector('.alloc-list');
        box.innerHTML = '';
        if (!rows.length) {
          box.innerHTML = '<p class="alloc-empty">尚無分攤列，請新增。</p>';
          updatePanelTotal(panel);
          return;
        }
        rows.forEach(function (row, idx) {
          var el = document.createElement('div');
          el.className = 'alloc-row';
          el.setAttribute('data-idx', String(idx));
          el.innerHTML =
            '<button type="button" class="alloc-rm" data-rm="' + idx + '">刪除</button>' +
            '<div class="row2"><div><label>案號</label><input class="inp-pn" placeholder="752" /></div>' +
            '<div><label>金額</label><input class="inp-amt" type="number" inputmode="numeric" /></div></div>' +
            '<label>品項</label><input class="inp-desc" placeholder="摘要" />';
          el.querySelector('.inp-pn').value = row.project_no || '';
          el.querySelector('.inp-amt').value = row.amount || '';
          el.querySelector('.inp-desc').value = row.item_desc || '';
          box.appendChild(el);
        });
        bindAllocPanelEvents(panel);
        updatePanelTotal(panel);
      }
      function readPatchFromPanel(panel) {
        return { allocations: readAllocRowsFromPanel(panel) };
      }

      async function approveVendor(item, patch) {
        patch = patch || defaultPatchForItem(item);
        if (patch.allocations) {
          var err = validateAllocRows(patch.allocations);
          if (err) { setMsg((item.party_name || '請款') + '：' + err); return false; }
        }
        var data = await AccountingApi.vendorPaymentApprove(session, item.payment_request_id, patch);
        if (!data.success) {
          setMsg((item.party_name || '請款') + '：' + (data.message || '核准失敗'));
          return false;
        }
        return true;
      }

      async function rejectVendor(item, reason) {
        var data = await AccountingApi.vendorPaymentReject(session, item.payment_request_id, reason || '主管退回');
        if (!data.success) { setMsg(data.message || '退回失敗'); return false; }
        return true;
      }

      function typeTags(item) {
        var html = '';
        if (item.kind === 'staff_payment') {
          html += '<span class="tag expense">員工請款</span><span class="tag expense">未實現</span>';
        } else if (item.kind === 'vendor_payment') {
          html += '<span class="tag vendor">廠商' + (item.doc_type || '請款') + '</span><span class="tag expense">未實現</span>';
        }
        html += '<span class="tag pay">' + (item.review_status || '待審') + '</span>';
        var ps = String(item.payment_status || '未匯款');
        if (ps === '未匯款') ps = '待匯款';
        html += '<span class="tag pay">' + ps + '</span>';
        return html;
      }

      function renderReviewPanel(item) {
        var panel = document.createElement('div');
        panel.className = 'review-panel hidden';
        var ready = itemReady(item);
        panel.innerHTML =
          '<label>分攤明細（案號＋金額，可多案）' +
          (ready ? '' : ' <span class="need">需補齊</span>') + '</label>' +
          '<div class="alloc-list"></div>' +
          '<button type="button" class="btn-ghost btn-add-alloc">＋ 新增一列</button>' +
          '<div class="total-line">合計 $<span class="alloc-total">0</span></div>' +
          (item.bank_code || item.account_no
            ? '<p class="bank-line">匯款：' + (item.bank_code || '—') + ' / ' + (item.account_no || '—') +
              ' / ' + (item.account_name || item.party_name || '—') + '</p>'
            : '') +
          (item.note ? '<p class="sub">備註：' + item.note + '</p>' : '') +
          '<label>退回原因（選填）</label>' +
          '<input type="text" class="inp-reject" placeholder="退回時填寫" />' +
          '<div class="actions" style="margin-top:12px">' +
          '<button type="button" class="btn btn-ok btn-confirm-approve">確認核准</button>' +
          '<button type="button" class="btn btn-warn btn-confirm-reject">退回</button>' +
          '</div>';
        renderAllocRowsInPanel(panel, allocRowsFromItem(item));

        panel.querySelector('.btn-confirm-approve').addEventListener('click', async function () {
          if (!canApproveVendor || itemQueueBusy(item.payment_request_id)) return;
          var btn = panel.querySelector('.btn-confirm-approve');
          await AccountingUi.runAsync(btn, {
            busyLabel: '核准中…',
            queue: true,
            queueId: 'ledger_review',
            itemId: item.payment_request_id
          }, async function () {
            ui.clear();
            var patch = readPatchFromPanel(panel);
            var err = validateAllocRows(patch.allocations);
            if (err) { setMsg(err); return; }
            var ok = await approveVendor(item, patch);
            if (ok) {
              setOk('已核准「' + (item.party_name || '') + '」，進入待匯款');
              removeFromListCache(item.payment_request_id);
              await loadList(true);
            }
          });
        });
        panel.querySelector('.btn-confirm-reject').addEventListener('click', async function () {
          if (!canApproveVendor || itemQueueBusy(item.payment_request_id)) return;
          var btn = panel.querySelector('.btn-confirm-reject');
          await AccountingUi.runAsync(btn, {
            busyLabel: '退回中…',
            queue: true,
            queueId: 'ledger_review',
            itemId: item.payment_request_id
          }, async function () {
            ui.clear();
            var reason = panel.querySelector('.inp-reject').value.trim() || '主管退回';
            var ok = await rejectVendor(item, reason);
            if (ok) {
              setOk('已退回「' + (item.party_name || '') + '」');
              removeFromListCache(item.payment_request_id);
              await loadList(true);
            }
          });
        });
        return panel;
      }

      function renderItem(item) {
        var div = document.createElement('div');
        div.className = 'item';
        var isRequest = isPaymentRequest(item);
        var pending = isPending(item);
        var ready = itemReady(item);

        div.innerHTML =
          '<div class="headline">' + (item.party_name || '—') + '</div>' +
          '<div class="amount">$' + fmtMoney(item.amount) + '</div>' +
          '<div class="sub">案號 ' + (item.project_no || '—') + ' · ' + (item.txn_date || '—') + '</div>' +
          '<div class="sub">' + (item.summary || '') + '</div>' +
          (item.has_allocations && item.allocations && item.allocations.length
            ? '<div class="sub">分攤：' + item.allocations.map(function (a) {
              return '#' + (a.project_no || '—') + ' $' + fmtMoney(a.amount) +
                (a.item_desc ? ' ' + a.item_desc : '');
            }).join('；') + '</div>'
            : '') +
          '<div class="mono">' + (item.payment_request_id ? item.payment_request_id.slice(0, 8) + '…' : '') + '</div>' +
          '<div>' + typeTags(item) + '</div>';

        var actions = document.createElement('div');
        actions.className = 'actions';
        var reviewPanel = renderReviewPanel(item);

        if (pending && isRequest && canApproveVendor) {
          var btnQuick = document.createElement('button');
          btnQuick.type = 'button';
          btnQuick.className = 'btn btn-ok';
          btnQuick.textContent = ready ? '快速核准' : '快速核准（需補資料）';
          btnQuick.disabled = !ready;
          btnQuick.title = ready ? '分攤已齊，直接進待匯款' : '請先點「審核」補分攤列';
          btnQuick.addEventListener('click', async function () {
            if (!ready || itemQueueBusy(item.payment_request_id)) return;
            await AccountingUi.runAsync(btnQuick, {
              busyLabel: '核准中…',
              queue: true,
              queueId: 'ledger_review',
              itemId: item.payment_request_id
            }, async function () {
              ui.clear();
              var ok = await approveVendor(item);
              if (ok) {
                setOk('已核准「' + (item.party_name || '') + '」，進入待匯款');
                removeFromListCache(item.payment_request_id);
                await loadList(true);
              }
            });
          });
          actions.appendChild(btnQuick);

          var btnReview = document.createElement('button');
          btnReview.type = 'button';
          btnReview.className = 'btn btn-primary';
          btnReview.textContent = '審核';
          btnReview.addEventListener('click', async function () {
            var open = reviewPanel.classList.toggle('hidden');
            btnReview.textContent = open ? '審核' : '收合';
            div.classList.toggle('focus', !open);
            if (!open) {
              var urls = item.attachment_urls && item.attachment_urls.length
                ? item.attachment_urls
                : await AccountingLightbox.fetchAttachmentUrls(session, item);
              if (urls.length) AccountingLightbox.open(urls);
            }
          });
          actions.appendChild(btnReview);

          var btnReject = document.createElement('button');
          btnReject.type = 'button';
          btnReject.className = 'btn btn-warn';
          btnReject.textContent = '退回';
          btnReject.addEventListener('click', async function () {
            if (itemQueueBusy(item.payment_request_id)) return;
            var reason = prompt('退回原因（選填）', '主管退回') || '主管退回';
            await AccountingUi.runAsync(btnReject, {
              busyLabel: '退回中…',
              queue: true,
              queueId: 'ledger_review',
              itemId: item.payment_request_id
            }, async function () {
              ui.clear();
              var ok = await rejectVendor(item, reason);
              if (ok) {
                setOk('已退回「' + (item.party_name || '') + '」');
                removeFromListCache(item.payment_request_id);
                await loadList(true);
              }
            });
          });
          actions.appendChild(btnReject);
        } else if (pending && isRequest && !canApproveVendor) {
          var hint = document.createElement('span');
          hint.className = 'sub';
          hint.textContent = '（核准需權限 ≥ 5）';
          actions.appendChild(hint);
        }

        if (item.has_attachments || (item.attachment_urls && item.attachment_urls.length)) {
          actions.appendChild(AccountingLightbox.makeButton(session, item, '看請款單'));
        } else if (pending && isRequest) {
          var btnAtt = document.createElement('button');
          btnAtt.type = 'button';
          btnAtt.className = 'btn btn-muted';
          btnAtt.textContent = '查附件';
          btnAtt.addEventListener('click', async function () {
            await AccountingUi.runAsync(btnAtt, { busyLabel: '查詢中…', clear: false }, async function () {
              var urls = await AccountingLightbox.fetchAttachmentUrls(session, item);
              if (!urls.length) { setMsg('這筆沒有上傳單據'); return; }
              AccountingLightbox.open(urls);
            });
          });
          actions.appendChild(btnAtt);
        }

        div.appendChild(actions);
        div.appendChild(reviewPanel);
        return div;
      }

      function updateBulkBar() {
        var bar = document.getElementById('bulkBar');
        var btn = document.getElementById('bulkApproveBtn');
        var pending = listItems.filter(function (it) {
          return isPaymentRequest(it) && isPending(it);
        });
        var ready = pending.filter(itemReady);
        if (!canApproveVendor || !pending.length) {
          bar.classList.add('hidden');
          return;
        }
        bar.classList.remove('hidden');
        document.getElementById('bulkSummary').textContent =
          '待審 ' + pending.length + ' 筆 · 可一次核准 ' + ready.length + ' 筆（分攤已齊）';
        btn.disabled = !ready.length ||
          (typeof AccountingActionQueue !== 'undefined' && AccountingActionQueue.isPending('ledger_review', 'bulk'));
      }

      async function bulkApprove() {
        var pending = listItems.filter(function (it) {
          return isPaymentRequest(it) && isPending(it) && itemReady(it);
        });
        if (!pending.length) { setMsg('沒有可一次核准的項目（需有完整分攤）'); return; }
        var skip = listItems.filter(function (it) {
          return isPaymentRequest(it) && isPending(it) && !itemReady(it);
        }).length;
        var msg = '將核准 ' + pending.length + ' 筆，進入待匯款。';
        if (skip) msg += '\n另有 ' + skip + ' 筆分攤不完整，請個別審核。';
        if (!confirm(msg + '\n\n確定？')) return;

        setMsg('');
        setOk('');
        updateBulkBar();
        var bulkBtn = document.getElementById('bulkApproveBtn');
        await AccountingUi.runAsync(bulkBtn, {
          busyLabel: '批次核准中…',
          queue: true,
          queueId: 'ledger_review',
          itemId: 'bulk'
        }, async function () {
          var okCount = 0;
          var fail = 0;
          for (var i = 0; i < pending.length; i++) {
            AccountingUi.warn('核准中… ' + (i + 1) + ' / ' + pending.length, 0);
            var ok = await approveVendor(pending[i]);
            if (ok) {
              okCount++;
              removeFromListCache(pending[i].payment_request_id);
            } else fail++;
          }
          if (fail) setMsg('完成：成功 ' + okCount + ' 筆，失敗 ' + fail + ' 筆');
          else setOk('已全部核准 ' + okCount + ' 筆，進入待匯款');
          await loadList(true);
        });
        updateBulkBar();
      }

      async function loadList(silent, force) {
        var run = async function () {
          if (!silent) ui.clear();
          var data;
          if (typeof AccountingListCache !== 'undefined') {
            data = await AccountingListCache.load(session, listCacheKey(), function () {
              return AccountingApi.ledgerReviewBundle(session, buildFilter());
            }, { force: !!force });
          } else {
            data = await AccountingApi.ledgerReviewBundle(session, buildFilter());
          }
          var box = document.getElementById('list');
          box.innerHTML = '';
          if (!data.success) { setMsg(data.message); listItems = []; updateBulkBar(); return; }
          canApproveVendor = !!data.can_approve_vendor;
          listItems = data.items || [];
          listItems.forEach(function (row) { box.appendChild(renderItem(row)); });
          if (!listItems.length) box.innerHTML = '<p class="sub">沒有符合的紀錄</p>';
          updateBulkBar();
        };
        if (silent) return run();
        var reloadBtn = document.getElementById('reloadBtn');
        return AccountingUi.runAsync(reloadBtn, { busyLabel: '載入中…', clear: false }, run);
      }

      document.getElementById('reloadBtn').addEventListener('click', function () { loadList(false, true); });
      document.getElementById('bulkApproveBtn').addEventListener('click', bulkApprove);

      (async function boot() {
        await AccountingBoot.run({
          onReady: async function (sess) {
            session = sess;
            await loadList();
          }
        });
      })();
    })();
  </script>
</body>
</html>
