<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>款項進度</title>
  <link rel="stylesheet" href="../../shared/css/accounting_layout.css?v=5" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="../../shared/js/operator_context.js?v=1"></script>
  <script src="../../shared/js/accounting_api.js?v=37"></script>
  <script src="../../shared/js/hub_ref_cache.js?v=1"></script>
  <script src="../../shared/js/accounting_list_cache.js?v=3"></script>
  <script src="../../shared/js/accounting_ui.js?v=11"></script>
  <script src="../../shared/js/accounting_nav.js?v=2"></script>
  <script src="../../shared/js/accounting_boot.js?v=4"></script>
  <style>
    h2 { margin: 0 0 8px; }
    h3 { margin: 16px 0 8px; font-size: 15px; color: #333; }
    .sub { color: #555; font-size: 14px; }
    .card { background: #fff; border-radius: 12px; padding: 14px; margin: 12px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .item { border-bottom: 1px solid #eee; padding: 12px 0; }
    .item:last-child { border-bottom: none; }
    .tag { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 6px; background: #e8f0fe; margin-right: 6px; margin-top: 4px; }
    .tag.warn { background: #fef7e0; color: #b06000; }
    .tag.ok { background: #e6f4ea; color: #137333; }
    .tag.bad { background: #fce8e6; color: #c5221f; }
    .photos a { display: inline-block; font-size: 13px; margin-right: 8px; color: #1a73e8; }
    #msg { color: #c5221f; font-size: 14px; }
    .hidden { display: none; }
    .nav { margin-bottom: 12px; font-size: 14px; }
    .nav a { color: #1a73e8; text-decoration: none; }
    .empty { color: #888; font-size: 14px; padding: 8px 0; }
    .btn { padding: 10px 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-block { width: 100%; margin: 10px 0; padding: 12px; }
  </style>
</head>
<body class="acct-page acct-page-form">
  <div id="loading">載入中…</div>
  <div id="app" class="hidden acct-main">
    <p class="nav"><a href="index.html">← 會計功能選單</a></p>
    <h2>款項進度</h2>
    <p class="sub" id="userLine">—</p>
    <div id="msg"></div>
    <button type="button" class="btn btn-primary btn-block" id="reloadBtn">重新整理</button>
    <div id="list"></div>
  </div>
  <script>
    (function () {
      var session = null;
      var STAGE_ORDER = ['請款待審', '待匯款', '已匯款', '已退回', '收支紀錄'];
      var STAGE_LABEL = {
        '請款待審': '待審核',
        '待匯款': '待匯款',
        '已匯款': '已匯款',
        '已退回': '已退回',
        '收支紀錄': '其他收支'
      };

      function setMsg(t) { if (t) AccountingUi.notify('err', t); }
      function showApp() {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
      }
      function tagClass(stage) {
        if (stage === '請款待審' || stage === '待匯款') return 'tag warn';
        if (stage === '已匯款') return 'tag ok';
        if (stage === '已退回') return 'tag bad';
        return 'tag';
      }
      function renderPhotos(urls) {
        if (!urls || !urls.length) return '';
        var html = '<div class="photos">';
        urls.forEach(function (u, i) {
          html += '<a href="' + u + '" target="_blank" rel="noopener">附件' + (i + 1) + '</a>';
        });
        return html + '</div>';
      }
      function renderItem(it) {
        var amt = Number(it.amount || 0).toLocaleString();
        var meta = (it.txn_date || '') +
          (it.project_no ? ' · 案號 ' + it.project_no : '') +
          (it.store ? ' · ' + it.store : '') +
          ' · $' + amt;
        var tags = '<span class="' + tagClass(it.stage) + '">' + (STAGE_LABEL[it.stage] || it.stage) + '</span>';
        if (it.review_status && it.stage !== '收支紀錄') {
          tags += '<span class="tag">' + it.review_status + '</span>';
        }
        if (it.payment_status && it.stage !== '收支紀錄') {
          tags += '<span class="tag">' + it.payment_status + '</span>';
        }
        var reject = it.reject_reason
          ? '<div class="sub" style="color:#c5221f">' + it.reject_reason + '</div>'
          : '';
        return '<div class="item">' +
          '<div><strong>' + (it.summary || '—') + '</strong></div>' +
          '<div class="sub">' + meta + '</div>' +
          '<div>' + tags + '</div>' +
          reject +
          renderPhotos(it.attachment_urls) +
          '</div>';
      }
      function renderItems(data) {
        var box = document.getElementById('list');
        box.innerHTML = '';
        if (!data.success) {
          box.innerHTML = '<div class="card">' + (data.message || '查詢失敗') + '</div>';
          return;
        }
        if (data.vendor && data.vendor.name) {
          var head = document.createElement('p');
          head.className = 'sub';
          head.textContent = '廠商：' + data.vendor.name;
          box.appendChild(head);
        }
        var items = data.items || [];
        if (!items.length) {
          box.innerHTML += '<div class="card empty">目前沒有符合的款項紀錄</div>';
          return;
        }
        var groups = {};
        items.forEach(function (it) {
          var st = it.stage || '收支紀錄';
          if (!groups[st]) groups[st] = [];
          groups[st].push(it);
        });
        STAGE_ORDER.forEach(function (stage) {
          var list = groups[stage];
          if (!list || !list.length) return;
          var card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = '<h3>' + (STAGE_LABEL[stage] || stage) + '（' + list.length + '）</h3>';
          list.forEach(function (it) {
            card.innerHTML += renderItem(it);
          });
          box.appendChild(card);
        });
      }
      async function loadList(force) {
        var data;
        if (typeof AccountingListCache !== 'undefined') {
          data = await AccountingListCache.load(session, 'vendor_status', function () {
            return AccountingApi.vendorPaymentStatus(session);
          }, { force: !!force });
        } else {
          data = await AccountingApi.vendorPaymentStatus(session);
        }
        renderItems(data);
      }
      document.getElementById('reloadBtn').addEventListener('click', function () {
        var btn = document.getElementById('reloadBtn');
        AccountingUi.runAsync(btn, { busyLabel: '載入中…', clear: false }, function () {
          return loadList(true);
        }).catch(function (e) {
          setMsg(e.message || String(e));
        });
      });
      (async function boot() {
        await AccountingBoot.run({
          minPermission: 0,
          deniedMsg: '需已登記廠商或財務權限（≥4）',
          initSession: async function () {
            var s = await AccountingApi.initPaymentRequestSession();
            if (!s) return null;
            var isVendor = String(s.auth.status || '') === '廠商';
            var isStaff = (s.auth.permission || 0) >= AccountingApi.MIN_PERMISSION;
            if (!isVendor && !isStaff) {
              throw new Error('需已登記廠商或財務權限（≥4）');
            }
            return s;
          },
          onReady: async function (sess) {
            session = sess;
            var isVendor = String(sess.auth.status || '') === '廠商';
            var isStaff = (sess.auth.permission || 0) >= AccountingApi.MIN_PERMISSION;
            if (!isVendor && !isStaff) {
              AccountingBoot.setLoading('需已登記廠商或財務權限（≥4）');
              return;
            }
            try {
              await loadList(false);
            } catch (e) {
              setMsg(e.message || String(e));
            }
          }
        });
      })();
    })();
  </script>
</body>
</html>
