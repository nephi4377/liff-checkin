<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>薪資審核</title>
  <link rel="stylesheet" href="../../shared/css/accounting_layout.css?v=5" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="../../shared/js/operator_context.js?v=1"></script>
  <script src="../../shared/js/accounting_api.js?v=42"></script>
  <script src="../../shared/js/hub_ref_cache.js?v=2"></script>
  <script src="../../shared/js/accounting_list_cache.js?v=5"></script>
  <script src="../../shared/js/accounting_action_queue.js?v=1"></script>
  <script src="../../shared/js/accounting_ui.js?v=16"></script>
  <script src="../../shared/js/accounting_nav.js?v=2"></script>
  <script src="../../shared/js/accounting_boot.js?v=6"></script>
  <style>
    h2 { margin: 0 0 8px; }
    .sub { color: #555; font-size: 14px; line-height: 1.45; }
    .card { background: #fff; border-radius: 12px; padding: 14px; margin: 12px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    label { display: block; margin-top: 8px; font-weight: 600; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { padding: 10px 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-ok { background: #34a853; color: #fff; }
    .btn-warn { background: #ea4335; color: #fff; }
    .btn-block { width: 100%; margin-top: 10px; padding: 12px; }
    .item { border: 1px solid #e8eaed; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .tag { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 6px; background: #e8f0fe; margin-right: 6px; }
    .tag.warn { background: #fce8e6; color: #c5221f; }
    .amount { font-size: 20px; font-weight: 700; color: #1a73e8; margin: 4px 0; }
    .bank { font-size: 13px; color: #444; margin-top: 6px; }
    .review-panel { margin-top: 12px; padding-top: 12px; border-top: 1px dashed #ddd; }
    #msg { color: #c5221f; font-size: 14px; margin: 8px 0; }
    #ok { color: #137333; font-size: 14px; margin: 8px 0; }
    .hidden { display: none; }
    .nav { margin-bottom: 12px; font-size: 14px; }
    .nav a { color: #1a73e8; text-decoration: none; }
  </style>
</head>
<body class="acct-page acct-page-form">
  <div id="loading">載入中…</div>
  <div id="app" class="hidden acct-main">
    <p class="nav"><a href="index.html">← 會計功能選單</a></p>
    <h2>薪資審核</h2>
    <p class="sub" id="userLine">—</p>
    <p class="sub">員工自審或主管代開審後會出現在這裡。核准後由財務在「薪資待匯款」決定薪轉與額外發放金額。</p>
    <div id="msg" role="alert"></div>
    <div id="ok" aria-live="polite"></div>

    <div class="card">
      <div class="row2">
        <div>
          <label>審核狀態</label>
          <select id="filterReview">
            <option value="pending_review" selected>待審</option>
            <option value="approved">已審（待匯款）</option>
            <option value="rejected">已退回</option>
            <option value="">全部</option>
          </select>
        </div>
        <div>
          <label>姓名／期別</label>
          <input id="filterKw" placeholder="例：張三、115/05" />
        </div>
      </div>
      <button type="button" class="btn btn-primary btn-block" id="reloadBtn" title="略過暫存，立刻向後端重抓最新清單">重新載入最新</button>
    </div>

    <div class="card">
      <h3 style="margin:0 0 8px">待審列表</h3>
      <div id="list"></div>
      <p id="emptyMsg" class="sub hidden">目前沒有待審薪資。</p>
    </div>
  </div>
  <script>
    (function () {
      var session = null;
      var ui = AccountingUi.feedback();
      function setMsg(t) { ui.setMsg(t); }
      function setOk(t) { ui.setOk(t); }
      function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

      function bankLine(row) {
        if (row.bank_incomplete) return '<span class="tag warn">銀行帳戶不完整，請至員工資料維護</span>';
        var ac = String(row.account_no || '');
        var tail = ac.length > 4 ? ac.slice(-4) : ac;
        return '銀行 ' + esc(row.bank_code) + ' · 帳號末四碼 ' + esc(tail) + ' · ' + esc(row.account_name);
      }

      function lineItemsHtml(rows, sign) {
        if (!rows || !rows.length) return '<p class="sub">—</p>';
        return '<ul style="margin:4px 0;padding-left:18px;font-size:13px">' + rows.map(function (row) {
          var amt = parseInt(row.amount, 10) || 0;
          var note = row.note ? ' <span style="color:#777">（' + esc(row.note) + '）</span>' : '';
          var amtText = amt > 0 ? (sign + amt.toLocaleString('zh-TW')) : '—';
          return '<li style="margin:2px 0"><span>' + esc(row.label) + note + '</span> <strong>' + amtText + '</strong></li>';
        }).join('') + '</ul>';
      }

      function isEditableDeductionLabel(label) {
        var s = String(label || '');
        if (!s) return false;
        if (s.indexOf('其他扣款') >= 0) return false;
        return true;
      }

      function editableDeductionsHtml(deductions, prId) {
        if (!deductions || !deductions.length) return '<p class="sub">—</p>';
        return '<ul style="margin:4px 0;padding-left:0;list-style:none;font-size:13px">' + deductions.map(function (row, idx) {
          var amt = parseInt(row.amount, 10) || 0;
          var note = row.note ? '<span style="color:#777;display:block;font-size:12px">' + esc(row.note) + '</span>' : '';
          if (!isEditableDeductionLabel(row.label)) {
            var amtText = amt > 0 ? '−' + amt.toLocaleString('zh-TW') : '—';
            return '<li style="margin:4px 0;padding:6px 0;border-bottom:1px solid #f0f0f0"><span>' + esc(row.label) + '</span> <strong style="float:right">' + amtText + '</strong>' + note + '</li>';
          }
          return '<li style="margin:4px 0;padding:6px 0;border-bottom:1px solid #f0f0f0">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px">' +
            '<span>' + esc(row.label) + '</span>' +
            '<span style="display:flex;align-items:center;gap:4px;white-space:nowrap">−' +
            '<input type="number" class="ded-line-input" min="0" step="1" ' +
            'data-pr="' + prId + '" data-idx="' + idx + '" data-orig="' + amt + '" data-label="' + esc(row.label) + '" ' +
            'value="' + amt + '" style="width:96px;padding:6px;border:1px solid #ccc;border-radius:6px;font-size:14px" />' +
            '</span></div>' + note + '</li>';
        }).join('') + '</ul>' +
          '<p class="sub" style="margin:4px 0 0;color:#666">減項有異議可直接改金額；實發會自動重算。請在審核備註寫原因。</p>';
      }

      function recalcFinalAmount(prId) {
        var root = document.getElementById('pr-' + prId);
        if (!root) return;
        var est = parseInt(root.getAttribute('data-est'), 10) || 0;
        var bonusEl = document.getElementById('bonus-' + prId);
        var dedEl = document.getElementById('ded-' + prId);
        var finalEl = document.getElementById('est-display-' + prId);
        if (!finalEl) return;
        var bonus = Number(bonusEl && bonusEl.value) || 0;
        var otherDed = Number(dedEl && dedEl.value) || 0;
        var delta = 0;
        root.querySelectorAll('.ded-line-input').forEach(function (inp) {
          var orig = parseInt(inp.getAttribute('data-orig'), 10) || 0;
          var now = Math.max(0, parseInt(inp.value, 10) || 0);
          delta += (orig - now);
        });
        finalEl.textContent = Math.max(0, est + delta + bonus - otherDed).toLocaleString('zh-TW');
      }

      function collectDeductionOverrides(prId) {
        var root = document.getElementById('pr-' + prId);
        if (!root) return [];
        var out = [];
        root.querySelectorAll('.ded-line-input').forEach(function (inp) {
          var orig = parseInt(inp.getAttribute('data-orig'), 10) || 0;
          var now = Math.max(0, parseInt(inp.value, 10) || 0);
          if (now === orig) return;
          out.push({
            label: inp.getAttribute('data-label') || '',
            original_amount: orig,
            amount: now,
            idx: parseInt(inp.getAttribute('data-idx'), 10)
          });
        });
        return out;
      }

      function projectRewardHtml(row) {
        var items = row.project_rewards || row.margin_bonus_drafts || [];
        if (!items.length) return '';
        var total = parseInt(row.project_reward_total, 10) || items.reduce(function (s, d) {
          return s + (parseInt(d.amount, 10) || 0);
        }, 0);
        var lis = items.map(function (d) {
          var start = d.start_date || '—';
          var close = d.close_date || '—';
          var note = d.note ? '（' + esc(d.note) + '）' : '';
          return '<li>案號 ' + esc(d.project_no) + '：' + (parseInt(d.amount,10)||0).toLocaleString('zh-TW') +
            ' 元 · 施工 ' + esc(start) + '～結案 ' + esc(close) + note + '</li>';
        }).join('');
        return '<div style="margin-top:8px;padding:8px;background:#fff8e8;border-radius:8px;border:1px solid #f0e0b8">' +
          '<p class="sub" style="margin:0 0 4px;font-weight:600;color:#8a5a00">專案報酬（合計 ' + total.toLocaleString('zh-TW') + ' 元，不併入本月薪資）</p>' +
          '<ul style="margin:0;padding-left:18px;font-size:13px">' + lis + '</ul></div>';
      }

      function renderItem(row) {
        var div = document.createElement('div');
        div.className = 'item';
        div.id = 'pr-' + row.payroll_request_id;
        var est = parseInt(row.estimated_net, 10) || 0;
        div.setAttribute('data-est', String(est));
        var ot = Number(row.overtime_hours) || 0;
        var remote = parseInt(row.remote_allowance, 10) || 0;
        var pb = row.payroll_breakdown || {};
        var additions = pb.additions || [];
        var deductions = pb.deductions || [];
        var selfTag = row.employee_self_reviewed === false
          ? '<span class="tag warn">主管代開</span>'
          : '<span class="tag">員工自審</span>';
        var breakdownBlock = '';
        if (additions.length || deductions.length) {
          breakdownBlock =
            '<div class="row2" style="margin-top:8px">' +
            '<div><p class="sub" style="font-weight:600;color:#137333;margin:0">加項</p>' + lineItemsHtml(additions, '+') + '</div>' +
            '<div><p class="sub" style="font-weight:600;color:#c5221f;margin:0">減項（可改）</p>' + editableDeductionsHtml(deductions, row.payroll_request_id) + '</div>' +
            '</div>';
        }
        div.innerHTML =
          '<div><strong>' + esc(row.employee_name) + '</strong> <span class="tag">' + esc(row.period_label) + '</span> ' + selfTag + '</div>' +
          '<p class="amount">試算實發 <span id="est-display-' + row.payroll_request_id + '">' + est.toLocaleString('zh-TW') + '</span> 元</p>' +
          '<p class="sub">期間 ' + esc(row.period_start) + '～' + esc(row.period_end) + ' · 發薪日 ' + esc(row.pay_date) + '</p>' +
          (ot > 0 ? '<p class="sub">加班 ' + ot + ' 小時</p>' : '') +
          (remote > 0 ? '<p class="sub">遠程津貼 ' + remote.toLocaleString('zh-TW') + ' 元</p>' : '') +
          (row.supplement_note ? '<p class="sub">補充／減項備註：' + esc(row.supplement_note) + '</p>' : '') +
          breakdownBlock +
          projectRewardHtml(row) +
          '<div class="bank">' + bankLine(row) + '</div>' +
          '<div class="review-panel">' +
          '<div class="row2">' +
          '<div><label>一般獎金（元）</label><input type="number" id="bonus-' + row.payroll_request_id + '" class="recalc-final" min="0" step="1" value="0" /></div>' +
          '<div><label>其他扣款（元）</label><input type="number" id="ded-' + row.payroll_request_id + '" class="recalc-final" min="0" step="1" value="' + (parseInt(row.deduction,10)||0) + '" /></div>' +
          '</div>' +
          '<label>獎金／備註說明</label><input type="text" id="bnote-' + row.payroll_request_id + '" placeholder="例：介紹獎金、年終（勿填專案報酬）" value="" />' +
          '<label>審核備註</label><input type="text" id="note-' + row.payroll_request_id + '" placeholder="減項有改請寫原因" value="' + esc(row.supplement_note || '') + '" />' +
          '<p class="sub" style="margin-top:8px">薪轉／額外金額請至「薪資待匯款」調整。</p>' +
          '<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">' +
          '<button type="button" class="btn btn-ok" data-approve="' + row.payroll_request_id + '">核准</button>' +
          '<button type="button" class="btn btn-warn" data-reject="' + row.payroll_request_id + '">退回</button>' +
          '</div></div>';
        return div;
      }

      function renderReadOnlyItem(row) {
        var div = document.createElement('div');
        div.className = 'item';
        var amount = parseInt(row.final_amount, 10) || parseInt(row.estimated_net, 10) || 0;
        div.innerHTML =
          '<div><strong>' + esc(row.employee_name) + '</strong> <span class="tag">' + esc(row.period_label) + '</span> ' +
          '<span class="tag">' + esc(row.review_status) + '</span></div>' +
          '<p class="amount">$' + amount.toLocaleString('zh-TW') + '</p>' +
          (row.reject_reason ? '<p class="sub">退回原因：' + esc(row.reject_reason) + '</p>' : '') +
          (row.bonus_note ? '<p class="sub">備註：' + esc(row.bonus_note) + '</p>' : '');
        return div;
      }

      function listCacheKey() {
        return 'payroll_review:' + (document.getElementById('filterReview').value || 'pending_review') + ':' +
          document.getElementById('filterKw').value.trim();
      }

      function renderListFromData(data) {
        var list = document.getElementById('list');
        list.innerHTML = '';
        if (!data.success) throw new Error(data.message || '載入失敗');
        var filterVal = document.getElementById('filterReview').value || 'pending_review';
        var items = data.items || [];
        document.getElementById('emptyMsg').classList.toggle('hidden', items.length > 0);
        items.forEach(function (row) {
          if (filterVal === 'pending_review' && String(row.review_status) === '待審') {
            list.appendChild(renderItem(row));
          } else if (filterVal !== 'pending_review') {
            list.appendChild(renderReadOnlyItem(row));
          }
        });
        if (!list.children.length) document.getElementById('emptyMsg').classList.remove('hidden');
      }

      async function loadList(force) {
        setMsg(''); setOk('');
        var list = document.getElementById('list');
        list.innerHTML = '<p class="sub">載入中…</p>';
        try {
          var filterVal = document.getElementById('filterReview').value || 'pending_review';
          var data;
          if (typeof AccountingListCache !== 'undefined') {
            data = await AccountingListCache.load(session, listCacheKey(), function () {
              return AccountingApi.payrollRequestList(session, {
                status: filterVal,
                keyword: document.getElementById('filterKw').value.trim()
              });
            }, {
              force: !!force,
              onUpdate: force ? null : function (fresh) {
                try { renderListFromData(fresh); } catch (e) {}
              }
            });
          } else {
            data = await AccountingApi.payrollRequestList(session, {
              status: filterVal,
              keyword: document.getElementById('filterKw').value.trim()
            });
          }
          renderListFromData(data);
        } catch (e) {
          list.innerHTML = '';
          setMsg(e.message || String(e));
        }
      }

      document.getElementById('list').addEventListener('input', function (e) {
        var t = e.target;
        if (!t) return;
        var prId = null;
        if (t.classList && t.classList.contains('ded-line-input')) {
          prId = t.getAttribute('data-pr');
        } else if (t.classList && t.classList.contains('recalc-final')) {
          var m = (t.id || '').match(/^(?:bonus|ded)-(.+)$/);
          prId = m && m[1];
        }
        if (prId) recalcFinalAmount(prId);
      });

      document.getElementById('list').addEventListener('click', async function (e) {
        var approveId = e.target.getAttribute('data-approve');
        var rejectId = e.target.getAttribute('data-reject');
        if (!approveId && !rejectId) return;
        var id = approveId || rejectId;
        if (typeof AccountingActionQueue !== 'undefined' &&
            AccountingActionQueue.isPending('payroll_review', id)) return;
        var btn = e.target;
        await AccountingUi.runAsync(btn, {
          busyLabel: approveId ? '核准中…' : '退回中…',
          queue: true,
          queueId: 'payroll_review',
          itemId: id
        }, async function () {
          if (rejectId) {
            var reason = document.getElementById('note-' + id).value.trim();
            if (!reason) { setMsg('退回時請填寫審核備註'); throw new Error('退回時請填寫審核備註'); }
            var rj = await AccountingApi.payrollRequestReject(session, {
              payroll_request_id: id, reject_reason: reason
            });
            if (!rj.success) throw new Error(rj.message);
            setOk(rj.message || '已退回');
          } else {
            var overrides = collectDeductionOverrides(id);
            var noteVal = document.getElementById('note-' + id).value.trim();
            if (overrides.length && !noteVal) {
              setMsg('有調整減項時請在審核備註寫原因');
              throw new Error('有調整減項時請在審核備註寫原因');
            }
            if (overrides.length) {
              var adjLines = overrides.map(function (o) {
                return o.label + ' ' + o.original_amount + '→' + o.amount;
              }).join('；');
              if (noteVal.indexOf('減項調整') < 0) {
                noteVal = (noteVal ? noteVal + '；' : '') + '減項調整：' + adjLines;
              }
            }
            var ap = await AccountingApi.payrollRequestApprove(session, {
              payroll_request_id: id,
              bonus_amount: Number(document.getElementById('bonus-' + id).value) || 0,
              deduction: Number(document.getElementById('ded-' + id).value) || 0,
              bonus_note: document.getElementById('bnote-' + id).value.trim(),
              note: noteVal,
              deduction_overrides: overrides
            });
            if (!ap.success) throw new Error(ap.message);
            setOk(ap.message || '已核准，會計可至薪資待匯款匯出');
          }
          if (typeof AccountingListCache !== 'undefined') {
            AccountingListCache.patch(session, listCacheKey(), function (data) {
              if (!data || !data.items) return;
              data.items = data.items.filter(function (row) {
                return row.payroll_request_id !== id;
              });
            });
          }
          document.getElementById('pr-' + id)?.remove();
          if (!document.getElementById('list').children.length) {
            document.getElementById('emptyMsg').classList.remove('hidden');
          }
        }).catch(function (err) {
          if (err && err.message && err.message !== '此項目已在處理中') setMsg(err.message);
        });
      });

      document.getElementById('reloadBtn').addEventListener('click', function () { loadList(true); });

      AccountingBoot.run({
        minPermission: 5,
        deniedMsg: '此頁需主管權限（≥5）',
        onReady: async function (s) {
          session = s;
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('app').classList.remove('hidden');
          document.getElementById('userLine').textContent = (s.profile && s.profile.displayName) || '—';
          await loadList();
        }
      });
    })();
  </script>
</body>
</html>
