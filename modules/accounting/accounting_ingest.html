<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>收支登錄已停用</title>
  <link rel="stylesheet" href="../../shared/css/accounting_layout.css?v=5" />
  <style>
    .box { max-width: 520px; margin: 48px auto; padding: 24px; background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    h2 { margin: 0 0 8px; }
    p { color: #444; line-height: 1.5; }
    a.btn { display: inline-block; margin-top: 12px; margin-right: 8px; padding: 10px 14px; background: #1a73e8; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; }
    a.btn.secondary { background: #5f6368; }
  </style>
</head>
<body class="acct-page">
  <div class="box">
    <h2>獨立「收支登錄」頁已停用</h2>
    <p>此頁與會計 HUB 流程不同步（收入會略過待審／客戶確認），已改由<strong>會計功能選單</strong>統一入口。</p>
    <p>尚未付款請用「待付款申請」；案件收入／收款請走會計選單內的案件毛利與收款流程。</p>
    <a class="btn" href="index.html">前往會計功能選單</a>
    <a class="btn secondary" href="payment_request.html">待付款申請</a>
  </div>
  <script>
    (function () {
      try {
        if (window.top && window.top !== window && window.top.location) {
          var h = String(window.top.location.hash || '');
          if (h.indexOf('accounting-ingest') >= 0) {
            window.top.location.hash = '#/accounting';
            return;
          }
        }
      } catch (e) { /* cross-origin ignore */ }
      setTimeout(function () {
        window.location.replace('index.html');
      }, 2500);
    })();
  </script>
</body>
</html>
