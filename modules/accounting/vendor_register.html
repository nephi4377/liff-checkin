<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>廠商資料登記</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="../../shared/js/accounting_master_data.js?v=11"></script>
  <script src="../../shared/js/accounting_api.js?v=11"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; max-width: 640px; margin: 0 auto; background: #f4f6f8; }
    h2 { margin: 0 0 8px; }
    .sub { color: #555; font-size: 14px; line-height: 1.5; }
    .card { background: #fff; border-radius: 12px; padding: 14px; margin: 12px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    label { display: block; margin-top: 8px; font-weight: 600; font-size: 14px; }
    label.req::after { content: ' *'; color: #c5221f; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
    textarea { min-height: 64px; resize: vertical; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { padding: 10px 14px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 14px; }
    .btn-block { width: 100%; margin-top: 10px; }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-secondary { background: #e8eaed; color: #333; }
    .btn-warn { background: #fce8e6; color: #c5221f; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    #msg { color: #c5221f; font-size: 14px; }
    #ok { color: #137333; font-size: 14px; }
    .hidden { display: none; }
    .section-title { font-size: 13px; color: #888; margin: 14px 0 6px; font-weight: 600; }
    .status-pill { display: inline-block; font-size: 12px; padding: 4px 10px; border-radius: 999px; background: #fef7e0; color: #b06000; }
    .status-pill.ok { background: #e6f4ea; color: #137333; }
    .bind-item { border: 1px solid #e0e0e0; border-radius: 8px; padding: 8px 10px; margin: 6px 0; font-size: 13px; }
    .bind-item .mono { font-family: ui-monospace, monospace; font-size: 12px; word-break: break-all; color: #555; }
    .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #e8f0fe; margin: 2px 4px 2px 0; }
    .photo-preview { max-width: 100%; border-radius: 8px; margin-top: 8px; }
    .photo-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .hint { font-size: 13px; color: #666; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="loading">載入中…</div>
  <div id="app" class="hidden">
    <h2>廠商資料登記</h2>
    <p class="sub" id="userLine">—</p>
    <p class="sub" id="statusLine"></p>
    <div id="msg"></div>
    <div id="ok"></div>

    <div class="card">
      <p class="sub" style="margin:0">
        請填寫匯款與聯絡資料，並上傳存摺或匯款資訊照片供核對。
        送出後即加入廠商名冊；若有疑慮行政會另行聯絡。
      </p>
    </div>

    <div class="card">
      <h3 style="margin:0 0 8px" id="formTitle">基本資料</h3>

      <label class="req">廠商／公司名稱</label>
      <input id="name" placeholder="例：全勝木業" />

      <div class="row2">
        <div><label>統一編號</label><input id="tax_id" inputmode="numeric" maxlength="8" /></div>
        <div>
          <label class="req">工種／類別</label>
          <select id="trade_category"></select>
        </div>
      </div>

      <label>材料／工資屬性</label>
      <select id="cost_type"></select>

      <div class="row2">
        <div><label class="req">聯絡人</label><input id="contact_name" /></div>
        <div><label class="req">電話</label><input id="contact_phone" inputmode="tel" /></div>
      </div>

      <label>Email</label>
      <input id="contact_email" type="email" />

      <label>公司／工廠地址</label>
      <input id="address" />

      <p class="section-title">匯款資訊（必填）</p>
      <p class="hint">可拍照存摺或匯款單，用下方「辨識帶入」自動填寫。</p>

      <div class="row2">
        <div><label class="req">銀行代碼</label><input id="bank_code" maxlength="3" inputmode="numeric" placeholder="例：013" /></div>
        <div><label>分行名稱</label><input id="branch_name" placeholder="例：台南分行" /></div>
      </div>
      <div class="row2">
        <div><label class="req">帳號</label><input id="account_no" inputmode="numeric" /></div>
        <div><label class="req">戶名</label><input id="account_name" /></div>
      </div>

      <label class="req">存摺／匯款資訊照片</label>
      <input id="passbookPhoto" type="file" accept="image/*" capture="environment" />
      <div id="passbookPreview"></div>
      <button type="button" class="btn btn-secondary btn-block" id="ocrBtn" disabled>辨識帶入匯款欄位</button>

      <label>其他證明照片（選填）</label>
      <input id="extraPhoto" type="file" accept="image/*" capture="environment" />
      <p class="hint">可上傳名片、公司登記等，方便行政核對。</p>
      <div id="extraPreview"></div>

      <p class="section-title">LINE 聯絡身份</p>
      <p class="hint">登入後會自動綁定您的 LINE；若在群組開啟此頁，可一併綁定群組 ID。</p>
      <div id="bindingList"></div>
      <div class="row2">
        <div>
          <label>新增身份類型</label>
          <select id="manualIdType">
            <option value="user">UID（私訊）</option>
            <option value="group">GID（群組）</option>
          </select>
        </div>
        <div>
          <label>用途</label>
          <select id="bindPurpose">
            <option value="報價">報價</option>
            <option value="請款">請款</option>
            <option value="一般">一般</option>
          </select>
        </div>
      </div>
      <input id="manualLineId" placeholder="貼上 U… 或 C…（選填）" />
      <button type="button" class="btn btn-secondary btn-block" id="addBindBtn">加入 LINE 身份</button>

      <label>補充說明（選填）</label>
      <textarea id="vendor_note" placeholder="服務區域、可配合時段等"></textarea>

      <button type="button" class="btn btn-primary btn-block" id="submitBtn">送出資料</button>
    </div>
  </div>

  <script>
    (function () {
      var session = null;
      var pendingBindings = [];
      var passbookFile = null;
      var extraFile = null;
      var isUpdate = false;

      function $(id) { return document.getElementById(id); }
      function setMsg(t) { $('msg').textContent = t || ''; }
      function setOk(t) { $('ok').textContent = t || ''; }

      function fillSelect(id, options, withEmpty) {
        var sel = $(id);
        sel.innerHTML = withEmpty ? '<option value="">（請選）</option>' : '';
        options.forEach(function (o) {
          var opt = document.createElement('option');
          opt.value = o; opt.textContent = o;
          sel.appendChild(opt);
        });
      }

      function initFormOptions(enums) {
        enums = enums || {};
        fillSelect('trade_category', enums.vendor_trade_categories || AccountingMasterData.vendor_trade_categories, false);
        fillSelect('cost_type', enums.vendor_cost_types || AccountingMasterData.vendor_cost_types, true);
      }

      function showApp() {
        $('loading').classList.add('hidden');
        $('app').classList.remove('hidden');
      }

      function readFormFields() {
        return {
          name: $('name').value.trim(),
          tax_id: $('tax_id').value.trim(),
          trade_category: $('trade_category').value,
          cost_type: $('cost_type').value,
          contact_name: $('contact_name').value.trim(),
          contact_phone: $('contact_phone').value.trim(),
          contact_email: $('contact_email').value.trim(),
          address: $('address').value.trim(),
          bank_code: $('bank_code').value.trim(),
          branch_name: $('branch_name').value.trim(),
          account_no: $('account_no').value.trim(),
          account_name: $('account_name').value.trim(),
          vendor_note: $('vendor_note').value.trim()
        };
      }

      function fillForm(v) {
        if (!v) return;
        $('name').value = v.name || '';
        $('tax_id').value = v.tax_id || '';
        $('trade_category').value = v.trade_category || '其他';
        $('cost_type').value = v.cost_type || '';
        $('contact_name').value = v.contact_name || '';
        $('contact_phone').value = v.contact_phone || '';
        $('contact_email').value = v.contact_email || '';
        $('address').value = v.address || '';
        $('bank_code').value = v.bank_code || '';
        $('branch_name').value = v.branch_name || '';
        $('account_no').value = v.account_no || '';
        $('account_name').value = v.account_name || '';
      }

      function renderStatus(vendor) {
        var box = $('statusLine');
        if (!vendor || !vendor.vendor_id) {
          box.innerHTML = '<span class="status-pill">首次登記</span>';
          $('formTitle').textContent = '填寫廠商資料';
          isUpdate = false;
          return;
        }
        isUpdate = true;
        $('formTitle').textContent = '更新廠商資料';
        var st = vendor.registration_status || '合作中';
        var cls = st === '合作中' ? 'status-pill ok' : 'status-pill';
        box.innerHTML = '<span class="' + cls + '">目前狀態：' + st + '</span>';
      }

      function renderBindings() {
        var box = $('bindingList');
        box.innerHTML = '';
        if (!pendingBindings.length) {
          box.innerHTML = '<p class="hint">尚無綁定</p>';
          return;
        }
        pendingBindings.forEach(function (b, idx) {
          var row = document.createElement('div');
          row.className = 'bind-item';
          var typeLabel = b.id_type === 'group' ? 'GID 群組' : 'UID 私訊';
          var locked = b.locked ? ' · 本帳號' : '';
          row.innerHTML =
            '<div><strong>' + (b.display_name || '—') + '</strong> ' +
            '<span class="tag">' + (b.purpose || '一般') + '</span> ' +
            '<span class="tag">' + typeLabel + locked + '</span></div>' +
            '<div class="mono">' + (b.line_id || '') + '</div>';
          if (!b.locked) {
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'btn btn-warn';
            btn.style.marginTop = '6px';
            btn.textContent = '移除';
            btn.addEventListener('click', function () {
              pendingBindings.splice(idx, 1);
              renderBindings();
            });
            row.appendChild(btn);
          }
          box.appendChild(row);
        });
      }

      function ensureSelfBinding() {
        if (!session || !session.profile) return;
        var uid = session.profile.userId;
        var has = pendingBindings.some(function (b) { return b.line_id === uid; });
        if (!has) {
          pendingBindings.unshift({
            id_type: 'user',
            line_id: uid,
            display_name: session.profile.displayName || '',
            purpose: '一般',
            is_primary: '是',
            locked: true
          });
        }
      }

      function suggestGroupBinding() {
        var ctx = session && session.liffContext;
        if (!ctx || !ctx.groupId) return;
        var gid = ctx.groupId;
        var has = pendingBindings.some(function (b) { return b.line_id === gid; });
        if (has) return;
        pendingBindings.push({
          id_type: 'group',
          line_id: gid,
          display_name: (ctx.type || '群組') + '（自動偵測）',
          purpose: '請款',
          locked: false
        });
      }

      function loadBindingsFromServer(list) {
        pendingBindings = (list || []).map(function (b) {
          return {
            id_type: b.id_type || 'user',
            line_id: b.line_id,
            display_name: b.display_name || '',
            purpose: b.purpose || '一般',
            is_primary: b.is_primary || '否',
            locked: b.id_type === 'user' && b.line_id === session.profile.userId
          };
        });
        ensureSelfBinding();
        suggestGroupBinding();
        renderBindings();
      }

      function fileToBase64(file) {
        return new Promise(function (resolve, reject) {
          var reader = new FileReader();
          reader.onload = function () {
            var dataUrl = reader.result || '';
            var i = String(dataUrl).indexOf(',');
            resolve({
              dataBase64: i >= 0 ? dataUrl.substring(i + 1) : dataUrl,
              mimeType: file.type || 'image/jpeg',
              filename: file.name || 'photo.jpg'
            });
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function showPreview(inputId, boxId, file) {
        var box = $(boxId);
        box.innerHTML = '';
        if (!file) return;
        var img = document.createElement('img');
        img.className = 'photo-preview';
        img.src = URL.createObjectURL(file);
        img.alt = '預覽';
        box.appendChild(img);
      }

      $('passbookPhoto').addEventListener('change', function () {
        passbookFile = this.files && this.files[0] ? this.files[0] : null;
        showPreview('passbookPhoto', 'passbookPreview', passbookFile);
        $('ocrBtn').disabled = !passbookFile;
      });

      $('extraPhoto').addEventListener('change', function () {
        extraFile = this.files && this.files[0] ? this.files[0] : null;
        showPreview('extraPhoto', 'extraPreview', extraFile);
      });

      $('ocrBtn').addEventListener('click', async function () {
        setMsg(''); setOk('');
        if (!passbookFile) { setMsg('請先選擇照片'); return; }
        $('ocrBtn').disabled = true;
        $('ocrBtn').textContent = '辨識中…';
        try {
          var photo = await fileToBase64(passbookFile);
          var data = await AccountingApi.vendorRegisterOcr(session, photo);
          if (!data.success) { setMsg(data.message || '辨識失敗'); return; }
          var f = data.fields || {};
          if (f.bank_code) $('bank_code').value = f.bank_code;
          if (f.branch_name) $('branch_name').value = f.branch_name;
          if (f.account_no) $('account_no').value = f.account_no;
          if (f.account_name) $('account_name').value = f.account_name;
          if (f.tax_id && !$('tax_id').value) $('tax_id').value = f.tax_id;
          if (f.name && !$('name').value) $('name').value = f.name;
          setOk('已帶入辨識結果，請核對是否正確');
        } catch (e) {
          setMsg(e.message || String(e));
        } finally {
          $('ocrBtn').disabled = !passbookFile;
          $('ocrBtn').textContent = '辨識帶入匯款欄位';
        }
      });

      $('addBindBtn').addEventListener('click', function () {
        setMsg('');
        var lineId = $('manualLineId').value.trim();
        if (!lineId) { setMsg('請貼上 LINE ID'); return; }
        if (pendingBindings.some(function (b) { return b.line_id === lineId; })) {
          setMsg('此 ID 已在清單中');
          return;
        }
        pendingBindings.push({
          id_type: $('manualIdType').value,
          line_id: lineId,
          display_name: '',
          purpose: $('bindPurpose').value,
          locked: false
        });
        $('manualLineId').value = '';
        renderBindings();
        setOk('已加入');
      });

      $('submitBtn').addEventListener('click', async function () {
        setMsg(''); setOk('');
        var fields = readFormFields();
        if (!fields.name) { setMsg('請填廠商／公司名稱'); return; }
        if (!fields.trade_category) { setMsg('請選工種'); return; }
        if (!fields.contact_name) { setMsg('請填聯絡人'); return; }
        if (!fields.contact_phone) { setMsg('請填電話'); return; }
        if (!fields.bank_code) { setMsg('請填銀行代碼'); return; }
        if (!fields.account_no) { setMsg('請填帳號'); return; }
        if (!fields.account_name) { setMsg('請填戶名'); return; }
        if (!isUpdate && !passbookFile) { setMsg('首次登記請上傳存摺或匯款資訊照片'); return; }

        $('submitBtn').disabled = true;
        $('submitBtn').textContent = '送出中…';
        try {
          var photos = [];
          if (passbookFile) {
            var p1 = await fileToBase64(passbookFile);
            p1.kind = 'passbook';
            photos.push(p1);
          }
          if (extraFile) {
            var p2 = await fileToBase64(extraFile);
            p2.kind = 'extra';
            photos.push(p2);
          }
          var payload = Object.assign({}, fields, {
            photos: photos,
            line_bindings: pendingBindings.map(function (b) {
              return {
                id_type: b.id_type,
                line_id: b.line_id,
                display_name: b.display_name,
                purpose: b.purpose,
                is_primary: b.is_primary || '否'
              };
            })
          });
          var data = await AccountingApi.vendorRegisterSubmit(session, payload);
          if (!data.success) { setMsg(data.message || '送出失敗'); return; }
          setOk(data.message || '已送出');
          if (data.vendor) {
            renderStatus(data.vendor);
            fillForm(data.vendor);
          }
          if (data.bindings) loadBindingsFromServer(data.bindings);
          passbookFile = null;
          extraFile = null;
          $('passbookPhoto').value = '';
          $('extraPhoto').value = '';
          $('passbookPreview').innerHTML = '';
          $('extraPreview').innerHTML = '';
          $('ocrBtn').disabled = true;
          isUpdate = true;
        } catch (e) {
          setMsg(e.message || String(e));
        } finally {
          $('submitBtn').disabled = false;
          $('submitBtn').textContent = '送出資料';
        }
      });

      (async function boot() {
        try {
          initFormOptions();
          session = await AccountingApi.initVendorSession();
          if (!session) return;
          var mode = session.devBypass ? ' · 測試模式' : '';
          $('userLine').textContent = session.profile.displayName + mode;

          var data = await AccountingApi.vendorRegisterGet(session);
          if (!data.success) throw new Error(data.message || '載入失敗');
          if (data.enums) initFormOptions(data.enums);

          if (data.vendor) {
            fillForm(data.vendor);
            renderStatus(data.vendor);
          } else {
            renderStatus(null);
            $('trade_category').value = '其他';
          }
          loadBindingsFromServer(data.bindings || session.bindings || []);
          showApp();
        } catch (e) {
          $('loading').textContent = e.message || String(e);
        }
      })();
    })();
  </script>
</body>
</html>
