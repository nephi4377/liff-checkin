<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>廠商資料登記</title>
  <link rel="stylesheet" href="../../shared/css/accounting_layout.css?v=5" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="../../shared/js/accounting_master_data.js?v=15"></script>
  <script src="../../shared/js/operator_context.js?v=1"></script>
  <script src="../../shared/js/accounting_api.js?v=26"></script>
  <script src="../../shared/js/accounting_ui.js?v=10"></script>
  <script src="../../shared/js/accounting_form_helpers.js?v=4"></script>
  <script src="../../shared/js/accounting_nav.js?v=2"></script>
  <style>
    h2 { margin: 0 0 8px; }
    h3 { margin: 0 0 8px; font-size: 16px; }
    .sub { color: #555; font-size: 14px; line-height: 1.5; }
    .card { background: #fff; border-radius: 12px; padding: 14px; margin: 12px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    label { display: block; margin-top: 8px; font-weight: 600; font-size: 14px; }
    label.req::after { content: ' *'; color: #c5221f; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
    textarea { min-height: 64px; resize: vertical; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { padding: 10px 14px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 14px; }
    .btn-block { width: 100%; margin-top: 10px; }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    #msg { color: #c5221f; font-size: 14px; }
    #ok { color: #137333; font-size: 14px; }
    .hidden { display: none; }
    .step-num { display: inline-block; background: #1a73e8; color: #fff; font-size: 12px; padding: 2px 8px; border-radius: 6px; margin-right: 6px; vertical-align: middle; }
    .status-pill { display: inline-block; font-size: 12px; padding: 4px 10px; border-radius: 999px; background: #fef7e0; color: #b06000; }
    .status-pill.ok { background: #e6f4ea; color: #137333; }
    .bind-item { border: 1px solid #e0e0e0; border-radius: 8px; padding: 8px 10px; margin: 6px 0; font-size: 13px; }
    .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #e8f0fe; margin: 2px 4px 2px 0; }
    .photo-preview { max-width: 100%; border-radius: 8px; margin-top: 8px; }
    .hint { font-size: 13px; color: #666; margin-top: 4px; }
    .ocr-status { font-size: 13px; margin-top: 6px; min-height: 1.2em; }
    .ocr-status.ok { color: #137333; }
    .ocr-status.err { color: #c5221f; }
  </style>
</head>
<body class="acct-page acct-page-form">
  <div id="loading">載入中…</div>
  <div id="app" class="hidden acct-main">
    <h2>廠商資料登記</h2>
    <p class="sub" id="userLine">—</p>
    <p class="sub" id="statusLine"></p>
    <div id="msg"></div>
    <div id="ok"></div>

    <div class="card">
      <p class="sub" style="margin:0">
        先拍照辨識（步驟 1、2），再核對下方資料。送出後即加入廠商名冊。
      </p>
    </div>

    <div class="card">
      <h3><span class="step-num">1</span>名片或公司證明（選填）</h3>
      <p class="hint">可帶入公司名稱、聯絡人、電話等。</p>
      <input id="cardPhoto" type="file" accept="image/*" capture="environment" />
      <div id="cardPreview"></div>
      <p id="cardOcrStatus" class="ocr-status"></p>
    </div>

    <div class="card">
      <h3><span class="step-num">2</span>存摺／匯款資訊（選填）</h3>
      <p class="hint">可拍照自動帶入，或直接在下方的匯款欄位手動填寫。</p>
      <input id="passbookPhoto" type="file" accept="image/*" capture="environment" />
      <div id="passbookPreview"></div>
      <p id="passbookOcrStatus" class="ocr-status"></p>
    </div>

    <div class="card">
      <h3 style="margin:0 0 8px" id="formTitle">基本資料</h3>

      <label class="req">廠商／公司名稱</label>
      <input id="name" placeholder="例：全勝木業" />

      <div class="row2">
        <div><label>統一編號</label><input id="tax_id" inputmode="numeric" maxlength="8" /></div>
        <div>
          <label>工種／類別（選填）</label>
          <select id="trade_category"></select>
        </div>
      </div>

      <div class="row2">
        <div><label class="req">聯絡人</label><input id="contact_name" /></div>
        <div><label class="req">電話</label><input id="contact_phone" inputmode="tel" /></div>
      </div>

      <label>Email</label>
      <input id="contact_email" type="email" />

      <label>公司／工廠地址</label>
      <input id="address" />

      <p class="section-title" style="font-size:13px;color:#888;margin:14px 0 6px;font-weight:600">匯款欄位（可手動修改）</p>

      <div class="row2">
        <div><label class="req">銀行代碼</label><input id="bank_code" maxlength="3" inputmode="numeric" placeholder="例：013" /></div>
        <div><label>分行名稱</label><input id="branch_name" placeholder="例：台南分行" /></div>
      </div>
      <div class="row2">
        <div><label class="req">帳號</label><input id="account_no" inputmode="numeric" /></div>
        <div><label class="req">戶名</label><input id="account_name" /></div>
      </div>

      <p class="section-title" style="font-size:13px;color:#888;margin:14px 0 6px;font-weight:600">LINE 聯絡身份</p>
      <p class="hint">登入後會自動綁定您的 LINE，無需自行填寫 UID。</p>
      <div id="bindingList"></div>

      <label>補充說明（選填）</label>
      <textarea id="vendor_note" placeholder="服務區域、可配合時段等"></textarea>

      <button type="button" class="btn btn-primary btn-block" id="submitBtn">送出資料</button>
    </div>
  </div>

  <script>
    (function () {
      function normPhone(v) {
        return AccountingFormHelpers.normalizeTaiwanPhone(v);
      }
      AccountingUi.init();
      var session = null;
      var cardFile = null;
      var passbookFile = null;
      var isUpdate = false;

      function $(id) { return document.getElementById(id); }
      function setMsg(t) { if (t) AccountingUi.notify('err', t); }
      function setOk(t) { if (t) AccountingUi.notify('ok', t); }

      function fillSelect(id, options, withEmpty) {
        var sel = $(id);
        sel.innerHTML = withEmpty ? '<option value="">（不指定）</option>' : '';
        options.forEach(function (o) {
          var opt = document.createElement('option');
          opt.value = o; opt.textContent = o;
          sel.appendChild(opt);
        });
      }

      function initFormOptions(enums) {
        enums = enums || {};
        fillSelect('trade_category', enums.vendor_trade_categories || AccountingMasterData.vendor_trade_categories, true);
      }

      function showApp() {
        $('loading').classList.add('hidden');
        $('app').classList.remove('hidden');
      }

      function normName(s) {
        return String(s || '').trim().replace(/\s+/g, '');
      }

      function crossFillVendorAndAccountName() {
        var n = $('name').value.trim();
        var a = $('account_name').value.trim();
        if (a && !n) $('name').value = a;
        else if (n && !a) $('account_name').value = n;
      }

      function applyOcrFields(f) {
        if (!f) return;
        if (f.bank_code) $('bank_code').value = f.bank_code;
        if (f.branch_name) $('branch_name').value = f.branch_name;
        if (f.account_no) $('account_no').value = f.account_no;
        if (f.account_name) $('account_name').value = f.account_name;
        if (f.tax_id && !$('tax_id').value.trim()) $('tax_id').value = f.tax_id;
        if (f.contact_name && !$('contact_name').value.trim()) $('contact_name').value = f.contact_name;
        if (f.contact_phone && !$('contact_phone').value.trim()) $('contact_phone').value = normPhone(f.contact_phone);
        if (f.contact_email && !$('contact_email').value.trim()) $('contact_email').value = f.contact_email;
        if (f.address && !$('address').value.trim()) $('address').value = f.address;
        if (f.name && !$('name').value.trim()) $('name').value = f.name;
        crossFillVendorAndAccountName();
      }

      function readFormFields() {
        return {
          name: $('name').value.trim(),
          tax_id: $('tax_id').value.trim(),
          trade_category: $('trade_category').value.trim(),
          contact_name: $('contact_name').value.trim(),
          contact_phone: normPhone($('contact_phone').value.trim()),
          contact_email: $('contact_email').value.trim(),
          address: $('address').value.trim(),
          bank_code: $('bank_code').value.trim(),
          branch_name: $('branch_name').value.trim(),
          account_no: $('account_no').value.trim(),
          account_name: $('account_name').value.trim(),
          vendor_note: $('vendor_note').value.trim()
        };
      }

      function fillForm(v) {
        if (!v) return;
        $('name').value = v.name || '';
        $('tax_id').value = v.tax_id || '';
        $('trade_category').value = AccountingMasterData.normalizeVendorTradeCategory(v.trade_category) || '';
        $('contact_name').value = v.contact_name || '';
        $('contact_phone').value = normPhone(v.contact_phone || '');
        $('contact_email').value = v.contact_email || '';
        $('address').value = v.address || '';
        $('bank_code').value = v.bank_code || '';
        $('branch_name').value = v.branch_name || '';
        $('account_no').value = v.account_no || '';
        $('account_name').value = v.account_name || '';
      }

      function renderStatus(vendor) {
        var box = $('statusLine');
        box.innerHTML = '';
        if (!vendor || !vendor.vendor_id) {
          $('formTitle').textContent = '填寫廠商資料';
          isUpdate = false;
          return;
        }
        isUpdate = true;
        $('formTitle').textContent = '更新廠商資料';
        if (vendor.update_blocked) {
          box.innerHTML = '<span class="status-pill">合作已暫停，如需更新資料請聯絡行政</span>';
        }
      }

      function buildAutoBindings() {
        var out = [{
          id_type: 'user',
          line_id: session.profile.userId,
          display_name: session.profile.displayName || '',
          purpose: '一般',
          is_primary: '是'
        }];
        var ctx = session && session.liffContext;
        if (ctx && ctx.groupId) {
          out.push({
            id_type: 'group',
            line_id: ctx.groupId,
            display_name: (ctx.type || '群組') + '（本群組）',
            purpose: '請款',
            is_primary: '否'
          });
        }
        return out;
      }

      function renderBindings() {
        var box = $('bindingList');
        box.innerHTML = '';
        buildAutoBindings().forEach(function (b) {
          var row = document.createElement('div');
          row.className = 'bind-item';
          var typeLabel = b.id_type === 'group' ? '群組 GID' : '您的 LINE';
          row.innerHTML =
            '<div><strong>' + (b.display_name || '—') + '</strong> ' +
            '<span class="tag">' + (b.purpose || '一般') + '</span> ' +
            '<span class="tag">' + typeLabel + '</span></div>';
          box.appendChild(row);
        });
      }

      function fileToBase64(file) {
        return new Promise(function (resolve, reject) {
          var reader = new FileReader();
          reader.onload = function () {
            var dataUrl = reader.result || '';
            var i = String(dataUrl).indexOf(',');
            resolve({
              dataBase64: i >= 0 ? dataUrl.substring(i + 1) : dataUrl,
              mimeType: file.type || 'image/jpeg',
              filename: file.name || 'photo.jpg'
            });
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function showPreview(boxId, file) {
        var box = $(boxId);
        box.innerHTML = '';
        if (!file) return;
        var img = document.createElement('img');
        img.className = 'photo-preview';
        img.src = URL.createObjectURL(file);
        img.alt = '預覽';
        box.appendChild(img);
      }

      function setOcrStatus(elId, text, ok) {
        var el = $(elId);
        el.textContent = text || '';
        el.className = 'ocr-status' + (text ? (ok ? ' ok' : ' err') : '');
      }

      async function runOcr(file, kind, statusId) {
        if (!file || !session) return;
        setOcrStatus(statusId, '辨識中…', true);
        try {
          var photo = await fileToBase64(file);
          photo.kind = kind;
          var data = await AccountingApi.vendorRegisterOcr(session, photo, kind);
          if (!data.success) {
            setOcrStatus(statusId, data.message || '辨識失敗，請改手動填寫', false);
            return;
          }
          applyOcrFields(data.fields || {});
          setOcrStatus(statusId, '已帶入辨識結果，請核對是否正確', true);
        } catch (e) {
          setOcrStatus(statusId, e.message || String(e), false);
        }
      }

      $('cardPhoto').addEventListener('change', function () {
        cardFile = this.files && this.files[0] ? this.files[0] : null;
        showPreview('cardPreview', cardFile);
        if (cardFile) runOcr(cardFile, 'card', 'cardOcrStatus');
        else setOcrStatus('cardOcrStatus', '', true);
      });

      $('passbookPhoto').addEventListener('change', function () {
        passbookFile = this.files && this.files[0] ? this.files[0] : null;
        showPreview('passbookPreview', passbookFile);
        if (passbookFile) runOcr(passbookFile, 'passbook', 'passbookOcrStatus');
        else setOcrStatus('passbookOcrStatus', '', true);
      });

      $('account_name').addEventListener('blur', crossFillVendorAndAccountName);
      $('name').addEventListener('blur', crossFillVendorAndAccountName);

      $('submitBtn').addEventListener('click', async function () {
        setMsg(''); setOk('');
        var fields = readFormFields();
        if (!fields.name) { setMsg('請填廠商／公司名稱'); return; }
        if (!fields.contact_name) { setMsg('請填聯絡人'); return; }
        if (!fields.contact_phone) { setMsg('請填電話'); return; }
        if (!fields.bank_code) { setMsg('請填銀行代碼'); return; }
        if (!fields.account_no) { setMsg('請填帳號'); return; }
        if (!fields.account_name) { setMsg('請填戶名'); return; }

        $('submitBtn').disabled = true;
        $('submitBtn').textContent = '送出中…';
        try {
          var photos = [];
          if (cardFile) {
            var p0 = await fileToBase64(cardFile);
            p0.kind = 'card';
            photos.push(p0);
          }
          if (passbookFile) {
            var p1 = await fileToBase64(passbookFile);
            p1.kind = 'passbook';
            photos.push(p1);
          }
          var payload = Object.assign({}, fields, {
            photos: photos,
            line_bindings: buildAutoBindings()
          });
          var data = await AccountingApi.vendorRegisterSubmit(session, payload);
          if (!data.success) { setMsg(data.message || '送出失敗'); return; }
          setOk(data.message || '已送出');
          if (data.vendor) {
            renderStatus(data.vendor);
            fillForm(data.vendor);
          }
          renderBindings();
          cardFile = null;
          passbookFile = null;
          $('cardPhoto').value = '';
          $('passbookPhoto').value = '';
          $('cardPreview').innerHTML = '';
          $('passbookPreview').innerHTML = '';
          setOcrStatus('cardOcrStatus', '', true);
          setOcrStatus('passbookOcrStatus', '', true);
          isUpdate = true;
        } catch (e) {
          setMsg(e.message || String(e));
        } finally {
          $('submitBtn').disabled = false;
          $('submitBtn').textContent = '送出資料';
        }
      });

      (async function boot() {
        if (typeof AccountingNav !== 'undefined') AccountingNav.init();
        try {
          initFormOptions();
          session = await AccountingApi.initVendorSession();
          if (!session) return;
          var mode = session.devBypass ? ' · 測試模式' : '';
          $('userLine').textContent = session.profile.displayName + mode;

          var data = await AccountingApi.vendorRegisterGet(session);
          if (!data.success) throw new Error(data.message || '載入失敗');
          if (data.enums) initFormOptions(data.enums);

          if (data.vendor) {
            fillForm(data.vendor);
            renderStatus(data.vendor);
          } else {
            renderStatus(null);
          }
          renderBindings();
          showApp();
        } catch (e) {
          $('loading').textContent = e.message || String(e);
        }
      })();
    })();
  </script>
</body>
</html>
