<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全員出勤燈號看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../shared/js/config.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <div id="app" class="max-w-6xl mx-auto p-4">
        <div v-if="loading" class="text-center py-16 text-gray-500">載入中…</div>
        <div v-else-if="error" class="bg-red-50 border border-red-200 text-red-700 p-4 rounded-lg">{{ error }}</div>
        <template v-else>
            <header class="mb-4">
                <h1 class="text-lg font-bold">全員出勤燈號看板</h1>
                <p class="text-xs text-gray-500 mt-1">權限 4 以上可檢視 · 燈號僅「今天」依打卡位置顯示</p>
            </header>

            <div class="bg-white border border-gray-200 rounded-lg p-3 mb-4 text-xs">
                <div class="font-semibold text-gray-600 mb-2">燈號說明</div>
                <div class="flex flex-wrap gap-3">
                    <span class="inline-flex items-center gap-1"><span class="presence-dot presence-red"></span>未打卡上班</span>
                    <span class="inline-flex items-center gap-1"><span class="presence-dot presence-blue"></span>店面範圍內</span>
                    <span class="inline-flex items-center gap-1"><span class="presence-dot presence-purple"></span>案場範圍內</span>
                    <span class="inline-flex items-center gap-1"><span class="presence-dot presence-orange"></span>待確認（見下方）</span>
                </div>
                <details class="mt-2">
                    <summary class="cursor-pointer text-orange-700 font-medium">橙色可能原因</summary>
                    <ul class="mt-1 list-disc pl-5 text-gray-600 space-y-0.5">
                        <li v-for="(r, i) in orangeLegend" :key="i">{{ r }}</li>
                    </ul>
                </details>
            </div>

            <div class="overflow-x-auto bg-white border border-gray-200 rounded-lg shadow-sm">
                <table class="min-w-full text-xs">
                    <thead>
                        <tr class="bg-gray-50 border-b">
                            <th class="text-left p-2 font-semibold sticky left-0 bg-gray-50 z-10">組別 / 姓名</th>
                            <th v-for="(d, i) in dayColumns" :key="d.dateStr" class="text-left p-2 font-semibold min-w-[7rem]">
                                {{ d.title }}<br><span class="font-normal text-gray-500">{{ d.dayLabel }}</span>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <template v-for="g in groupedRows" :key="g.group">
                            <tr class="bg-gray-100">
                                <td :colspan="dayColumns.length + 1" class="p-1.5 font-bold text-gray-600">{{ g.group }}</td>
                            </tr>
                            <tr v-for="row in g.members" :key="row.userId" class="border-t border-gray-100 hover:bg-gray-50">
                                <td class="p-2 font-medium sticky left-0 bg-white">{{ row.userName }}</td>
                                <td v-for="(d, di) in dayColumns" :key="row.userId + d.dateStr" class="p-2 align-top">
                                    <div class="flex items-start gap-1.5">
                                        <span v-if="di === 0 && row.presence && row.presence.light !== 'none'"
                                            :class="['presence-dot flex-shrink-0 mt-0.5', 'presence-' + row.presence.light]"
                                            :title="presenceTitle(row.presence)"></span>
                                        <div>
                                            <span :class="['inline-flex px-1.5 py-0.5 rounded-full border text-[10px]', row.days[di].colorClass]">
                                                {{ row.days[di].label }}
                                            </span>
                                            <div v-if="di === 0 && row.presence && row.presence.checkInTime" class="text-[10px] text-gray-400 mt-0.5">
                                                打卡 {{ row.presence.checkInTime }}
                                            </div>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>
    </div>

    <style>
        .presence-dot { width: 10px; height: 10px; border-radius: 9999px; display: inline-block; box-shadow: 0 0 0 1px rgba(0,0,0,.08); }
        .presence-red { background: #ef4444; }
        .presence-blue { background: #3b82f6; }
        .presence-purple { background: #9333ea; }
        .presence-orange { background: #f97316; }
        .presence-none { background: transparent; box-shadow: none; width: 0; }
    </style>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script type="module">
        import { CONFIG } from '../../shared/js/config.js';

        const { createApp, ref, computed, onMounted } = Vue;

        const pad2 = (n) => String(n).padStart(2, '0');
        const formatDateStr = (d) => `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
        const formatDayLabel = (d) => {
            const wd = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'][d.getDay()];
            return `${d.getMonth() + 1}/${d.getDate()}（${wd}）`;
        };

        const KNOWN_LEAVE = ['婚假', '喪假', '病假', '事假', '特休', '補休', '公假', '休假', '加班', '休'];

        function parseScheduleEntry(rawValue) {
            if (!rawValue) return { label: '', timeRange: '' };
            const str = String(rawValue).trim();
            const m = str.match(/^(.+?)\[(.+?)\]$/);
            if (m) return { label: m[1].trim(), timeRange: m[2].trim() };
            return { label: str.split(/\s+/)[0] || str, timeRange: '' };
        }

        function deriveStatus(entries) {
            if (!entries || entries.length === 0) {
                return { label: '上班', colorClass: 'bg-green-100 text-green-800 border-green-200' };
            }
            const leaveEntry = entries.find(e => e.label && e.label !== '加班' && e.label !== '休假' && e.label !== '休');
            const offEntry = entries.find(e => e.label === '休假' || e.label === '休');
            const otEntry = entries.find(e => e.label === '加班');
            if (leaveEntry) {
                const text = leaveEntry.timeRange ? `${leaveEntry.label} ${leaveEntry.timeRange}` : leaveEntry.label;
                return { label: text, colorClass: 'bg-yellow-100 text-yellow-800 border-yellow-300' };
            }
            if (offEntry) return { label: '休假', colorClass: 'bg-red-100 text-red-700 border-red-200' };
            if (otEntry) {
                const otText = otEntry.timeRange ? `加班 ${otEntry.timeRange}` : '加班';
                return { label: otText, colorClass: 'bg-blue-100 text-blue-800 border-blue-200' };
            }
            return { label: '上班', colorClass: 'bg-green-100 text-green-800 border-green-200' };
        }

        function getEntriesForUserOnDate(scheduleByMonth, uid, dateStr) {
            const y = parseInt(dateStr.split('-')[0], 10);
            const m = parseInt(dateStr.split('-')[1], 10);
            const sch = scheduleByMonth[`${y}-${m}`]?.[uid];
            if (!sch) return [];
            const entries = [];
            Object.keys(sch).forEach(k => {
                if (k === '_userName') return;
                if (k.split(':')[0] === dateStr) entries.push(parseScheduleEntry(sch[k]));
            });
            return entries;
        }

        createApp({
            setup() {
                const loading = ref(true);
                const error = ref('');
                const board = ref(null);
                const orangeLegend = ref([]);

                const params = new URLSearchParams(window.location.search);
                const userId = params.get('uid') || params.get('userId') || '';

                const dayColumns = computed(() => {
                    const titles = ['今天', '明天', '後天'];
                    const today = new Date();
                    return [0, 1, 2].map((offset, i) => {
                        const d = new Date(today);
                        d.setDate(d.getDate() + offset);
                        return {
                            title: titles[i],
                            dateStr: formatDateStr(d),
                            dayLabel: formatDayLabel(d)
                        };
                    });
                });

                const groupedRows = computed(() => {
                    if (!board.value) return [];
                    const scheduleByMonth = board.value.scheduleByMonth || {};
                    const presenceMap = board.value.todayPresence || {};
                    const groups = {};
                    (board.value.employees || []).forEach(emp => {
                        const g = emp.group || '未分類';
                        if (!groups[g]) groups[g] = [];
                        const days = dayColumns.value.map(d =>
                            deriveStatus(getEntriesForUserOnDate(scheduleByMonth, emp.userId, d.dateStr))
                        );
                        groups[g].push({
                            userId: emp.userId,
                            userName: emp.userName,
                            days,
                            presence: presenceMap[emp.userId] || null
                        });
                    });
                    return Object.keys(groups).sort().map(g => ({
                        group: g,
                        members: groups[g].sort((a, b) => String(a.userName).localeCompare(String(b.userName), 'zh-Hant'))
                    }));
                });

                const presenceTitle = (p) => {
                    if (!p) return '';
                    let t = p.label || '';
                    if (p.reasons && p.reasons.length) t += '\n' + p.reasons.join('\n');
                    if (p.closestSiteName) t += '\n最近：' + p.closestSiteName;
                    return t;
                };

                onMounted(async () => {
                    if (!userId) {
                        error.value = '缺少使用者身分，請從主控台進入。';
                        loading.value = false;
                        return;
                    }
                    try {
                        const url = new URL(CONFIG.ATTENDANCE_GAS_WEB_APP_URL);
                        url.searchParams.set('page', 'attendance_api');
                        url.searchParams.set('action', 'get_hub_staff_board');
                        url.searchParams.set('userId', userId);
                        const res = await fetch(url);
                        const data = await res.json();
                        if (!data.success) throw new Error(data.message || '載入失敗');
                        board.value = data;
                        orangeLegend.value = data.orangeReasonsLegend || [];
                    } catch (e) {
                        error.value = e.message || '載入失敗';
                    } finally {
                        loading.value = false;
                    }
                });

                return { loading, error, dayColumns, groupedRows, orangeLegend, presenceTitle };
            }
        }).mount('#app');
    </script>
</body>
</html>
