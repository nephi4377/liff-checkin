<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>出勤儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .summary-card { transition: all 0.3s ease; }
        .summary-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1); }
        #map { height: 400px; width: 100%; border-radius: 0.5rem; margin-top: 1rem; }
        .modal { display: none; }
        .modal.is-open { display: flex; align-items: center; justify-content: center; }
        /* 日期/時間輸入：較易點擊、可读性較佳（無 min/max 時 :out-of-range 無意義故不使用） */
        input[type="date"],
        input[type="time"] {
            cursor: pointer;
            color: #1f2937;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="container mx-auto p-4 md:p-8">
        <header class="mb-6 flex justify-between items-center">
            <h1 class="text-3xl font-bold text-gray-700">出勤儀表板</h1>
            <button id="add-checkin-btn" class="bg-green-600 text-white font-bold py-2 px-4 rounded-md hover:bg-green-700">＋ 手動補打卡</button>
        </header>

        <div class="bg-white p-6 rounded-lg shadow-md mb-6">
            <h2 class="text-xl font-semibold mb-2">查詢條件</h2>
            <p class="text-sm text-gray-500 mb-4">預設顯示每人小計；點姓名可展開逐日明細。選單一員工時，上方會多出統計卡片。</p>
            <div class="flex flex-wrap gap-2 mb-4">
                <button type="button" id="btn-range-this-month" class="text-sm px-3 py-1.5 rounded-md bg-indigo-50 text-indigo-700 hover:bg-indigo-100">本月</button>
                <button type="button" id="btn-range-last-month" class="text-sm px-3 py-1.5 rounded-md bg-gray-100 text-gray-700 hover:bg-gray-200">上月</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label for="start-date" class="block text-sm font-medium text-gray-700">開始日期</label>
                    <input type="date" id="start-date" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                </div>
                <div>
                    <label for="end-date" class="block text-sm font-medium text-gray-700">結束日期</label>
                    <input type="date" id="end-date" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                </div>
                <div>
                    <label for="employee-select" class="block text-sm font-medium text-gray-700">選擇員工</label>
                    <select id="employee-select" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                        <option value="">所有員工</option>
                    </select>
                    <!-- 【您的要求】新增「顯示所有歷史員工」的核取方塊 -->
                    <div class="mt-2 flex flex-col gap-1">
                        <div class="flex items-center">
                            <input id="show-all-employees-checkbox" type="checkbox" class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                            <label for="show-all-employees-checkbox" class="ml-2 block text-sm text-gray-900">顯示所有歷史員工</label>
                        </div>
                        <div class="flex items-center">
                            <input id="show-all-absent-checkbox" type="checkbox" class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                            <label for="show-all-absent-checkbox" class="ml-2 block text-sm text-gray-900">顯示全期缺勤</label>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button id="query-btn" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition duration-300">查詢</button>
                    <!-- 【您的要求】新增匯出按鈕 -->
                    <button id="export-csv-btn" type="button" title="匯出會計用 CSV（含每人小計與逐日明細）" class="hidden whitespace-nowrap px-3 py-2 bg-green-600 text-white text-sm font-medium rounded-md hover:bg-green-700">匯出 CSV</button>
                </div>
            </div>
        </div>

        <div id="summary-section" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-6" style="display: none;">
            <p id="summary-scope-hint" class="col-span-full text-sm text-amber-800 bg-amber-50 border border-amber-100 rounded-md px-3 py-2 mb-1" style="display:none;">以下為<strong>該員工</strong>於查詢區間的統計。</p>
            <div class="bg-white p-4 rounded-lg shadow summary-card"><div class="text-sm font-medium text-gray-500">標準工作日(天)</div><div id="total-workdays" class="mt-1 text-3xl font-semibold text-gray-700">0</div></div>
            <div class="bg-white p-4 rounded-lg shadow summary-card"><div class="text-sm font-medium text-gray-500">實際出勤(天)</div><div id="total-attended" class="mt-1 text-3xl font-semibold text-green-600">0</div></div>
            <div class="bg-white p-4 rounded-lg shadow summary-card"><div class="text-sm font-medium text-gray-500">總遲到(分)</div><div id="total-late" class="mt-1 text-3xl font-semibold text-orange-500">0</div></div>
            <div class="bg-white p-4 rounded-lg shadow summary-card"><div class="text-sm font-medium text-gray-500">總早退(分)</div><div id="total-early" class="mt-1 text-3xl font-semibold text-blue-500">0</div></div>
            <div class="bg-white p-4 rounded-lg shadow summary-card"><div class="text-sm font-medium text-gray-500">總缺勤(天)</div><div id="total-absent" class="mt-1 text-3xl font-semibold text-red-600">0</div></div>
            <div class="bg-white p-4 rounded-lg shadow summary-card"><div class="text-sm font-medium text-gray-500">異常(天)</div><div id="total-anomaly" class="mt-1 text-3xl font-semibold text-amber-600">0</div></div>
        </div>

        <div id="results-container" class="bg-white p-6 rounded-lg shadow-md">
             <h2 class="text-xl font-semibold mb-4">每人小計</h2>
             <div id="loading-spinner" class="text-center py-10" style="display: none;">載入中...</div>
             <div id="report-table-container"></div>
             <div id="map-container" style="display: none;">
                 <h3 class="text-lg font-semibold mt-4">打卡地圖</h3>
                 <div id="map"></div>
             </div>
        </div>
    </div>
    
    <div id="checkin-modal" class="modal fixed inset-0 bg-gray-600 bg-opacity-50 h-full w-full">
      <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white">
        <h3 class="text-lg font-semibold">手動補打卡</h3>
        <div class="mt-4 space-y-4">
          <div><label for="modal-employee-select" class="block text-sm font-medium text-gray-700">員工</label><select id="modal-employee-select" class="mt-1 block w-full rounded-md border-gray-300"></select></div>
          <div><label for="modal-date" class="block text-sm font-medium text-gray-700">日期</label><input type="date" id="modal-date" class="mt-1 block w-full rounded-md border-gray-300"></div>
          <div><label for="modal-time" class="block text-sm font-medium text-gray-700">時間 (HH:mm)</label><input type="time" id="modal-time" class="mt-1 block w-full rounded-md border-gray-300"></div>
          <!-- 【⭐️ 核心新增：快速帶入時間按鈕 ⭐️】 -->
          <div id="shift-time-buttons" class="flex items-center gap-2 mt-1">
              <button id="btn-set-shift-start" class="text-xs bg-sky-100 text-sky-700 px-4 py-1 rounded-md hover:bg-sky-200">上班</button>
              <button id="btn-set-shift-end" class="text-xs bg-amber-100 text-amber-700 px-4 py-1 rounded-md hover:bg-amber-200">下班</button>
          </div>
          <!-- 【新增結束】 -->
          <div><label for="modal-event-type" class="block text-sm font-medium text-gray-700">事件</label><select id="modal-event-type" class="mt-1 block w-full rounded-md border-gray-300"><option value="上班">上班</option><option value="下班">下班</option></select></div>
        </div>
        <div class="mt-6 flex justify-end space-x-2">
          <button id="modal-cancel-btn" class="px-4 py-2 bg-gray-200 rounded-md">取消</button>
          <button id="modal-submit-btn" class="px-4 py-2 bg-blue-600 text-white rounded-md">送出</button>
        </div>
      </div>
    </div>

<!-- 【⭐️ 核心改造：將內聯腳本改為模組，並從 utils.js 引入函式 ⭐️】 -->
<script type="module">
    import { showGlobalNotification } from '../../shared/js/utils.js';

    // 【您的要求】新增全域變數，用於儲存當前報表資料以供匯出
    let currentReportData = {};
    let lastGlobalSummary = {};
    let lastReportHolidays = new Set();
    let expandedUserIds = new Set();
    let employeeShiftData = {};

    const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbz5-DUPNNciVdvE5wrOogNgxYt8EpDZppAe9f2cUh8pW9y3i29fB6n0RA5r-A5KuAiz/exec';

    function escapeHtml(s) {
        if (s == null || s === undefined) return '';
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function escapeAttr(s) {
        return String(s ?? '')
            .replace(/&/g, '&amp;')
            .replace(/"/g, '&quot;')
            .replace(/</g, '&lt;');
    }

    /** CSV 欄位跳脫（含逗號、引號、換行） */
    function csvEscapeField(value) {
        const str = value == null ? '' : String(value);
        if (/[",\r\n]/.test(str)) return `"${str.replace(/"/g, '""')}"`;
        return str;
    }

    // 【v32.0 核心改造】將 loadJsonp 升級為現代的 fetch API
    async function fetchApi(params) {
        const url = new URL(API_BASE_URL);
        // [v396.0] 來源參數只附加一次（勿在 params 迴圈內重複 append）
        url.searchParams.append('source', '出勤儀表板');
        for (const key in params) {
            url.searchParams.append(key, params[key]);
        }

        const response = await fetch(url);
        if (!response.ok) {
            // 增加超時處理
            throw new Error(`後端伺服器錯誤: ${response.status} ${response.statusText}`);
        }
        return response.json();
    }

    /**
     * 【您的要求】核心修正：從 hub.html 移入遺失的快取管理函式
     * 將資料儲存到瀏覽器的 localStorage，並設定到期日。
     * @param {string} key - 快取的鍵值。
     * @param {any} data - 要快取的資料。
     * @param {number} [days=1] - 快取有效天數，預設為 1 天。
     */
    function saveCache(key, data, days = 1) {
        const cache = { data: data, expires: Date.now() + days * 24 * 60 * 60 * 1000 };
        try {
            localStorage.setItem(key, JSON.stringify(cache));
        } catch (e) {
            console.error('儲存快取失敗:', e);
        }
    }

    function loadCache(key) {
        const cached = localStorage.getItem(key);
        if (!cached) return null;
        let cache;
        try {
            cache = JSON.parse(cached);
        } catch (e) {
            console.error('讀取快取失敗（JSON 無效）:', e);
            localStorage.removeItem(key);
            return null;
        }
        if (!cache || typeof cache.expires !== 'number') {
            localStorage.removeItem(key);
            return null;
        }
        if (cache.expires < Date.now()) { localStorage.removeItem(key); return null; }
        return cache.data;
    }

    function loadGoogleMapsAPI(apiKey) {
        // [優化] 使用 Google 推薦的 Inline Bootstrap Loader 方式載入 API，避免效能警告
        if (window.google && window.google.maps) {
            return Promise.resolve(); // 如果已載入，直接返回
        }
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            const url = new URL('https://maps.googleapis.com/maps/api/js');
            url.searchParams.set('key', apiKey);
            url.searchParams.set('libraries', 'marker');
            url.searchParams.set('v', 'weekly');
            const prevAuthFailure = window.gm_authFailure;
            window.gm_authFailure = () => {
                window.gm_authFailure = prevAuthFailure;
                if (typeof prevAuthFailure === 'function') prevAuthFailure();
                reject(new Error("Google Maps API 金鑰驗證失敗。"));
            };
            const cbName = '__attendanceGmapsCb_' + Math.random().toString(36).slice(2);
            window[cbName] = () => {
                delete window[cbName];
                window.gm_authFailure = prevAuthFailure;
                resolve();
            };
            url.searchParams.set('callback', cbName);
            script.src = url.toString();
            script.async = true;
            script.onerror = () => {
                delete window[cbName];
                window.gm_authFailure = prevAuthFailure;
                reject(new Error("無法載入 Google Maps API 腳本。"));
            };
            document.head.appendChild(script);
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date();
        const firstDayOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
        document.getElementById('start-date').value = firstDayOfMonth.toLocaleDateString('sv');
        document.getElementById('end-date').value = today.toLocaleDateString('sv');

        // 【⭐️ 核心修正：將所有事件綁定移至此處，確保 DOM 已載入 ⭐️】
        document.getElementById('query-btn').onclick = fetchReportData;
        document.getElementById('btn-range-this-month').onclick = () => setMonthRange(0);
        document.getElementById('btn-range-last-month').onclick = () => setMonthRange(-1);
        // 【您的要求】為匯出按鈕綁定事件
        document.getElementById('export-csv-btn').onclick = exportToCsv;
        document.getElementById('add-checkin-btn').onclick = () => {
            document.getElementById('checkin-modal').classList.add('is-open');
            // 【⭐️ 核心新增：打開視窗時，設定預設日期與時間 ⭐️】
            const today = new Date();
            document.getElementById('modal-date').value = today.toLocaleDateString('sv');
            const currentHour = today.getHours().toString().padStart(2, '0');
            document.getElementById('modal-time').value = `${currentHour}:00`;
        };
        document.getElementById('modal-cancel-btn').onclick = () => document.getElementById('checkin-modal').classList.remove('is-open');
        document.getElementById('modal-submit-btn').onclick = handleManualCheckinSubmit;
        document.getElementById('btn-set-shift-start').addEventListener('click', () => setShiftTime('start'));
        document.getElementById('btn-set-shift-end').addEventListener('click', () => setShiftTime('end'));

        // 【⭐️ 核心新增：為日期與時間輸入框加上手動觸發功能 ⭐️】
        const tryShowPicker = (e) => {
            const el = e.target;
            if (el && typeof el.showPicker === 'function') el.showPicker();
        };
        document.getElementById('modal-date').addEventListener('click', tryShowPicker);
        document.getElementById('modal-time').addEventListener('click', tryShowPicker);

        // 【v175.0 核心改造】將 API 請求移至此處，並統一附上使用者資訊
        // 【您的要求】為「顯示所有歷史員工」核取方塊綁定事件
        document.getElementById('show-all-employees-checkbox').addEventListener('change', loadAndRenderEmployees);
        document.getElementById('show-all-absent-checkbox').addEventListener('change', () => {
            if (currentReportData && Object.keys(currentReportData).length) {
                renderReportView(currentReportData, lastReportHolidays);
            }
        });

        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid') || 'unknown_user'; // 【v175.0 核心修正】從 URL 取得操作者資訊
        const name = urlParams.get('name') || 'Unknown User';

        const userParams = { userId: uid, userName: name }; // 準備要傳給後端的通用參數

        // 並行發送請求，提升載入速度
        fetchApi({ page: 'attendance_api', action: 'get_config', ...userParams })
            .then(configResponse => {
                // 步驟 3: 處理地圖設定
                if (configResponse && configResponse.googleMapsApiKey) {
                    loadGoogleMapsAPI(configResponse.googleMapsApiKey).catch(console.error);
                } else {
                    console.error('[DEBUG] 無法取得 Google Maps API Key');
                }
            });

        // 獨立載入員工列表
        loadAndRenderEmployees();

        function loadAndRenderEmployees() {
            const showAll = document.getElementById('show-all-employees-checkbox').checked;
            const filter = showAll ? 'attendance_all' : 'attendance_active_with_recent_resigned';
            const cacheKey = `employees_cache_${filter}`;

            // 快取優先策略
            const cachedData = loadCache(cacheKey);
            if (cachedData) {
                console.log(`⚡️ 從快取載入員工列表 (模式: ${filter})...`);
                renderEmployeeSelect(cachedData);
            }

            // 無論是否有快取，都在背景請求最新資料
            console.log(`🔄 正在從後端請求員工列表 (模式: ${filter})...`);
            fetchApi({ page: 'attendance_api', action: 'get_employees', filter: filter, ...userParams })
                .then(response => {
                    if (response && response.success) {
                        const newData = response.data;
                        // 只有在新舊資料不同時，才更新畫面與快取
                        if (JSON.stringify(cachedData) !== JSON.stringify(newData)) {
                            console.log(`🔄 偵測到員工資料已更新 (模式: ${filter})，正在刷新下拉選單...`);
                            saveCache(cacheKey, newData, 1); // 快取 1 天
                            renderEmployeeSelect(newData);
                            if (cachedData) { // 只有在是背景更新時才跳通知
                                showGlobalNotification('員工列表已自動更新。', 3000, 'info');
                            }
                        } else {
                            console.log(`✅ 背景資料與快取一致 (模式: ${filter})，無需更新。`);
                        }
                    } else {
                        throw new Error(response.message || '後端未回傳有效資料');
                    }
                })
                .catch(error => {
                    console.error(`載入員工列表 (模式: ${filter}) 失敗:`, error);
                    if (!cachedData) { // 如果連快取都沒有，才顯示錯誤
                        showGlobalNotification(`載入員工列表失敗: ${error.message}`, 8000, 'error');
                    }
                });
        }

        function renderEmployeeSelect(employees) {
            const mainSelect = document.getElementById('employee-select');
            const modalSelect = document.getElementById('modal-employee-select');
            mainSelect.innerHTML = '<option value="">所有員工</option>';
            modalSelect.innerHTML = '';
            employeeShiftData = {};

            const activeEmployees = employees.filter(emp => emp.status !== '離職');
            const resignedEmployees = employees.filter(emp => emp.status === '離職');

            const activeGroup = document.createElement('optgroup');
            activeGroup.label = '在職員工';
            activeEmployees.forEach(emp => {
                activeGroup.innerHTML += `<option value="${escapeAttr(emp.userId)}">${escapeHtml(emp.userName)}</option>`;
                modalSelect.innerHTML += `<option value="${escapeAttr(emp.userId)}">${escapeHtml(emp.userName)}</option>`;
                employeeShiftData[emp.userId] = { shiftStart: emp.shiftStart, shiftEnd: emp.shiftEnd };
            });
            mainSelect.appendChild(activeGroup);

            if (resignedEmployees.length > 0) {
                const resignedGroup = document.createElement('optgroup');
                resignedGroup.label = '離職員工';
                resignedEmployees.forEach(emp => {
                    resignedGroup.innerHTML += `<option value="${escapeAttr(emp.userId)}" class="text-gray-400">${escapeHtml(emp.userName)} (已離職)</option>`;
                    employeeShiftData[emp.userId] = { shiftStart: emp.shiftStart, shiftEnd: emp.shiftEnd };
                });
                mainSelect.appendChild(resignedGroup);
            }
        }
    });

    // 【⭐️ 核心重構：簡化設定時間的函式 ⭐️】
    function setShiftTime(type) {
        const userId = document.getElementById('modal-employee-select').value;
        const timeInput = document.getElementById('modal-time');
        const eventTypeSelect = document.getElementById('modal-event-type');

        // 如果有員工且有班表資料，就帶入時間；否則就清空時間。
        const shiftData = employeeShiftData[userId];
        if (!shiftData) { timeInput.value = ''; return; }

        if (type === 'start') {
            timeInput.value = employeeShiftData[userId].shiftStart || '';
            eventTypeSelect.value = '上班';
        } else {
            timeInput.value = employeeShiftData[userId].shiftEnd || '';
            eventTypeSelect.value = '下班';
        }
    }

    function handleManualCheckinSubmit() {
        const btn = document.getElementById('modal-submit-btn');
        const payload = {
            page: 'attendance_api', // 【⭐️ 核心修正 1/3：指定正確的 page ⭐️】
            action: 'add_manual_checkin',
            userId: document.getElementById('modal-employee-select').value,
            date: document.getElementById('modal-date').value,
            time: document.getElementById('modal-time').value,
            eventType: document.getElementById('modal-event-type').value,
        };

        if (!payload.userId) {
            alert('請選擇員工。');
            return;
        }
        if(!payload.date || !payload.time) {
            alert('請填寫完整的日期與時間。');
            return;
        }

        btn.disabled = true;
        btn.textContent = '送出中...';

        // 【⭐️ 核心修正 2/3：改用 loadJsonp 並指向正確的 API 路由 ⭐️】
        fetchApi(payload)
            .then(response => {
                if (response && response.success === false) {
                    throw new Error(response.message || '補打卡失敗');
                }
                document.getElementById('checkin-modal').classList.remove('is-open');
                const startDate = document.getElementById('start-date').value;
                const endDate = document.getElementById('end-date').value;
                const inRange = startDate && endDate && payload.date >= startDate && payload.date <= endDate;
                const hasReport = currentReportData && Object.keys(currentReportData).length > 0;
                if (inRange && hasReport) {
                    showGlobalNotification('補登成功，正在更新報表…', 5000, 'info');
                    fetchReportData();
                } else {
                    showGlobalNotification(response.message || '補打卡成功！', 10000, 'success');
                }
            })
            .catch(error => {
                alert(`補打卡失敗：${error.message}`);
            })
            .finally(() => {
                // 【⭐️ 核心修正 3/3：恢復按鈕狀態 ⭐️】
                btn.disabled = false;

        const spinner = document.getElementById('loading-spinner');

        document.getElementById('export-csv-btn').classList.add('hidden');
        document.getElementById('map-container').style.display = 'none';

        // 【v175.0 核心修正】在查詢報表時，也附上當前操作者的資訊

            .then(data => {

                // 如果後端明確回傳查詢失敗，則拋出錯誤，由下方的 catch 區塊統一顯示錯誤訊息。
                if (data && data.success === false) {
                    throw new Error(data.message || '後端回報了一個未知的錯誤。');
                }

                // 以出勤名單 (employeeShiftData) 篩報表列（後端 attendance_* mode 已排除廠商／權限≥5）。
                const allowedUserIds = new Set(Object.keys(employeeShiftData));
                const records = data.records || {}; // 增加保護，如果 data.records 為 null 或 undefined，則使用空物件
                // 【您的要求】將過濾後的資料存到全域變數
                currentReportData = Object.fromEntries(Object.entries(records).filter(([id]) => allowedUserIds.has(id)));

                const filteredRecords = Object.fromEntries(Object.entries(records).filter(([id]) => allowedUserIds.has(id)));

                spinner.style.display = 'none';
                lastGlobalSummary = data.summary || {};
                lastReportHolidays = new Set(data.holidays || []);
                expandedUserIds.clear();
                renderSummary(data.summary, document.getElementById('employee-select').value);

                if (Object.keys(filteredRecords).length > 0) {
                    document.getElementById('export-csv-btn').classList.remove('hidden');
                }
            })
            .catch(error => {
                spinner.style.display = 'none';
                console.error("查詢報表資料失敗:", error);
                document.getElementById('report-table-container').innerHTML =
                    `<p class="text-center text-red-500">查詢資料失敗：${escapeHtml(error.message)}</p>`;
            });

    function setMonthRange(monthOffset) {
        const now = new Date();
        const y = now.getFullYear();
        const m = now.getMonth() + monthOffset;
        const start = new Date(y, m, 1);
        const end = monthOffset === 0 ? now : new Date(y, m + 1, 0);
        document.getElementById('start-date').value = start.toLocaleDateString('sv');
        document.getElementById('end-date').value = end.toLocaleDateString('sv');
    }

    /** 與後端 _getDayAnomalyTags_ 對齊 */
    function getDayAnomalyTags(day) {
        if (!day) return [];
        if (day.anomalyTags && day.anomalyTags.length) return day.anomalyTags;
        const tags = [];
        const st = String(day.status || '');
        if (st === '缺勤' || st.startsWith('缺勤')) tags.push('缺勤');
        if (st === '僅單次打卡') tags.push('僅單次打卡');
        if (st.startsWith('異常')) tags.push('休假仍打卡');
        if (st.includes('缺記錄')) tags.push('缺班表');
        if (day.offSiteAnomaly || st.includes('離場未填')) tags.push('離場未填');
        if ((day.late || 0) > 0) tags.push('遲到');
        if ((day.early || 0) > 0) tags.push('早退');
        return tags;
    }

    function formatAnomalyDetailCell(day) {
        const tags = getDayAnomalyTags(day);
        const parts = [];
        if (tags.length) parts.push(tags.join('、'));
        const offNote = day?.offSiteReasonSummary && String(day.offSiteReasonSummary).trim();
        if (offNote) parts.push(`離場：${offNote}`);
        return parts.length ? parts.join('｜') : '—';
    }

    function dayCountsAsAnomaly(day) {
        const tags = getDayAnomalyTags(day);
        return tags.some((t) => t !== '遲到' && t !== '早退');
    }

    function countAnomalyDays(userData) {
        if (userData.stats && userData.stats.anomalyDays != null) return userData.stats.anomalyDays;
        return Object.values(userData.dailyData || {}).filter((d) => dayCountsAsAnomaly(d)).length;
    }

    /** 後端以 8h 工日回傳小數；UI 顯示小數天（例 0.44）並 tooltip 3.5/8 */
    function formatDayAccounting(decimal) {
        const n = Number(decimal);
        if (!n || Number.isNaN(n)) return '0';
        if (Math.abs(n - Math.round(n)) < 0.001) return String(Math.round(n));
        return (Math.round(n * 100) / 100).toFixed(2);
    }

    function formatDayEighths(decimal) {
        const n = Number(decimal);
        if (!n || Number.isNaN(n)) return '0/8';
        const hours = Math.round(n * 8 * 10) / 10;
        if (hours <= 0) return '0/8';
        return `${hours}/8`;
    }

    function dayAccountingTitle(decimal) {
        const n = Number(decimal);
        if (!n || Number.isNaN(n)) return '';
        return `${formatDayEighths(n)} 天（8h 工日）`;
    }

    /** 全期僅缺勤（0 打卡、0 假別、有缺勤）— 與後端 stats.allAbsentPeriod 對齊 */
    function isAllAbsentPeriodUser(userData) {
        const st = userData?.stats;
        if (!st) return false;
        if (st.allAbsentPeriod === true) return true;
        if (st.allAbsentPeriod === false) return false;
        const leaveTotal = (st.annualLeave || 0) + (st.sickLeave || 0) + (st.personalLeave || 0);
        return (st.workDays || 0) > 0 && (st.checkInDays || 0) === 0 && leaveTotal === 0 && (st.absent || 0) > 0;
    }

    function shouldShowEmployeeRow(userData) {
        const showAllAbsent = document.getElementById('show-all-absent-checkbox')?.checked;
        if (showAllAbsent) return true;
        return !isAllAbsentPeriodUser(userData);
    }

    const ANOMALY_HANDLING_ROWS = [
        ['缺勤', '核對假單；無假單依考勤辦法記缺勤'],
        ['僅單次打卡', '請補下班卡，或由管理員手動補登'],
        ['休假仍打卡', '確認誤打或更正假單／班表'],
        ['缺班表', '請系統管理員補排班歷史'],
        ['離場未填', '請員工補離場說明（LINE 或補登備註）'],
        ['遲到／早退', '依考勤辦法扣款或事前報備'],
        ['離場已填說明', '屬正常紀錄，不計入異常天數']
    ];

    function buildAnomalyHandlingFootnote() {
        let html = '<details class="text-xs text-gray-600 mt-3"><summary class="cursor-pointer text-amber-800 font-medium">異常類型與處理方式（點開）</summary>';
        html += '<table class="mt-2 w-full border border-gray-200 text-left"><thead class="bg-gray-50"><tr><th class="px-2 py-1 border-b">類型</th><th class="px-2 py-1 border-b">建議處理</th></tr></thead><tbody>';
        ANOMALY_HANDLING_ROWS.forEach(([type, action]) => {
            html += `<tr><td class="px-2 py-1 border-b align-top">${escapeHtml(type)}</td><td class="px-2 py-1 border-b">${escapeHtml(action)}</td></tr>`;
        });
        html += '</tbody></table></details>';
        return html;
    }

    function getEmployeeStats(userData) {
        if (userData.stats) {
            return {
                ...userData.stats,
                anomalyDays: userData.stats.anomalyDays ?? countAnomalyDays(userData),
                flexibleMinutes: userData.stats.flexibleMinutes ?? userData.flexibleMinutes ?? 0
            };
        }
        const daily = userData.dailyData || {};
        let lateMinutes = 0, earlyMinutes = 0, attended = 0, absent = 0, workDays = 0;
        Object.values(daily).forEach((day) => {
            lateMinutes += day.late || 0;
            earlyMinutes += day.early || 0;
            const st = String(day.status || '');
            if (st === '缺勤' || st.startsWith('缺勤')) absent++;
            if (st === '出勤' || st.startsWith('出勤') || st === '僅單次打卡' || st.startsWith('異常') || st === '加班' || st.includes('加班')) attended++;
            if (st && st !== '應休' && !st.includes('休') && st !== '排休' && !st.startsWith('特休') && !st.startsWith('病假') && !st.startsWith('事假')) {
                if (st === '出勤' || st.startsWith('出勤') || st === '缺勤' || st.startsWith('缺勤') || st === '僅單次打卡') workDays++;
            }
        });
        return { workDays, attended, absent, lateMinutes, earlyMinutes, anomalyDays: countAnomalyDays(userData), flexibleMinutes: userData.flexibleMinutes ?? 0 };
    }

    function parseLeaveFromStatus(status) {
        const s = String(status || '');
        const m = s.match(/異常\(([^)]+)\)/);
        if (m) return m[1];
        if (['特休', '病假', '事假', '補休', '公假', '婚假', '喪假', '休假', '排休'].some((k) => s === k || s.startsWith(k))) return s.split('(')[0].split('·')[0];
        const p = s.match(/^([^([]+)\(/);
        return p ? p[1] : '';
    }

    function reportIncludesIncompleteToday() {
        const endDate = document.getElementById('end-date').value;
        const todayStr = new Date().toLocaleDateString('sv');
        if (!endDate || endDate < todayStr) return false;
        for (const userId in currentReportData) {
            const day = currentReportData[userId].dailyData?.[todayStr];
            if (!day) continue;
            if (day.status === '僅單次打卡') return true;
            if (!day.checkOut || day.checkOut === '---') return true;
        }
        return false;
    }

    function exportToCsv() {
        if (!currentReportData || Object.keys(currentReportData).length === 0) {
            showGlobalNotification('沒有可匯出的資料，請先查詢。', 5000, 'error');
            return;
        }
        if (reportIncludesIncompleteToday()) {
            const ok = confirm('查詢區間含「今天」，部分打卡可能尚未完成。\n建議以結算後資料為準。\n\n仍要匯出嗎？');
            if (!ok) return;
        }

        const startDate = document.getElementById('start-date').value;
        const endDate = document.getElementById('end-date').value;
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        let csvContent = '\uFEFF';
        csvContent += '【每人小計】\n';
        csvContent += '員工編號,員工姓名,標準工作日(天),實際出勤(天),特休(天),病假(天),事假(天),加班(天),彈性(分),遲到(分),早退(分),缺勤(天),異常(天)\n';
        const userIds = Object.keys(currentReportData).filter((id) => shouldShowEmployeeRow(currentReportData[id])).sort((a, b) =>
            (currentReportData[a].userName || '').localeCompare(currentReportData[b].userName || '', 'zh-Hant'));
        userIds.forEach((userId) => {
            const u = currentReportData[userId];
            const st = getEmployeeStats(u);
            csvContent += [
                csvEscapeField(userId), csvEscapeField(u.userName), st.workDays, st.checkInDays ?? st.attended,
                formatDayAccounting(st.annualLeave), formatDayAccounting(st.sickLeave), formatDayAccounting(st.personalLeave), formatDayAccounting(st.overtimeDays),
                st.flexibleMinutes ?? '', st.lateMinutes, st.earlyMinutes, formatDayAccounting(st.absent), st.anomalyDays || 0
            ].join(',') + '\n';
        });

        csvContent += '\n【逐日明細】\n';
        csvContent += '員工編號,員工姓名,日期,星期,上班時間,下班時間,狀態,假別,資料來源,異常摘要,遲到(分),早退(分)\n';
        const allDates = new Set();
        Object.values(currentReportData).forEach((u) => Object.keys(u.dailyData || {}).forEach((d) => allDates.add(d)));
        const sortedDates = Array.from(allDates).sort();

        userIds.forEach((userId) => {
            const userData = currentReportData[userId];
            sortedDates.forEach((dateStr) => {
                const day = (userData.dailyData || {})[dateStr];
                if (!day) return;
                const dateObj = new Date(dateStr);
                dateObj.setMinutes(dateObj.getMinutes() + dateObj.getTimezoneOffset());
                csvContent += [
                    csvEscapeField(userId), csvEscapeField(userData.userName), csvEscapeField(dateStr),
                    csvEscapeField(weekdays[dateObj.getDay()]), csvEscapeField(day.checkIn || ''),
                    csvEscapeField(day.checkOut || ''), csvEscapeField(day.status || ''),
                    csvEscapeField(parseLeaveFromStatus(day.status)), csvEscapeField(day.dataSource || ''),
                    csvEscapeField(formatAnomalyDetailCell(day)),
                    day.late || 0, day.early || 0
                ].join(',') + '\n';
            });
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `出勤報表_${startDate}_至_${endDate}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
        showGlobalNotification('CSV 已下載。', 3000, 'success');
    }

    function formatDayDisplay(day, dateStr, userId) {
        const todayStr = new Date().toLocaleDateString('sv');
        const now = new Date();
        let displayStatus = day.status;
        let displayCheckOut = day.checkOut || '---';
        if (dateStr === todayStr) {
            if (displayStatus === '僅單次打卡') displayStatus = '出勤';
            const shiftData = employeeShiftData[userId];
            if (shiftData?.shiftEnd) {
                const shiftEndHour = parseInt(shiftData.shiftEnd.split(':')[0], 10);
                if (now.getHours() < shiftEndHour) displayCheckOut = '---';
            }
        }
        if (day.hasManualEntry && displayStatus && !String(displayStatus).includes('含補登')) {
            displayStatus = `${displayStatus}（含補登）`;
        }
        return { displayStatus, displayCheckOut };
    }

    function statusClassForDay(day, dispStr) {
        const rawStatus = day.status;
        const s = String(dispStr ?? '');
        if (s === '缺勤' || s.startsWith('缺勤') || String(rawStatus).startsWith('異常')) return 'text-red-600 font-bold';
        if (rawStatus === '僅單次打卡') return 'text-purple-600 font-bold';
        if (s.includes('加班')) return 'text-orange-600 font-bold';
        if (s.includes('特休')) return 'text-blue-600 font-bold';
        if (s.includes('病假')) return 'text-yellow-600 font-bold';
        if (s.includes('事假')) return 'text-gray-500';
        if (['補休', '公假', '婚假', '喪假'].some((k) => s.includes(k))) return 'text-indigo-600 font-bold';
        if (getDayAnomalyTags(day).length > 0) return 'text-amber-700 font-medium';
        return '';
    }

    function buildDailyDetailRows(userId, userData, holidays) {
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        const dailyData = userData.dailyData || {};
        const sortedDates = Object.keys(dailyData).sort();
        let rows = '';
        sortedDates.forEach((dateStr) => {
            const day = dailyData[dateStr];
            const { displayStatus, displayCheckOut } = formatDayDisplay(day, dateStr, userId);
            const dateObj = new Date(dateStr);
            dateObj.setMinutes(dateObj.getMinutes() + dateObj.getTimezoneOffset());
            const dayOfWeek = dateObj.getDay();
            const isHoliday = holidays.has(dateStr) || dayOfWeek === 0 || dayOfWeek === 6;
            const dateClass = isHoliday ? 'text-red-600 font-bold' : '';
            const lateVal = day.late ?? 0;
            const earlyVal = day.early ?? 0;
            const statusClass = statusClassForDay(day, displayStatus);
            const anomalyText = formatAnomalyDetailCell(day);
            const anomalyClass = anomalyText !== '—' ? 'text-amber-800 font-medium' : 'text-gray-400';
            const dateCellText = `${dateStr} (${weekdays[dayOfWeek]})`;
            rows += `<tr class="bg-slate-50/80 text-sm">
                <td class="px-4 py-2 pl-10 text-gray-400">↳</td>
                <td class="px-4 py-2 ${dateClass}">${escapeHtml(dateCellText)}</td>
                <td class="px-4 py-2 text-center">${escapeHtml(day.checkIn || '---')}</td>
                <td class="px-4 py-2 text-center">${escapeHtml(displayCheckOut)}</td>
                <td class="px-4 py-2 ${statusClass}">${escapeHtml(displayStatus || '')}</td>
                <td class="px-4 py-2 text-center text-gray-600">${escapeHtml(day.dataSource || '—')}</td>
                <td class="px-4 py-2 ${anomalyClass}">${escapeHtml(anomalyText)}</td>
                <td class="px-4 py-2 text-center ${lateVal > 0 ? 'text-orange-600 font-bold' : ''}">${escapeHtml(lateVal)}</td>
                <td class="px-4 py-2 text-center ${earlyVal > 0 ? 'text-blue-600 font-bold' : ''}">${escapeHtml(earlyVal)}</td>
            </tr>`;
        });
        return rows;
    }

            html += `<tr class="hover:bg-gray-50 border-t border-gray-100">
                <td class="px-4 py-3 font-medium">
                    <button type="button" class="emp-expand-btn text-left text-indigo-700 hover:underline font-semibold" data-user-id="${escapeAttr(userId)}">${escapeHtml(userData.userName)}</button>
                </td>
                <td class="px-4 py-3 text-center">${st.workDays}</td>
                <td class="px-4 py-3 text-center text-green-700">${st.checkInDays ?? st.attended}</td>
                <td class="px-4 py-3 text-center text-gray-600" title="${escapeAttr(dayAccountingTitle(st.annualLeave))}">${formatDayAccounting(st.annualLeave)}</td>
                <td class="px-4 py-3 text-center text-gray-600" title="${escapeAttr(dayAccountingTitle(st.sickLeave))}">${formatDayAccounting(st.sickLeave)}</td>
                <td class="px-4 py-3 text-center text-gray-600" title="${escapeAttr(dayAccountingTitle(st.personalLeave))}">${formatDayAccounting(st.personalLeave)}</td>
                <td class="px-4 py-3 text-center text-gray-600" title="${escapeAttr(dayAccountingTitle(st.overtimeDays))}">${formatDayAccounting(st.overtimeDays)}</td>
                <td class="px-4 py-3 text-center ${st.lateMinutes > 0 ? 'text-orange-600 font-bold' : ''}">${st.lateMinutes}</td>
                <td class="px-4 py-3 text-center ${st.earlyMinutes > 0 ? 'text-blue-600 font-bold' : ''}">${st.earlyMinutes}</td>
                <td class="px-4 py-3 text-center ${st.absent > 0 ? 'text-red-600 font-bold' : ''}" title="${escapeAttr(dayAccountingTitle(st.absent))}">${formatDayAccounting(st.absent)}</td>
                <td class="px-4 py-3 text-center ${anomalyN > 0 ? 'text-amber-700 font-bold' : 'text-gray-400'}">${anomalyN}</td>
                <td class="px-4 py-3 text-center text-gray-400">${toggleIcon}</td>
            </tr>`;
            if (expanded) {
                html += `<tr class="bg-gray-100"><td colspan="12" class="px-2 py-2">
                    <table class="min-w-full text-xs">
                    <thead><tr class="text-gray-500">
                        <th class="px-4 py-1"></th><th class="px-4 py-1 text-left">日期</th>
                        <th class="px-4 py-1 text-center">上班</th><th class="px-4 py-1 text-center">下班</th>
                        <th class="px-4 py-1 text-left">狀態</th><th class="px-4 py-1 text-center">資料來源</th>
                        <th class="px-4 py-1 text-left">異常摘要</th>
                        <th class="px-4 py-1 text-center">遲到</th><th class="px-4 py-1 text-center">早退</th>
                    </tr></thead><tbody>${buildDailyDetailRows(userId, userData, holidays)}</tbody></table>
                </td></tr>`;
            }
        });

        html += `</tbody></table>${footnote}</div>`;
        container.innerHTML = html;

        container.querySelectorAll('.emp-expand-btn').forEach((btn) => {
            btn.addEventListener('click', () => {
                const uid = btn.getAttribute('data-user-id');
                if (expandedUserIds.has(uid)) expandedUserIds.delete(uid);
                else expandedUserIds.add(uid);
                renderReportView(currentReportData, lastReportHolidays);
            });
        });
    }

    function getMarkerIcon(eventType, status) {
        let color = '#707070'; 
        if (eventType === '上班') {
            color = (status === '遲到') ? '#F97316' : '#22C55E';
        } else if (eventType === '下班') {
            color = (status === '早退') ? '#EF4444' : '#3B82F6';
        }
        return {
            path: 'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z',
            fillColor: color,
            fillOpacity: 0.9,
            strokeWeight: 0,
            rotation: 0,
            scale: 1.5,
            anchor: new google.maps.Point(12, 22),
        };
    }

    async function initMap(points) {
        const mapContainer = document.getElementById('map-container');
        if (!points || !Array.isArray(points) || points.length === 0 || 
            typeof points[0] !== 'object' || points[0] === null || 
            typeof points[0].lat !== 'number' || typeof points[0].lng !== 'number') {
            console.error('[DEBUG] 收到的地圖座標資料無效或格式不符:', points);
            mapContainer.style.display = 'none';
            return; // 結束函式
        }

        // [優化] 使用新的 API 載入方式，需要非同步引入函式庫
        const { Map } = await google.maps.importLibrary("maps");
        const { InfoWindow } = await google.maps.importLibrary("maps");

        mapContainer.style.display = 'block';
        const map = new Map(document.getElementById("map"), {
            zoom: 15,
            center: { lat: points[0].lat, lng: points[0].lng },
            mapId: 'ATTENDANCE_MAP' // 為地圖指定一個 ID
        });
        const infoWindow = new InfoWindow();
        points.forEach(point => {
            const position = { lat: point.lat, lng: point.lng };
            const titleRaw = `${point.eventType ?? ''} - ${point.time ?? ''}`;
            const titleSafe = titleRaw.replace(/[\r\n<>&]/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 240);
            const marker = new google.maps.Marker({ 
                position: position, 
                map: map,
                title: titleSafe,
                icon: getMarkerIcon(point.eventType, point.status) 
            });
            marker.addListener('click', ({ domEvent, latLng }) => {
                const fill = getMarkerIcon(point.eventType, point.status).fillColor;
                const statusText = (point.status === '準點') ? '' : `<span class="font-bold" style="color: ${fill};">(${escapeHtml(point.status)})</span>`;
                const contentString = `
                    <div class="p-1" style="max-width: 250px;">
                        <div class="font-bold">${escapeHtml(point.eventType)} ${statusText}</div>
                        <div class="text-sm text-gray-600">${escapeHtml(point.time || '無時間資訊')}</div>
                        <div class="text-xs text-gray-800 mt-1">${escapeHtml(point.address || '無地址資訊')}</div>
                    </div>`;
                infoWindow.setContent(contentString);
                infoWindow.open(marker.map, marker);
            });
        });
    }
</script>
</body>
</html>
