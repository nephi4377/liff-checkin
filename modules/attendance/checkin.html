<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添心設計 | 員工打卡</title>
    <!-- 引入系統必要框架：Tailwind CSS 用於高品質 UI，LIFF SDK 用於 Google/LINE 身分介接 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script>
        /** 
         * @stable CONSTANTS - 系統核心配置 (承重牆)
         * 包含應用程式運作所需的全部硬編碼常數與逾時設定。
         * 修改關鍵金鑰 (LIFF_ID, GAS_URL) 可能導致系統全面崩潰。
         */
        const CONSTANTS = {
            LIFF_ID: '2007974938-jVxn6y37',
            GAS_URL: 'https://script.google.com/macros/s/AKfycbz5-DUPNNciVdvE5wrOogNgxYt8EpDZppAe9f2cUh8pW9y3i29fB6n0RA5r-A5KuAiz/exec',
            VERSION: 'v26.02.28.1324',
            CACHE_KEYS: {
                PROFILE: 'checkin_user_profile_cache', // 使用者個人資料快取
                HISTORY: 'checkin_history_records',     // 歷史打卡紀錄快取
                QUEUE: 'checkin_offline_queue'         // 離線待發送數據隊列
            },
            TIMEOUTS: {
                INIT: 10000,       // LIFF 初始化逾時時間 (10s)
                GEO: 12000,        // GPS 座標擷取逾時時間 (12s)
                SYNC: 30000,       // API 通訊逾時時間 (30s)
                AUTO_CLOSE: 45000  // 打卡成功後自動關閉頁面的倒數時間 (45s)
            },
            MAX_RETRY: 3,          // GPS 定位失敗時的最大重試次數
            HISTORY_LIMIT: 15      // 前端介面顯示的歷史紀錄筆數上限
        };
    </script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .gradient-bg {
            background-image: linear-gradient(to top, #f3e7e9 0%, #e3eeff 99%, #e3eeff 100%);
        }

        .btn-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(59, 130, 246, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
            }
        }

        .spinner {
            border-top-color: #3498db;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .status-indicator {
            transition: all 0.3s ease;
        }

        .status-pending .status-icon {
            color: #9ca3af;
        }

        .status-success .status-icon {
            color: #22c55e;
        }

        .status-error .status-icon {
            color: #ef4444;
        }

        .status-success .status-text {
            color: #166534;
        }

        .status-error .status-text {
            color: #991b1b;
        }

        .status-icon svg {
            width: 1.25rem;
            height: 1.25rem;
        }
    </style>
</head>

<body class="gradient-bg flex flex-col items-center justify-center min-h-screen p-4">

        <!-- 交互訊息與載入顯示 -->
        <div id="status-container"

            <div id="checkin-history-container" class="mt-4 pt-3 border-t border-gray-200 w-full hidden">

        <!-- 主要動作按鈕：內建 Pulse 動畫與 Disable 灰階邏輯 -->
        <button id="checkin-button"

            disabled> 立即打卡 </button>
    </div>

    <!-- 詳細資訊彈窗：用於檢視打卡結果的完整文字回饋 -->
    <div id="detail-modal"
        class="fixed inset-0 bg-gray-900 bg-opacity-70 hidden flex items-center justify-center z-50 px-4 backdrop-blur-md">
        <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full p-8 transition-all">
            <div class="flex justify-between items-start mb-4">
                <h3 id="modal-title" class="text-2xl font-black text-gray-800">打卡詳細</h3>
                <button onclick="AppUI.closeModal()" class="text-gray-300 hover:text-gray-900 transition-colors"><svg
                        class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                        </path>
                    </svg></button>
            </div>
            <p id="modal-time" class="text-xs text-gray-400 mb-4 font-mono border-b border-gray-50 pb-2"></p>
            <div id="modal-content"
                class="text-gray-800 text-sm whitespace-pre-wrap leading-relaxed bg-gray-50 p-5 rounded-2xl border border-gray-100 max-h-80 overflow-y-auto font-medium">
            </div>
            <button onclick="AppUI.closeModal()"
                class="mt-8 w-full bg-gray-900 text-white font-bold py-4 rounded-2xl hover:bg-black transition-colors">確認關閉</button>
        </div>
    </div>

    <footer class="mt-10 text-center text-[9px] text-gray-400 font-bold uppercase tracking-widest">
        <p>STABLE PRODUCTION ENVIRONMENT</p>
    </footer>

    <!-- =============================================================== -->
    <!-- [v2026.1] 職責分離核心引擎 (Logic Decoupling Engine)           -->
    <!-- 將資料、介面與通訊邏輯徹底拆分，符合開發規範。                       -->
    <!-- =============================================================== -->
    <script>
        /** 
         * [DevOps] 全域錯誤監聽器
         * 確保在手機端發生任何 JS 崩潰時，能即時回顯於介面，免除盲猜。
         */
        window.onerror = function (msg, url, line) {
            const errDisplay = `[Runtime Error] ${msg} (Line: ${line})`;
            console.error(errDisplay);
            if (document.getElementById('message')) {
                document.getElementById('message').innerHTML = `<span class="text-red-600 font-black">${errDisplay}</span>`;
            }
        };

        /** 
         * @stable AppStorage - 資料持久化模組 (承重牆)
         * 維護 localStorage 快取系統與離線快取規則。
         * 功用：確保使用者身分、歷史紀錄與待發送隊列 (Offline Queue) 的資料完整性。
         */
        const AppStorage = {
            save: (key, data, days = 7) => {
                const bundle = { data, expires: Date.now() + days * 86400000 };
                try { localStorage.setItem(key, JSON.stringify(bundle)); } catch (e) { }
            },
            load: (key) => {
                const raw = localStorage.getItem(key);
                if (!raw) return null;
                try {
                    const bundle = JSON.parse(raw);
                    if (bundle.expires < Date.now()) { localStorage.removeItem(key); return null; }
                    return bundle.data;
                } catch (e) { return null; }
            },
            getHistory: () => AppStorage.load(CONSTANTS.CACHE_KEYS.HISTORY) || [],
            addHistory: (record) => {
                let h = AppStorage.getHistory();
                h.unshift({ ...record, timestamp: Date.now() });
                if (h.length > CONSTANTS.HISTORY_LIMIT) h = h.slice(0, CONSTANTS.HISTORY_LIMIT);
                AppStorage.save(CONSTANTS.CACHE_KEYS.HISTORY, h);
            },
            getQueue: () => JSON.parse(localStorage.getItem(CONSTANTS.CACHE_KEYS.QUEUE) || '[]'),
            saveQueue: (q) => localStorage.setItem(CONSTANTS.CACHE_KEYS.QUEUE, JSON.stringify(q)),
            addToQueue: (r) => { const q = AppStorage.getQueue(); q.push(r); AppStorage.saveQueue(q); },
            updateQueueItem: (timestamp, updates) => {
                const q = AppStorage.getQueue();
                const idx = q.findIndex(item => item.timestamp === timestamp);
                if (idx !== -1) {
                    q[idx] = { ...q[idx], ...updates };
                    AppStorage.saveQueue(q);
                }
            }
        };

        /** 
         * @core AppGeo - 地理位置服務系統 (承重牆)
         * 負責 GPS 座標擷取邏輯。
         * 具備：高度精確模式 (enableHighAccuracy)、逾時控制與自動重試流程。
         */
        const AppGeo = {
            getCoords: () => new Promise((res, rej) => {
                if (!navigator.geolocation) return rej({ code: 'NOT_SUPPORTED', message: '瀏覽器不支援定位' });
                navigator.geolocation.getCurrentPosition(res, (e) => rej({ code: e.code, message: e.message }), {
                    enableHighAccuracy: true, timeout: CONSTANTS.TIMEOUTS.GEO, maximumAge: 0
                });
            }),
            withRetry: async (max = CONSTANTS.MAX_RETRY) => {
                for (let i = 1; i <= max; i++) {
                    try { return await AppGeo.getCoords(); } catch (e) {
                        if (e.code === 1 || i === max) throw e; // 1 = 拒絕授權，這不需要重試。
                        await new Promise(r => setTimeout(r, 1000));
                    }
                }
            }
        };

        /** 
         * @core AppAPI - 與後端通訊伺服 (承重牆)
         * 處理所有對 Google Apps Script (GAS) 的請求。
         * 亮點：自動判定 source (hub/richmenu)、Promise 競態防護機制。
         */
        const AppAPI = {
            request: async (params) => {
                const retryLimit = 3;

                /**
                 * 【高級斷網容錯機制】
                 * 針對案場訊號閃斷 (1-3秒) 進行優化，若實體斷網則啟動 5 秒寬限期。
                 */
                if (!navigator.onLine) {
                    AppUI.updateIndicator('network', 'error', '網路中斷');
                    for (let i = 5; i > 0; i--) {
                        AppUI.setLoading(true, `網路不穩，等待恢復 (${i}s)...`);
                        await new Promise(r => setTimeout(r, 1000));
                        if (navigator.onLine) break;
                    }
                    if (!navigator.onLine) throw new Error('持續斷網，進入離線模式');
                }

                const url = new URL(CONSTANTS.GAS_URL);
                Object.entries(params).forEach(([k, v]) => url.searchParams.append(k, v));

                /**
                 * 【核心來源偵測機制】
                 * 1. 優先擷取 URL 參數 `source` (應用場景：整合主控台=?source=hub, 生產力小助手=?source=assistant)
                 * 2. 若無參數，則判斷是否在 LINE Client 內 (應用場景：LINE Richmenu=?richmenu)
                 * 3. 兩者皆非則標記為 unknown (外部瀏覽器)
                 */
                const source = new URLSearchParams(window.location.search).get('source') || (liff.isInClient() ? 'richmenu' : 'unknown');
                url.searchParams.append('source', source);

                /**
                 * 【三段階重試機制 (Retry Policy)】
                 * 針對 5xx 伺服器錯誤或非預期通訊失敗進行最多 3 次自動重試。
                 */
                for (let attempt = 1; attempt <= retryLimit; attempt++) {
                    try {
                        if (attempt > 1) AppUI.setLoading(true, `通訊重試中 (${attempt}/${retryLimit})...`);

                        const res = await Promise.race([
                            fetch(url),
                            new Promise((_, rej) => setTimeout(() => rej(new Error('伺服器無回應')), CONSTANTS.TIMEOUTS.SYNC))
                        ]);

                        if (res.ok) return await res.json();

                        // 僅針對 5xx 伺服器端錯誤進行重試，4xx 通常為參數問題，不採取重試。
                        if (res.status >= 500 && attempt < retryLimit) {
                            await new Promise(r => setTimeout(r, 1000));
                            continue;
                        }
                        throw new Error(`HTTP 錯誤: ${res.status}`);
                    } catch (e) {
                        // 針對網路不穩導致的 TypeError (如 DNS 失敗) 或超時，發起重試。
                        if (attempt < retryLimit && (e instanceof TypeError || e.message.includes('無回應'))) {
                            await new Promise(r => setTimeout(r, 1000));
                            continue;
                        }
                        throw e; // 傳遞至外層進入離線暫存邏輯。
                    }
                }
            },
            /** 
             * @core dispatch - 統一調度發送出口 (Single Sink)
             * 全系統唯一的 API 發送點，負責排隊、鎖定與併發防護。
             */
            isDispatching: false,
            dispatch: async (payload) => {
                if (AppAPI.isDispatching) return { status: 'busy' }; // 簡單鎖定防護
                AppAPI.isDispatching = true;
                try {
                    const result = await AppAPI.request(payload);
                    AppAPI.isDispatching = false;
                    return result;
                } catch (e) {
                    AppAPI.isDispatching = false;
                    throw e; // 傳遞錯誤由呼叫端決定是否進隊列
                }
            },
            /** 同步離線隊列中的所有紀錄 */
            syncAll: async () => {
                if (AppAPI.isDispatching) return;
                const q = AppStorage.getQueue(); if (!q.length) return;

                // 依序透過 dispatch 發送
                let remaining = q;
                for (const item of q) {
                    try {
                        const res = await AppAPI.dispatch(item);
                        if (res.status === 'success') {
                            remaining = remaining.filter(r => r.timestamp !== item.timestamp);
                        }
                    } catch (e) { break; } // 網絡不通則停止同步
                }
                AppStorage.saveQueue(remaining);
            }
        };

        /**
         * AppUI - 全域介面管理員 (UI Manager)
         * 負責所有 DOM 更新、燈號切換與歷史紀錄渲染。
         */
        const AppUI = {
            updateIndicator: (name, status, text) => {
                const el = document.getElementById(`status-${name}`);
                if (!el) return;
                el.className = `status-indicator status-${status}`;
                el.querySelector('div:last-child').textContent = text;
            },
            setLoading: (show, text = '') => {
                const loading = document.getElementById('loading');
                const btn = document.getElementById('checkin-button');
                const message = document.getElementById('message');
                if (loading) loading.classList.toggle('hidden', !show);
                if (document.getElementById('loading-text')) document.getElementById('loading-text').textContent = text;
                if (message) message.classList.toggle('hidden', show);
                if (btn) btn.disabled = show;
            },
            updateMessage: (html, colorClass = 'text-gray-700') => {
                const msg = document.getElementById('message');
                msg.innerHTML = html; msg.className = `text-center text-sm ${colorClass}`;
            },
            updateUserDisplay: (name) => { const el = document.getElementById('displayName'); if (el) el.textContent = name; },
            showModal: (record) => {
                const isFail = record.message.includes('失敗') || record.message.includes('錯誤');
                const mod = document.getElementById('detail-modal');
                document.getElementById('modal-title').textContent = isFail ? '打卡失敗' : '打卡詳細';
                document.getElementById('modal-title').className = `text-2xl font-black ${isFail ? 'text-red-600' : 'text-gray-900'}`;
                document.getElementById('modal-time').textContent = new Date(record.timestamp).toLocaleString('zh-TW', { hour12: false });
                document.getElementById('modal-content').textContent = record.message;
                mod.classList.remove('hidden');
            },
            closeModal: () => document.getElementById('detail-modal').classList.add('hidden'),
            renderHistory: () => {
                const h = AppStorage.getHistory();
                const container = document.getElementById('checkin-history-container');
                const list = document.getElementById('checkin-history-list');
                if (!h.length) { container.classList.add('hidden'); return; }
                container.classList.remove('hidden'); list.innerHTML = '';

                h.forEach(record => {
                    const isOffline = record.isOffline === true || (record.message && record.message.includes('離線'));
                    const isFail = record.message && (record.message.includes('失敗') || record.message.includes('錯誤'));
                    const d = new Date(record.timestamp);
                    const timeStr = `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
                    const dateStr = `${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getDate().toString().padStart(2, '0')}`;

                    // Regex 下班預測解析 (承重牆標籤：用於 UI 視覺增強)
                    const off = record.message && record.message.match(/預計下班：(\d{2}:\d{2})/);
                    const offTag = off ? `<span class="bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded text-[10px] ml-1 font-bold">下班 ${off[1]}</span>` : '';

                    const li = document.createElement('li');
                    li.className = `flex justify-between items-center border-b border-gray-100 p-2 last:border-0 cursor-pointer transition-colors rounded-md ${isFail ? 'bg-red-50 hover:bg-red-100' : 'hover:bg-gray-50'}`;
                    li.innerHTML = `<div class="flex items-center min-w-0"><svg class="w-3 h-3 ${isFail ? 'text-red-500' : (isOffline ? 'text-amber-500' : 'text-green-500')} mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${isFail ? 'M6 18L18 6M6 6l12 12' : 'M5 13l4 4L19 7'}"/></svg><span class="text-[10px] font-bold text-gray-400">${dateStr} ${timeStr}</span> ${offTag}</div><span class="text-[9px] text-gray-400 truncate ml-2 max-w-[120px]">${(record.message || '').split('\n')[0].substring(0, 14)}</span>`;
                    li.onclick = () => AppUI.showModal(record);
                    list.appendChild(li);
                });

                // 判斷今日是否已打過卡，並顯示精確提示。
                const todayRes = h.filter(r => new Date(r.timestamp).toDateString() === new Date().toDateString() && !r.message.includes('失敗'));
                if (todayRes.length > 0) {
                    const first = todayRes[todayRes.length - 1]; // 第一筆
                    const d = new Date(first.timestamp);
                    const t = `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
                    const off = first.message.match(/預計下班：(\d{2}:\d{2})/);
                    AppUI.updateMessage(`您今日已於 <span class="text-blue-600 font-black">${t}</span> 完成打卡！${off ? `<br>預計下班：<span class="text-blue-600 font-bold">${off[1]}</span>` : ''}`, 'text-green-800');
                }
            }
        };

        /** @core AppCore - 業務啟動與狀態機 (承重牆)
         * 驅動打卡完整 Lifecycle：身分驗證 -> 定位 -> 發送 -> 鎖定 -> 關閉。
         */
        const AppCore = {
            user: null, isLocked: false,
            init: async () => {
                // 1. 優先顯示基本資訊與網路狀態
                document.getElementById('app-version').textContent = CONSTANTS.VERSION;
                const updateNet = () => AppUI.updateIndicator('network', navigator.onLine ? 'success' : 'error', navigator.onLine ? '連線正常' : '已離線');
                updateNet(); window.ononline = window.onoffline = updateNet;
                AppUI.renderHistory();

                // 2. 優先嘗試載入身分快取，確保「離線/弱網」下按鈕仍可運作
                const cached = AppStorage.load(CONSTANTS.CACHE_KEYS.PROFILE);
                if (cached) {
                    AppCore.user = cached;
                    AppUI.updateUserDisplay(cached.displayName);
                    AppUI.updateIndicator('line', 'success', '身分快取');
                    document.getElementById('checkin-button').disabled = false;
                }

                // 3. 執行 LIFF 初始化 (加入超時保護防止卡死)
                try {
                    AppUI.updateIndicator('line', 'pending', '身分驗證');

                    // Promise 競態：若 LIFF 10秒沒反應則拋出超時
                    await Promise.race([
                        liff.init({ liffId: CONSTANTS.LIFF_ID }),
                        new Promise((_, rej) => setTimeout(() => rej(new Error('驗證超時')), 10000))
                    ]);

                    if (!liff.isLoggedIn()) { liff.login(); return; }

                    const p = await liff.getProfile();
                    AppCore.user = p;
                    AppStorage.save(CONSTANTS.CACHE_KEYS.PROFILE, p);
                    AppUI.updateUserDisplay(p.displayName);
                    AppUI.updateIndicator('line', 'success', '認證成功');
                    document.getElementById('checkin-button').disabled = false;

                    AppAPI.syncAll();
                } catch (e) {
                    console.error('LIFF Init Error:', e);
                    if (!cached) {
                        AppUI.updateIndicator('line', 'error', '身分失效');
                        AppUI.updateMessage(`驗證失敗: ${e.message}<br>請嘗試重新開啟頁面。`, 'text-red-700 font-bold');
                    } else {
                        AppUI.updateIndicator('line', 'success', '離線認證');
                    }
                }
            },
            /** 生命週期：執行打卡動作 */
            execute: async () => {
                if (AppCore.isLocked) return; AppCore.isLocked = true;
                const btn = document.getElementById('checkin-button');
                btn.disabled = true; btn.textContent = '定位中...'; btn.classList.remove('btn-pulse');
                AppUI.updateIndicator('gps', 'pending', '定位中');
                AppUI.setLoading(true, '確認經緯座標...');

                try {
                    const pos = await AppGeo.withRetry();
                    AppUI.updateIndicator('gps', 'success', '定位成功');

                    const payload = {
                        reqId: `c-${Math.random().toString(36).substr(2, 9)}-${Date.now()}`,
                        userId: AppCore.user.userId,
                        userName: AppCore.user.displayName,
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        timestamp: Date.now()
                    };

                    AppUI.setLoading(true, '正在傳送數據...');
                    btn.textContent = '傳送中...';

                    try {
                        // 統一出口發送
                        const result = await AppAPI.dispatch(payload);
                        AppCore.finalize(result);
                    } catch (e) {
                        // 發送失敗，存入隊列交由自動同步
                        AppStorage.addToQueue(payload);
                        AppCore.finalize({ status: 'success', message: '打卡成功！\n(紀錄已暫存，雲端將自動補傳)' });
                    }
                } catch (err) {
                    AppUI.updateIndicator('gps', 'error', '定位失敗');
                    AppUI.updateMessage(err.code === 1 ? '<strong>您已拒絕位置授權</strong><br>請開啟位置權限後重試。' : `打卡失敗: ${err.message}`, 'text-red-800');
                    btn.disabled = false; btn.textContent = '重新打卡'; btn.classList.add('btn-pulse');
                    AppCore.isLocked = false; AppUI.setLoading(false);
                }
            },
            /** 生命週期：處理結果與結算 */
            finalize: (res, isSilentInit = false) => {
                AppUI.setLoading(false);
                const isOff = res.status === 'success' && res.message.includes('離線');
                if (res.status === 'success') {
                    if (!isSilentInit) {
                        AppCore.isLocked = true; // 鎖定本次會話
                        AppStorage.addHistory({ message: res.message, isOffline: isOff });
                    }
                    AppUI.renderHistory();
                    const btn = document.getElementById('checkin-button');
                    // 成功後按鈕樣式：強制灰色鎖定，防止單次開啟後重複打卡。
                    btn.textContent = '打卡完成';
                    btn.className = "w-full bg-gray-200 text-gray-400 font-bold py-5 px-6 rounded-xl text-xl cursor-not-allowed transform-none shadow-none";
                    btn.disabled = true;
                    if (isOff) {
                        document.getElementById('icon-default').classList.add('hidden');
                        document.getElementById('icon-offline').classList.remove('hidden');
                    }
                    AppUI.updateMessage(res.message + (isSilentInit ? '' : '<br><span class="text-[9px] text-gray-400 mt-2 block italic font-bold">視窗將於 45 秒後自動關閉</span>'), isOff ? 'text-amber-700' : 'text-green-800');
                    if (!isSilentInit) {
                        setTimeout(() => { if (liff.closeWindow) liff.closeWindow(); }, CONSTANTS.TIMEOUTS.AUTO_CLOSE);
                    }
                } else {
                    AppUI.updateMessage(res.message || '後端回報錯誤，請洽管理員', 'text-red-800');
                    const btn = document.getElementById('checkin-button');
                    btn.disabled = false; btn.textContent = '重新點擊'; btn.classList.add('btn-pulse');
                    AppCore.isLocked = false;
                }
            }
        };
        document.getElementById('checkin-button').onclick = AppCore.execute;
        window.onload = AppCore.init;
    </script>
</body>

</html>
