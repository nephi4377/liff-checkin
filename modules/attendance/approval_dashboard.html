<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添心設計 | 假勤審核儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <!-- [v516.0 修正] 更新共用模組 utils.js 的路徑 -->
    <script type="module" src="../../shared/js/utils.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .spinner { border-top-color: #3498db; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .request-card { transition: opacity 0.5s ease-out, transform 0.5s ease-out; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4 max-w-4xl">
        <div id="loading-screen" class="text-center py-20">
            <div class="spinner w-10 h-10 border-4 border-gray-200 rounded-full mx-auto"></div>
            <p class="mt-4 text-gray-600">正在載入待審核項目...</p>
        </div>

        <div id="main-content" class="hidden">
            <header class="text-center my-6">
                <h1 class="text-3xl font-bold text-gray-800">假勤審核儀表板</h1>
                <p id="welcome-message" class="text-gray-500 mt-2"></p>
            </header>

            <nav id="approval-tabs" class="flex gap-2 mb-6 bg-white p-1.5 rounded-xl shadow-sm border border-gray-100" role="tablist">
                <button type="button" id="tab-leave-approval" class="flex-1 min-h-[44px] text-sm font-semibold rounded-lg bg-blue-600 text-white flex items-center justify-center gap-1.5" role="tab" aria-selected="true">假勤<span id="tab-leave-badge" class="hidden min-w-[1.25rem] h-5 px-1 text-[10px] font-bold rounded-full bg-red-500 text-white"></span></button>
                <button type="button" id="tab-appeal-approval" class="flex-1 min-h-[44px] text-sm font-semibold rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 flex items-center justify-center gap-1.5" role="tab" aria-selected="false">出勤申訴<span id="tab-appeal-badge" class="hidden min-w-[1.25rem] h-5 px-1 text-[10px] font-bold rounded-full bg-amber-500 text-white"></span></button>
                <button type="button" id="tab-payroll-approval" class="hidden flex-1 min-h-[44px] text-sm font-semibold rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200" role="tab" aria-selected="false">薪資核對</button>
            </nav>

            <div id="leave-panel">
                <div id="requests-container" class="space-y-4"></div>
                <p id="no-requests-message" class="text-center text-gray-500 py-12 hidden">太棒了！目前沒有任何待審核的假勤項目。</p>
            </div>

            <div id="appeal-panel" class="hidden">
                <div id="appeals-container" class="space-y-4"></div>
                <p id="no-appeals-message" class="text-center text-gray-500 py-12 hidden">目前沒有待處理的出勤申訴。</p>
            </div>

            <div id="payroll-panel" class="hidden">
                <div id="payroll-reviews-container" class="space-y-4"></div>
                <p id="no-payroll-message" class="text-center text-gray-500 py-12 hidden">目前沒有待審核的薪資核對申請。</p>
            </div>
        </div>
    </div>

    <div id="lightbox" aria-hidden="true">
        <div class="lb-wrap">
            <img class="lb-img" alt="preview">
            <button type="button" class="lb-close" aria-label="關閉">✕</button>
        </div>
    </div>

<!-- 【v31.0 核心改造】將腳本改為 module，並引入 showGlobalNotification -->
<script type="module">
    import { showGlobalNotification } from '../../shared/js/utils.js';
    import { initLightbox } from '../../shared/js/lightbox.js';
    import { initPayrollReviewApproval } from './payroll_review_panel.js';

    const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbz5-DUPNNciVdvE5wrOogNgxYt8EpDZppAe9f2cUh8pW9y3i29fB6n0RA5r-A5KuAiz/exec';
    let userProfile = null;
    let activeTab = 'leave';
    let userPermission = 1;
    let payrollApproval = null;

    function escapeHtml(s) {
        if (s == null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function normalizeCheckinDate(raw) {
        if (!raw) return '';
        const s = String(raw).trim();
        if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
        const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (iso) return iso[0];
        const parts = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
        if (parts) {
            return `${parts[1]}-${String(parts[2]).padStart(2, '0')}-${String(parts[3]).padStart(2, '0')}`;
        }
        const d = new Date(s);
        if (!isNaN(d.getTime())) return d.toLocaleDateString('sv-SE');
        return s.slice(0, 10);
    }

    function normalizeCheckinTime(raw) {
        const m = String(raw || '').trim().match(/^(\d{1,2}):(\d{2})/);
        return m ? `${m[1].padStart(2, '0')}:${m[2]}` : '';
    }

    function switchApprovalTab(tab) {
        activeTab = tab;
        const isLeave = tab === 'leave';
        const isAppeal = tab === 'appeal';
        const isPayroll = tab === 'payroll';
        document.getElementById('leave-panel').classList.toggle('hidden', !isLeave);
        document.getElementById('appeal-panel').classList.toggle('hidden', !isAppeal);
        document.getElementById('payroll-panel').classList.toggle('hidden', !isPayroll);
        const tabLeave = document.getElementById('tab-leave-approval');
        const tabAppeal = document.getElementById('tab-appeal-approval');
        const tabPayroll = document.getElementById('tab-payroll-approval');
        const activeCls = 'flex-1 min-h-[44px] text-sm font-semibold rounded-lg bg-blue-600 text-white';
        const inactiveCls = 'flex-1 min-h-[44px] text-sm font-semibold rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200';
        tabLeave.className = isLeave ? activeCls : inactiveCls;
        tabAppeal.className = isAppeal ? activeCls : inactiveCls;
        if (tabPayroll) tabPayroll.className = isPayroll ? activeCls : inactiveCls;
        tabLeave.setAttribute('aria-selected', isLeave ? 'true' : 'false');
        tabAppeal.setAttribute('aria-selected', isAppeal ? 'true' : 'false');
        if (tabPayroll) tabPayroll.setAttribute('aria-selected', isPayroll ? 'true' : 'false');
        if (isAppeal) fetchPendingAppeals();
        if (isPayroll && payrollApproval) payrollApproval.fetchPending();
    }

    async function main() {
        const urlParams = new URLSearchParams(window.location.search);
        const isLocalTest = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
        userPermission = parseInt(urlParams.get('permission') || urlParams.get('perm') || '5', 10);

        if (isLocalTest) {
            userProfile = {
                userId: urlParams.get('uid') || 'U_manager_test_user',
                displayName: '測試管理者'
            };
            showMainContent();
        } else {
            const uid = urlParams.get('uid');
            const name = urlParams.get('name');
            if (uid && name) {
                userProfile = { userId: uid, displayName: name };
                showMainContent();
            } else {
                document.getElementById('loading-screen').innerHTML = '<p class="text-red-500 font-semibold">錯誤：缺少使用者認證資訊。</p>';
            }
        }
    }

    function showMainContent() {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('main-content').classList.remove('hidden');
        document.getElementById('welcome-message').textContent = `你好，${userProfile.displayName}，以下是待您處理的項目：`;
        fetchAllPending();
    }

    function updateTabBadges(leaveCount, appealCount) {
        const leaveBadge = document.getElementById('tab-leave-badge');
        const appealBadge = document.getElementById('tab-appeal-badge');
        if (leaveBadge) {
            if (leaveCount > 0) {
                leaveBadge.textContent = String(leaveCount);
                leaveBadge.classList.remove('hidden');
            } else {
                leaveBadge.classList.add('hidden');
            }
        }
        if (appealBadge) {
            if (appealCount > 0) {
                appealBadge.textContent = String(appealCount);
                appealBadge.classList.remove('hidden');
            } else {
                appealBadge.classList.add('hidden');
            }
        }
    }

    async function fetchAllPending() {
        const [leaveCount, appealCount] = await Promise.all([
            fetchPendingRequests(),
            fetchPendingAppeals()
        ]);
        updateTabBadges(leaveCount, appealCount);
        if (leaveCount === 0 && appealCount > 0) {
            switchApprovalTab('appeal');
        }
    }

    async function fetchPendingRequests() {
        let count = 0;
        try {
            const url = new URL(API_BASE_URL);
            url.searchParams.append('page', 'attendance_api');
            url.searchParams.append('action', 'get_pending_requests');
            url.searchParams.append('userId', userProfile.userId);

            const response = await fetch(url);
            const result = await response.json();
            console.log('後端回傳的待審核項目:', result);

            const container = document.getElementById('requests-container');
            container.innerHTML = '';
            document.getElementById('no-requests-message').classList.add('hidden');

            if (result.success && result.data.length > 0) {
                count = result.data.length;
                result.data.forEach(req => {
                    container.appendChild(createRequestCard(req));
                });
            } else {
                document.getElementById('no-requests-message').classList.remove('hidden');
            }
        } catch (error) {
            document.getElementById('loading-screen').innerHTML = `<p class="text-red-500 font-semibold">載入失敗: ${error.message}</p>`;
        }
        return count;
    }

    async function fetchPendingAppeals() {
        let count = 0;
        try {
            const url = new URL(API_BASE_URL);
            url.searchParams.append('page', 'attendance_api');
            url.searchParams.append('action', 'attendance_appeal');
            url.searchParams.append('mode', 'pending');
            url.searchParams.append('operatorId', userProfile.userId);

            const response = await fetch(url);
            const result = await response.json();
            const container = document.getElementById('appeals-container');
            container.innerHTML = '';
            document.getElementById('no-appeals-message').classList.add('hidden');

            if (result.success && result.data.length > 0) {
                count = result.data.length;
                result.data.forEach((appeal) => container.appendChild(createAppealCard(appeal)));
            } else {
                document.getElementById('no-appeals-message').classList.remove('hidden');
            }
        } catch (error) {
            document.getElementById('appeals-container').innerHTML = `<p class="text-red-500 text-center py-8">載入申訴失敗：${escapeHtml(error.message)}</p>`;
        }
        return count;
    }

    function createAppealCard(appeal) {
        const card = document.createElement('div');
        card.id = `appeal-${appeal.appealId}`;
        card.className = 'request-card bg-white p-5 rounded-lg shadow-md border-l-4 border-amber-400';

        const statusLabel = appeal.isLateSubmit && appeal.status === '待審' ? '待審核（逾期送出）' : appeal.status;
        const targetDateYmd = normalizeCheckinDate(appeal.targetDate);
        const attachments = (appeal.attachmentUrls || '').split(';').filter(Boolean);
        const attachHtml = attachments.length
            ? `<div class="flex flex-wrap gap-2 mt-1">${attachments.map((u, i) =>
                `<button type="button" class="appeal-attach-thumb block w-16 h-16 rounded border border-gray-200 overflow-hidden p-0 bg-gray-50 hover:ring-2 hover:ring-blue-400 cursor-pointer" data-idx="${i}" title="點擊放大 附件${i + 1}"><img src="${escapeHtml(u)}" alt="附件${i + 1}" class="w-full h-full object-cover" loading="lazy"></button>`
            ).join('')}</div>`
            : '<span class="text-gray-400 text-sm">無</span>';

        let snapshotText = appeal.systemSnapshot || '';
        try {
            const snap = JSON.parse(appeal.systemSnapshot);
            snapshotText = `上班 ${snap.checkIn || '—'}、下班 ${snap.checkOut || '—'}、狀態 ${snap.status || '—'}`;
        } catch (e) { /* keep raw */ }

        const manualBlock = appeal.status === '待補登' ? `
            <div class="mt-4 p-3 bg-green-50 rounded-md border border-green-100 space-y-2">
                <p class="text-sm font-medium text-green-800">請補登打卡（完成後申訴自動結案）</p>
                <div class="grid grid-cols-2 gap-2">
                    <input type="time" id="fix-time-${appeal.appealId}" class="rounded border-gray-300 text-sm" value="08:30">
                    <select id="fix-type-${appeal.appealId}" class="rounded border-gray-300 text-sm"><option value="上班">上班</option><option value="下班">下班</option></select>
                </div>
                <button type="button" data-appeal-fix="${appeal.appealId}" data-employee-id="${appeal.employeeUserId}" data-target-date="${escapeHtml(targetDateYmd)}" class="w-full px-3 py-2 text-sm font-bold text-white bg-green-600 rounded-md hover:bg-green-700">執行補登</button>
            </div>` : '';

        card.innerHTML = `
            <div class="flex justify-between items-start gap-2">
                <div>
                    <h3 class="text-lg font-bold text-gray-800">${escapeHtml(appeal.employeeName)} · ${escapeHtml(targetDateYmd)}</h3>
                    <p class="text-sm text-gray-500">${escapeHtml(appeal.employeeGroup || '')} · ${escapeHtml(appeal.anomalyType)}</p>
                </div>
                <span class="text-xs font-semibold px-2 py-1 rounded-full bg-amber-100 text-amber-800">${escapeHtml(statusLabel)}</span>
            </div>
            <div class="mt-3 space-y-1 text-sm text-gray-700">
                <p><strong>系統紀錄：</strong>${escapeHtml(snapshotText)}</p>
                <p><strong>員工說明：</strong>${escapeHtml(appeal.reason || '(未填)')}</p>
                <p><strong>附件：</strong>${attachHtml}</p>
                ${appeal.reviewNote ? `<p><strong>審核備註：</strong>${escapeHtml(appeal.reviewNote)}</p>` : ''}
            </div>
            <div id="appeal-note-wrap-${appeal.appealId}" class="hidden mt-3">
                <input type="text" id="appeal-note-${appeal.appealId}" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm" placeholder="審核回覆（駁回時必填）">
            </div>
            ${appeal.status === '待審' ? `
            <div class="mt-4 p-3 bg-gray-50 rounded-md border border-gray-100 space-y-3">
                <p class="text-sm font-medium text-gray-700">補登打卡（核准時一併完成）</p>
                <div class="grid grid-cols-2 gap-2">
                    <input type="time" id="fix-time-${appeal.appealId}" class="rounded border-gray-300 text-sm" value="08:30">
                    <select id="fix-type-${appeal.appealId}" class="rounded border-gray-300 text-sm"><option value="上班">上班</option><option value="下班">下班</option></select>
                </div>
                <div class="flex flex-wrap justify-end gap-2">
                    <button type="button" data-appeal-decision="reject" data-appeal-id="${appeal.appealId}" class="px-3 py-2 text-sm font-bold text-white bg-red-500 rounded-md hover:bg-red-600">駁回</button>
                    <button type="button" data-appeal-decision="note_only" data-appeal-id="${appeal.appealId}" class="px-3 py-2 text-sm font-bold text-white bg-gray-500 rounded-md hover:bg-gray-600">僅備註</button>
                    <button type="button" data-appeal-approve-fix="${appeal.appealId}" data-employee-id="${escapeHtml(appeal.employeeUserId)}" data-target-date="${escapeHtml(targetDateYmd)}" class="px-3 py-2 text-sm font-bold text-white bg-green-600 rounded-md hover:bg-green-700">核准並補登</button>
                </div>
            </div>` : ''}
            ${manualBlock}
        `;
        if (attachments.length) {
            card.dataset.attachmentUrls = JSON.stringify(attachments);
        }
        return card;
    }

    async function postManualCheckin(appealId, userId, date, time, eventType) {
        const dateYmd = normalizeCheckinDate(date);
        const timeHm = normalizeCheckinTime(time);
        if (!dateYmd || !timeHm) {
            throw new Error('日期或時間格式無效（請使用 YYYY-MM-DD 與 HH:mm）');
        }
        const url = new URL(API_BASE_URL);
        url.searchParams.append('page', 'attendance_api');
        url.searchParams.append('action', 'add_manual_checkin');
        url.searchParams.append('userId', userId);
        url.searchParams.append('date', dateYmd);
        url.searchParams.append('time', timeHm);
        url.searchParams.append('eventType', eventType);
        url.searchParams.append('operatorId', userProfile.userId);
        url.searchParams.append('operatorName', userProfile.displayName);
        url.searchParams.append('appealId', appealId);
        const response = await fetch(url);
        const result = await response.json();
        if (!result.success) throw new Error(result.message || '補登失敗');
        return result;
    }

    function removeAppealCard(appealId) {
        const card = document.getElementById(`appeal-${appealId}`);
        if (card) card.remove();
        if (!document.getElementById('appeals-container').children.length) {
            document.getElementById('no-appeals-message').classList.remove('hidden');
        }
    }

    async function postAppealResolve(appealId, decision, reviewNote) {
        const payload = {
            action: 'attendance_appeal', op: 'resolve',
            operatorId: userProfile.userId, userName: userProfile.displayName,
            appealId, decision, reviewNote: reviewNote || ''
        };
        const response = await fetch(API_BASE_URL, {
            method: 'POST', cache: 'no-cache',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (!result.success) throw new Error(result.message || '審核失敗');
        return result;
    }

    async function handleAppealAction(event) {
        const thumb = event.target.closest('.appeal-attach-thumb');
        if (thumb) {
            const card = thumb.closest('[data-attachment-urls]');
            if (card && card.dataset.attachmentUrls && window.__openLightbox__) {
                try {
                    const urls = JSON.parse(card.dataset.attachmentUrls);
                    const idx = parseInt(thumb.dataset.idx, 10) || 0;
                    window.__openLightbox__(urls, idx);
                } catch (e) { /* ignore */ }
            }
            return;
        }

        const approveFixBtn = event.target.closest('[data-appeal-approve-fix]');
        if (approveFixBtn) {
            const appealId = approveFixBtn.dataset.appealApproveFix;
            const userId = approveFixBtn.dataset.employeeId;
            const date = approveFixBtn.dataset.targetDate;
            const time = document.getElementById(`fix-time-${appealId}`).value;
            const eventType = document.getElementById(`fix-type-${appealId}`).value;
            const noteInput = document.getElementById(`appeal-note-${appealId}`);
            const reviewNote = noteInput ? noteInput.value.trim() : '';
            if (!time) {
                alert('請選擇補登時間');
                return;
            }
            approveFixBtn.disabled = true;
            approveFixBtn.textContent = '處理中…';
            try {
                await postAppealResolve(appealId, 'approve_fix', reviewNote);
                await postManualCheckin(appealId, userId, date, time, eventType);
                showGlobalNotification('已核准並補登，申訴已結案', 5000, 'success');
                removeAppealCard(appealId);
            } catch (error) {
                alert(`核准並補登失敗：${error.message}\n若狀態已變「待補登」，可再按「執行補登」重試。`);
                approveFixBtn.disabled = false;
                approveFixBtn.textContent = '核准並補登';
                fetchPendingAppeals();
            }
            return;
        }

        const fixBtn = event.target.closest('[data-appeal-fix]');
        if (fixBtn) {
            fixBtn.disabled = true;
            fixBtn.textContent = '補登中…';
            try {
                const appealId = fixBtn.dataset.appealFix;
                const userId = fixBtn.dataset.employeeId;
                const date = fixBtn.dataset.targetDate;
                const time = document.getElementById(`fix-time-${appealId}`).value;
                const eventType = document.getElementById(`fix-type-${appealId}`).value;
                await postManualCheckin(appealId, userId, date, time, eventType);
                showGlobalNotification('補登成功，申訴已結案', 5000, 'success');
                removeAppealCard(appealId);
            } catch (error) {
                alert(`補登失敗：${error.message}`);
                fixBtn.disabled = false;
                fixBtn.textContent = '執行補登';
            }
            return;
        }

        const btn = event.target.closest('[data-appeal-decision]');
        if (!btn) return;
        const appealId = btn.dataset.appealId;
        const decision = btn.dataset.appealDecision;
        const noteWrap = document.getElementById(`appeal-note-wrap-${appealId}`);
        const noteInput = document.getElementById(`appeal-note-${appealId}`);
        const reviewNote = noteInput ? noteInput.value.trim() : '';

        if (decision === 'reject' && !reviewNote && noteWrap.classList.contains('hidden')) {
            noteWrap.classList.remove('hidden');
            return;
        }
        if (decision === 'reject' && !reviewNote) {
            alert('駁回時請填寫回覆說明');
            return;
        }

        btn.disabled = true;
        try {
            await postAppealResolve(appealId, decision, reviewNote);
            showGlobalNotification('申訴已更新', 4000, 'success');
            removeAppealCard(appealId);
        } catch (error) {
            alert(`操作失敗：${error.message}`);
            btn.disabled = false;
        }
    }

    function createRequestCard(req) {
        const card = document.createElement('div');
        card.id = `req-${req.timestamp}`;
        card.className = 'request-card bg-white p-5 rounded-lg shadow-md border-l-4';
        
        const statusColors = { '待審核': 'border-amber-400', '已報備': 'border-blue-400' };
        card.classList.add(statusColors[req.status] || 'border-gray-400');

        const formatDateTime = (dtStr) => new Date(dtStr).toLocaleString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });

        card.innerHTML = `
            <div class="flex justify-between items-start">
                <div>
                    <h3 class="text-lg font-bold text-gray-800">${req.userName} - <span class="text-indigo-600">${req.leaveType}</span></h3>
                    <p class="text-sm text-gray-500">${req.recordType}</p>
                </div>
                <span class="text-xs font-semibold px-2 py-1 rounded-full ${req.status === '待審核' ? 'bg-amber-100 text-amber-800' : 'bg-blue-100 text-blue-800'}">${req.status}</span>
            </div>
            <div class="mt-4 space-y-2 text-sm text-gray-700">
                <p><strong>時間：</strong> ${formatDateTime(req.startTime)} 至 ${formatDateTime(req.endTime)}</p>
                <p><strong>事由：</strong> ${req.reason || '(未填寫)'}</p>
            </div>
            <!-- 【v36.0 新增】駁回理由輸入區塊 (預設隱藏) -->
            <div id="reject-reason-wrapper-${req.timestamp}" class="hidden mt-4 space-y-2">
                <label for="reject-reason-${req.timestamp}" class="block text-sm font-medium text-gray-700">駁回理由 (可選填)</label>
                <input type="text" id="reject-reason-${req.timestamp}" class="w-full px-3 py-2 border border-gray-300 rounded-md" placeholder="請輸入駁回的理由...">
                <button data-decision="confirm-reject" data-record-id="${req.timestamp}" class="w-full px-4 py-2 text-sm font-bold text-white bg-red-600 rounded-md hover:bg-red-700">確認駁回</button>
            </div>
            <div class="mt-4 flex justify-end gap-3">
                <button data-decision="rejected" data-record-id="${req.timestamp}" class="px-4 py-2 text-sm font-bold text-white bg-red-500 rounded-md hover:bg-red-600">駁回</button>
                <button data-decision="approved" data-record-id="${req.timestamp}" class="px-4 py-2 text-sm font-bold text-white bg-green-500 rounded-md hover:bg-green-600">批准</button>
            </div>
        `;

        return card;
    }

    async function handleApproval(event) {
        const button = event.target.closest('button[data-decision]');
        if (!button) return;

        const { decision, recordId } = button.dataset;

        // 【v36.0 核心改造】處理駁回按鈕的 UI 互動
        if (decision === 'rejected') {
            const wrapper = document.getElementById(`reject-reason-wrapper-${recordId}`);
            if (wrapper) {
                wrapper.classList.toggle('hidden'); // 切換顯示/隱藏輸入框
            }
            return; // 中斷後續流程
        }

        button.disabled = true;
        button.textContent = '處理中...';

        // 【v36.0 核心改造】處理批准與確認駁回的邏輯
        let reason = '';
        let finalDecision = decision;

        if (decision === 'confirm-reject') {
            finalDecision = 'rejected'; // 將動作轉換為後端可識別的 'rejected'
            const reasonInput = document.getElementById(`reject-reason-${recordId}`);
            reason = reasonInput ? reasonInput.value : '';
        }

        try {
            // 【v43.0 核心改造】為了解決 CORS 問題，且不修改後端，改用 no-cors 模式發送 GET 請求。
            // 這是一種「發射後不理」的策略，前端無法讀取後端的回應內容，但請求會成功送達。
            const url = new URL(API_BASE_URL);
            url.searchParams.append('page', 'attendance_api');
            url.searchParams.append('action', 'handle_approval');
            url.searchParams.append('decision', finalDecision);
            url.searchParams.append('recordId', recordId);
            url.searchParams.append('approverName', userProfile.displayName);
            if (reason) url.searchParams.append('reason', reason);

            const response = await fetch(url, { mode: 'no-cors' });
            console.log('已使用 no-cors 模式發送審核請求。注意：前端無法讀取後端回應。');

            // 在 no-cors 模式下，我們無法得知 response.ok 的真實狀態，
            // 但只要 fetch 沒有拋出網路錯誤，我們就樂觀地假設後端已成功處理。
            if (true) { // 樂觀更新 UI
                const card = document.getElementById(`req-${recordId}`);
                if (card) {
                    card.style.opacity = '0';
                    card.style.transform = 'translateX(50px)';
                    // 更新 Hub 頁面的計數
                    const currentCount = parseInt(document.getElementById('approval-badge')?.textContent || '1', 10);
                    if (window.opener && window.opener.updateApprovalBadge) {
                        window.opener.updateApprovalBadge(Math.max(0, currentCount - 1));
                    }
                    setTimeout(() => card.remove(), 500);
                }
            } else {
                throw new Error(`伺服器回應錯誤: ${response.status}`);
            }
        } catch (error) {
            alert(`操作失敗: ${error.message}`);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        initLightbox();
        main();
        document.getElementById('requests-container').addEventListener('click', handleApproval);
        document.getElementById('appeals-container').addEventListener('click', handleAppealAction);
        document.getElementById('tab-leave-approval').addEventListener('click', () => switchApprovalTab('leave'));
        document.getElementById('tab-appeal-approval').addEventListener('click', () => switchApprovalTab('appeal'));
        document.getElementById('tab-payroll-approval').addEventListener('click', () => switchApprovalTab('payroll'));
    });
</script>    
</body>
</html>
