<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添心設計 | 員工打卡 (重構測試版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <!-- =============================================================== -->
    <!-- [v2026.1] 集中化配置 (Centralized Configuration)             -->
    <!-- =============================================================== -->
    <script>
        const CONSTANTS = {
            LIFF_ID: '2007974938-jVxn6y37',
            GAS_URL: 'https://script.google.com/macros/s/AKfycbz5-DUPNNciVdvE5wrOogNgxYt8EpDZppAe9f2cUh8pW9y3i29fB6n0RA5r-A5KuAiz/exec',
            VERSION: 'v26.02.28.CORE-REF',
            CACHE_KEYS: {
                PROFILE: 'checkin_user_profile_cache',
                HISTORY: 'checkin_history_records',
                QUEUE: 'checkin_offline_queue'
            },
            TIMEOUTS: {
                INIT: 10000,
                GEO: 12000,
                SYNC: 30000,
                AUTO_CLOSE: 45000
            },
            MAX_RETRY: 3,
            HISTORY_LIMIT: 15,
            // 【測試專用】模擬身分庫
            MOCK_USERS: {
                "BOSS": { userId: 'Ud58333430513b7527106fa71d2e30151', displayName: '黃俊豪 (BOSS)' },
                "MANAGER": { userId: 'Ucd6cb7c6f541e9d6c92b83be1dba5d74', displayName: '添心設計 店長' },
                "STORE": { userId: 'Ua6306c79f1250e55be6a1546882bb6ac', displayName: '添心設計-台南店' }
            }
        };
    </script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        .gradient-bg {
            background-image: linear-gradient(to top, #f3e7e9 0%, #e3eeff 99%, #e3eeff 100%);
        }

        .btn-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(59, 130, 246, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
            }
        }

        .spinner {
            border-top-color: #3498db;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .status-indicator {
            transition: all 0.3s ease;
        }

        .status-pending .status-icon {
            color: #9ca3af;
        }

        .status-success .status-icon {
            color: #22c55e;
        }

        .status-error .status-icon {
            color: #ef4444;
        }

        .status-success .status-text {
            color: #166534;
        }

        .status-error .status-text {
            color: #991b1b;
        }
    </style>
</head>

<body class="gradient-bg flex flex-col items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md mx-auto bg-white rounded-2xl shadow-xl p-8 text-center">

        <!-- 圖示區塊 -->
        <div id="ui-icons" class="mb-6">
            <div id="icon-offline" class="hidden">
                <svg class="mx-auto h-12 w-auto text-amber-500" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 16.2A4.5 4.5 0 0 0 17.5 8h-1.8A7 7 0 1 0 4 14.9" />
                    <path d="M12 12v9" />
                    <path d="m16 16-4-4-4 4" />
                </svg>
            </div>
            <div id="icon-default">
                <svg class="mx-auto h-12 w-auto text-blue-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <h1 class="text-2xl font-bold text-gray-800 mt-2">添心設計</h1>
                <p class="text-[10px] text-blue-500 font-mono">REFACTORED CORE v1.1</p>
            </div>
        </div>

        <!-- 狀態燈號 -->
        <div class="grid grid-cols-3 gap-4 mb-6 text-center">
            <div id="status-line" class="status-indicator status-pending">
                <div class="status-icon mx-auto"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z" />
                        <path
                            d="M12.01 6c-1.09 0-2.1.48-2.82 1.25l1.42 1.42C11.12 8.16 11.55 8 12.01 8c1.65 0 3 1.35 3 3s-1.35 3-3 3c-.46 0-.89-.16-1.28-.42L9.31 15.01C10.21 15.63 11.23 16 12.01 16c3.31 0 6-2.69 6-6s-2.69-6-6-6z" />
                    </svg></div>
                <div class="status-text text-xs font-semibold mt-1">身分驗證</div>
            </div>
            <div id="status-network" class="status-indicator status-pending">
                <div class="status-icon mx-auto"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 4.5C7.31 4.5 3.19 6.34 0 9.25l2.25 2.25C4.32 9.61 7.95 8 12 8s7.68 1.61 9.75 3.5l2.25-2.25C20.81 6.34 16.69 4.5 12 4.5zM12 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-4-4.5C9.66 13.5 10.76 13 12 13s2.34.5 3.5 1.5l-3.5 3.5-3.5-3.5z" />
                    </svg></div>
                <div class="status-text text-xs font-semibold mt-1">網路狀態</div>
            </div>
            <div id="status-gps" class="status-indicator status-pending">
                <div class="status-icon mx-auto"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
                    </svg></div>
                <div class="status-text text-xs font-semibold mt-1">GPS狀態</div>
            </div>
        </div>

        <!-- 訊息與載入區塊 -->
        <div id="status-panel"
            class="mb-8 p-4 rounded-lg bg-gray-50 min-h-[100px] flex flex-col items-center justify-center transition-colors duration-500">
            <div id="message" class="text-gray-700">歡迎，<span id="displayName"
                    class="font-semibold text-blue-600">讀取中...</span>！<br>準備啟動打卡程序。</div>
            <div id="loading" class="hidden flex flex-col items-center mt-2">
                <div class="spinner w-8 h-8 border-4 border-gray-200 rounded-full mb-2"></div>
                <p id="loading-text" class="text-xs text-blue-500 font-bold"></p>
            </div>

            <!-- 歷史紀錄列表 -->
            <div id="history-container" class="mt-4 pt-3 border-t border-gray-200 w-full hidden">
                <p class="text-[10px] text-gray-400 mb-2 font-bold uppercase tracking-wider text-left">Recent Records
                </p>
                <ul id="history-list"
                    class="text-sm text-gray-600 font-mono space-y-2 max-h-48 overflow-y-auto text-left px-2"></ul>
            </div>
        </div>

        <button id="btn-checkin"
            class="w-full bg-blue-600 text-white font-bold py-4 px-6 rounded-lg text-lg hover:bg-blue-700 transition-all transform hover:scale-105 btn-pulse disabled:bg-gray-400 disabled:shadow-none"
            disabled>
            打卡
        </button>

        <!-- 測試用：身分切換 -->
        <div id="test-selector" class="mt-6 flex flex-wrap justify-center gap-2 hidden">
            <button onclick="AppCore.switchUser('BOSS')" class="text-[9px] px-2 py-1 bg-gray-100 rounded">黃俊豪</button>
            <button onclick="AppCore.switchUser('MANAGER')" class="text-[9px] px-2 py-1 bg-gray-100 rounded">店長</button>
            <button onclick="AppCore.switchUser('STORE')" class="text-[9px] px-2 py-1 bg-gray-100 rounded">台南店</button>
        </div>
    </div>

    <!-- 詳細資訊彈窗 -->
    <div id="detail-modal"
        class="fixed inset-0 bg-gray-900 bg-opacity-60 hidden flex items-center justify-center z-50 px-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 transform transition-all">
            <div class="flex justify-between items-start mb-4">
                <h3 id="modal-title" class="text-xl font-bold">打卡詳細</h3>
                <button onclick="AppUI.closeModal()" class="text-gray-400 hover:text-gray-600"><svg class="w-6 h-6"
                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg></button>
            </div>
            <p id="modal-time" class="text-xs text-gray-400 mb-3 font-mono border-b pb-2"></p>
            <div id="modal-content"
                class="text-gray-700 text-sm whitespace-pre-wrap bg-gray-50 p-4 rounded-xl border border-gray-100 max-h-60 overflow-y-auto font-medium">
            </div>
            <button onclick="AppUI.closeModal()"
                class="mt-6 w-full bg-gray-100 text-gray-700 font-bold py-3 rounded-xl hover:bg-gray-200">關閉</button>
        </div>
    </div>

    <footer class="mt-8 text-center text-[10px] text-gray-300">
        <p>VERSION: <span id="ui-version"></span> | SYSTEM STABLE</p>
    </footer>

    <!-- =============================================================== -->
    <!-- [v2026.1] 核心開發規範區塊 - 職責分離與承重牆保護                -->
    <!-- =============================================================== -->
    <script>
        /**
         * @stable AppStorage - 資料持久化模組
         * 負責所有 localStorage、快取與隊列管理。
         */
        const AppStorage = {
            save: (key, data, days = 7) => {
                const bundle = { data, expires: Date.now() + days * 86400000 };
                try { localStorage.setItem(key, JSON.stringify(bundle)); } catch (e) { console.error('Cache Save Error', e); }
            },
            load: (key) => {
                const raw = localStorage.getItem(key);
                if (!raw) return null;
                try {
                    const bundle = JSON.parse(raw);
                    if (bundle.expires < Date.now()) { localStorage.removeItem(key); return null; }
                    return bundle.data;
                } catch (e) { return null; }
            },
            getHistory: () => AppStorage.load(CONSTANTS.CACHE_KEYS.HISTORY) || [],
            addHistory: (record) => {
                let h = AppStorage.getHistory();
                h.unshift({ ...record, timestamp: Date.now() });
                AppStorage.save(CONSTANTS.CACHE_KEYS.HISTORY, h.slice(0, CONSTANTS.HISTORY_LIMIT));
            },
            getQueue: () => JSON.parse(localStorage.getItem(CONSTANTS.CACHE_KEYS.QUEUE)) || [],
            saveQueue: (q) => localStorage.setItem(CONSTANTS.CACHE_KEYS.QUEUE, JSON.stringify(q)),
            addToQueue: (record) => {
                const q = AppStorage.getQueue();
                q.push(record);
                AppStorage.saveQueue(q);
            }
        };

        /**
         * @core AppGeo - 地理位置模組
         */
        const AppGeo = {
            getCurrent: () => {
                return new Promise((res, rej) => {
                    if (!navigator.geolocation) return rej(new Error('不支援 GPS'));
                    navigator.geolocation.getCurrentPosition(res, rej, {
                        enableHighAccuracy: true, timeout: CONSTANTS.TIMEOUTS.GEO, maximumAge: 0
                    });
                });
            },
            withRetry: async (retries = CONSTANTS.MAX_RETRY) => {
                for (let i = 1; i <= retries; i++) {
                    try {
                        console.log(`[GEO] Attempt ${i}...`);
                        return await AppGeo.getCurrent();
                    } catch (e) {
                        if (i === retries) throw e;
                        await new Promise(r => setTimeout(r, 1000));
                    }
                }
            }
        };

        /**
         * @core AppAPI - 通訊與背景服務模組
         */
        const AppAPI = {
            request: async (params) => {
                const url = new URL(CONSTANTS.GAS_URL);
                Object.entries(params).forEach(([k, v]) => url.searchParams.append(k, v));

                const res = await Promise.race([
                    fetch(url),
                    new Promise((_, rej) => setTimeout(() => rej(new Error('API 響應超時')), CONSTANTS.TIMEOUTS.SYNC))
                ]);

                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.json();
            },
            syncAll: async () => {
                const q = AppStorage.getQueue();
                if (!q.length) return;
                console.log(`[API] 同步離線隊列: ${q.length} 筆`);
                let remaining = [];
                for (const item of q) {
                    try { await AppAPI.request(item); } catch (e) { remaining.push(item); }
                }
                AppStorage.saveQueue(remaining);
            }
        };

        /**
         * AppUI - 介面與渲染模組
         */
        const AppUI = {
            updateIndicator: (name, status, text) => {
                const el = document.getElementById(`status-${name}`);
                if (!el) return;
                el.className = `status-indicator status-${status}`;
                el.querySelector('.status-text').textContent = text;
            },
            setLoading: (show, text = '') => {
                document.getElementById('loading').classList.toggle('hidden', !show);
                document.getElementById('loading-text').textContent = text;
                document.getElementById('btn-checkin').disabled = show;
            },
            setMessage: (html, colorClass = 'text-gray-700') => {
                const msg = document.getElementById('message');
                msg.innerHTML = html;
                msg.className = colorClass;
            },
            showModal: (record) => {
                const isFail = record.message.includes('失敗');
                const isOffline = record.isOffline;
                const modal = document.getElementById('detail-modal');
                const title = document.getElementById('modal-title');

                title.textContent = isFail ? '打卡失敗' : (isOffline ? '離線簽到' : '打卡成功');
                title.className = `text-xl font-bold ${isFail ? 'text-red-600' : (isOffline ? 'text-amber-600' : 'text-green-600')}`;

                document.getElementById('modal-time').textContent = new Date(record.timestamp).toLocaleString();
                document.getElementById('modal-content').textContent = record.message;
                modal.classList.remove('hidden');
            },
            closeModal: () => document.getElementById('detail-modal').classList.add('hidden'),
            renderHistory: () => {
                const h = AppStorage.getHistory();
                const container = document.getElementById('history-container');
                const list = document.getElementById('history-list');

                if (!h.length) { container.classList.add('hidden'); return; }
                container.classList.remove('hidden');

                list.innerHTML = '';
                h.forEach(record => {
                    const isOffline = record.isOffline;
                    const isFail = record.message.includes('失敗');
                    const timeStr = new Date(record.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const dateStr = `${new Date(record.timestamp).getMonth() + 1}/${new Date(record.timestamp).getDate()}`;

                    const li = document.createElement('li');
                    li.className = `flex justify-between items-center p-2 rounded-lg cursor-pointer transition-colors ${isFail ? 'bg-red-50' : 'hover:bg-gray-50'}`;

                    let icon = `<svg class="w-3 h-3 ${isFail ? 'text-red-500' : (isOffline ? 'text-amber-500' : 'text-green-500')} mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${isFail ? 'M6 18L18 6M6 6l12 12' : 'M5 13l4 4L19 7'}"/></svg>`;

                    // 下班時間解析
                    const offMatch = record.message.match(/下班：(\d{2}:\d{2})/);
                    const offTag = offMatch ? `<span class="bg-blue-50 text-blue-600 px-1 py-0.5 rounded-[4px] text-[9px] font-bold ml-2">下班 ${offMatch[1]}</span>` : '';

                    li.innerHTML = `
                        <div class="flex items-center truncate">
                            ${icon} <span class="text-[11px] font-bold">${dateStr} ${timeStr}</span> ${offTag}
                        </div>
                        <span class="text-[10px] text-gray-400 truncate ml-2">${record.message.split('\n')[0].substring(0, 10)}...</span>
                    `;
                    li.onclick = () => AppUI.showModal(record);
                    list.appendChild(li);
                });

                // 如果今天有上班，顯示醒目通知
                const todayStr = new Date().toDateString();
                const firstOne = h.find(r => new Date(r.timestamp).toDateString() === todayStr && !r.message.includes('失敗'));
                if (firstOne) {
                    const time = new Date(firstOne.timestamp).toTimeString().substring(0, 5);
                    const offMatch = firstOne.message.match(/下班：(\d{2}:\d{2})/);
                    AppUI.setMessage(`✅ 今日已於 <span class="text-blue-600 font-bold">${time}</span> 打卡<br>${offMatch ? `預計下班：<span class="text-blue-600 font-bold">${offMatch[1]}</span>` : ''}`, 'text-green-800');
                }
            }
        };

        /**
         * @stable AppCore - 業務邏輯與狀態機
         */
        const AppCore = {
            user: null,
            isProcessing: false,

            init: async () => {
                document.getElementById('ui-version').textContent = CONSTANTS.VERSION;

                // 1. 初始化 UI
                AppUI.updateIndicator('network', navigator.onLine ? 'success' : 'error', navigator.onLine ? '連線中' : '無網路');
                window.ononline = window.onoffline = () => AppUI.updateIndicator('network', navigator.onLine ? 'success' : 'error', navigator.onLine ? '連線中' : '無網路');
                AppUI.renderHistory();

                // 2. 快取優先加載
                const cached = AppStorage.load(CONSTANTS.CACHE_KEYS.PROFILE);
                if (cached) {
                    AppCore.user = cached;
                    document.getElementById('displayName').textContent = cached.displayName;
                    AppUI.updateIndicator('line', 'success', '快取登入');
                    document.getElementById('btn-checkin').disabled = false;
                }

                // 3. 測試環境判斷
                const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.search.includes('debug=true');
                if (isLocal) {
                    document.getElementById('test-selector').classList.remove('hidden');
                    if (!cached) AppCore.switchUser('BOSS');
                    AppAPI.syncAll();
                    return;
                }

                // 4. 生產環境 LIFF 初始化
                try {
                    await liff.init({ liffId: CONSTANTS.LIFF_ID });
                    if (!liff.isLoggedIn()) { liff.login(); return; }
                    const p = await liff.getProfile();
                    AppCore.user = p;
                    AppStorage.save(CONSTANTS.CACHE_KEYS.PROFILE, p);
                    document.getElementById('displayName').textContent = p.displayName;
                    AppUI.updateIndicator('line', 'success', '已連線');
                    document.getElementById('btn-checkin').disabled = false;
                    AppAPI.syncAll();
                } catch (e) {
                    AppUI.updateIndicator('line', 'error', '授權失效');
                }
            },

            switchUser: (key) => {
                const u = CONSTANTS.MOCK_USERS[key];
                AppCore.user = u;
                AppStorage.save(CONSTANTS.CACHE_KEYS.PROFILE, u);
                document.getElementById('displayName').textContent = u.displayName;
                AppUI.updateIndicator('line', 'success', '測試切換');
                AppUI.renderHistory();
                console.log(`[CORE] Switched to ${u.displayName}`);
            },

            doCheckin: async () => {
                if (AppCore.isProcessing) return;
                AppCore.isProcessing = true;
                AppUI.setLoading(true, '定位中...');
                AppUI.updateIndicator('gps', 'pending', '定位中');

                const startTime = Date.now();
                const recordId = `REQ_${startTime}`;

                try {
                    // 1. GPS
                    const pos = await AppGeo.withRetry();
                    const { latitude, longitude } = pos.coords;
                    AppUI.updateIndicator('gps', 'success', '定位成功');

                    // 2. 封裝封包
                    const payload = {
                        userId: AppCore.user.userId,
                        userName: AppCore.user.displayName,
                        lat: latitude, lon: longitude,
                        timestamp: startTime,
                        source: location.search.includes('debug') ? 'test_refactor' : 'richmenu'
                    };

                    // 3. 寫入離線隊列 (高穩定預防機制)
                    AppStorage.addToQueue({ ...payload, id: recordId });
                    AppUI.setLoading(true, '傳送資訊...');

                    // 4. 發射 API
                    try {
                        const res = await AppAPI.request(payload);
                        // 清理隊列
                        const q = AppStorage.getQueue().filter(r => r.id !== recordId);
                        AppStorage.saveQueue(q);

                        AppCore.handleSuccess(res.message, false);
                    } catch (apiErr) {
                        console.warn('Immediate sync failed, relied on queue', apiErr);
                        AppCore.handleSuccess('打卡成功！(離線紀錄已暫存，將自動上傳)', true);
                    }

                } catch (e) {
                    AppUI.updateIndicator('gps', 'error', '失敗');
                    AppUI.setMessage(`<span class="text-red-500 font-bold">打卡失敗</span><br>${e.message}`, 'text-red-800');
                    AppCore.isProcessing = false;
                    AppUI.setLoading(false);
                }
            },

            handleSuccess: (msg, isOffline) => {
                AppUI.setLoading(false);
                AppStorage.addHistory({ message: msg, isOffline });
                AppUI.renderHistory();

                const panel = document.getElementById('status-panel');
                panel.className = `mb-8 p-4 rounded-lg min-h-[100px] flex flex-col items-center justify-center border ${isOffline ? 'bg-amber-50 border-amber-200' : 'bg-green-50 border-green-200'}`;

                const btn = document.getElementById('btn-checkin');
                btn.textContent = isOffline ? '打卡完成 (離線)' : '打卡成功';
                btn.className = `w-full text-white font-bold py-4 px-6 rounded-lg text-lg ${isOffline ? 'bg-amber-500' : 'bg-green-600'}`;
                btn.disabled = true;

                if (isOffline) {
                    document.getElementById('icon-default').classList.add('hidden');
                    document.getElementById('icon-offline').classList.remove('hidden');
                }

                setTimeout(() => { if (liff.closeWindow) liff.closeWindow(); }, CONSTANTS.TIMEOUTS.AUTO_CLOSE);
            }
        };

        // 綁定按紐
        document.getElementById('btn-checkin').onclick = AppCore.doCheckin;
        window.onload = AppCore.init;
    </script>
</body>

</html>
